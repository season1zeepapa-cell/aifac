    // ========================================
    // л¬ём„ң мғҒм„ё лӘЁлӢ¬ (мһҘ/м Ҳ м ‘кё°/нҺјм№ҳкё° м§Җмӣҗ)
    // ========================================
    function DocumentDetailModal({ isOpen, onClose, documentId }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [expandedChapters, setExpandedChapters] = useState({}); // мһҘлі„ нҺјм№Ё мғҒнғң
      const [allExpanded, setAllExpanded] = useState(false);
      const [summaries, setSummaries] = useState({}); // sectionId вҶ’ summary
      const [summarizing, setSummarizing] = useState({}); // sectionId вҶ’ true (лЎңл”©)
      const [bulkSummarizing, setBulkSummarizing] = useState(false);
      const [summaryProvider, setSummaryProvider] = useState('gemini');
      const [summaryProviders, setSummaryProviders] = useState([]);
      // нғңк·ё кҙҖлҰ¬
      const [newTagName, setNewTagName] = useState('');
      const [tagLoading, setTagLoading] = useState(false);
      // AI л¶„м„қ
      const [analyzing, setAnalyzing] = useState(false);
      // UX1: мқёлқјмқё л©”нғҖ нҺём§‘
      const [editingMeta, setEditingMeta] = useState(false);
      const [editTitle, setEditTitle] = useState('');
      const [editCategory, setEditCategory] = useState('');
      const [savingMeta, setSavingMeta] = useState(false);
      // UX2: мһ„лІ л”© мһ¬мғқм„ұ
      const [rebuildingEmb, setRebuildingEmb] = useState(false);
      // лІ•л № л¬ём„ң: мЎ°л¬ё лӘ©лЎқ / м°ёмЎ° к·ёлһҳн”„ нғӯ
      const [detailTab, setDetailTab] = useState('sections');
      // мӣҗліё мқҙлҜём§Җ лҜёлҰ¬ліҙкё° Blob URL
      const [previewUrl, setPreviewUrl] = useState(null);

      useEffect(() => {
        if (!isOpen || !documentId) return;
        setLoading(true);
        setError(null);
        setExpandedChapters({});
        setAllExpanded(false);
        setPreviewUrl(null);
        authFetch(`${API_BASE_URL}/documents?id=${documentId}`)
          .then(res => {
            if (!res.ok) throw new Error('л¬ём„ңлҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ.');
            return res.json();
          })
          .then(setData)
          .catch(err => setError(err.message))
          .finally(() => setLoading(false));
        // LLM н”„лЎңл°”мқҙлҚ” лӘ©лЎқ лЎңл“ң
        authFetch(`${API_BASE_URL}/api-usage?type=llm`)
          .then(r => r.json())
          .then(d => { if (d.providers) setSummaryProviders(d.providers); })
          .catch(() => {});
      }, [isOpen, documentId]);

      // мқҙлҜём§Җ лҜёлҰ¬ліҙкё° лЎңл“ң (мқёмҰқ н—ӨлҚ” нҸ¬н•Ё)
      useEffect(() => {
        const doc = data?.document;
        if (!doc?.original_mimetype?.startsWith('image/')) return;
        let cancelled = false;
        authFetch(`${API_BASE_URL}/documents?id=${doc.id}&download=preview`, {
          headers: { 'Accept': 'application/json' },
        })
          .then(res => {
            if (!res.ok) throw new Error('мқҙлҜём§Җ лЎңл“ң мӢӨнҢЁ');
            const ct = res.headers.get('content-type') || '';
            if (ct.includes('application/json')) {
              // Supabase Signed URL л°ҳнҷҳ вҶ’ м§Ғм ‘ н‘ңмӢң
              return res.json().then(j => { if (!cancelled && j.url) setPreviewUrl(j.url); });
            }
            // BYTEA нҸҙл°ұ вҶ’ BlobмңјлЎң ліҖнҷҳ
            return res.blob().then(blob => { if (!cancelled) setPreviewUrl(URL.createObjectURL(blob)); });
          })
          .catch(() => {});
        return () => { cancelled = true; };
      }, [data]);

      const doc = data?.document;
      const sections = data?.sections || [];

      // мһҘ(chapter) кё°мӨҖмңјлЎң м„№м…ҳ к·ёлЈ№н•‘
      const groupedSections = useMemo(() => {
        if (sections.length === 0) return [];

        // лІ•л № л¬ём„ң(article нғҖмһ…)л§Ң к·ёлЈ№н•‘
        const hasChapters = sections.some(s => s.metadata?.chapter);
        if (!hasChapters) return [{ chapter: null, sections }];

        const groups = [];
        let currentChapter = null;
        let currentGroup = [];

        for (const section of sections) {
          const chapter = section.metadata?.chapter || null;
          if (chapter !== currentChapter) {
            if (currentGroup.length > 0) {
              groups.push({ chapter: currentChapter, sections: currentGroup });
            }
            currentChapter = chapter;
            currentGroup = [section];
          } else {
            currentGroup.push(section);
          }
        }
        if (currentGroup.length > 0) {
          groups.push({ chapter: currentChapter, sections: currentGroup });
        }
        return groups;
      }, [sections]);

      // мһҘ нҶ кёҖ
      const toggleChapter = useCallback((chapter) => {
        setExpandedChapters(prev => ({ ...prev, [chapter]: !prev[chapter] }));
      }, []);

      // м „мІҙ нҺјм№ҳкё°/м ‘кё°
      const toggleAll = useCallback(() => {
        if (allExpanded) {
          setExpandedChapters({});
          setAllExpanded(false);
        } else {
          const all = {};
          groupedSections.forEach(g => { if (g.chapter) all[g.chapter] = true; });
          setExpandedChapters(all);
          setAllExpanded(true);
        }
      }, [allExpanded, groupedSections]);

      // лӢЁмқј м„№м…ҳ AI мҡ”м•Ҫ
      const handleSummarize = useCallback(async (sectionId) => {
        setSummarizing(prev => ({ ...prev, [sectionId]: true }));
        try {
          const res = await authFetch(`${API_BASE_URL}/summary`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sectionId, provider: summaryProvider }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'мҡ”м•Ҫ мӢӨнҢЁ');
          setSummaries(prev => ({ ...prev, [sectionId]: data.summary }));
        } catch (err) {
          setSummaries(prev => ({ ...prev, [sectionId]: `мҡ”м•Ҫ мӢӨнҢЁ: ${err.message}` }));
        } finally {
          setSummarizing(prev => ({ ...prev, [sectionId]: false }));
        }
      }, []);

      // л¬ём„ң м „мІҙ мқјкҙ„ мҡ”м•Ҫ
      const handleBulkSummarize = useCallback(async () => {
        if (!documentId) return;
        setBulkSummarizing(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/summary`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ documentId, provider: summaryProvider }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'мқјкҙ„ мҡ”м•Ҫ мӢӨнҢЁ');
          // мҷ„лЈҢ нӣ„ л¬ём„ң лҚ°мқҙн„° мғҲлЎңкі м№Ё (мәҗмӢұлҗң мҡ”м•Ҫ нҸ¬н•Ё)
          const docRes = await authFetch(`${API_BASE_URL}/documents?id=${documentId}`);
          if (docRes.ok) {
            const docData = await docRes.json();
            setData(docData);
            // мҡ”м•Ҫ state м—…лҚ°мқҙнҠё
            const newSummaries = {};
            (docData.sections || []).forEach(s => {
              if (s.summary || s.metadata?.summary) newSummaries[s.id] = s.summary || s.metadata.summary;
            });
            setSummaries(newSummaries);
          }
        } catch (err) {
          alert(`мқјкҙ„ мҡ”м•Ҫ мӢӨнҢЁ: ${err.message}`);
        } finally {
          setBulkSummarizing(false);
        }
      }, [documentId, summaryProvider]);

      // лҚ°мқҙн„° лЎңл“ң мӢң кё°мЎҙ мҡ”м•Ҫ мәҗмӢң л°ҳмҳҒ
      useEffect(() => {
        if (!data?.sections) return;
        const cached = {};
        data.sections.forEach(s => {
          if (s.summary || s.metadata?.summary) cached[s.id] = s.summary || s.metadata.summary;
        });
        setSummaries(cached);
      }, [data]);

      // нғңк·ё м¶”к°Җ
      const handleAddTag = useCallback(async () => {
        if (!newTagName.trim() || !documentId) return;
        setTagLoading(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'addTag', id: documentId, tagName: newTagName.trim() }),
          });
          if (!res.ok) throw new Error('нғңк·ё м¶”к°Җ мӢӨнҢЁ');
          setNewTagName('');
          // л¬ём„ң лҚ°мқҙн„° лҰ¬лЎңл“ң
          const docRes = await authFetch(`${API_BASE_URL}/documents?id=${documentId}`);
          if (docRes.ok) setData(await docRes.json());
        } catch (err) {
          alert(err.message);
        } finally {
          setTagLoading(false);
        }
      }, [newTagName, documentId]);

      // нғңк·ё мӮӯм ң
      const handleRemoveTag = useCallback(async (tagId) => {
        if (!documentId) return;
        try {
          await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'removeTag', id: documentId, tagId }),
          });
          const docRes = await authFetch(`${API_BASE_URL}/documents?id=${documentId}`);
          if (docRes.ok) setData(await docRes.json());
        } catch (err) {
          alert(err.message);
        }
      }, [documentId]);

      // AI л¶„м„қ м§„н–ү лӢЁкі„ мӢңл®¬л Ҳмқҙм…ҳ (лҢҖмҡ©лҹү л¬ём„ң кё°мӨҖ мҙқ ~120мҙҲ)
      const analyzeSteps = useMemo(() => [
        { message: 'AI л¬ём„ң л¶„м„қ мӨ‘ (мҡ”м•Ҫ/нӮӨмӣҢл“ң)...', progress: 10, duration: 8000 },
        { message: 'нғңк·ё мғқм„ұ мӨ‘...', progress: 20, duration: 5000 },
        { message: 'м„№м…ҳлі„ мҡ”м•Ҫ мғқм„ұ мӨ‘...', progress: 35, duration: 15000 },
        { message: 'м„№м…ҳ мҡ”м•Ҫ мІҳлҰ¬ мӨ‘...', progress: 50, duration: 15000 },
        { message: 'Enriched мһ„лІ л”© мғқм„ұ мӨ‘...', progress: 65, duration: 20000 },
        { message: 'мһ„лІ л”© мІҳлҰ¬ мӨ‘...', progress: 78, duration: 20000 },
        { message: 'мһ„лІ л”© л§Ҳл¬ҙлҰ¬ мӨ‘...', progress: 88, duration: 20000 },
        { message: 'мөңмў… м ҖмһҘ мӨ‘...', progress: 95, duration: 15000 },
      ], []);
      const analyzeProgress2 = useSimulatedProgress(analyzeSteps);

      const handleAnalyze = useCallback(async () => {
        if (!documentId) return;
        setAnalyzing(true);
        analyzeProgress2.start();
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'analyze', id: documentId }),
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error || 'AI л¶„м„қ мӢӨнҢЁ');
          }
          analyzeProgress2.finish('л¶„м„қ мҷ„лЈҢ!');
          // л¶„м„қ мҷ„лЈҢ нӣ„ л¬ём„ң лҚ°мқҙн„° лҰ¬лЎңл“ң
          const docRes = await authFetch(`${API_BASE_URL}/documents?id=${documentId}`);
          if (docRes.ok) setData(await docRes.json());
        } catch (err) {
          alert(`AI л¶„м„қ мӢӨнҢЁ: ${err.message}`);
          analyzeProgress2.reset();
        } finally {
          setTimeout(() => analyzeProgress2.reset(), 2000);
          setAnalyzing(false);
        }
      }, [documentId]);

      // UX1: л©”нғҖ мҲҳм • м ҖмһҘ
      const handleSaveMeta = useCallback(async () => {
        if (!documentId) return;
        setSavingMeta(true);
        try {
          const body = { action: 'updateMeta', id: documentId };
          if (editTitle.trim()) body.title = editTitle.trim();
          if (editCategory.trim()) body.category = editCategory.trim();
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'мҲҳм • мӢӨнҢЁ'); }
          // лҚ°мқҙн„° лҰ¬лЎңл“ң
          const docRes = await authFetch(`${API_BASE_URL}/documents?id=${documentId}`);
          if (docRes.ok) setData(await docRes.json());
          setEditingMeta(false);
        } catch (err) {
          alert(`л©”нғҖ мҲҳм • мӢӨнҢЁ: ${err.message}`);
        } finally {
          setSavingMeta(false);
        }
      }, [documentId, editTitle, editCategory]);

      // UX2: мһ„лІ л”© мһ¬мғқм„ұ
      const handleRebuildEmbeddings = useCallback(async () => {
        if (!documentId) return;
        setRebuildingEmb(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'rebuildEmbeddings', id: documentId }),
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'мһ„лІ л”© мһ¬мғқм„ұ мӢӨнҢЁ'); }
          const result = await res.json();
          // лҚ°мқҙн„° лҰ¬лЎңл“ң
          const docRes = await authFetch(`${API_BASE_URL}/documents?id=${documentId}`);
          if (docRes.ok) setData(await docRes.json());
          alert(`мһ„лІ л”© мһ¬мғқм„ұ мҷ„лЈҢ: ${result.totalChunks}к°ң мІӯнҒ¬`);
        } catch (err) {
          alert(`мһ„лІ л”© мһ¬мғқм„ұ мӢӨнҢЁ: ${err.message}`);
        } finally {
          setRebuildingEmb(false);
        }
      }, [documentId]);

      // мЎ°л¬ё IDлЎң мҠӨнҒ¬лЎӨ мқҙлҸҷ
      const scrollToArticle = useCallback((refId) => {
        // refId: "м ң10мЎ°", "м ң3мЎ°мқҳ2" л“ұ
        // н•ҙлӢ№ мЎ°л¬ёмқҙ мҶҚн•ң мһҘмқ„ нҺјм№ҳкі  мҠӨнҒ¬лЎӨ
        const target = sections.find(s => {
          const m = s.metadata || {};
          let artId = m.articleNumber ? `м ң${m.articleNumber}мЎ°` : '';
          if (m.branchNumber) artId += `мқҳ${m.branchNumber}`;
          return artId === refId;
        });
        if (target) {
          const chapter = target.metadata?.chapter;
          if (chapter) {
            setExpandedChapters(prev => ({ ...prev, [chapter]: true }));
          }
          // DOM мҠӨнҒ¬лЎӨ (м•Ҫк°„ л”ңл Ҳмқҙ нӣ„)
          setTimeout(() => {
            const el = document.getElementById(`section-${target.id}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
      }, [sections]);

      // лӢЁмқј м„№м…ҳ л ҢлҚ”л§Ғ
      const renderSection = (section, idx) => {
        const meta = section.metadata || {};
        const isQuiz = section.section_type === 'quiz' && meta.body;
        const references = meta.references || [];
        const referencedBy = meta.referencedBy || [];

        return (
          <div key={section.id || idx} id={`section-${section.id}`} className="bg-bg border border-border rounded-lg p-3">
            <div className="flex items-center gap-2 mb-2 flex-wrap">
              {isQuiz ? (
                <>
                  <Badge color="primary">л¬ём ң {meta.number}</Badge>
                  {meta.subject && <Badge color="yellow">{meta.subject}</Badge>}
                </>
              ) : section.section_type === 'article' && meta.label ? (
                <>
                  {meta.section && <Badge color="yellow">{meta.section}</Badge>}
                  <Badge color="gray">
                    м ң{meta.articleNumber}мЎ°{meta.branchNumber ? `мқҳ${meta.branchNumber}` : ''}{meta.articleTitle ? `(${meta.articleTitle})` : ''}
                  </Badge>
                </>
              ) : (
                <Badge color="gray">
                  {meta.heading || section.section_title || section.title || `м„№м…ҳ ${idx + 1}`}
                </Badge>
              )}
            </div>

            {isQuiz ? (
              <div className="space-y-2">
                <p className="text-sm text-text font-medium leading-relaxed">{meta.body}</p>
                <div className="space-y-1 pl-2">
                  {(meta.choices || []).map((choice, ci) => (
                    <p key={ci} className="text-sm leading-relaxed text-text/80">{choice}</p>
                  ))}
                </div>
              </div>
            ) : (
              <pre className="text-sm text-text whitespace-pre-wrap break-words leading-relaxed font-[inherit]">
                {section.content || section.text || '(лӮҙмҡ© м—ҶмқҢ)'}
              </pre>
            )}

            {/* AI мҡ”м•Ҫ */}
            {section.id && (
              <div className="mt-2">
                {(summaries[section.id] || section.summary) ? (
                  <div className="p-2 bg-primary/10 rounded-md border border-primary/20">
                    <p className="text-xs text-primary font-medium mb-0.5">AI мҡ”м•Ҫ</p>
                    <p className="text-xs text-text leading-relaxed">{summaries[section.id] || section.summary}</p>
                  </div>
                ) : (
                  <button
                    onClick={(e) => { e.stopPropagation(); handleSummarize(section.id); }}
                    disabled={summarizing[section.id]}
                    className="text-xs text-primary hover:text-primary-hover underline disabled:opacity-50"
                  >
                    {summarizing[section.id] ? 'мҡ”м•Ҫ мғқм„ұ мӨ‘...' : 'AI мҡ”м•Ҫ'}
                  </button>
                )}
              </div>
            )}

            {/* м°ёмЎ° кҙҖкі„ н‘ңмӢң */}
            {(references.length > 0 || referencedBy.length > 0) && (
              <div className="mt-2 pt-2 border-t border-border/50 flex flex-wrap gap-1.5">
                {references.length > 0 && (
                  <div className="flex items-center gap-1 flex-wrap">
                    <span className="text-xs text-text-secondary">м°ёмЎ°:</span>
                    {references.map((ref, ri) => (
                      <button
                        key={ri}
                        onClick={() => scrollToArticle(ref)}
                        className="text-xs text-primary hover:text-primary-hover underline"
                      >{ref}</button>
                    ))}
                  </div>
                )}
                {referencedBy.length > 0 && (
                  <div className="flex items-center gap-1 flex-wrap">
                    <span className="text-xs text-text-secondary ml-2">м—ӯм°ёмЎ°:</span>
                    {referencedBy.map((ref, ri) => (
                      <button
                        key={ri}
                        onClick={() => scrollToArticle(ref)}
                        className="text-xs text-yellow-400 hover:text-yellow-300 underline"
                      >{ref}</button>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };

      const hasGroups = groupedSections.some(g => g.chapter);

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={doc?.title || 'л¬ём„ң мғҒм„ё'} size="lg">
          {loading ? (
            <div className="flex items-center justify-center py-12">
              <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
            </div>
          ) : error ? (
            <p className="text-sm text-red-500 py-8 text-center">{error}</p>
          ) : doc ? (
            <div className="space-y-4">
              {/* л¬ём„ң м •ліҙ + лІ„нҠј мҳҒм—ӯ */}
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex flex-wrap gap-2 items-center text-sm text-text-secondary">
                  {editingMeta ? (
                    <React.Fragment>
                      <input
                        value={editTitle}
                        onChange={e => setEditTitle(e.target.value)}
                        className="px-2 py-1 bg-bg border border-primary rounded text-sm text-text font-medium w-48 focus:outline-none"
                        placeholder="м ңлӘ©"
                      />
                      <select
                        value={editCategory}
                        onChange={e => setEditCategory(e.target.value)}
                        className="px-2 py-1 bg-bg border border-primary rounded text-sm text-text focus:outline-none"
                      >
                        {CATEGORIES.filter(c => c.value).map(c => (
                          <option key={c.value} value={c.value}>{c.label}</option>
                        ))}
                      </select>
                      <Button variant="primary" size="sm" onClick={handleSaveMeta} disabled={savingMeta}>
                        {savingMeta ? 'м ҖмһҘ...' : 'м ҖмһҘ'}
                      </Button>
                      <Button variant="ghost" size="sm" onClick={() => setEditingMeta(false)}>м·ЁмҶҢ</Button>
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <Badge color={doc.category === 'лІ•л №' ? 'primary' : doc.category === 'кё°м¶ң' ? 'green' : doc.category === 'к·ңм •' ? 'yellow' : 'gray'}>
                        {doc.category}
                      </Badge>
                      <span>{formatDate(doc.created_at)}</span>
                      <span>{sections.length}к°ң м„№м…ҳ</span>
                      {doc.file_size > 0 && <span>{formatFileSize(doc.file_size)}</span>}
                      <button
                        onClick={() => { setEditTitle(doc.title); setEditCategory(doc.category || ''); setEditingMeta(true); }}
                        className="text-xs text-primary hover:text-primary-hover underline ml-1"
                        title="м ңлӘ©/м№ҙн…Ңкі лҰ¬ мҲҳм •"
                      >мҲҳм •</button>
                    </React.Fragment>
                  )}
                </div>
                <div className="flex items-center gap-2 flex-wrap">
                  {/* LLM н”„лЎңл°”мқҙлҚ” м„ нғқ */}
                  {summaryProviders.length > 0 && (
                    <div className="flex items-center gap-1 mr-1">
                      {summaryProviders.map(p => {
                        const colors = { gemini: 'blue', openai: 'emerald', claude: 'orange' };
                        const c = colors[p.id] || 'gray';
                        const active = summaryProvider === p.id;
                        const modelId = llmSettings[p.id]?.model || '';
                        const shortModel = modelId.replace(/^(gemini-|gpt-|claude-)/, '').replace(/-\d{8}$/, '');
                        return (
                          <button key={p.id} onClick={() => setSummaryProvider(p.id)}
                            className={`px-2 py-0.5 rounded-full text-xs font-medium transition-colors ${active
                              ? `bg-${c}-500 text-white shadow-sm`
                              : `bg-${c}-50 text-${c}-600 hover:bg-${c}-100`}`}>
                            {p.name}
                            {active && shortModel && <span className="ml-1 opacity-80">({shortModel})</span>}
                          </button>
                        );
                      })}
                    </div>
                  )}
                  {hasGroups && (
                    <Button variant="ghost" size="sm" onClick={toggleAll}>
                      {allExpanded ? 'м „мІҙ м ‘кё°' : 'м „мІҙ нҺјм№ҳкё°'}
                    </Button>
                  )}
                  <Button variant="ghost" size="sm" onClick={handleBulkSummarize} disabled={bulkSummarizing}>
                    {bulkSummarizing ? 'мҡ”м•Ҫ мӨ‘...' : 'м „мІҙ мҡ”м•Ҫ'}
                  </Button>
                  <Button variant="secondary" size="sm" onClick={handleAnalyze} disabled={analyzing}>
                    {analyzing ? 'AI л¶„м„қ мӨ‘...' : 'AI л¶„м„қ'}
                  </Button>
                  {/* UX2: мһ„лІ л”© мғҒнғң + мһ¬мғқм„ұ лІ„нҠј */}
                  {(doc.embedding_status === 'failed' || doc.embedding_status === 'pending') && (
                    <Button variant="ghost" size="sm" onClick={handleRebuildEmbeddings} disabled={rebuildingEmb}
                      className="text-red-500 hover:text-red-600">
                      {rebuildingEmb ? 'мһ¬мғқм„ұ мӨ‘...' : 'мһ„лІ л”© мһ¬мӢңлҸ„'}
                    </Button>
                  )}
                </div>
              </div>

              {/* AI л¶„м„қ м§„н–үлҘ  */}
              {analyzeProgress2.progress > 0 && (
                <div className="space-y-2">
                  <ProgressBar value={analyzeProgress2.progress} />
                  <div className="flex justify-between items-center">
                    <p className="text-xs text-text-secondary">{analyzeProgress2.message || 'л¶„м„қ мӨ‘...'}</p>
                    <span className="text-xs text-primary font-medium">{Math.round(analyzeProgress2.progress)}%</span>
                  </div>
                </div>
              )}

              {/* AI мҡ”м•Ҫ / нӮӨмӣҢл“ң (л¶„м„қ мҷ„лЈҢ мӢң н‘ңмӢң) */}
              {(doc.summary || doc.keywords) && (
                <div className="bg-primary/5 border border-primary/20 rounded-lg p-3 space-y-2">
                  {doc.summary && (
                    <div>
                      <p className="text-xs text-primary font-medium mb-1">AI мҡ”м•Ҫ</p>
                      <p className="text-sm text-text leading-relaxed">{doc.summary}</p>
                    </div>
                  )}
                  {doc.keywords && (
                    <div className="flex flex-wrap gap-1">
                      {(typeof doc.keywords === 'string' ? doc.keywords.split(',') : doc.keywords).map((kw, i) => (
                        <span key={i} className="px-2 py-0.5 rounded-full text-[10px] bg-primary/15 text-primary/80">{kw.trim()}</span>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {/* нғңк·ё кҙҖлҰ¬ */}
              <div className="border border-border rounded-lg p-3 space-y-2">
                <p className="text-xs text-text-secondary font-medium">нғңк·ё</p>
                <div className="flex flex-wrap gap-1.5">
                  {(data.tags || []).map(tag => (
                    <span key={tag.id} className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-primary/15 text-primary">
                      #{tag.name}
                      <button
                        onClick={() => handleRemoveTag(tag.id)}
                        className="ml-0.5 hover:text-red-500 transition-colors"
                        title="нғңк·ё мӮӯм ң"
                      >
                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                      </button>
                    </span>
                  ))}
                  {(data.tags || []).length === 0 && !analyzing && (
                    <span className="text-xs text-text-secondary">нғңк·ё м—ҶмқҢ (AI л¶„м„қмңјлЎң мһҗлҸҷ мғқм„ұ к°ҖлҠҘ)</span>
                  )}
                </div>
                <div className="flex gap-2">
                  <input
                    type="text"
                    value={newTagName}
                    onChange={e => setNewTagName(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleAddTag()}
                    placeholder="нғңк·ё мһ…л Ҙ нӣ„ Enter"
                    className="flex-1 px-2.5 py-1.5 bg-bg border border-border rounded-lg text-xs text-text placeholder-text-secondary/50 focus:outline-none focus:border-primary transition-colors"
                  />
                  <Button variant="ghost" size="sm" onClick={handleAddTag} disabled={tagLoading || !newTagName.trim()}>
                    {tagLoading ? '...' : 'м¶”к°Җ'}
                  </Button>
                </div>
              </div>

              {/* мӣҗліё нҢҢмқј кҙҖлҰ¬ мҳҒм—ӯ */}
              {doc.original_filename && (
                <div className="border border-border rounded-lg p-4 bg-card-bg space-y-3">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-2 text-sm">
                      <span className="text-text-secondary">мӣҗліё нҢҢмқј:</span>
                      <span className="text-text font-medium">{doc.original_filename}</span>
                      {doc.file_size > 0 && (
                        <span className="text-text-secondary">({formatFileSize(doc.file_size)})</span>
                      )}
                    </div>
                    <button
                      onClick={async () => {
                        try {
                          const res = await authFetch(`${API_BASE_URL}/documents?id=${doc.id}&download=true`, {
                            headers: { 'Accept': 'application/json' },
                          });
                          if (!res.ok) throw new Error('лӢӨмҡҙлЎңл“ң мӢӨнҢЁ');
                          const ct = res.headers.get('content-type') || '';
                          if (ct.includes('application/json')) {
                            // Signed URL вҶ’ мғҲ нғӯм—җм„ң лӢӨмҡҙлЎңл“ң
                            const j = await res.json();
                            if (j.url) window.open(j.url, '_blank');
                          } else {
                            // BYTEA вҶ’ Blob лӢӨмҡҙлЎңл“ң
                            const blob = await res.blob();
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(blob);
                            a.download = doc.original_filename || 'download';
                            a.click();
                            URL.revokeObjectURL(a.href);
                          }
                        } catch (err) { console.error(err); }
                      }}
                      className="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium bg-primary hover:bg-primary-hover text-white rounded-lg transition-colors"
                    >
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                      </svg>
                      лӢӨмҡҙлЎңл“ң
                    </button>
                  </div>
                  {/* мқҙлҜём§Җ лҜёлҰ¬ліҙкё° */}
                  {doc.original_mimetype && doc.original_mimetype.startsWith('image/') && (
                    <div className="border border-border rounded-lg overflow-hidden bg-bg">
                      {previewUrl ? (
                        <img
                          src={previewUrl}
                          alt={doc.original_filename}
                          className="max-w-full max-h-96 mx-auto object-contain"
                        />
                      ) : (
                        <div className="flex items-center justify-center py-8 text-text-secondary text-sm">
                          <div className="w-5 h-5 border-2 border-primary border-t-transparent rounded-full animate-spin mr-2" />
                          мқҙлҜём§Җ лЎңл”© мӨ‘...
                        </div>
                      )}
                    </div>
                  )}
                  {/* PDF м•ҲлӮҙ */}
                  {doc.original_mimetype === 'application/pdf' && (
                    <p className="text-xs text-text-secondary">
                      PDF нҢҢмқјмқҖ лӢӨмҡҙлЎңл“ң лІ„нҠјмқ„ нҒҙлҰӯн•ҳм—¬ нҷ•мқён•  мҲҳ мһҲмҠөлӢҲлӢӨ.
                    </p>
                  )}
                </div>
              )}

              {/* лІ•л № л¬ём„ң: нғӯ м „нҷҳ (мЎ°л¬ё лӘ©лЎқ / м°ёмЎ° к·ёлһҳн”„) */}
              {doc.file_type === 'law' && (
                <div className="flex border-b border-border">
                  {[
                    { id: 'sections', label: 'мЎ°л¬ё лӘ©лЎқ' },
                    { id: 'graph', label: 'м°ёмЎ° к·ёлһҳн”„' },
                    { id: 'crossref', label: 'көҗм°Ё м°ёмЎ°' },
                  ].map(tab => (
                    <button
                      key={tab.id}
                      onClick={() => setDetailTab(tab.id)}
                      className={`flex-1 py-2.5 text-sm font-medium text-center transition-colors ${
                        detailTab === tab.id
                          ? 'text-primary border-b-2 border-primary'
                          : 'text-text-secondary hover:text-text'
                      }`}
                    >{tab.label}</button>
                  ))}
                </div>
              )}

              {/* м°ёмЎ° к·ёлһҳн”„ нғӯ */}
              {doc.file_type === 'law' && detailTab === 'graph' && (
                <LawGraphView documentId={documentId} scrollToArticle={(ref) => { setDetailTab('sections'); scrollToArticle(ref); }} />
              )}

              {/* көҗм°Ё м°ёмЎ° нғӯ */}
              {doc.file_type === 'law' && detailTab === 'crossref' && (
                <CrossRefView documentId={documentId} docTitle={doc.title} />
              )}

              {/* м„№м…ҳ лӘ©лЎқ */}
              {(doc.file_type !== 'law' || detailTab === 'sections') && (
              <div className="space-y-2">
                {sections.length === 0 ? (
                  <p className="text-sm text-text-secondary text-center py-4">м¶”м¶ңлҗң м„№м…ҳмқҙ м—ҶмҠөлӢҲлӢӨ.</p>
                ) : hasGroups ? (
                  // мһҘлі„ к·ёлЈ№н•‘ н‘ңмӢң (м ‘кё°/нҺјм№ҳкё°)
                  groupedSections.map((group, gi) => {
                    if (!group.chapter) {
                      // chapter м—ҶлҠ” м„№м…ҳмқҖ л°”лЎң н‘ңмӢң
                      return group.sections.map((s, si) => renderSection(s, `${gi}-${si}`));
                    }
                    const isExpanded = expandedChapters[group.chapter] || false;
                    return (
                      <div key={gi} className="border border-border rounded-lg overflow-hidden">
                        {/* мһҘ н—ӨлҚ” (нҒҙлҰӯмңјлЎң нҶ кёҖ) */}
                        <button
                          onClick={() => toggleChapter(group.chapter)}
                          className="w-full flex items-center justify-between px-4 py-3 bg-card-bg hover:bg-card-bg-hover transition-colors text-left"
                        >
                          <div className="flex items-center gap-2">
                            <Badge color="primary">{group.chapter}</Badge>
                            <span className="text-sm text-text-secondary">{group.sections.length}к°ң мЎ°л¬ё</span>
                          </div>
                          <svg
                            className={`w-4 h-4 text-text-secondary transition-transform ${isExpanded ? 'rotate-180' : ''}`}
                            fill="none" stroke="currentColor" viewBox="0 0 24 24"
                          >
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                          </svg>
                        </button>
                        {/* мһҘ лӮҙ м„№м…ҳ (нҺјм№Ё мӢңм—җл§Ң н‘ңмӢң) */}
                        {isExpanded && (
                          <div className="p-3 space-y-2 bg-bg/50">
                            {group.sections.map((s, si) => renderSection(s, `${gi}-${si}`))}
                          </div>
                        )}
                      </div>
                    );
                  })
                ) : (
                  // к·ёлЈ№н•‘ м—Ҷмқҙ лӘЁл‘җ н‘ңмӢң
                  sections.map((section, idx) => renderSection(section, idx))
                )}
              </div>
              )}
            </div>
          ) : null}
        </Modal>
      );
    }

    // ========================================
    // лІ•л № м°ёмЎ° кҙҖкі„ D3.js л„ӨнҠёмӣҢнҒ¬ к·ёлһҳн”„
    // ========================================
    function LawGraphView({ documentId, scrollToArticle }) {
      const svgRef = useRef(null);
      const containerRef = useRef(null);
      const [graphData, setGraphData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [hoveredNode, setHoveredNode] = useState(null);
      const [showStats, setShowStats] = useState(false);

      // мһҘ(chapter)лі„ мғүмғҒ нҢ”л ҲнҠё
      const chapterColors = useMemo(() => {
        if (!graphData) return {};
        const chapters = [...new Set(graphData.nodes.map(n => n.chapter).filter(Boolean))];
        const palette = [
          '#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6',
          '#EC4899', '#06B6D4', '#F97316', '#14B8A6', '#6366F1',
          '#D946EF', '#84CC16',
        ];
        const map = {};
        chapters.forEach((ch, i) => { map[ch] = palette[i % palette.length]; });
        return map;
      }, [graphData]);

      // к·ёлһҳн”„ лҚ°мқҙн„° лЎңл“ң
      useEffect(() => {
        if (!documentId) return;
        setLoading(true);
        setError(null);
        authFetch(`${API_BASE_URL}/law-graph?docId=${documentId}`)
          .then(res => {
            if (!res.ok) throw new Error('к·ёлһҳн”„ лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ.');
            return res.json();
          })
          .then(setGraphData)
          .catch(err => setError(err.message))
          .finally(() => setLoading(false));
      }, [documentId]);

      // D3 force simulation л ҢлҚ”л§Ғ
      useEffect(() => {
        if (!graphData || !svgRef.current || graphData.nodes.length === 0) return;

        const svg = d3.select(svgRef.current);
        svg.selectAll('*').remove();

        const container = containerRef.current;
        const width = container?.clientWidth || 600;
        const height = 500;

        svg.attr('width', width).attr('height', height);

        // мӨҢ/нҢ¬ м„Өм •
        const g = svg.append('g');
        const zoom = d3.zoom()
          .scaleExtent([0.3, 4])
          .on('zoom', (event) => g.attr('transform', event.transform));
        svg.call(zoom);

        // л…ёл“ң/л§ҒнҒ¬ лҚ°мқҙн„° ліөмӮ¬ (D3к°Җ лҚ°мқҙн„°лҘј ліҖнҳ•н•ҳлҜҖлЎң)
        const nodes = graphData.nodes.map(n => ({ ...n }));
        const links = graphData.links.map(l => ({ ...l }));

        // л…ёл“ң нҒ¬кё°: м—ӯм°ёмЎ° мҲҳм—җ л№„лЎҖ (мөңмҶҢ 5, мөңлҢҖ 20)
        const radiusScale = d3.scaleLinear()
          .domain([0, d3.max(nodes, d => d.refCount) || 1])
          .range([5, 20]);

        // force simulation
        const simulation = d3.forceSimulation(nodes)
          .force('link', d3.forceLink(links).id(d => d.id).distance(80))
          .force('charge', d3.forceManyBody().strength(-200))
          .force('center', d3.forceCenter(width / 2, height / 2))
          .force('collision', d3.forceCollide().radius(d => radiusScale(d.refCount) + 5));

        // нҷ”мӮҙн‘ң л§Ҳм»Ө м •мқҳ
        svg.append('defs').selectAll('marker')
          .data(['arrow'])
          .enter().append('marker')
          .attr('id', 'arrow')
          .attr('viewBox', '0 -5 10 10')
          .attr('refX', 20)
          .attr('refY', 0)
          .attr('markerWidth', 6)
          .attr('markerHeight', 6)
          .attr('orient', 'auto')
          .append('path')
          .attr('fill', 'var(--text-secondary)')
          .attr('d', 'M0,-5L10,0L0,5');

        // л§ҒнҒ¬ (нҷ”мӮҙн‘ң)
        const link = g.append('g')
          .selectAll('line')
          .data(links)
          .enter().append('line')
          .attr('stroke', 'var(--text-secondary)')
          .attr('stroke-opacity', 0.3)
          .attr('stroke-width', 1)
          .attr('marker-end', 'url(#arrow)');

        // л…ёл“ң к·ёлЈ№
        const node = g.append('g')
          .selectAll('g')
          .data(nodes)
          .enter().append('g')
          .style('cursor', 'pointer')
          .call(d3.drag()
            .on('start', (event, d) => {
              if (!event.active) simulation.alphaTarget(0.3).restart();
              d.fx = d.x; d.fy = d.y;
            })
            .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
            .on('end', (event, d) => {
              if (!event.active) simulation.alphaTarget(0);
              d.fx = null; d.fy = null;
            })
          );

        // л…ёл“ң мӣҗ
        node.append('circle')
          .attr('r', d => radiusScale(d.refCount))
          .attr('fill', d => chapterColors[d.chapter] || '#9CA3AF')
          .attr('stroke', 'white')
          .attr('stroke-width', 1.5)
          .attr('opacity', 0.85);

        // л…ёл“ң лқјлІЁ (нҒ° л…ёл“ңл§Ң)
        node.append('text')
          .text(d => d.refCount >= 2 ? d.id : '')
          .attr('text-anchor', 'middle')
          .attr('dy', d => radiusScale(d.refCount) + 12)
          .attr('font-size', '10px')
          .attr('fill', 'var(--text-secondary)');

        // нҳёлІ„ мқҙлІӨнҠё
        node.on('mouseover', function(event, d) {
          // м—°кІ°лҗң л…ёл“ң н•ҳмқҙлқјмқҙнҠё
          const connected = new Set();
          links.forEach(l => {
            if (l.source.id === d.id) connected.add(l.target.id);
            if (l.target.id === d.id) connected.add(l.source.id);
          });
          connected.add(d.id);

          node.select('circle').attr('opacity', n => connected.has(n.id) ? 1 : 0.15);
          node.select('text').attr('opacity', n => connected.has(n.id) ? 1 : 0.15);
          link.attr('stroke-opacity', l =>
            l.source.id === d.id || l.target.id === d.id ? 0.8 : 0.05
          ).attr('stroke-width', l =>
            l.source.id === d.id || l.target.id === d.id ? 2 : 1
          );

          // нҳёлІ„ м •ліҙ м—…лҚ°мқҙнҠё
          setHoveredNode(d);
        })
        .on('mouseout', function() {
          node.select('circle').attr('opacity', 0.85);
          node.select('text').attr('opacity', 1);
          link.attr('stroke-opacity', 0.3).attr('stroke-width', 1);
          setHoveredNode(null);
        })
        .on('click', function(event, d) {
          if (scrollToArticle) scrollToArticle(d.id);
        });

        // л§Ө tickл§ҲлӢӨ мң„м№ҳ к°ұмӢ 
        simulation.on('tick', () => {
          link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
          node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        // мҙҲкё° мӨҢ л§һм¶”кё° (м•Ҫк°„ м¶•мҶҢ)
        svg.call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(0.9));

        return () => simulation.stop();
      }, [graphData, chapterColors]);

      if (loading) {
        return (
          <div className="flex items-center justify-center py-12">
            <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
          </div>
        );
      }

      if (error) {
        return <p className="text-sm text-red-500 py-8 text-center">{error}</p>;
      }

      if (!graphData || graphData.nodes.length === 0) {
        return <p className="text-sm text-text-secondary py-8 text-center">м°ёмЎ° кҙҖкі„ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.</p>;
      }

      const stats = graphData.stats || {};

      return (
        <div className="space-y-3">
          {/* к·ёлһҳн”„ мҳҒм—ӯ */}
          <div ref={containerRef} className="border border-border rounded-lg overflow-hidden bg-bg relative">
            <svg ref={svgRef} className="w-full" style={{ minHeight: '500px' }} />

            {/* нҳёлІ„ м •ліҙ */}
            {hoveredNode && (
              <div className="absolute top-3 left-3 bg-card-bg border border-border rounded-lg p-3 shadow-lg max-w-xs">
                <p className="text-sm font-medium text-text">{hoveredNode.label}</p>
                {hoveredNode.chapter && (
                  <div className="flex items-center gap-1.5 mt-1">
                    <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: chapterColors[hoveredNode.chapter] }} />
                    <span className="text-xs text-text-secondary">{hoveredNode.chapter}</span>
                  </div>
                )}
                <div className="flex gap-3 mt-1.5 text-xs text-text-secondary">
                  <span>м—ӯм°ёмЎ° {hoveredNode.refCount}кұҙ</span>
                  <span>м°ёмЎ° {hoveredNode.outCount}кұҙ</span>
                </div>
                <p className="text-[10px] text-text-secondary/60 mt-1">нҒҙлҰӯн•ҳл©ҙ мЎ°л¬ёмңјлЎң мқҙлҸҷ</p>
              </div>
            )}
          </div>

          {/* лІ”лЎҖ (мһҘлі„ мғүмғҒ) */}
          <div className="flex flex-wrap gap-2 px-1">
            {Object.entries(chapterColors).map(([ch, color]) => (
              <div key={ch} className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: color }} />
                <span className="text-[10px] text-text-secondary">{ch}</span>
              </div>
            ))}
          </div>

          {/* нҶөкі„ нҢЁл„җ (нҶ кёҖ) */}
          <button
            onClick={() => setShowStats(s => !s)}
            className="w-full text-left px-3 py-2 text-xs font-medium text-text-secondary bg-card-bg border border-border rounded-lg hover:bg-card-bg-hover transition-colors"
          >
            м°ёмЎ° нҶөкі„ {showStats ? 'м ‘кё°' : 'ліҙкё°'} вҖ” {stats.totalNodes}к°ң мЎ°л¬ё, {stats.totalLinks}к°ң м°ёмЎ° кҙҖкі„
          </button>

          {showStats && (
            <Card className="border-border space-y-3">
              {/* к°ҖмһҘ л§Һмқҙ м°ёмЎ°лҗҳлҠ” мЎ°л¬ё */}
              {stats.mostReferenced?.length > 0 && (
                <div>
                  <p className="text-xs font-medium text-text-secondary mb-1">к°ҖмһҘ л§Һмқҙ м°ёмЎ°лҗҳлҠ” мЎ°л¬ё (н•өмӢ¬ мЎ°л¬ё)</p>
                  <div className="space-y-1">
                    {stats.mostReferenced.filter(n => n.count > 0).map((n, i) => (
                      <div key={i} className="flex items-center gap-2">
                        <button
                          onClick={() => scrollToArticle && scrollToArticle(n.id)}
                          className="text-xs text-primary hover:underline"
                        >{n.label}</button>
                        <div className="flex-1 h-1.5 bg-border rounded-full overflow-hidden">
                          <div
                            className="h-full bg-primary rounded-full"
                            style={{ width: `${(n.count / (stats.mostReferenced[0]?.count || 1)) * 100}%` }}
                          />
                        </div>
                        <span className="text-[10px] text-text-secondary w-8 text-right">{n.count}нҡҢ</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* к°ҖмһҘ л§Һмқҙ м°ёмЎ°н•ҳлҠ” мЎ°л¬ё */}
              {stats.mostReferencing?.length > 0 && (
                <div>
                  <p className="text-xs font-medium text-text-secondary mb-1">к°ҖмһҘ л§Һмқҙ м°ёмЎ°н•ҳлҠ” мЎ°л¬ё</p>
                  <div className="space-y-1">
                    {stats.mostReferencing.filter(n => n.count > 0).map((n, i) => (
                      <div key={i} className="flex items-center gap-2">
                        <button
                          onClick={() => scrollToArticle && scrollToArticle(n.id)}
                          className="text-xs text-primary hover:underline"
                        >{n.label}</button>
                        <div className="flex-1 h-1.5 bg-border rounded-full overflow-hidden">
                          <div
                            className="h-full bg-yellow-500 rounded-full"
                            style={{ width: `${(n.count / (stats.mostReferencing[0]?.count || 1)) * 100}%` }}
                          />
                        </div>
                        <span className="text-[10px] text-text-secondary w-8 text-right">{n.count}к°ң</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* мһҘлі„ м°ёмЎ° л°ҖлҸ„ */}
              {stats.chapterDensity && Object.keys(stats.chapterDensity).length > 0 && (
                <div>
                  <p className="text-xs font-medium text-text-secondary mb-1">мһҘлі„ м°ёмЎ° л°ҖлҸ„</p>
                  <div className="space-y-1">
                    {Object.entries(stats.chapterDensity)
                      .sort((a, b) => b[1].refs - a[1].refs)
                      .map(([ch, d]) => (
                        <div key={ch} className="flex items-center gap-2">
                          <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: chapterColors[ch] || '#9CA3AF' }} />
                          <span className="text-xs text-text-secondary w-24 truncate">{ch}</span>
                          <div className="flex-1 h-1.5 bg-border rounded-full overflow-hidden">
                            <div
                              className="h-full rounded-full"
                              style={{
                                backgroundColor: chapterColors[ch] || '#9CA3AF',
                                width: `${(d.refs / Math.max(...Object.values(stats.chapterDensity).map(v => v.refs), 1)) * 100}%`
                              }}
                            />
                          </div>
                          <span className="text-[10px] text-text-secondary w-16 text-right">{d.count}мЎ° / {d.refs}кұҙ</span>
                        </div>
                      ))}
                  </div>
                </div>
              )}

              {/* кі лҰҪлҗң мЎ°л¬ё */}
              {stats.isolatedCount > 0 && (
                <p className="text-xs text-text-secondary">
                  кі лҰҪлҗң мЎ°л¬ё (м°ёмЎ° кҙҖкі„ м—ҶмқҢ): {stats.isolatedCount}к°ң
                </p>
              )}
            </Card>
          )}
        </div>
      );
    }

    // ========================================
    // көҗм°Ё м°ёмЎ° л·° (л¬ём„ң к°„ м°ёмЎ° кҙҖкі„)
    // ========================================
    function CrossRefView({ documentId, docTitle }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [building, setBuilding] = useState(false);

      // көҗм°Ё м°ёмЎ° лҚ°мқҙн„° лЎңл“ң
      const fetchCrossRefs = useCallback(async () => {
        setLoading(true);
        try {
          const resp = await authFetch(`/api/cross-references?docId=${documentId}`);
          if (!resp.ok) throw new Error('мЎ°нҡҢ мӢӨнҢЁ');
          setData(await resp.json());
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, [documentId]);

      useEffect(() => { fetchCrossRefs(); }, [fetchCrossRefs]);

      // көҗм°Ё м°ёмЎ° кө¬м¶• нҠёлҰ¬кұ°

            })
          : React.createElement('div', { className: 'space-y-2 max-h-96 overflow-y-auto' },
              refs.map((ref, i) => {
                const isSource = ref.source_document_id === documentId;
                const otherDoc = isSource ? ref.target_doc_title : ref.source_doc_title;
                const sourceMeta = ref.source_meta || {};

                    React.createElement('span', { className: 'text-xs font-medium text-text' },

                    React.createElement('span', { className: `text-[10px] px-1.5 py-0.5 rounded-full ${

      const handleToggleFavorite = useCallback(async (docId) => {
        try {

            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'rebuildEmbeddings', id: docId }),
          });
          if (!resp.ok) { const d = await resp.json().catch(() => ({})); throw new Error(d.error || 'мӢӨнҢЁ'); }

          alert(`мһ„лІ л”© мһ¬мғқм„ұ мӢӨнҢЁ: ${err.message}`);

          setRebuildingEmbId(null);
        }

      // л¬ём„ң лӘ©лЎқ л¶Ҳлҹ¬мҳӨкё°
      const fetchDocuments = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          let query = showTrash
            ? '?trash=true'

          const res = await authFetch(`${API_BASE_URL}/documents${query}`);

          const data = await res.json();
          setDocuments(Array.isArray(data) ? data : data.documents || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [categoryFilter, showTrash]);

      // нңҙм§ҖнҶө к°ңмҲҳ мЎ°нҡҢ

        try {

        fetchDocuments();

            headers: { 'Content-Type': 'application/json' },

          setDocuments(prev => prev.filter(d => d.id !== id));
        } catch (err) {
          alert(err.message);
        } finally {
          setDeleting(null);
        }
      }, []);

        e.stopPropagation();
        if (!confirm('мқҙ л¬ём„ңлҘј мҳҒкө¬ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?\nмқҙ мһ‘м—…мқҖ лҗҳлҸҢлҰҙ мҲҳ м—ҶмҠөлӢҲлӢӨ.')) return;

        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'permanentDelete', id }),

          if (!res.ok) throw new Error('мҳҒкө¬ мӮӯм ңм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.');
          setDocuments(prev => prev.filter(d => d.id !== id));

          setDeleting(null);

      // нңҙм§ҖнҶө л№„мҡ°кё°
      const handleEmptyTrash = useCallback(async () => {
        if (!confirm(`нңҙм§ҖнҶөмқҳ лӘЁл“  л¬ём„ң(${documents.length}к°ң)лҘј мҳҒкө¬ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?\nмқҙ мһ‘м—…мқҖ лҗҳлҸҢлҰҙ мҲҳ м—ҶмҠөлӢҲлӢӨ.`)) return;
        setLoading(true);
        try {

            headers: { 'Content-Type': 'application/json' },

          alert(err.message);
        } finally {
          setLoading(false);
        }

      // кІҪкіј мӢңк°„ н‘ңмӢң (мӮӯм ң нӣ„ л©°м№  кІҪкіј)
      const getDeletedAgo = (deletedAt) => {

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        if (days === 0) return 'мҳӨлҠҳ';

        return `${days}мқј м „`;

                        <div className="flex flex-wrap gap-1 mt-1.5">
                          {doc.tags.map(tag => (
                            <span key={tag.id} className="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-blue-50 text-blue-600 border border-blue-100">
                              #{tag.name}
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                    {/* мҰҗкІЁм°ҫкё° + мӮӯм ң лІ„нҠј / нңҙм§ҖнҶө: ліөкө¬ + мҳҒкө¬мӮӯм ң */}
                    {showTrash ? (
                      <div className="flex gap-1 shrink-0">
                        <button
                          onClick={(e) => handleRestore(doc.id, e)}
                          disabled={deleting === doc.id}
                          className="p-2 text-text-secondary hover:text-green-600 transition-colors"
                          title="ліөкө¬"
                        >
                          {deleting === doc.id ? (
                            <div className="w-4 h-4 border-2 border-green-400 border-t-transparent rounded-full animate-spin" />
                          ) : (
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" /></svg>
                          )}
                        </button>
                        <button
                          onClick={(e) => handlePermanentDelete(doc.id, e)}
                          disabled={deleting === doc.id}
                          className="p-2 text-text-secondary hover:text-red-500 transition-colors"
                          title="мҳҒкө¬ мӮӯм ң"
                        >
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                      </div>
                    ) : (
                      <div className="flex items-center gap-0.5 shrink-0">
                      <button
                        onClick={(e) => { e.stopPropagation(); handleToggleFavorite(doc.id); }}
                        className={`p-2 transition-colors ${doc.is_favorited ? 'text-yellow-500' : 'text-text-secondary hover:text-yellow-500'}`}
                        aria-label="мҰҗкІЁм°ҫкё°"
                      >
                        <svg className="w-4 h-4" fill={doc.is_favorited ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                      </button>
                      <button
                        onClick={(e) => handleDelete(doc.id, e)}
                        disabled={deleting === doc.id}
                        className="p-2 text-text-secondary hover:text-red-500 transition-colors"
                        aria-label="мӮӯм ң"
                      >
                        {deleting === doc.id ? (
                          <div className="w-4 h-4 border-2 border-red-400 border-t-transparent rounded-full animate-spin" />
                        ) : (
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        )}
                      </button>
                      </div>
                    )}
                  </div>
                </Card>
              ))}
              {/* лҚ”ліҙкё° лІ„нҠј */}
              {documents.length > visibleCount && (
                <button
                  onClick={() => setVisibleCount(prev => prev + 5)}
                  className="w-full py-2.5 text-sm text-primary hover:text-primary-hover bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors"
                >
                  лҚ”ліҙкё° ({visibleCount}/{documents.length}кұҙ)
                </button>
              )}
            </div>
          )}

          {/* л¬ём„ң мғҒм„ё лӘЁлӢ¬ */}
          <DocumentDetailModal
            isOpen={selectedDocId !== null}
            onClose={() => setSelectedDocId(null)}
            documentId={selectedDocId}
          />

          {/* л§Ё мң„лЎң мҠӨнҒ¬лЎӨ лІ„нҠј */}
          {showScrollTop && (
            <button
              className="scroll-top-btn"
              onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
              aria-label="л§Ё мң„лЎң"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7" /></svg>
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // кІҖмғү нғӯ (н…ҚмҠӨнҠё / лІЎн„° / AI м§Ҳмқҳ + н•„н„°)
    // ========================================
    function SearchTab() {
      const [searchQuery, setSearchQuery] = useState('');
      const [searchType, setSearchType] = useState('hybrid');
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      // н•„н„°
      const [filterDocIds, setFilterDocIds] = useState([]);
      const [filterChapter, setFilterChapter] = useState('');
      const [docList, setDocList] = useState([]); // л¬ём„ң лӘ©лЎқ (н•„н„°мҡ©)
      const [showFilters, setShowFilters] = useState(false);
      // кІҖмғү кІ°кіјм—җм„ң л¬ём„ң мғҒм„ё мқҙлҸҷ
      const [selectedDocId, setSelectedDocId] = useState(null);
      // нҺҳмқҙм§•: нҷ”л©ҙм—җ н‘ңмӢңн•  кІ°кіј мҲҳ
      const PAGE_SIZE = 5;
      const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);

      // F19: мһҗлҸҷмҷ„м„ұ
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const suggestTimerRef = useRef(null);

      // л¬ём„ң лӘ©лЎқ л¶Ҳлҹ¬мҳӨкё° (н•„н„°мҡ©)
      useEffect(() => {
        authFetch(`${API_BASE_URL}/documents`)
          .then(r => r.json())
          .then(data => setDocList(Array.isArray(data) ? data : data.documents || []))
          .catch(() => {});
      }, []);

      // F19: кІҖмғүм–ҙ ліҖкІҪ мӢң мһҗлҸҷмҷ„м„ұ м„ңм ңмҠӨнҠё
      const handleQueryChange = useCallback((val) => {
        setSearchQuery(val);
        if (suggestTimerRef.current) clearTimeout(suggestTimerRef.current);
        if (val.trim().length < 2) { setSuggestions([]); setShowSuggestions(false); return; }
        suggestTimerRef.current = setTimeout(async () => {
          try {
            const resp = await authFetch(`${API_BASE_URL}/search?suggest=${encodeURIComponent(val.trim())}`);
            const data = await resp.json();
            if (data.suggestions?.length > 0) {
              setSuggestions(data.suggestions);
              setShowSuggestions(true);
            } else {
              setShowSuggestions(false);
            }
          } catch { setShowSuggestions(false); }
        }, 300);
      }, []);

      const handleSelectSuggestion = useCallback((text) => {
        setSearchQuery(text);
        setShowSuggestions(false);
      }, []);

      // кІҖмғү мӢӨн–ү
      const handleSearch = useCallback(async () => {
        setShowSuggestions(false);
        if (!searchQuery.trim()) return;
        setLoading(true);
        setError(null);
        setResults(null);
        setVisibleCount(PAGE_SIZE);

        try {
          const params = new URLSearchParams({
            q: searchQuery.trim(),
            type: searchType,
            limit: '50',
          });
          if (filterDocIds.length > 0) params.set('docIds', filterDocIds.join(','));
          if (filterChapter) params.set('chapter', filterChapter);
          const res = await authFetch(`${API_BASE_URL}/search?${params}`);
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error || `кІҖмғү мӢӨнҢЁ (${res.status})`);
          }
          setResults(await res.json());
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [searchQuery, searchType, filterDocIds, filterChapter]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter') handleSearch();
      }, [handleSearch]);

      // кІҖмғүм–ҙ н•ҳмқҙлқјмқҙнҠё
      const highlightText = useCallback((text, query) => {
        if (!query || !text) return text;
        const maxLen = 300;
        const lowerText = text.toLowerCase();
        const lowerQuery = query.toLowerCase();
        const idx = lowerText.indexOf(lowerQuery);
        let excerpt = text;
        if (text.length > maxLen) {
          if (idx >= 0) {
            const start = Math.max(0, idx - 80);
            const end = Math.min(text.length, idx + query.length + 220);
            excerpt = (start > 0 ? '...' : '') + text.slice(start, end) + (end < text.length ? '...' : '');
          } else {
            excerpt = text.slice(0, maxLen) + '...';
          }
        }
        if (idx < 0) return excerpt;
        const parts = excerpt.split(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'));
        return parts.map((part, i) =>
          part.toLowerCase() === lowerQuery
            ? React.createElement('mark', { key: i, className: 'bg-primary/30 text-primary px-0.5 rounded' }, part)
            : part
        );
      }, []);

      // кІҖмғү кІ°кіј м№ҙл“ң (нҒҙлҰӯ мӢң л¬ём„ң мғҒм„ё мқҙлҸҷ)
      const ResultCard = ({ r, children }) => (
        <Card hoverable onClick={() => r.documentId && setSelectedDocId(r.documentId)}>
          {children}
        </Card>
      );

      return (
        <div className="space-y-4 fade-in">
          {/* кІҖмғү мһ…л Ҙ */}
          <Card>
            <div className="space-y-3">
              <div className="flex gap-2">
                <div className="relative flex-1">
                  <input
                    type="text"
                    value={searchQuery}
                    onChange={e => handleQueryChange(e.target.value)}
                    onKeyDown={(e) => { if (e.key === 'Enter') { setShowSuggestions(false); handleSearch(); } }}
                    onFocus={() => suggestions.length > 0 && setShowSuggestions(true)}
                    onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
                    placeholder="кІҖмғүм–ҙлҘј мһ…л Ҙн•ҳм„ёмҡ”..."
                    className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-text placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                    autoComplete="off"
                  />
                  {/* F19: мһҗлҸҷмҷ„м„ұ л“ңлЎӯлӢӨмҡҙ */}
                  {showSuggestions && suggestions.length > 0 && (
                    <div className="absolute z-20 top-full left-0 right-0 mt-1 bg-card-bg border border-border rounded-lg shadow-lg overflow-hidden">
                      {suggestions.map((s, i) => (
                        <button
                          key={i}
                          onMouseDown={() => handleSelectSuggestion(s.text)}
                          className="w-full text-left px-3 py-2 text-sm text-text hover:bg-card-bg-hover transition-colors flex items-center gap-2"
                        >
                          <svg className="w-3.5 h-3.5 text-text-secondary shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                          <span className="truncate">{s.text}</span>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
                <Button onClick={handleSearch} disabled={loading || !searchQuery.trim()}>
                  {loading ? 'кІҖмғү мӨ‘...' : 'кІҖмғү'}
                </Button>
              </div>
              {/* кІҖмғү нғҖмһ… м„ нғқ */}
              <div className="flex gap-2 flex-wrap">
                {[
                  { key: 'hybrid', label: 'нҶөн•© кІҖмғү' },
                  { key: 'text', label: 'н…ҚмҠӨнҠё кІҖмғү' },
                  { key: 'vector', label: 'мқҳлҜё кІҖмғү' },
                ].map(t => (
                  <button key={t.key}
                    onClick={() => setSearchType(t.key)}
                    className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                      searchType === t.key ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{t.label}</button>
                ))}
                {/* н•„н„° нҶ кёҖ */}
                <button
                  onClick={() => setShowFilters(!showFilters)}
                  className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                    showFilters || filterDocIds.length > 0 || filterChapter
                      ? 'bg-yellow-500/20 text-yellow-400'
                      : 'bg-border text-text-secondary hover:text-text'
                  }`}
                >
                  н•„н„° {(filterDocIds.length > 0 || filterChapter) ? '(нҷңм„ұ)' : ''}
                </button>
              </div>

              {/* н•„н„° нҢЁл„җ */}
              {showFilters && (
                <div className="space-y-2 p-3 bg-bg rounded-lg border border-border">
                  <MultiSelect
                    label="л¬ём„ң лІ”мң„ (ліөмҲҳ м„ нғқ к°ҖлҠҘ)"
                    selectedIds={filterDocIds}
                    onChange={setFilterDocIds}
                    options={docList.map(d => ({ value: String(d.id), label: d.title }))}
                    placeholder="м „мІҙ л¬ём„ң"
                  />
                  <Input
                    label="мһҘ/м Ҳ н•„н„°"
                    value={filterChapter}
                    onChange={e => setFilterChapter(e.target.value)}
                    placeholder="мҳҲ: м ң1мһҘ, мҙқм№ҷ"
                  />
                  {(filterDocIds.length > 0 || filterChapter) && (
                    <button
                      onClick={() => { setFilterDocIds([]); setFilterChapter(''); }}
                      className="text-xs text-red-500 hover:text-red-300"
                    >н•„н„° мҙҲкё°нҷ”</button>
                  )}
                </div>
              )}

              <p className="text-xs text-text-secondary">
                {searchType === 'hybrid'
                  ? 'нӮӨмӣҢл“ң л§Өм№ӯкіј мқҳлҜё кІҖмғүмқ„ кІ°н•©н•ҳм—¬ мөңм Ғмқҳ кІ°кіјлҘј ліҙм—¬мӨҚлӢҲлӢӨ.'
                  : searchType === 'text'
                  ? 'мһ…л Ҙн•ң лӢЁм–ҙк°Җ нҸ¬н•Ёлҗң л¬ём„ңлҘј кІҖмғүн•©лӢҲлӢӨ.'
                  : 'мһ…л Ҙн•ң лӮҙмҡ©кіј мқҳлҜёк°Җ мң мӮ¬н•ң л¬ём„ңлҘј кІҖмғүн•©лӢҲлӢӨ.'}
              </p>
            </div>
          </Card>

          {/* лЎңл”© */}
          {loading && (
            <div className="flex items-center justify-center py-12">
              <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
            </div>
          )}

          {/* м—җлҹ¬ */}
          {error && (
            <Card className="border-red-200 bg-red-50">
              <p className="text-sm text-red-500">{error}</p>
            </Card>
          )}

          {/* кІҖмғү кІ°кіј */}
          {results && !loading && (
            <div className="space-y-3">
              <p className="text-sm text-text-secondary">
                "{results.query}" кІҖмғү кІ°кіј: <span className="text-text font-medium">{results.count}кұҙ</span>
                <span className="text-xs ml-1">(нҒҙлҰӯн•ҳл©ҙ л¬ём„ң мғҒм„ёлЎң мқҙлҸҷ)</span>
              </p>

              {/* FN1: нҷ•мһҘ кІҖмғүм–ҙ н‘ңмӢң вҖ” лҸҷмқҳм–ҙ мӮ¬м „мңјлЎң кІҖмғүм–ҙк°Җ нҷ•мһҘлҗң кІҪмҡ° н‘ңмӢң */}
              {results.expandedTerms && results.expandedTerms.length > 0 && (
                <div className="flex items-start gap-2 px-3 py-2 bg-primary/10 border border-primary/20 rounded-lg">
                  <svg className="w-4 h-4 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
                  <p className="text-xs text-text-secondary leading-relaxed">
                    <span className="font-medium text-primary">нҷ•мһҘ кІҖмғүм–ҙ: </span>
                    {results.expandedTerms.map((term, i) => (
                      React.createElement(React.Fragment, { key: i },
                        i > 0 && ', ',
                        React.createElement('span', { className: 'text-text font-medium' }, term)
                      )
                    ))}
                  </p>
                </div>
              )}

              {results.count === 0 ? (
                <EmptyState icon="рҹ”Қ" title="кІҖмғү кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ" description="лӢӨлҘё кІҖмғүм–ҙлЎң мӢңлҸ„н•ҙліҙм„ёмҡ”." />
              ) : results.type === 'hybrid' ? (
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{highlightText(r.documentTitle, results.query)}</span>
                          <Badge color={r.category === 'лІ•л №' ? 'primary' : r.category === 'кё°м¶ң' ? 'green' : r.category === 'к·ңм •' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          {r.vectorRank && r.ftsRank
                            ? <Badge color="green">м–‘мӘҪ л§Өм№ӯ</Badge>
                            : r.vectorRank
                            ? <Badge color="blue">мқҳлҜё л§Өм№ӯ</Badge>
                            : <Badge color="yellow">нӮӨмӣҢл“ң л§Өм№ӯ</Badge>}
                          <span className="text-xs text-text-secondary">RRF {(r.rrfScore * 1000).toFixed(2)}</span>
                          {r.label && <Badge color="gray">{r.label}</Badge>}
                        </div>
                        <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                          {highlightText(r.chunkText, results.query)}
                        </p>
                      </div>
                    </ResultCard>
                  ))}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      лҚ”ліҙкё° ({visibleCount}/{results.results.length}кұҙ)
                    </button>
                  )}
                </>
              ) : results.type === 'fts' ? (
                /* FTS м „л¬ё кІҖмғү кІ°кіј вҖ” ts_headline н•ҳмқҙлқјмқҙнҢ… + FTS м җмҲҳ н‘ңмӢң */
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{highlightText(r.documentTitle, results.query)}</span>
                          <Badge color={r.category === 'лІ•л №' ? 'primary' : r.category === 'кё°м¶ң' ? 'green' : r.category === 'к·ңм •' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          {r.label ? <Badge color="gray">{r.label}</Badge> : <Badge color="gray">м„№м…ҳ {r.sectionIndex + 1}</Badge>}
                          <span className="text-xs text-text-secondary">FTS {(r.ftsScore * 1000).toFixed(1)}</span>
                        </div>
                        {/* ts_headlineмқҙ мһҲмңјл©ҙ <mark> нғңк·ёк°Җ нҸ¬н•Ёлҗң н•ҳмқҙлқјмқҙнҢ… н‘ңмӢң */}
                        {r.headline ? (
                          <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words fts-headline"
                            dangerouslySetInnerHTML={{ __html: r.headline }}
                          />
                        ) : (
                          <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                            {highlightText(r.rawText, results.query)}
                          </p>
                        )}
                      </div>
                    </ResultCard>
                  ))}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      лҚ”ліҙкё° ({visibleCount}/{results.results.length}кұҙ)
                    </button>
                  )}
                </>
              ) : results.type === 'text' ? (
                /* ILIKE нҸҙл°ұ (1кёҖмһҗ кІҖмғү л“ұ) */
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{highlightText(r.documentTitle, results.query)}</span>
                          <Badge color={r.category === 'лІ•л №' ? 'primary' : r.category === 'кё°м¶ң' ? 'green' : r.category === 'к·ңм •' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          {r.label ? <Badge color="gray">{highlightText(r.label, results.query)}</Badge> : <Badge color="gray">м„№м…ҳ {r.sectionIndex + 1}</Badge>}

                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}

              ) : (
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{highlightText(r.documentTitle, results.query)}</span>
                          <Badge color={r.category === 'лІ•л №' ? 'primary' : r.category === 'кё°м¶ң' ? 'green' : r.category === 'к·ңм •' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          <Badge color="green">мң мӮ¬лҸ„ {(r.similarity * 100).toFixed(1)}%</Badge>
                          {r.label && <Badge color="gray">{highlightText(r.label, results.query)}</Badge>}
                        </div>
                        <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                          {highlightText(r.chunkText, results.query)}
                        </p>
                      </div>
                    </ResultCard>
                  ))}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      лҚ”ліҙкё° ({visibleCount}/{results.results.length}кұҙ)
