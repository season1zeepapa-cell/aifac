                  )}
                </>
              )}
            </div>
          )}

          {/* кІҖмғү кІ°кіјм—җм„ң л¬ём„ң мғҒм„ё лӘЁлӢ¬ */}
          <DocumentDetailModal
            isOpen={selectedDocId !== null}
            onClose={() => setSelectedDocId(null)}
            documentId={selectedDocId}
          />
        </div>
      );
    }

    // ========================================
    // LLM м„Өм • нҢЁл„җ м»ҙнҸ¬л„ҢнҠё (кҙҖлҰ¬ нғӯ лӮҙ м„ңлёҢнғӯ)
    // ========================================
    function LlmSettingsPanel() {
      const [settings, setSettings] = useState(() => loadLlmSettings());
      const [saved, setSaved] = useState(false);

      // н”„лЎңл°”мқҙлҚ”лі„ м„Өм • м—…лҚ°мқҙнҠё н—¬нҚј
      const updateProvider = useCallback((provider, key, value) => {
        setSettings(prev => ({
          ...prev,
          [provider]: { ...prev[provider], [key]: value },
        }));
        setSaved(false);
      }, []);

      // лӘЁлҚё ліҖкІҪ мӢң н•ҙлӢ№ лӘЁлҚёмқҳ кё°ліёк°’ м Ғмҡ©
      const handleModelChange = useCallback((provider, modelId) => {
        const catalogs = { gemini: GEMINI_CATALOG, openai: OPENAI_CATALOG, claude: CLAUDE_CATALOG };
        const info = catalogs[provider]?.find(m => m.id === modelId);
        const isG3 = provider === 'gemini' && modelId.startsWith('gemini-3');
        setSettings(prev => ({
          ...prev,
          [provider]: {
            ...prev[provider],
            model: modelId,
            temperature: 0.3,
            // Gemini 3.x: thinkingLevel (budget мҙҲкё°нҷ”), 2.5: thinkingBudget (level мҙҲкё°нҷ”)
            ...(provider === 'gemini' && info?.thinking && isG3 ? { thinkingLevel: 'medium', thinkingBudget: 0 } : {}),
            ...(provider === 'gemini' && info?.thinking && !isG3 ? { thinkingBudget: 4096, thinkingLevel: '' } : {}),
            ...(provider === 'gemini' && !info?.thinking ? { thinkingBudget: 0, thinkingLevel: '' } : {}),
            // OpenAI o-мӢңлҰ¬мҰҲ: reasoningEffort кё°ліёк°’
            ...(provider === 'openai' && info?.reasoning ? { reasoningEffort: 'medium' } : {}),
          },
        }));
        setSaved(false);
      }, []);

      // м ҖмһҘ
      const handleSave = useCallback(() => {
        llmSettings = JSON.parse(JSON.stringify(settings));
        saveLlmSettings(settings);
        setSaved(true);
        setTimeout(() => setSaved(false), 3000);
      }, [settings]);

      // мҙҲкё°нҷ”
      const handleReset = useCallback(() => {
        const defaults = JSON.parse(JSON.stringify(DEFAULT_LLM_SETTINGS));
        setSettings(defaults);
        llmSettings = defaults;
        saveLlmSettings(defaults);
        setSaved(true);
        setTimeout(() => setSaved(false), 3000);
      }, []);

      // к°ҖкІ© лұғм§Җ
      const TierBadge = ({ tier }) => (
        React.createElement('span', {
          className: 'text-[10px] font-bold text-white px-1.5 py-0.5 rounded',

      const ProviderSection = ({ provider, label, catalog, icon }) => {
        const s = settings[provider];
        const selectedModel = catalog.find(m => m.id === s.model);
        const isGemini = provider === 'gemini';

        const showThinking = isGemini && selectedModel?.thinking;
        const isGemini3 = isGemini && (s.model || '').startsWith('gemini-3');

        return (
          <Card>

                <h3 className="text-sm font-bold text-text">{label}</h3>

              {/* лӘЁлҚё м„ нғқ */}
              <div>
                <label className="block text-xs font-medium text-text-secondary mb-1.5">лӘЁлҚё</label>
                <select

                {/* м„ нғқлҗң лӘЁлҚё м •ліҙ */}

              {/* Temperature мҠ¬лқјмқҙлҚ” */}

                  </div>
                  <p className="text-[10px] text-text-secondary mt-1">0 = н•ӯмғҒ к°ҷмқҖ лӢө, 2 = лӢӨм–‘н•ң н‘ңнҳ„. RAG к¶ҢмһҘк°’: 0.2~0.5</p>
                </div>

              {/* Max Tokens */}
              <div>
                <label className="block text-xs font-medium text-text-secondary mb-1.5">Max Tokens (мөңлҢҖ мқ‘лӢө кёёмқҙ)</label>
                <select
                  value={s.maxTokens || 2048}

                >
                  <option value={512}>512 вҖ” м§§мқҖ лӢөліҖ</option>
                  <option value={1024}>1,024 вҖ” ліҙнҶө</option>
                  <option value={2048}>2,048 вҖ” мғҒм„ё (кё°ліё)</option>
                  <option value={4096}>4,096 вҖ” л§Өмҡ° мғҒм„ё</option>
                  <option value={8192}>8,192 вҖ” мөңлҢҖ</option>
                </select>
              </div>

              {/* Gemini 3.x Thinking Level */}
              {showThinking && isGemini3 && (
                <div>
                  <label className="block text-xs font-medium text-text-secondary mb-1.5">Thinking Level (м¶”лЎ  к°•лҸ„)</label>

                  >
                    <option value="low">low вҖ” л№ лҰ„ (мөңмҶҢ м¶”лЎ )</option>
                    <option value="medium">medium вҖ” к· нҳ• (кё°ліё)</option>
                    <option value="high">high вҖ” мөңкі  м •нҷ• (мӢ¬мёө м¶”лЎ )</option>
                  </select>
                  <p className="text-[10px] text-text-secondary mt-1">Gemini 3.x м „мҡ©. м¶”лЎ  к°•лҸ„к°Җ лҶ’мқ„мҲҳлЎқ л№„мҡ©/мӢңк°„ мҰқк°Җ</p>
                </div>
              )}

              {/* Gemini 2.5 Thinking Budget */}
              {showThinking && !isGemini3 && (
                <div>
                  <label className="block text-xs font-medium text-text-secondary mb-1.5">Thinking Budget (мӮ¬кі  нҶ нҒ°)</label>
                  <select
                    value={s.thinkingBudget || 0}
                    onChange={e => updateProvider(provider, 'thinkingBudget', parseInt(e.target.value))}
                    className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-sm text-text focus:outline-none focus:border-primary transition-colors"
                  >
                    <option value={0}>OFF вҖ” мҰүмӢң мқ‘лӢө (м¶”лЎ  м—ҶмқҢ)</option>
                    <option value={1024}>1,024 tokens вҖ” к°ҖлІјмҡҙ м¶”лЎ </option>
                    <option value={4096}>4,096 tokens вҖ” мқјл°ҳ м¶”лЎ </option>
                    <option value={8192}>8,192 tokens вҖ” мӢ¬мёө м¶”лЎ </option>
                    <option value={16384}>16,384 tokens вҖ” мөңлҢҖ м¶”лЎ </option>
                  </select>
                  <p className="text-[10px] text-text-secondary mt-1">Gemini 2.5 м „мҡ©. мӮ¬кі  нҶ нҒ° мҲҳл§ҢнҒј л№„мҡ©мқҙ м¶”к°Җлҗ©лӢҲлӢӨ</p>
                </div>
              )}

              {/* OpenAI Reasoning Effort */}
              {showReasoning && (
                <div>
                  <label className="block text-xs font-medium text-text-secondary mb-1.5">Reasoning Effort (м¶”лЎ  к°•лҸ„)</label>
                  <select
                    value={s.reasoningEffort || 'medium'}
                    onChange={e => updateProvider(provider, 'reasoningEffort', e.target.value)}
                    className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-sm text-text focus:outline-none focus:border-primary transition-colors"
                  >
                    <option value="low">low вҖ” л№ лҰ„ (м Җл№„мҡ©)</option>
                    <option value="medium">medium вҖ” к· нҳ• (кё°ліё)</option>
                    <option value="high">high вҖ” мөңкі  м •нҷ• (кі л№„мҡ©)</option>
                  </select>
                  <p className="text-[10px] text-text-secondary mt-1">o-мӢңлҰ¬мҰҲ м „мҡ©. м¶”лЎ  к°•лҸ„к°Җ лҶ’мқ„мҲҳлЎқ л№„мҡ©/мӢңк°„ мҰқк°Җ</p>
                </div>
              )}

          </Card>
        );
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <p className="text-sm text-text-secondary">AI мұ„нҢ…м—җм„ң мӮ¬мҡ©н•  лӘЁлҚёкіј нҢҢлқјлҜён„°лҘј м„Өм •н•©лӢҲлӢӨ.</p>

              <button

                className="text-xs text-text-secondary hover:text-red-500 border border-border rounded-lg px-2.5 py-1.5 transition-colors"

              <button
                onClick={handleSave}
                className={`text-xs font-medium rounded-lg px-3 py-1.5 transition-colors ${

                  </span>

          </Card>

      );
    }

    // ========================================
    // кө¬мЎ°нҷ” лӢөліҖ л ҢлҚ”л§Ғ м»ҙнҸ¬л„ҢнҠё
    // ========================================
    // LLM мқ‘лӢөмқ„ кІ°лЎ /к·јкұ° мІҙмқё/көҗм°Ё м°ёмЎ°/мЈјмқҳмӮ¬н•ӯ м„№м…ҳмңјлЎң л¶„лҰ¬ н‘ңмӢң
    function ParsedAnswer({ parsed, raw, sources }) {
      const [showEvidence, setShowEvidence] = useState(true);
      const [showCrossRefs, setShowCrossRefs] = useState(false);
      const [showRaw, setShowRaw] = useState(false);

      // нҢҢмӢұ кІ°кіјк°Җ м—Ҷкұ°лӮҳ нҢҢмӢұ мӢӨнҢЁ мӢң кё°мЎҙ л§ҲнҒ¬лӢӨмҡҙ л ҢлҚ”л§Ғ
      if (!parsed || !parsed.parsed) {
        return React.createElement('div', {
          className: 'text-sm text-text leading-relaxed markdown-body',
          dangerouslySetInnerHTML: {
            __html: typeof marked !== 'undefined' ? marked.parse(raw || '') : (raw || '')
          }
        });
      }

      const { conclusion, evidenceChain, crossReferences, caveats, warnings, format } = parsed;

      return React.createElement('div', { className: 'space-y-2' },
        // нҢҢмӢұ нҳ•мӢқ + кІҪкі  л°°м§Җ
        warnings && warnings.length > 0 && React.createElement('div', {
          className: 'flex flex-wrap gap-1 mb-1'
        },
          warnings.map((w, i) => React.createElement('span', {
            key: i,
            className: 'text-[10px] px-1.5 py-0.5 rounded bg-red-100 text-red-700'
          }, w))
        ),

        // кІ°лЎ  м„№м…ҳ
        conclusion && React.createElement('div', {
          className: 'bg-blue-50 dark:bg-blue-950/30 border border-blue-200 dark:border-blue-800 rounded-lg p-3'
        },
          React.createElement('div', { className: 'flex items-center gap-1.5 mb-1.5' },
            React.createElement('span', { className: 'text-blue-600 dark:text-blue-400 text-xs font-bold' }, '\u{1F4A1} \uACB0\uB860')
          ),
          React.createElement('div', {
            className: 'text-sm text-text leading-relaxed markdown-body',
            dangerouslySetInnerHTML: {
              __html: typeof marked !== 'undefined' ? marked.parse(conclusion) : conclusion
            }
          })
        ),

        // к·јкұ° мІҙмқё м„№м…ҳ
        evidenceChain && evidenceChain.length > 0 && React.createElement('div', {
          className: 'border border-border rounded-lg overflow-hidden'
        },
          React.createElement('button', {
            className: 'w-full flex items-center justify-between px-3 py-2 bg-bg hover:bg-card-bg transition-colors text-left',
            onClick: () => setShowEvidence(v => !v)
          },
            React.createElement('span', { className: 'text-xs font-bold text-text flex items-center gap-1' },
              '\u{1F4CB} \uADFC\uAC70 \uCCB4\uC778',
              React.createElement('span', { className: 'text-text-secondary font-normal' }, `(${evidenceChain.length}\uB2E8\uACC4)`)
            ),
            React.createElement('svg', {
              className: `w-3.5 h-3.5 text-text-secondary transition-transform ${showEvidence ? 'rotate-180' : ''}`,
              fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'
            }, React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M19 9l-7 7-7-7' }))
          ),
          showEvidence && React.createElement('div', { className: 'px-3 pb-3 space-y-2 pt-1' },
            evidenceChain.map((step, i) => {
              // к·јкұ° лІҲнҳёк°Җ sourcesм—җ мһҲмңјл©ҙ нҒҙлҰӯ к°ҖлҠҘн•ҳкІҢ н‘ңмӢң
              const srcIdx = step.sourceIndex;
              const matchedSource = srcIdx && sources && sources[srcIdx - 1];
              return React.createElement('div', {
                key: i,
                className: `relative pl-6 ${i < evidenceChain.length - 1 ? 'pb-2 border-l-2 border-blue-200 dark:border-blue-800 ml-1.5' : 'ml-1.5'}`
              },
                // мҲңм„ң лІҲнҳё мӣҗнҳ•
                React.createElement('div', {
                  className: `absolute -left-[9px] top-0.5 w-[18px] h-[18px] rounded-full flex items-center justify-center text-[10px] font-bold ${
                    step.verified !== false
                      ? 'bg-blue-500 text-white'
                      : 'bg-red-400 text-white'
                  }`
                }, step.step || i + 1),
                // мЎ°л¬ёлӘ…
                React.createElement('div', { className: 'text-xs' },
                  srcIdx && React.createElement('span', {
                    className: 'font-bold text-blue-600 dark:text-blue-400 mr-1'
                  }, `[\uADFC\uAC70 ${srcIdx}]`),
                  React.createElement('span', {
                    className: 'font-medium text-text'
                  }, step.sourceLabel || ''),
                  step.verified === false && React.createElement('span', {
                    className: 'text-[10px] text-red-500 ml-1'
                  }, '(\uBBF8\uAC80\uC99D)')
                ),
                // мқёмҡ©
                step.quote && React.createElement('div', {
                  className: 'text-xs text-text-secondary mt-0.5 pl-2 border-l-2 border-gray-200 dark:border-gray-600 italic'
                }, `"${step.quote}"`),
                // м„ӨлӘ…
                step.reasoning && React.createElement('div', {
                  className: 'text-xs text-text mt-0.5'
                }, `\u2192 ${step.reasoning}`),
                // м—°кІ° нҷ”мӮҙн‘ң (л§Ҳм§Җл§үмқҙ м•„лӢҢ кІҪмҡ°)
                i < evidenceChain.length - 1 && React.createElement('div', {
                  className: 'text-[10px] text-blue-500 font-medium mt-1'
                }, '\u2193 \uB530\uB77C\uC11C')
              );
            })
          )
        ),

        // көҗм°Ё м°ёмЎ° м„№м…ҳ
        crossReferences && crossReferences.length > 0 && React.createElement('div', {
          className: 'border border-border rounded-lg overflow-hidden'
        },
          React.createElement('button', {
            className: 'w-full flex items-center justify-between px-3 py-2 bg-bg hover:bg-card-bg transition-colors text-left',
            onClick: () => setShowCrossRefs(v => !v)
          },
            React.createElement('span', { className: 'text-xs font-bold text-text flex items-center gap-1' },
              '\u{1F517} \uAD50\uCC28 \uCC38\uC870',
              React.createElement('span', { className: 'text-text-secondary font-normal' }, `(${crossReferences.length}\uAC74)`)
            ),

    // ========================================
    // AI мұ„нҢ… нғӯ (л©ҖнӢ°н„ҙ RAG лҢҖнҷ”)
    // ========================================
    function ChatTab() {
      const [chatMessages, setChatMessages] = useState([]);
      // к°Ғ л©”мӢңм§Җ: { role: 'user'|'assistant', content, sources?, provider? }
      const [inputText, setInputText] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      // LLM н”„лЎңл°”мқҙлҚ”
      const [llmProvider, setLlmProvider] = useState('gemini');
      const [llmProviders, setLlmProviders] = useState([]);
      // л¬ём„ң лІ”мң„ н•„н„° (ліөмҲҳ м„ нғқ)
      const [filterDocIds, setFilterDocIds] = useState([]);
      const [docList, setDocList] = useState([]);
      const [showSettings, setShowSettings] = useState(false);
      // к·јкұ°мһҗлЈҢ м ‘кё°/нҺјм№ҳкё° (л©”мӢңм§Җ мқёлҚұмҠӨлі„)
      const [expandedSources, setExpandedSources] = useState({});
      // F17: лҢҖнҷ” нһҲмҠӨнҶ лҰ¬
      const [sessionId, setSessionId] = useState(null);
      const [sessions, setSessions] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      const chatEndRef = useRef(null);
      const inputRef = useRef(null);

      // мҙҲкё° лҚ°мқҙн„° лЎңл“ң
      useEffect(() => {
        authFetch(`${API_BASE_URL}/documents`)
          .then(r => r.json())
          .then(data => setDocList(Array.isArray(data) ? data : data.documents || []))
          .catch(() => {});
        authFetch(`${API_BASE_URL}/api-usage?type=llm`)
          .then(r => r.json())
          .then(data => { if (data.providers) setLlmProviders(data.providers); })
          .catch(() => {});
        // лҢҖнҷ” нһҲмҠӨнҶ лҰ¬ лӘ©лЎқ лЎңл“ң
        authFetch(`${API_BASE_URL}/chat-sessions`)
          .then(r => r.json())
          .then(data => { if (data.sessions) setSessions(data.sessions); })
          .catch(() => {});
      }, []);

      // мғҲ л©”мӢңм§Җ мӢң н•ҳлӢЁ мһҗлҸҷ мҠӨнҒ¬лЎӨ
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatMessages, loading]);

      // SSE мҠӨнҠёлҰ¬л°Қ нҢҢм„ң: fetch мқ‘лӢөм—җм„ң SSE мқҙлІӨнҠёлҘј м¶”м¶ң
      const parseSSE = useCallback(async function* (response) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try { yield JSON.parse(line.slice(6)); } catch {}
          }
        }
      }, []);

      // л©”мӢңм§Җ м „мҶЎ (SSE мҠӨнҠёлҰ¬л°Қ)
      const handleSend = useCallback(async () => {
        const text = inputText.trim();
        if (!text || loading) return;

        const userMsg = { role: 'user', content: text };
        setChatMessages(prev => [...prev, userMsg]);
        setInputText('');
        setLoading(true);
        setError(null);

        try {
          // history: мқҙм „ л©”мӢңм§Җм—җм„ң contentл§Ң м¶”м¶ң (sources м ңмҷё)
          const history = chatMessages.map(m => ({ role: m.role, content: m.content }));
          // llmSettingsм—җм„ң нҳ„мһ¬ н”„лЎңл°”мқҙлҚ” м„Өм •мқ„ к°Җм ёмҷҖ м „лӢ¬
          const providerSettings = llmSettings[llmProvider] || {};
          const body = {
            question: text, topK: 5, provider: llmProvider, history,
            stream: true,
            llmOptions: {
              model: providerSettings.model,
              temperature: providerSettings.temperature,
              maxTokens: providerSettings.maxTokens,
              ...(llmProvider === 'gemini' && providerSettings.thinkingBudget ? { thinkingBudget: providerSettings.thinkingBudget } : {}),
              ...(llmProvider === 'gemini' && providerSettings.thinkingLevel ? { thinkingLevel: providerSettings.thinkingLevel } : {}),
              ...(llmProvider === 'openai' && providerSettings.reasoningEffort ? { reasoningEffort: providerSettings.reasoningEffort } : {}),
            },
          };
          if (filterDocIds.length > 0) body.docIds = filterDocIds.map(id => parseInt(id, 10));

          const res = await authFetch(`${API_BASE_URL}/rag`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });

          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error || `м§Ҳмқҳ мӢӨнҢЁ (${res.status})`);
          }

          // SSE мҠӨнҠёлҰ¬л°Қ мқ‘лӢө мІҳлҰ¬
          let streamSources = [];
          let streamProvider = llmProvider;
          let streamHops = 1;
          let streamCrossRefs = [];
          let accumulated = '';

          // мҠӨнҠёлҰ¬л°Қ мӨ‘мқё assistant л©”мӢңм§ҖлҘј лЁјм Җ м¶”к°Җ
          const placeholderMsg = {
            role: 'assistant', content: '', sources: [],
            provider: llmProvider, hops: 1, crossRefs: [],
          };
          setChatMessages(prev => [...prev, placeholderMsg]);

          for await (const event of parseSSE(res)) {
            if (event.type === 'sources') {
              // кІҖмғү кІ°кіј мҲҳмӢ 
              streamSources = event.sources || [];
              streamProvider = event.provider || llmProvider;
              streamHops = event.hops || 1;
              streamCrossRefs = event.crossRefs || [];
              // sources м •ліҙ м—…лҚ°мқҙнҠё
              setChatMessages(prev => {
                const updated = [...prev];
                const last = { ...updated[updated.length - 1] };
                last.sources = streamSources;
                last.provider = streamProvider;
                last.hops = streamHops;
                last.crossRefs = streamCrossRefs;
                updated[updated.length - 1] = last;
                return updated;
              });
            } else if (event.type === 'token') {
              // нҶ нҒ° лҸ„м°© вҶ’ л§Ҳм§Җл§ү assistant л©”мӢңм§Җм—җ м¶”к°Җ
              accumulated += event.token;
              const currentText = accumulated;
              setChatMessages(prev => {
                const updated = [...prev];
                const last = { ...updated[updated.length - 1] };
                last.content = currentText;
                updated[updated.length - 1] = last;
                return updated;
              });
            } else if (event.type === 'parsed') {
              // мҠӨнҠёлҰ¬л°Қ мҷ„лЈҢ нӣ„ кө¬мЎ°нҷ” нҢҢмӢұ кІ°кіј мҲҳмӢ 
              setChatMessages(prev => {
                const updated = [...prev];
                const last = { ...updated[updated.length - 1] };
                last.parsed = event.parsed;
                updated[updated.length - 1] = last;
                return updated;
              });
            } else if (event.type === 'error') {
              throw new Error(event.error || 'мҠӨнҠёлҰ¬л°Қ мҳӨлҘҳ');
            }
            // type === 'done' вҶ’ лЈЁн”„ мў…лЈҢ
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
          setTimeout(() => inputRef.current?.focus(), 100);
        }
      }, [inputText, loading, chatMessages, llmProvider, filterDocIds, parseSSE]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      }, [handleSend]);

      // мғҲ лҢҖнҷ”
      const handleNewChat = useCallback(() => {
        setChatMessages([]);
        setSessionId(null);
        setError(null);
        setExpandedSources({});
        inputRef.current?.focus();
      }, []);

      // F17: лҢҖнҷ” м ҖмһҘ
      const handleSaveChat = useCallback(async () => {
        if (chatMessages.length === 0) return;
        try {
          const resp = await authFetch(`${API_BASE_URL}/chat-sessions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              id: sessionId, messages: chatMessages, provider: llmProvider,
              docIds: filterDocIds.map(id => parseInt(id, 10)),
            }),
          });
          const data = await resp.json();
          if (data.success) {
            setSessionId(data.id);
            // м„ём…ҳ лӘ©лЎқ к°ұмӢ 
            const listResp = await authFetch(`${API_BASE_URL}/chat-sessions`);
            const listData = await listResp.json();
            if (listData.sessions) setSessions(listData.sessions);
          }
        } catch (e) { console.warn('лҢҖнҷ” м ҖмһҘ мӢӨнҢЁ:', e.message); }
      }, [chatMessages, sessionId, llmProvider, filterDocIds]);

      // F17: лҢҖнҷ” л¶Ҳлҹ¬мҳӨкё°
      const handleLoadChat = useCallback(async (sid) => {
        try {
          const resp = await authFetch(`${API_BASE_URL}/chat-sessions?id=${sid}`);
          const data = await resp.json();

            setSessionId(data.id);
            setLlmProvider(data.provider || 'gemini');
            if (data.doc_ids?.length > 0) setFilterDocIds(data.doc_ids.map(String));

            setExpandedSources({});
          }
        } catch (e) { console.warn('лҢҖнҷ” лЎңл“ң мӢӨнҢЁ:', e.message); }
      }, []);

      // F17: лҢҖнҷ” мӮӯм ң
      const handleDeleteSession = useCallback(async (sid, e) => {

        if (!confirm('мқҙ лҢҖнҷ”лҘј мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')) return;
        try {
          await authFetch(`${API_BASE_URL}/chat-sessions?id=${sid}`, { method: 'DELETE' });
          setSessions(prev => prev.filter(s => s.id !== sid));
          if (sessionId === sid) { setSessionId(null); setChatMessages([]); }
        } catch (e) { console.warn('лҢҖнҷ” мӮӯм ң мӢӨнҢЁ:', e.message); }
      }, [sessionId]);

      // к·јкұ°мһҗлЈҢ нҶ кёҖ
      const toggleSources = useCallback((idx) => {
        setExpandedSources(prev => ({ ...prev, [idx]: !prev[idx] }));
      }, []);

      // н”„лЎңл°”мқҙлҚ” мғүмғҒ
      const providerColor = (id) => id === 'gemini' ? 'blue' : id === 'openai' ? 'green' : 'orange';
      const providerName = (id) => id === 'gemini' ? 'Gemini' : id === 'openai' ? 'OpenAI' : 'Claude';

      return (
        <div className="flex flex-col fade-in" style={{ height: 'calc(100vh - 130px)' }}>
          {/* мғҒлӢЁ л°”: мғҲ лҢҖнҷ” + м„Өм • */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <h2 className="text-base font-bold text-text">AI мұ„нҢ…</h2>
              {chatMessages.length > 0 && (
                <span className="text-xs text-text-secondary">{Math.floor(chatMessages.length / 2)}нҡҢ лҢҖнҷ”</span>
              )}
            </div>
            <div className="flex items-center gap-1.5">
              <button
                onClick={() => setShowHistory(!showHistory)}

                  {sessionId ? 'м ҖмһҘ' : 'мғҲлЎң м ҖмһҘ'}

              )}
              <button
                onClick={() => setShowSettings(!showSettings)}

          {/* м„Өм • нҢЁл„җ (м ‘кё°/нҺјм№ҳкё°) */}
          {showSettings && (
            <Card className="mb-3">
              <div className="space-y-3">
                {/* LLM н”„лЎңл°”мқҙлҚ” м„ нғқ */}
                <div>

                          )}
                          {msg.crossRefs && msg.crossRefs.length > 0 && (
                            <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-purple-100 text-purple-700 font-medium">
                              көҗм°Ём°ёмЎ° {msg.crossRefs.length}кұҙ
                            </span>
                          )}
                        </div>
                        {React.createElement(ParsedAnswer, {
                          parsed: msg.parsed,
                          raw: msg.content,
                          sources: msg.sources
                        })}
                      </div>
                    ) : (
                      <p className="text-sm leading-relaxed">{msg.content}</p>
                    )}
                  </div>

                  {/* к·јкұ°мһҗлЈҢ (AI л©”мӢңм§Җл§Ң) */}
                  {msg.role === 'assistant' && msg.sources && msg.sources.length > 0 && (
                    <div className="mt-1.5 ml-1">
                      <button
                        onClick={() => toggleSources(idx)}
                        className="text-xs text-text-secondary hover:text-primary transition-colors flex items-center gap-1"
                      >
                        <svg className={`w-3 h-3 transition-transform ${expandedSources[idx] ? 'rotate-90' : ''}`}
                          fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                        </svg>
                        к·јкұ°мһҗлЈҢ {msg.sources.length}кұҙ
                        {(() => {
                          const docSet = new Set(msg.sources.map(s => s.documentTitle));
                          return docSet.size > 1 ? ` (${docSet.size}к°ң л¬ём„ң)` : '';
                        })()}
                      </button>
                      {expandedSources[idx] && (
                        <div className="mt-2 space-y-1.5">
                          {msg.sources.map((src, si) => {
                            const simPercent = (src.similarity * 100).toFixed(1);
                            const simColor = simPercent >= 80 ? 'text-green-600' : simPercent >= 60 ? 'text-yellow-600' : 'text-text-secondary';
                            return (
                              <div key={si} className="text-xs bg-bg border border-border rounded-lg p-2.5">
                                <div className="flex items-center gap-1.5 flex-wrap mb-1">
                                  <span className="font-medium text-primary">к·јкұ° {si + 1}</span>
                                  <span className="text-text font-medium">{src.documentTitle}</span>
                                  {src.label && <span className="text-text-secondary">({src.label})</span>}
                                  {src.chapter && !src.label && <span className="text-text-secondary">{src.chapter}</span>}
                                  <span className={`${simColor} font-medium`}>{simPercent}%</span>
                                </div>
                                <p className="text-text-secondary leading-relaxed">{src.excerpt}</p>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            ))}

            {/* лЎңл”© мқёл””мјҖмқҙн„° */}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-card-bg border border-border rounded-2xl rounded-bl-md px-4 py-3 shadow-sm">
                  <div className="flex items-center gap-2">
                    <div className="flex gap-1">
                      <div className="w-2 h-2 bg-primary/50 rounded-full animate-bounce" style={{ animationDelay: '0ms' }} />
                      <div className="w-2 h-2 bg-primary/50 rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                      <div className="w-2 h-2 bg-primary/50 rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                    </div>
                    <span className="text-xs text-text-secondary">лӢөліҖ мғқм„ұ мӨ‘...</span>
                  </div>
                </div>
              </div>
            )}

            {/* м—җлҹ¬ */}
            {error && (
              <div className="flex justify-start">
                <div className="bg-red-50 border border-red-200 rounded-2xl rounded-bl-md px-4 py-3">
                  <p className="text-sm text-red-500">{error}</p>
                </div>
              </div>
            )}

            <div ref={chatEndRef} />
          </div>

          {/* н•ҳлӢЁ мһ…л Ҙ мҳҒм—ӯ */}
          <div className="border-t border-border pt-3 mt-2">
            <div className="flex gap-2 items-end">
              <div className="flex-1 relative">
                <textarea
                  ref={inputRef}
                  value={inputText}
                  onChange={e => setInputText(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="м§Ҳл¬ёмқ„ мһ…л Ҙн•ҳм„ёмҡ”..."
                  rows={1}
                  className="w-full px-4 py-2.5 bg-bg border border-border rounded-xl text-text text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none"
                  style={{ minHeight: '42px', maxHeight: '120px' }}
                  onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
                />
              </div>
              <button
                onClick={handleSend}
                disabled={loading || !inputText.trim()}
                className="flex-shrink-0 w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center hover:bg-primary-hover disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19V5m0 0l-7 7m7-7l7 7" />
                </svg>
              </button>
            </div>
            <div className="flex items-center justify-between mt-1.5">
              <span className="text-[10px] text-text-secondary">
                {providerName(llmProvider)} ({llmSettings[llmProvider]?.model || 'кё°ліё'}) {filterDocIds.length > 0 ? `| ${filterDocIds.length}к°ң л¬ём„ң м„ нғқ` : '| м „мІҙ л¬ём„ң'}
              </span>
              <span className="text-[10px] text-text-secondary">Shift+EnterлЎң мӨ„л°”кҝҲ</span>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // API кҙҖлҰ¬ лҢҖмӢңліҙл“ң нғӯ
    // ========================================
    function ApiDashboardTab() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [range, setRange] = useState('today');
      const [subTab, setSubTab] = useState('dashboard');
      const [actionLoading, setActionLoading] = useState(null);
      // мқёлқјмқё кІ°кіј л©”мӢңм§Җ { id: string, success: bool, message: string }
      const [actionResult, setActionResult] = useState(null);
      // н•ңлҸ„ мқёлқјмқё нҺём§‘ { provider: string, value: string }
      const [editingLimit, setEditingLimit] = useState(null);
      // м—җлҹ¬ н•„н„°
      const [errorFilter, setErrorFilter] = useState('all');
      // л“ңлһҳк·ё м•Ө л“ңлЎӯ
      const [dragIndex, setDragIndex] = useState(null);
      const [dragOverIndex, setDragOverIndex] = useState(null);
      // OCR мғҒнғң
      const [engines, setEngines] = useState([]);
      const [ocrLoading, setOcrLoading] = useState(true);

      const fetchData = useCallback(async () => {
        setLoading(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?range=${range}`);
          if (!res.ok) throw new Error('лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ');
          setData(await res.json());
        } catch (err) {
          console.error(err);
        } finally {
          setLoading(false);
        }
      }, [range]);

      const fetchEngines = useCallback(async () => {
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?type=ocr`);
          if (res.ok) {
            const d = await res.json();
            setEngines(d.engines || []);
          }
        } catch (err) {
          console.error('[OCR]', err);
        } finally {
          setOcrLoading(false);
        }
      }, []);

      useEffect(() => { fetchData(); fetchEngines(); }, [fetchData, fetchEngines]);

      // в”Җв”Җ API нӮӨ м•Ўм…ҳ в”Җв”Җ
      const handleTestKey = useCallback(async (provider) => {
        setActionLoading(`test-${provider}`);
        setActionResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'testKey', provider }),
          });
          const result = await res.json();
          setActionResult({ id: `key-${provider}`, success: result.success, message: result.message });
          fetchData();
          setTimeout(() => setActionResult(prev => prev?.id === `key-${provider}` ? null : prev), 5000);
        } finally { setActionLoading(null); }
      }, [fetchData]);

      const handleToggleKey = useCallback(async (provider, currentActive) => {
        setActionLoading(`toggle-${provider}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'toggleKey', provider, isActive: !currentActive }),
          });
          fetchData();
        } finally { setActionLoading(null); }
      }, [fetchData]);

      const handleUpdateLimit = useCallback(async (provider, value) => {
        setActionLoading(`limit-${provider}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'updateLimit', provider, dailyLimit: parseInt(value) || 0 }),
          });
          setEditingLimit(null);
          fetchData();
        } finally { setActionLoading(null); }
      }, [fetchData]);

      // в”Җв”Җ OCR м•Ўм…ҳ в”Җв”Җ
      const handleOcrMove = useCallback(async (index, direction) => {
        const ne = [...engines];
        const si = index + direction;
        if (si < 0 || si >= ne.length) return;
        [ne[index], ne[si]] = [ne[si], ne[index]];
        setEngines(ne);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrUpdatePriority', order: ne.map(e => e.engine_id) }),
          });
        } catch { fetchEngines(); }
      }, [engines, fetchEngines]);

      // л“ңлһҳк·ё мҷ„лЈҢ мӢң мҲңм„ң л°ҳмҳҒ
      const handleDragEnd = useCallback(async () => {
        if (dragIndex === null || dragOverIndex === null || dragIndex === dragOverIndex) {
          setDragIndex(null);
          setDragOverIndex(null);
          return;
        }
        const ne = [...engines];
        const [moved] = ne.splice(dragIndex, 1);
        ne.splice(dragOverIndex, 0, moved);
        setEngines(ne);
        setDragIndex(null);
        setDragOverIndex(null);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrUpdatePriority', order: ne.map(e => e.engine_id) }),
          });
        } catch { fetchEngines(); }
      }, [dragIndex, dragOverIndex, engines, fetchEngines]);

      const handleOcrToggle = useCallback(async (engineId, currentEnabled) => {
        setActionLoading(`ocr-toggle-${engineId}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrToggleEngine', engineId, enabled: !currentEnabled }),
          });
          fetchEngines();
        } finally { setActionLoading(null); }
      }, [fetchEngines]);

      const handleOcrTest = useCallback(async (engineId) => {
        setActionLoading(`ocr-test-${engineId}`);
        setActionResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrTestEngine', engineId }),
          });
          const result = await res.json();
          setActionResult({ id: `ocr-${engineId}`, success: result.success, message: result.message });
          setTimeout(() => setActionResult(prev => prev?.id === `ocr-${engineId}` ? null : prev), 5000);
        } finally { setActionLoading(null); }
      }, []);

      // мқјкҙ„ н…ҢмҠӨнҠё (API нӮӨ)
      const handleTestAllKeys = useCallback(async () => {
        const configured = data?.keys?.filter(k => k.configured) || [];
        if (configured.length === 0) return;
        setActionLoading('test-all');
        let ok = 0, fail = 0;
        for (const key of configured) {
          setActionResult({ id: 'test-all', success: true, message: `н…ҢмҠӨнҠё мӨ‘... (${ok + fail + 1}/${configured.length}) ${key.provider}` });
          try {
            const res = await authFetch(`${API_BASE_URL}/api-usage`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'testKey', provider: key.provider }),
            });
            const r = await res.json();
            r.success ? ok++ : fail++;
          } catch { fail++; }
        }
        setActionResult({ id: 'test-all', success: fail === 0, message: `мҷ„лЈҢ: м„ұкіө ${ok}к°ң, мӢӨнҢЁ ${fail}к°ң` });
        fetchData();
        setTimeout(() => setActionResult(prev => prev?.id === 'test-all' ? null : prev), 5000);
        setActionLoading(null);
      }, [data, fetchData]);

      // мқјкҙ„ н…ҢмҠӨнҠё (OCR)
      const handleTestAllOcr = useCallback(async () => {
        const available = engines.filter(e => e.is_available && e.is_enabled);
        if (available.length === 0) return;
        setActionLoading('ocr-test-all');
        let ok = 0, fail = 0;
        for (const engine of available) {
          setActionResult({ id: 'ocr-test-all', success: true, message: `н…ҢмҠӨнҠё мӨ‘... (${ok + fail + 1}/${available.length}) ${engine.name}` });
          try {
            const res = await authFetch(`${API_BASE_URL}/api-usage`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'ocrTestEngine', engineId: engine.engine_id }),
            });
            const r = await res.json();
            r.success ? ok++ : fail++;
          } catch { fail++; }
        }
        setActionResult({ id: 'ocr-test-all', success: fail === 0, message: `мҷ„лЈҢ: м„ұкіө ${ok}к°ң, мӢӨнҢЁ ${fail}к°ң` });
        setTimeout(() => setActionResult(prev => prev?.id === 'ocr-test-all' ? null : prev), 5000);
        setActionLoading(null);
      }, [engines]);

      const providerLabels = {
        openai: 'OpenAI', anthropic: 'Anthropic', gemini: 'Google Gemini',
        cohere: 'Cohere', upstage: 'Upstage',
        'law-api': 'көӯк°ҖлІ•л №м •ліҙм„јн„°', 'ocr-space': 'OCR.space',
        'google-vision': 'Google Vision', 'aws-textract': 'AWS Textract', 'naver-clova': 'л„ӨмқҙлІ„ CLOVA',
      };
      const providerColors = {
        openai: 'green', anthropic: 'yellow', gemini: 'primary',
        cohere: 'blue', upstage: 'blue',
        'law-api': 'gray', 'ocr-space': 'gray',
        'google-vision': 'primary', 'aws-textract': 'yellow', 'naver-clova': 'green',
      };

      if (loading && !data) {
        return (
          <div className="flex items-center justify-center py-16">
            <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
          </div>
        );
      }

      if (!data) {
        return <EmptyState icon="&#9888;" title="лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ" description="API мӮ¬мҡ©лҹү н…Ңмқҙлё”мқҙ мғқм„ұлҗҳм§Җ м•Ҡм•ҳмқ„ мҲҳ мһҲмҠөлӢҲлӢӨ." />;
      }

      const totalCost = data.usageByProvider?.reduce((sum, p) => sum + parseFloat(p.total_cost || 0), 0) || 0;
      const totalCalls = data.usageByProvider?.reduce((sum, p) => sum + parseInt(p.call_count || 0), 0) || 0;
      const totalErrors = data.usageByProvider?.reduce((sum, p) => sum + parseInt(p.error_count || 0), 0) || 0;

      const SUB_TABS = [
        { id: 'dashboard', label: 'лҢҖмӢңліҙл“ң' },
        { id: 'keys', label: 'API нӮӨ' },
        { id: 'usage', label: 'мӮ¬мҡ©лҹү' },
        { id: 'llm', label: 'LLM м„Өм •' },
        { id: 'ocr', label: 'OCR м„Өм •' },
        { id: 'deidentify', label: 'л№„мӢқлі„нҷ”' },
      ];

      const ocrStatusBadge = (engine) => {
        if (!engine.is_available) return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-400">лҜём„Өм •</span>;
        if (!engine.is_enabled) return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">л№„нҷңм„ұ</span>;
        return <span className="text-xs px-1.5 py-0.5 rounded bg-green-50 text-green-600">нҷңм„ұ</span>;
      };

      return (
        <div className="space-y-4 fade-in">
          {/* м„ңлёҢ нғӯ л„Өл№„кІҢмқҙм…ҳ */}
          <div className="flex gap-1 bg-card-bg rounded-lg p-1 border border-border">
            {SUB_TABS.map(tab => (
              <button key={tab.id} onClick={() => setSubTab(tab.id)}
                className={`flex-1 px-2 py-2 rounded-md text-xs font-medium transition-all ${
                  subTab === tab.id
                    ? 'bg-primary text-white shadow-sm'
                    : 'text-text-secondary hover:text-text hover:bg-border/50'
                }`}
              >{tab.label}{tab.id === 'ocr' && engines.filter(e => e.is_available && e.is_enabled).length > 0 ? ` (${engines.filter(e => e.is_available && e.is_enabled).length})` : ''}</button>
            ))}
          </div>

          {/* в•җв•җв•җв•җв•җв•җв•җв•җ лҢҖмӢңліҙл“ң нғӯ в•җв•җв•җв•җв•җв•җв•җв•җ */}
          {subTab === 'dashboard' && (
            <div className="space-y-4">
              {/* кё°к°„ м„ нғқ + мғҲлЎңкі м№Ё */}
              <div className="flex gap-2">
                {[{ v: 'today', l: 'мҳӨлҠҳ' }, { v: 'week', l: '7мқј' }, { v: 'month', l: '30мқј' }].map(r => (
                  <button key={r.v} onClick={() => setRange(r.v)}
                    className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${
                      range === r.v ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{r.l}</button>
                ))}
                <button onClick={fetchData}
                  className="ml-auto px-3 py-1.5 rounded-full text-xs bg-border text-text-secondary hover:text-text"
                >&#x21BB; мғҲлЎңкі м№Ё</button>
              </div>

              {/* мҡ”м•Ҫ м№ҙл“ң + м „мқј л№„көҗ */}
              {(() => {
                const today = data.prevComparison?.find(r => r.period === 'today');
                const yesterday = data.prevComparison?.find(r => r.period === 'yesterday');
                const diffBadge = (todayVal, yesterdayVal) => {
                  if (!yesterday || parseInt(yesterdayVal) === 0) return null;
                  const pct = Math.round(((todayVal - yesterdayVal) / yesterdayVal) * 100);
                  if (pct === 0) return null;
                  return <span className={`text-[10px] font-medium ${pct > 0 ? 'text-red-400' : 'text-green-500'}`}>{pct > 0 ? '\u2191' : '\u2193'}{Math.abs(pct)}%</span>;
                };
                return (
                  <div className="grid grid-cols-3 gap-3">
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">мҙқ нҳём¶ң</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className="text-2xl font-bold text-text">{totalCalls.toLocaleString()}</p>
                        {today && yesterday && diffBadge(parseInt(today.call_count), parseInt(yesterday.call_count))}
                      </div>
                    </Card>
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">мҳҲмғҒ л№„мҡ©</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className="text-2xl font-bold text-primary">${totalCost.toFixed(4)}</p>
                        {today && yesterday && diffBadge(parseFloat(today.total_cost), parseFloat(yesterday.total_cost))}
                      </div>
                    </Card>
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">м—җлҹ¬</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className={`text-2xl font-bold ${totalErrors > 0 ? 'text-red-500' : 'text-green-500'}`}>{totalErrors}</p>
                        {today && yesterday && diffBadge(parseInt(today.error_count), parseInt(yesterday.error_count))}
                      </div>
                    </Card>
                  </div>
                );
              })()}

              {/* н”„лЎңл°”мқҙлҚ”лі„ мҡ”м•Ҫ */}
              <Card>
                <h4 className="text-xs font-bold text-text mb-3">н”„лЎңл°”мқҙлҚ”лі„ нҳ„нҷ©</h4>
                <div className="space-y-3">
                  {data.usageByProvider?.map(p => {
                    const cost = parseFloat(p.total_cost || 0);
                    const calls = parseInt(p.call_count || 0);
                    const errors = parseInt(p.error_count || 0);
                    const maxCalls = Math.max(...(data.usageByProvider?.map(x => parseInt(x.call_count || 0)) || [1]));
                    return (
                      <div key={p.provider}>
                        <div className="flex items-center justify-between mb-1">
                          <div className="flex items-center gap-2">
                            <Badge color={providerColors[p.provider] || 'gray'}>{providerLabels[p.provider] || p.provider}</Badge>
                            <span className="text-xs text-text">{calls}нҡҢ</span>
                            {errors > 0 && <span className="text-xs text-red-500">({errors} м—җлҹ¬)</span>}
                          </div>
                          <span className="text-xs text-primary font-medium">${cost.toFixed(4)}</span>
                        </div>
                        <div className="w-full bg-border rounded-full h-1.5">
                          <div className="h-1.5 rounded-full bg-primary/70 transition-all" style={{ width: `${maxCalls > 0 ? (calls / maxCalls) * 100 : 0}%` }} />
                        </div>
                      </div>
                    );
                  })}
                  {(!data.usageByProvider || data.usageByProvider.length === 0) && (
                    <p className="text-xs text-text-secondary text-center py-4">м„ нғқн•ң кё°к°„м—җ мӮ¬мҡ© кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ.</p>
                  )}
                </div>
              </Card>

                          <div className="flex items-center gap-3">

                            <span className={`font-medium ${rate >= 90 ? 'text-green-600' : rate >= 70 ? 'text-yellow-600' : 'text-red-500'}`}>м„ұкіөлҘ  {rate}%</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </Card>
              )}

              {ocrLoading ? (
                <div className="text-center py-8 text-text-secondary text-sm">лЎңл”©...</div>
              ) : (
                <>
                  <div className="space-y-2">
                    {engines.map((engine, index) => (
                      <div key={engine.engine_id}
                        draggable
                        onDragStart={() => setDragIndex(index)}
                        onDragOver={(e) => { e.preventDefault(); setDragOverIndex(index); }}
                        onDragEnd={handleDragEnd}
                        onTouchStart={(e) => { setDragIndex(index); }}
                        className={`flex items-center gap-2 p-3 rounded-lg border transition-all ${
                          dragOverIndex === index && dragIndex !== null && dragIndex !== index
                            ? 'border-primary border-2 bg-blue-50/50'
                            : engine.is_enabled && engine.is_available
                              ? 'bg-card-bg border-border shadow-sm'
                              : !engine.is_available
                                ? 'bg-gray-50 border-dashed border-gray-300'
                                : 'bg-gray-50 border-border/50 opacity-70'
                        } ${dragIndex === index ? 'opacity-40 scale-95' : ''} cursor-grab active:cursor-grabbing`}
                      >
                        <span className={`text-sm font-bold w-6 text-center ${engine.is_available ? 'text-primary' : 'text-gray-300'}`} title="л“ңлһҳк·ён•ҳм—¬ мҲңм„ң ліҖкІҪ">{index + 1}</span>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className={`text-sm font-medium truncate ${engine.is_available ? 'text-text' : 'text-text-secondary'}`}>{engine.name}</span>
                            {engine.free && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-green-50 text-green-600 font-medium">л¬ҙлЈҢ</span>}
                            {ocrStatusBadge(engine)}
                          </div>
                          <p className="text-[11px] text-text-secondary truncate">{engine.description}</p>
                          {!engine.is_available && (
                            <p className="text-[10px] text-amber-600 mt-0.5">
                              <code className="bg-amber-50 px-1 py-0.5 rounded">{engine.envKey}</code> нҷҳкІҪліҖмҲҳ м„Өм •мқҙ н•„мҡ”н•©лӢҲлӢӨ
                            </p>
                          )}
                          {actionResult?.id === `ocr-${engine.engine_id}` && (
                            <p className={`text-[10px] mt-0.5 fade-in ${actionResult.success ? 'text-green-600' : 'text-red-500'}`}>
                              {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                            </p>
                          )}
                        </div>
                        <div className="flex items-center gap-1 shrink-0">
                          <button onClick={() => handleOcrMove(index, -1)} disabled={index === 0}
                            className="w-7 h-7 flex items-center justify-center rounded-md text-text-secondary hover:text-primary hover:bg-gray-100 disabled:opacity-30 text-xs">&#9650;</button>
                          <button onClick={() => handleOcrMove(index, 1)} disabled={index === engines.length - 1}
                            className="w-7 h-7 flex items-center justify-center rounded-md text-text-secondary hover:text-primary hover:bg-gray-100 disabled:opacity-30 text-xs">&#9660;</button>
                          <button onClick={() => handleOcrToggle(engine.engine_id, engine.is_enabled)}
                            disabled={actionLoading === `ocr-toggle-${engine.engine_id}`}
                            className={`w-9 h-5 rounded-full transition-colors relative ${engine.is_enabled ? 'bg-green-500' : 'bg-gray-300'}`}
                          ><span className={`absolute w-3.5 h-3.5 rounded-full bg-white top-[3px] transition-transform ${engine.is_enabled ? 'right-[3px]' : 'left-[3px]'}`} /></button>
                          {engine.is_available && (
                            <button onClick={() => handleOcrTest(engine.engine_id)} disabled={!!actionLoading}
                              className="text-[10px] px-2 py-1 rounded-md border border-primary/30 text-primary hover:bg-blue-50 transition-colors disabled:opacity-30"
                            >{actionLoading === `ocr-test-${engine.engine_id}` ? '...' : 'н…ҢмҠӨнҠё'}</button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}

          {/* в•җв•җв•җв•җв•җв•җв•җв•җ л№„мӢқлі„нҷ” м„Өм • нғӯ в•җв•җв•җв•җв•җв•җв•җв•җ */}
          {subTab === 'deidentify' && (
            <DeidentifyPanel />
          )}
        </div>
      );
    }

    // ========================================
    // л№„мӢқлі„нҷ” нӮӨмӣҢл“ң кҙҖлҰ¬ нҢЁл„җ
    // ========================================
    function DeidentifyPanel() {
      const [words, setWords] = useState([]);
      const [loading, setLoading] = useState(true);
      const [newKeyword, setNewKeyword] = useState('');
      const [newReplacement, setNewReplacement] = useState('***');
      const [bulkInput, setBulkInput] = useState('');
      const [showBulk, setShowBulk] = useState(false);
      const [message, setMessage] = useState(null);

      const fetchWords = useCallback(async () => {
        try {
          const res = await authFetch(`${API_BASE_URL}/deidentify`);
          if (res.ok) {
            const data = await res.json();
            setWords(data.words || []);
          }
        } catch (err) {
          console.error(err);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchWords(); }, [fetchWords]);

      const handleAdd = useCallback(async () => {
        if (!newKeyword.trim()) return;
        try {
          const res = await authFetch(`${API_BASE_URL}/deidentify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'add', keyword: newKeyword.trim(), replacement: newReplacement }),
          });
          if (res.ok) {
            setNewKeyword('');
            setMessage({ type: 'success', text: `"${newKeyword.trim()}" м¶”к°ҖлҗЁ` });
            fetchWords();
            setTimeout(() => setMessage(null), 2000);
          }
        } catch (err) {
          setMessage({ type: 'error', text: err.message });
        }
      }, [newKeyword, newReplacement, fetchWords]);

      const handleDelete = useCallback(async (id, keyword) => {
        try {
          await authFetch(`${API_BASE_URL}/deidentify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'delete', id }),
          });
          setMessage({ type: 'success', text: `"${keyword}" мӮӯм ңлҗЁ` });
          fetchWords();
          setTimeout(() => setMessage(null), 2000);
        } catch (err) {
          setMessage({ type: 'error', text: err.message });
        }
      }, [fetchWords]);

      const handleBulkAdd = useCallback(async () => {
        const keywords = bulkInput.split('\n').map(s => s.trim()).filter(s => s.length > 0);
        if (keywords.length === 0) return;
        try {
          const res = await authFetch(`${API_BASE_URL}/deidentify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'bulkAdd', keyword: keywords, replacement: newReplacement }),
          });
          if (res.ok) {
            const data = await res.json();
            setBulkInput('');
            setShowBulk(false);
            setMessage({ type: 'success', text: `${data.added}к°ң нӮӨмӣҢл“ң м¶”к°ҖлҗЁ` });
            fetchWords();
            setTimeout(() => setMessage(null), 2000);
          }
        } catch (err) {
          setMessage({ type: 'error', text: err.message });
        }
      }, [bulkInput, newReplacement, fetchWords]);

      return (
        <div className="space-y-4">
          <Card>
            <div className="space-y-1">
              <h3 className="text-sm font-bold text-text">л№„мӢқлі„нҷ” нӮӨмӣҢл“ң кҙҖлҰ¬</h3>
              <p className="text-xs text-text-secondary">
                л“ұлЎқлҗң нӮӨмӣҢл“ңлҠ” нҢҢмқј м—…лЎңл“ң мӢң н…ҚмҠӨнҠём—җм„ң мһҗлҸҷмңјлЎң м№ҳнҷҳлҗ©лӢҲлӢӨ.
                м—…лЎңл“ң нҷ”л©ҙм—җм„ң "л№„мӢқлі„нҷ”" мҳөм…ҳмқ„ мјңм•ј м Ғмҡ©лҗ©лӢҲлӢӨ.
              </p>
            </div>
          </Card>

          {message && (
            <div className={`text-xs px-3 py-2 rounded-lg fade-in ${message.type === 'success' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>
              {message.text}
            </div>
          )}

          {/* нӮӨмӣҢл“ң м¶”к°Җ */}
          <Card>
            <div className="space-y-3">
              <div className="flex gap-2">
                <input
                  type="text"
                  value={newKeyword}
                  onChange={e => setNewKeyword(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleAdd()}
                  placeholder="л№„мӢқлі„нҷ”н•  нӮӨмӣҢл“ң мһ…л Ҙ"
                  className="flex-1 px-3 py-2 bg-bg border border-border rounded-lg text-text text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary"
                />
                <input
                  type="text"
                  value={newReplacement}
                  onChange={e => setNewReplacement(e.target.value)}
                  placeholder="м№ҳнҷҳ н…ҚмҠӨнҠё"
                  className="w-20 px-2 py-2 bg-bg border border-border rounded-lg text-text text-sm text-center focus:outline-none focus:border-primary"
                />
                <Button onClick={handleAdd} disabled={!newKeyword.trim()}>м¶”к°Җ</Button>
              </div>
              <div className="flex gap-2">
                <button
                  onClick={() => setShowBulk(!showBulk)}
                  className="text-xs text-primary hover:underline"
                >{showBulk ? 'мқјкҙ„ мһ…л Ҙ лӢ«кё°' : 'мқјкҙ„ мһ…л Ҙ'}</button>
              </div>
              {showBulk && (
                <div className="space-y-2">
                  <textarea
                    value={bulkInput}
                    onChange={e => setBulkInput(e.target.value)}
                    placeholder="н•ң мӨ„м—җ н•ҳлӮҳм”© нӮӨмӣҢл“ңлҘј мһ…л Ҙн•ҳм„ёмҡ”&#10;мҳҲ:&#10;нҷҚкёёлҸҷ&#10;010-1234-5678&#10;м„ңмҡёмӢң к°•лӮЁкө¬"
                    className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-text text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary h-32 resize-none"
                  />
                  <Button onClick={handleBulkAdd} disabled={!bulkInput.trim()}>мқјкҙ„ м¶”к°Җ</Button>
                </div>
              )}
            </div>
          </Card>

          {/* л“ұлЎқлҗң нӮӨмӣҢл“ң лӘ©лЎқ */}
          <Card>
            <div className="flex items-center justify-between mb-3">
              <h4 className="text-xs font-bold text-text">л“ұлЎқлҗң нӮӨмӣҢл“ң ({words.length}к°ң)</h4>
            </div>
            {loading ? (
              <p className="text-xs text-text-secondary text-center py-4">лЎңл”©...</p>
            ) : words.length === 0 ? (
              <p className="text-xs text-text-secondary text-center py-4">л“ұлЎқлҗң нӮӨмӣҢл“ңк°Җ м—ҶмҠөлӢҲлӢӨ.</p>
            ) : (
              <div className="space-y-1.5 max-h-80 overflow-y-auto">
                {words.map(w => (
                  <div key={w.id} className="flex items-center justify-between py-1.5 px-2 rounded-lg hover:bg-card-bg-hover group">
                    <div className="flex items-center gap-2 min-w-0">
                      <span className="text-sm text-text font-medium truncate">{w.keyword}</span>
                      <span className="text-xs text-text-secondary shrink-0">
                        &rarr; <span className="font-mono bg-badge-bg px-1.5 py-0.5 rounded">{w.replacement}</span>
                      </span>
                    </div>
                    <button
                      onClick={() => handleDelete(w.id, w.keyword)}
                      className="text-xs text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 ml-2"
                    >мӮӯм ң</button>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      );
    }

    // ========================================
    // App м»ҙнҸ¬л„ҢнҠё
    // ========================================
    // ========================================
    // лЎңк·ёмқё нҷ”л©ҙ
    // ========================================
    function LoginScreen({ onLogin, theme, onToggleTheme }) {
      const [id, setId] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!id || !password) { setError('м•„мқҙл””мҷҖ л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }
        setLoading(true);
        setError('');
        try {
          const res = await fetch(`${API_BASE_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, password }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error || 'лЎңк·ёмқём—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.'); return; }
          setAuthToken(data.token);
          setAuthUser({ name: data.name, admin: data.admin, orgId: data.orgId, orgName: data.orgName });
          onLogin();
        } catch (err) {
          setError('м„ңлІ„ м—°кІ°м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center px-4">
          <div className="w-full max-w-sm">
            {/* н…Ңл§Ҳ нҶ кёҖ */}
            <div className="flex justify-end mb-4">
              <button onClick={onToggleTheme} className="w-8 h-8 flex items-center justify-center rounded-lg text-text-secondary hover:text-text transition-colors" title={theme === 'light' ? 'лӢӨнҒ¬лӘЁл“ң' : 'лқјмқҙнҠёлӘЁл“ң'}>
                {theme === 'light' ? (
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                ) : (
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                )}
              </button>
            </div>
            {/* лЎңкі  мҳҒм—ӯ */}
            <div className="text-center mb-8">
              <div className="text-4xl mb-2">&#128218;</div>
              <h1 className="text-2xl font-bold text-text">DocStore</h1>
              <p className="text-text-secondary text-sm mt-1">м§ҖмӢқ кҙҖлҰ¬ мӢңмҠӨн…ң</p>
            </div>

            {/* лЎңк·ёмқё нҸј */}
            <form onSubmit={handleSubmit} className="bg-card-bg rounded-xl p-6 border border-border shadow-lg">
              {error && (
                <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm">
                  {error}
                </div>
              )}

              <div className="mb-4">
                <label className="block text-sm text-text-secondary mb-1">м•„мқҙл””</label>
                <input
                  type="text"
                  value={id}
                  onChange={e => setId(e.target.value)}
                  className="w-full px-3 py-2.5 bg-card-bg border border-border rounded-lg text-text text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                  placeholder="м•„мқҙл””лҘј мһ…л Ҙн•ҳм„ёмҡ”"
                  autoFocus
                  autoComplete="username"
                />
              </div>

              <div className="mb-6">
                <label className="block text-sm text-text-secondary mb-1">л№„л°ҖлІҲнҳё</label>
                <input
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  className="w-full px-3 py-2.5 bg-card-bg border border-border rounded-lg text-text text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                  placeholder="л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҳм„ёмҡ”"
                  autoComplete="current-password"
                />
              </div>

              <button
                type="submit"
                disabled={loading}
                className="w-full py-2.5 bg-primary hover:bg-primary-hover text-white rounded-lg text-sm font-medium transition-colors disabled:opacity-50"
              >
                {loading ? 'лЎңк·ёмқё мӨ‘...' : 'лЎңк·ёмқё'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(!!getAuthToken());
      const [activeTab, setActiveTab] = useState('upload');
      const [refreshKey, setRefreshKey] = useState(0);
      const { theme, toggle: toggleTheme } = useTheme();

      // м—…лЎңл“ң мҷ„лЈҢ мӢң л¬ём„ң лӘ©лЎқ мғҲлЎңкі м№Ё нҠёлҰ¬кұ°
      const handleUploadComplete = useCallback(() => {
        setRefreshKey(k => k + 1);
      }, []);

      const handleLogout = useCallback(() => {
        clearAuthToken();
        setIsLoggedIn(false);
      }, []);

      // нҷҲ лІ„нҠј: л¬ём„ң лӘ©лЎқ нғӯмңјлЎң мқҙлҸҷ + мғҲлЎңкі м№Ё
      const handleHomeClick = useCallback(() => {
        setActiveTab('upload');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, []);

      // лЎңк·ёмқё м „мқҙл©ҙ лЎңк·ёмқё нҷ”л©ҙ н‘ңмӢң
      if (!isLoggedIn) {
        return <LoginScreen onLogin={() => setIsLoggedIn(true)} theme={theme} onToggleTheme={toggleTheme} />;
      }

      return (
        <div className="min-h-screen pb-16">
          <Header onLogout={handleLogout} onHomeClick={handleHomeClick} theme={theme} onToggleTheme={toggleTheme} />
          <main className="max-w-3xl mx-auto px-4 py-5">
            {activeTab === 'upload' && (
              <UploadTab onUploadComplete={handleUploadComplete} />
            )}
            {activeTab === 'documents' && (
              <DocumentsTab key={refreshKey} />
            )}
            {activeTab === 'search' && (
              <SearchTab />
            )}
            {activeTab === 'chat' && (
              <ChatTab />
            )}
            {activeTab === 'api' && (
              <ApiDashboardTab />
            )}
          </main>
          <BottomNav activeTab={activeTab} onTabChange={setActiveTab} />
        </div>
      );
    }

    // ========================================
    // л ҢлҚ”л§Ғ
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
