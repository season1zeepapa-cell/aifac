    // ========================================
    function useTheme() {
      const [theme, setThemeState] = useState(() => {
        return localStorage.getItem('docstore_theme') || 'light';
      });

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('docstore_theme', theme);
      }, [theme]);

      const toggle = useCallback(() => {
        setThemeState(prev => prev === 'light' ? 'dark' : 'light');
      }, []);

      return { theme, toggle };

      { id:'gpt-5.1',      tier:'кі м„ұлҠҘ', inputP:'$1.25',  outputP:'$10.00', reasoning:false, desc:'GPT-5 м•Ҳм • лІ„м „ (5.1)' },

      { id:'o3-pro',       tier:'мөңкі кёү', inputP:'$20.00', outputP:'$80.00', reasoning:true,  desc:'мөңкі  м„ұлҠҘ м¶”лЎ  В· ліөмһЎн•ң лҚ°мқҙн„° л¶„м„қ' },
      { id:'o4-mini',      tier:'м¶”лЎ ',   inputP:'$1.10',  outputP:'$4.40',  reasoning:true,  desc:'мөңмӢ  кІҪлҹү м¶”лЎ  лӘЁлҚё (o4 м„ёлҢҖ)' },
      { id:'o3',           tier:'м¶”лЎ ',   inputP:'$2.00',  outputP:'$8.00',  reasoning:true,  desc:'к°•л Ҙн•ң м¶”лЎ  лӘЁлҚё В· ліөмһЎн•ң л¬ём ң' },
      { id:'o3-mini',      tier:'м¶”лЎ ',   inputP:'$1.10',  outputP:'$4.40',  reasoning:true,  desc:'кІҪлҹү м¶”лЎ  нҠ№нҷ” лӘЁлҚё' },
      { id:'o1-mini',      tier:'м¶”лЎ ',   inputP:'$3.00',  outputP:'$12.00', reasoning:true,  desc:'STEMВ·мҲҳн•ҷ нҠ№нҷ” м¶”лЎ  лӘЁлҚё' },
      { id:'o1',           tier:'мөңкі кёү', inputP:'$15.00', outputP:'$60.00', reasoning:true,  desc:'мөңкі  мҲҳмӨҖ м¶”лЎ  В· ліөмһЎн•ң л¬ём ң' },
      // GPT-4.1 / GPT-4o
      { id:'gpt-4.1',      tier:'кі м„ұлҠҘ', inputP:'$2.00',  outputP:'$8.00',  reasoning:false, desc:'GPT-4.1 н”Ңлһҳк·ёмӢӯ В· лӣ°м–ҙлӮң м„ұлҠҘ' },
      { id:'gpt-4.1-mini', tier:'мӨ‘к°„',   inputP:'$0.40',  outputP:'$1.60',  reasoning:false, desc:'GPT-4.1 кё°л°ҳ л№ лҘҙкі  м Җл ҙ' },
      { id:'gpt-4.1-nano', tier:'м Җл№„мҡ©', inputP:'$0.10',  outputP:'$0.40',  reasoning:false, desc:'GPT-4.1 кі„м—ҙ мөңм Җ л№„мҡ©' },
      { id:'gpt-4o',       tier:'кі м„ұлҠҘ', inputP:'$2.50',  outputP:'$10.00', reasoning:false, desc:'к°•л Ҙн•ң л©ҖнӢ°лӘЁлӢ¬ В· мҳҒмғҒ мқҙн•ҙ' },
      { id:'gpt-4o-mini',  tier:'мӨ‘к°„',   inputP:'$0.15',  outputP:'$0.60',  reasoning:false, desc:'к· нҳ•мһЎнһҢ к°Җм„ұл№„ лӘЁлҚё' },
    ];
    const CLAUDE_CATALOG = [
      { id:'claude-sonnet-4-20250514', tier:'м¶”мІң',   inputP:'$3.00', outputP:'$15.00', desc:'Claude Sonnet 4 В· к· нҳ•мһЎнһҢ м„ұлҠҘ' },
      { id:'claude-haiku-4-5-20251001',tier:'м Җл№„мҡ©', inputP:'$0.80', outputP:'$4.00',  desc:'Claude Haiku 4.5 В· л№ лҘҙкі  м Җл ҙ' },
    ];
    const TIER_COLORS = { 'мөңмӢ ':'#e11d48','м¶”мІң':'#10b981','м Җл№„мҡ©':'#06b6d4','мӨ‘к°„':'#6b7280','кі м„ұлҠҘ':'#3b82f6','мөңкі кёү':'#8b5cf6','м¶”лЎ ':'#f59e0b' };

    // LLM м„Өм • м „м—ӯ мғҒнғң (React context лҢҖмӢ  м „м—ӯ ліҖмҲҳлЎң кҙҖлҰ¬, мғҲлЎңкі м№Ё мӢң кё°ліёк°’)
    const DEFAULT_LLM_SETTINGS = {
      gemini:  { model:'gemini-2.5-flash', temperature:0.3, maxTokens:2048, thinkingBudget:0 },
      openai:  { model:'gpt-4o-mini',      temperature:0.3, maxTokens:2048 },
      claude:  { model:'claude-sonnet-4-20250514', temperature:0.3, maxTokens:2048 },
    };
    // localStorageм—җ м ҖмһҘн•ҳм—¬ м„ём…ҳ к°„ мң м§Җ
    function loadLlmSettings() {
      try {
        const saved = localStorage.getItem('docstore_llm_settings');
        if (saved) return JSON.parse(saved);
      } catch {}
      return JSON.parse(JSON.stringify(DEFAULT_LLM_SETTINGS));
    }
    function saveLlmSettings(settings) {
      localStorage.setItem('docstore_llm_settings', JSON.stringify(settings));
    }
    let llmSettings = loadLlmSettings();

    // ========================================
    // мқёмҰқ нҶ нҒ° кҙҖлҰ¬
    // ========================================
    function getAuthToken() {
      return localStorage.getItem('docstore_token');
    }
    function setAuthToken(token) {
      localStorage.setItem('docstore_token', token);
    }
    function clearAuthToken() {
      localStorage.removeItem('docstore_token');
      localStorage.removeItem('docstore_user');
    }
    function getAuthUser() {
      try { return JSON.parse(localStorage.getItem('docstore_user')); } catch { return null; }
    }
    function setAuthUser(user) {
      localStorage.setItem('docstore_user', JSON.stringify(user));
    }

    // мқёмҰқ н—ӨлҚ”к°Җ нҸ¬н•Ёлҗң fetch лһҳнҚј
    function authFetch(url, options = {}) {
      const token = getAuthToken();
      if (token) {
        options.headers = {
          ...options.headers,
          'Authorization': `Bearer ${token}`,
        };
      }
      return fetch(url, options).then(res => {
        // 401 мқ‘лӢөмқҙл©ҙ мһҗлҸҷ лЎңк·ём•„мӣғ
        if (res.status === 401) {
          clearAuthToken();
          window.location.reload();
        }
        return res;
      });
    }

    // мӢңл®¬л Ҳмқҙм…ҳ м§„н–үлҘ  вҖ” м„ңлІ„ мқ‘лӢөмқ„ кё°лӢӨлҰ¬лҠ” лҸҷм•Ҳ лӢЁкі„лі„ л©”мӢңм§ҖлҘј н‘ңмӢң
    // steps: [{ message, duration(ms), progress }] вҖ” к°Ғ лӢЁкі„ м •ліҙ
    // м„ңлІ„ мқ‘лӢөмқҙ мҳӨл©ҙ мһҗлҸҷмңјлЎң 100%лЎң м „нҷҳ
    function useSimulatedProgress(steps) {
      const [progress, setProgress] = React.useState(0);
      const [message, setMessage] = React.useState('');
      const timerRef = React.useRef(null);

      const start = React.useCallback(() => {
        let stepIdx = 0;
        setProgress(steps[0]?.progress || 5);
        setMessage(steps[0]?.message || 'мІҳлҰ¬ мӨ‘...');

        timerRef.current = setInterval(() => {
          stepIdx++;
          if (stepIdx < steps.length) {
            setProgress(steps[stepIdx].progress);
            setMessage(steps[stepIdx].message);
          } else {
            // л§Ҳм§Җл§ү лӢЁкі„ мқҙнӣ„ мІңмІңнһҲ мҰқк°Җ (мөңлҢҖ 92%)
            setProgress(prev => Math.min(92, prev + 1));
          }
        }, steps[stepIdx]?.duration || 3000);
      }, [steps]);

      const finish = React.useCallback((msg) => {
        if (timerRef.current) clearInterval(timerRef.current);
        setProgress(100);
        setMessage(msg || 'мҷ„лЈҢ!');
      }, []);

      const reset = React.useCallback(() => {
        if (timerRef.current) clearInterval(timerRef.current);
        setProgress(0);
        setMessage('');
      }, []);

      // м»ҙнҸ¬л„ҢнҠё м–ёл§ҲмҡҙнҠё мӢң нғҖмқҙлЁё м •лҰ¬
      React.useEffect(() => () => {
        if (timerRef.current) clearInterval(timerRef.current);
      }, []);

      return { progress, message, start, finish, reset };
    }

    // в”Җв”Җ XHR кё°л°ҳ мӢӨмӢңк°„ м—…лЎңл“ң м§„н–үлҘ  нӣ… в”Җв”Җ
    // нҢҢмқј м „мҶЎ(0~50%): л°”мқҙнҠё кё°л°ҳ мӢӨмӢңк°„, м„ңлІ„ мІҳлҰ¬(50~100%): мӢңл®¬л Ҳмқҙм…ҳ
    function useUploadProgress() {
      const [progress, setProgress] = React.useState(0);
      const [message, setMessage] = React.useState('');
      const timerRef = React.useRef(null);
      const xhrRef = React.useRef(null);

      // XHRлЎң нҢҢмқј м—…лЎңл“ң + м§„н–үлҘ  м¶”м Ғ
      const upload = React.useCallback((url, formData, token) => {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhrRef.current = xhr;

          // нҢҢмқј м „мҶЎ м§„н–үлҘ  (0~50%)
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const pct = (e.loaded / e.total) * 50;
              setProgress(pct);
              const mb = (e.loaded / 1024 / 1024).toFixed(1);
              const totalMb = (e.total / 1024 / 1024).toFixed(1);
              setMessage(`нҢҢмқј м „мҶЎ мӨ‘... ${mb}MB / ${totalMb}MB`);
            }
          };

          // нҢҢмқј м „мҶЎ мҷ„лЈҢ вҶ’ м„ңлІ„ мІҳлҰ¬ мӢңл®¬л Ҳмқҙм…ҳ мӢңмһ‘ (50~95%)
          xhr.upload.onload = () => {
            setProgress(50);
            setMessage('м„ңлІ„м—җм„ң н…ҚмҠӨнҠё м¶”м¶ң мӨ‘...');
            const serverSteps = [
              { msg: 'м„ңлІ„м—җм„ң н…ҚмҠӨнҠё м¶”м¶ң мӨ‘...', pct: 55, delay: 3000 },
              { msg: 'DB м ҖмһҘ мӨ‘...', pct: 62, delay: 3000 },
              { msg: 'мһ„лІ л”© мғқм„ұ мӨ‘...', pct: 70, delay: 5000 },
              { msg: 'мһ„лІ л”© мІҳлҰ¬ мӨ‘...', pct: 80, delay: 5000 },
              { msg: 'л§Ҳл¬ҙлҰ¬ мӨ‘...', pct: 90, delay: 5000 },
            ];
            let idx = 0;
            timerRef.current = setInterval(() => {
              idx++;
              if (idx < serverSteps.length) {
                setProgress(serverSteps[idx].pct);
                setMessage(serverSteps[idx].msg);
              } else {
                setProgress(prev => Math.min(95, prev + 0.5));
              }
            }, serverSteps[idx]?.delay || 4000);
          };

          // мқ‘лӢө мҲҳмӢ  мҷ„лЈҢ
          xhr.onload = () => {
            if (timerRef.current) clearInterval(timerRef.current);
            if (xhr.status >= 200 && xhr.status < 300) {
              try {
                resolve(JSON.parse(xhr.responseText));
              } catch {
                reject(new Error('мқ‘лӢө нҢҢмӢұ мӢӨнҢЁ'));
              }
            } else {
              try {
                const err = JSON.parse(xhr.responseText);
                reject(new Error(err.error || `м—…лЎңл“ң мӢӨнҢЁ (${xhr.status})`));
              } catch {
                reject(new Error(`м—…лЎңл“ң мӢӨнҢЁ (${xhr.status})`));
              }
            }
          };

          xhr.onerror = () => {
            if (timerRef.current) clearInterval(timerRef.current);
            reject(new Error('л„ӨнҠёмӣҢнҒ¬ мҳӨлҘҳ'));
          };

          xhr.open('POST', url);
          if (token) xhr.setRequestHeader('Authorization', `Bearer ${token}`);
          xhr.send(formData);
        });
      }, []);

      const finish = React.useCallback((msg) => {
        if (timerRef.current) clearInterval(timerRef.current);
        xhrRef.current = null;
        setProgress(100);
        setMessage(msg || 'мҷ„лЈҢ!');
      }, []);

      const reset = React.useCallback(() => {
        if (timerRef.current) clearInterval(timerRef.current);
        xhrRef.current = null;
        setProgress(0);
        setMessage('');
      }, []);

      React.useEffect(() => () => {
        if (timerRef.current) clearInterval(timerRef.current);
        if (xhrRef.current) xhrRef.current.abort();
      }, []);

      return { progress, message, upload, finish, reset };
    }

    // нҷ•мһҘмһҗ вҶ’ нҢҢмқј нҳ•мӢқ л§Өн•‘
    function detectClientFileType(filename) {
      const ext = (filename || '').toLowerCase().match(/\.[^.]+$/)?.[0] || '';
      const map = {
        '.pdf': 'pdf', '.txt': 'text', '.md': 'markdown', '.markdown': 'markdown',
        '.docx': 'docx', '.xlsx': 'xlsx', '.xls': 'xlsx', '.csv': 'csv',
        '.json': 'json', '.jpg': 'image', '.jpeg': 'image', '.png': 'image',
        '.gif': 'image', '.webp': 'image',
      };
      return map[ext] || 'unknown';
    }

    function formatFileSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // л©ҖнӢ° м„ нғқ л“ңлЎӯлӢӨмҡҙ (л¬ём„ң лІ”мң„ н•„н„°мҡ©)
    function MultiSelect({ label, selectedIds, onChange, options, placeholder = 'м „мІҙ' }) {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);

      // л°”к№Ҙ нҒҙлҰӯ мӢң лӢ«кё°
      useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const toggle = (id) => {
        const next = selectedIds.includes(id)
          ? selectedIds.filter(v => v !== id)
          : [...selectedIds, id];
        onChange(next);
      };

      const displayText = selectedIds.length === 0
        ? placeholder
        : selectedIds.length <= 2

          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
        ) },
        { id: 'api', label: 'кҙҖлҰ¬', icon: (
          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        ) },
      ];

      return (
        <nav className="fixed bottom-0 left-0 right-0 bg-card-bg border-t border-border z-40 shadow-sm">
          <div className="max-w-3xl mx-auto grid grid-cols-5">
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => !tab.disabled && onTabChange(tab.id)}
                disabled={tab.disabled}
                className={`flex flex-col items-center gap-1 py-2.5 transition-colors ${
                  tab.disabled
                    ? 'opacity-30 cursor-not-allowed'
                    : activeTab === tab.id
                      ? 'text-primary'
                      : 'text-text-secondary hover:text-text'
                }`}
              >
                {tab.icon}
                <span className="text-xs font-medium">{tab.label}</span>
              </button>
            ))}
          </div>
        </nav>
      );
    }

    // ========================================
    // м—…лЎңл“ң нғӯ (нҢҢмқј м—…лЎңл“ң + лІ•л № кІҖмғү лӘЁл“ң)
    // ========================================
    function UploadTab({ onUploadComplete }) {
      // лӘЁл“ң нҶ кёҖ: 'file' / 'law' / 'url'
      const [uploadMode, setUploadMode] = useState('file');

      // в”Җв”Җ нҢҢмқј лӘЁл“ң state в”Җв”Җ
      const [file, setFile] = useState(null);
      const [fileType, setFileType] = useState(null); // к°җм§Җлҗң нҢҢмқј нҳ•мӢқ
      const [title, setTitle] = useState('');
      const [category, setCategory] = useState('кё°нғҖ');
      const [sectionType, setSectionType] = useState('full');
      const [customDelimiter, setCustomDelimiter] = useState('');
      const [contentColumn, setContentColumn] = useState('');
      const [contentField, setContentField] = useState('');
      const [contentType, setContentType] = useState('general'); // мқҙлҜём§Җ OCR нғҖмһ…
      const [previewInfo, setPreviewInfo] = useState(null); // CSV/XLSX м—ҙ лӘ©лЎқ, JSON н•„л“ң лҜёлҰ¬ліҙкё°
      const [uploading, setUploading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const [deidentify, setDeidentify] = useState(false); // л№„мӢқлі„нҷ” нҶ кёҖ
      const [chunkStrategy, setChunkStrategy] = useState('sentence'); // мІӯнҒ¬ л¶„н•  м „лһө
      const fileInputRef = useRef(null);

      // в”Җв”Җ лІ•л № кІҖмғү лӘЁл“ң state в”Җв”Җ
      const [lawQuery, setLawQuery] = useState('');
      const [lawResults, setLawResults] = useState([]);
      const [lawSearching, setLawSearching] = useState(false);
      const [importing, setImporting] = useState(null);
      const [lawError, setLawError] = useState(null);
      const [lawResult, setLawResult] = useState(null);
      const [lawVisibleCount, setLawVisibleCount] = useState(5);
      const [lawImportedMap, setLawImportedMap] = useState({}); // lawId вҶ’ { documentId, title, importedAt }

      // в”Җв”Җ URL нҒ¬лЎӨл§Ғ лӘЁл“ң state в”Җв”Җ
      const [urlInput, setUrlInput] = useState('');
      const [urlTitle, setUrlTitle] = useState('');
      const [urlCategory, setUrlCategory] = useState('кё°нғҖ');
      const [urlImporting, setUrlImporting] = useState(false);
      const [urlError, setUrlError] = useState(null);
      const [urlResult, setUrlResult] = useState(null);

      // в”Җв”Җ нҢҢмқј м„ нғқ н•ёл“Өлҹ¬ (лӘЁл“  нҳ•мӢқ м§Җмӣҗ) в”Җв”Җ
      const handleFileSelect = useCallback((selectedFile) => {
        if (!selectedFile) return;
        const detected = detectClientFileType(selectedFile.name);
        if (detected === 'unknown') {
          setError('м§Җмӣҗн•ҳм§Җ м•ҠлҠ” нҢҢмқј нҳ•мӢқмһ…лӢҲлӢӨ. (PDF, TXT, MD, DOCX, XLSX, CSV, JSON, мқҙлҜём§Җ)');
          return;
        }
        setFile(selectedFile);
        setFileType(detected);
        setError(null);
        setResult(null);
        setPreviewInfo(null);

        // нҢҢмқјлӘ…м—җм„ң м ңлӘ© мһҗлҸҷ м¶”м¶ң
        const baseName = selectedFile.name.replace(/\.[^.]+$/, '');
        setTitle(baseName);

        // нҳ•мӢқлі„ кё°ліё мҳөм…ҳ м„Өм •
        const config = FILE_TYPE_CONFIG[detected];
        if (config?.sectionOptions?.length > 0) {
          setSectionType(config.sectionOptions[0].value);
        }

        // CSV/XLSX: нҒҙлқјмқҙм–ёнҠём—җм„ң м—ҙ лӘ©лЎқ лҜёлҰ¬ мқҪкё°
        if (detected === 'csv' || detected === 'xlsx') {
          readSpreadsheetPreview(selectedFile, detected);
        }
        // JSON: н•„л“ң лӘ©лЎқ лҜёлҰ¬ мқҪкё°
        if (detected === 'json') {
          readJsonPreview(selectedFile);
        }
      }, []);

      // CSV/XLSX м—ҙ лӘ©лЎқ лҜёлҰ¬ліҙкё°
      const readSpreadsheetPreview = useCallback((f, type) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            if (type === 'csv') {
              // CSV: мІ« мӨ„м—җм„ң м—ҙ мқҙлҰ„ м¶”м¶ң
              const text = e.target.result;
              const firstLine = text.split('\n')[0];
              const cols = firstLine.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
              setPreviewInfo({ type: 'columns', columns: cols, rowCount: text.split('\n').filter(l => l.trim()).length - 1 });
            } else {
              // XLSX: мІ« мӢңнҠё м—ҙ мқҙлҰ„ м¶”м¶ң (к°„лӢЁ нҢҢмӢұ)
              // нҒҙлқјмқҙм–ёнҠём—җм„ңлҠ” м—ҙ мқҙлҰ„л§Ң н‘ңмӢң, мӢӨм ң нҢҢмӢұмқҖ м„ңлІ„м—җм„ң
              setPreviewInfo({ type: 'columns', columns: [], note: 'м„ңлІ„м—җм„ң м—ҙ м •ліҙлҘј мқҪмҠөлӢҲлӢӨ.' });
            }
          } catch { /* лҜёлҰ¬ліҙкё° мӢӨнҢЁн•ҙлҸ„ л¬ҙмӢң */ }
        };
        if (type === 'csv') reader.readAsText(f);
        else reader.readAsArrayBuffer(f);
      }, []);

      // JSON н•„л“ң лҜёлҰ¬ліҙкё°
      const readJsonPreview = useCallback((f) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data) && data.length > 0) {
              const fields = Object.keys(data[0]);
              setPreviewInfo({ type: 'fields', fields, itemCount: data.length });
            } else if (typeof data === 'object') {
              setPreviewInfo({ type: 'fields', fields: Object.keys(data), itemCount: Object.keys(data).length });
            }
          } catch { /* лҜёлҰ¬ліҙкё° мӢӨнҢЁн•ҙлҸ„ л¬ҙмӢң */ }
        };
        reader.readAsText(f);
      }, []);

      const handleDragOver = useCallback((e) => { e.preventDefault(); setDragOver(true); }, []);
      const handleDragLeave = useCallback((e) => { e.preventDefault(); setDragOver(false); }, []);
      const handleDrop = useCallback((e) => {
        e.preventDefault();
        setDragOver(false);
        handleFileSelect(e.dataTransfer.files[0]);
      }, [handleFileSelect]);

      // в”Җв”Җ м—…лЎңл“ң мӢӨн–ү (XHR мӢӨмӢңк°„ м§„н–үлҘ ) в”Җв”Җ
      const uploadProgress = useUploadProgress();

      const handleUpload = useCallback(async () => {
        if (!file) return;
        setUploading(true);
        setError(null);
        setResult(null);
        try {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('title', title || file.name.replace(/\.[^.]+$/, ''));
          formData.append('category', category);
          formData.append('sectionType', sectionType);
          if (sectionType === 'custom' && customDelimiter) {
            formData.append('customDelimiter', customDelimiter);
          }
          if (contentColumn) formData.append('contentColumn', contentColumn);
          if (contentField) formData.append('contentField', contentField);
          if (contentType) formData.append('contentType', contentType);
          if (deidentify) formData.append('deidentify', 'true');
          if (chunkStrategy && chunkStrategy !== 'sentence') formData.append('chunkStrategy', chunkStrategy);

          const token = getAuthToken();
          const data = await uploadProgress.upload(`${API_BASE_URL}/upload`, formData, token);
          uploadProgress.finish('м—…лЎңл“ң мҷ„лЈҢ!');
          setResult(data);
          setTimeout(() => {
            setFile(null); setFileType(null); setTitle('');
            uploadProgress.reset();
            setPreviewInfo(null); setContentColumn(''); setContentField('');
            if (fileInputRef.current) fileInputRef.current.value = '';
            if (onUploadComplete) onUploadComplete();
          }, 2000);
        } catch (err) {
          setError(err.message);
          uploadProgress.reset();
        } finally {
          setUploading(false);
        }
      }, [file, title, category, sectionType, customDelimiter, contentColumn, contentField, contentType, deidentify, chunkStrategy, onUploadComplete]);

      const handleReset = useCallback(() => {
        setFile(null); setFileType(null); setTitle(''); setCategory('кё°нғҖ');
        setSectionType('full'); setCustomDelimiter(''); setContentColumn('');
        setContentField(''); setContentType('general'); setPreviewInfo(null);
        setDeidentify(false); setChunkStrategy('sentence'); setError(null); setResult(null);
        if (fileInputRef.current) fileInputRef.current.value = '';
      }, []);

      // в”Җв”Җ лІ•л № кІҖмғү н•ёл“Өлҹ¬ в”Җв”Җ
      const handleLawSearch = useCallback(async () => {
        if (!lawQuery.trim()) return;
        setLawSearching(true);
        setLawError(null);
        setLawResults([]);
        setLawResult(null);
        setLawImportedMap({});
        setLawVisibleCount(5);
        try {
          const res = await authFetch(`${API_BASE_URL}/law`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'search', query: lawQuery.trim() }),
          });
          if (!res.ok) throw new Error('лІ•л № кІҖмғүм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.');
          const data = await res.json();
          setLawResults(data.results || []);
          setLawImportedMap(data.importedMap || {});
          if ((data.results || []).length === 0) {
            setLawError('кІҖмғү кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ. лӢӨлҘё лІ•л №лӘ…мңјлЎң мӢңлҸ„н•ҙліҙм„ёмҡ”.');
          }
        } catch (err) {
          setLawError(err.message);
        } finally {
          setLawSearching(false);
        }
      }, [lawQuery]);

      // лІ•л № мһ„нҸ¬нҠё м§„н–ү лӢЁкі„ мӢңл®¬л Ҳмқҙм…ҳ
      const lawSteps = useMemo(() => [
        { message: 'лІ•м ңмІҳ API мЎ°нҡҢ мӨ‘...', progress: 10, duration: 3000 },
        { message: 'мЎ°л¬ё лҚ°мқҙн„° мҲҳмӢ  мӨ‘...', progress: 25, duration: 4000 },
        { message: 'мЎ°л¬ё м ҖмһҘ мӨ‘...', progress: 40, duration: 3000 },
        { message: 'м°ёмЎ° кҙҖкі„ л¶„м„қ мӨ‘...', progress: 55, duration: 2000 },
        { message: 'мһ„лІ л”© мғқм„ұ мӨ‘...', progress: 65, duration: 5000 },
        { message: 'мһ„лІ л”© мІҳлҰ¬ мӨ‘...', progress: 80, duration: 5000 },
      ], []);
      const lawImportProgress = useSimulatedProgress(lawSteps);

      const handleLawImport = useCallback(async (law) => {
        setImporting(law.id);
        lawImportProgress.start();
        setLawError(null);
        setLawResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/law-import`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lawId: law.id, lawName: law.name }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `мһ„нҸ¬нҠё мӢӨнҢЁ (${res.status})`);
          lawImportProgress.finish('мһ„нҸ¬нҠё мҷ„лЈҢ!');
          setLawResult(data);
          setLawImportedMap(prev => ({
            ...prev,
            [String(law.id)]: { documentId: data.documentId, title: data.title, importedAt: new Date().toISOString() },
          }));
          if (onUploadComplete) onUploadComplete();
        } catch (err) {
          setLawError(err.message);
          lawImportProgress.reset();
        } finally {
          setTimeout(() => {
            lawImportProgress.reset();
            setImporting(null);
          }, 2000);
        }
      }, [onUploadComplete]);

      // в”Җв”Җ URL нҒ¬лЎӨл§Ғ н•ёл“Өлҹ¬ в”Җв”Җ
      const handleUrlImport = useCallback(async () => {
        if (!urlInput.trim()) return;
        setUrlImporting(true);
        setUrlError(null);
        setUrlResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/url-import`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              url: urlInput.trim(),
              title: urlTitle.trim() || undefined,
              category: urlCategory,
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `мһ„нҸ¬нҠё мӢӨнҢЁ (${res.status})`);
          setUrlResult(data);
          if (onUploadComplete) onUploadComplete();
        } catch (err) {
          setUrlError(err.message);
        } finally {
          setUrlImporting(false);
        }
      }, [urlInput, urlTitle, urlCategory, onUploadComplete]);

      // нҳ„мһ¬ нҢҢмқј нҳ•мӢқмқҳ м„Өм •
      const currentConfig = fileType ? FILE_TYPE_CONFIG[fileType] : null;

      return (
        <div className="space-y-5 fade-in">
          {/* лӘЁл“ң нҶ кёҖ вҖ” 3к°ң к· л“ұ л°°л¶„ */}
          <div className="grid grid-cols-3 gap-2 bg-gray-100 p-1 rounded-xl">
            <button
              onClick={() => setUploadMode('file')}
              className={`py-2.5 rounded-lg text-sm font-medium transition-all ${
                uploadMode === 'file' ? 'bg-card-bg text-primary shadow-sm' : 'text-text-secondary hover:text-text'
              }`}
            >нҢҢмқј м—…лЎңл“ң</button>
            <button
              onClick={() => setUploadMode('law')}
              className={`py-2.5 rounded-lg text-sm font-medium transition-all ${
                uploadMode === 'law' ? 'bg-card-bg text-primary shadow-sm' : 'text-text-secondary hover:text-text'
              }`}
            >лІ•л № кІҖмғү</button>
            <button
              onClick={() => setUploadMode('url')}
              className={`py-2.5 rounded-lg text-sm font-medium transition-all ${
                uploadMode === 'url' ? 'bg-card-bg text-primary shadow-sm' : 'text-text-secondary hover:text-text'
              }`}
            >URL нҒ¬лЎӨл§Ғ</button>
          </div>

          {/* в”Җв”Җ нҢҢмқј м—…лЎңл“ң лӘЁл“ң в”Җв”Җ */}
          {uploadMode === 'file' && (
            <>
              {/* нҢҢмқј л“ңлЎӯмЎҙ (лӘЁл“  нҳ•мӢқ н—Ҳмҡ©) */}
              <div
                className={`drop-zone ${dragOver ? 'drag-over' : ''}`}
                onDragOver={handleDragOver}
                onDragLeave={handleDragLeave}
                onDrop={handleDrop}
                onClick={() => fileInputRef.current?.click()}
              >
                <input ref={fileInputRef} type="file" accept={ALL_ACCEPTED} className="hidden" onChange={e => handleFileSelect(e.target.files[0])} />
                {file && currentConfig ? (
                  <div className="space-y-2">
                    <div className="text-4xl">{currentConfig.icon}</div>
                    <p className="text-text font-medium">{file.name}</p>
                    <div className="flex items-center justify-center gap-2">
                      <Badge color={currentConfig.color}>{currentConfig.label}</Badge>
                      <span className="text-sm text-text-secondary">{formatFileSize(file.size)}</span>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    <svg className="w-10 h-10 mx-auto text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                    <p className="text-text-secondary">нҢҢмқјмқ„ л“ңлһҳк·ён•ҳкұ°лӮҳ нҒҙлҰӯн•ҳм—¬ м„ нғқ</p>
                    <p className="text-xs text-text-secondary/60">PDF, TXT, MD, DOCX, XLSX, CSV, JSON, мқҙлҜём§Җ</p>
                  </div>
                )}
              </div>

              {/* нҢҢмқј к°җм§Җ нӣ„ мҳөм…ҳ н‘ңмӢң */}
              {file && currentConfig && (
                <Card>
                  <div className="space-y-4">
                    {/* м ңлӘ© */}
                    <Input label="м ңлӘ©" value={title} onChange={e => setTitle(e.target.value)} placeholder="л¬ём„ң м ңлӘ©мқ„ мһ…л Ҙн•ҳм„ёмҡ”" />

                    {/* м№ҙн…Ңкі лҰ¬ */}
                    <Select label="м№ҙн…Ңкі лҰ¬" value={category} onChange={e => setCategory(e.target.value)} options={CATEGORIES.filter(c => c.value !== '')} />

                    {/* нҳ•мӢқлі„ м¶”м¶ң лӢЁмң„ (мҳөм…ҳмқҙ 2к°ң мқҙмғҒмқј л•Ңл§Ң н‘ңмӢң) */}
                    {currentConfig.sectionOptions.length > 1 && (
                      <Select
                        label="м¶”м¶ң лӢЁмң„"
                        value={sectionType}
                        onChange={e => setSectionType(e.target.value)}
                        options={currentConfig.sectionOptions}
                      />
                    )}

                    {/* кө¬л¶„мһҗ мһ…л Ҙ (customмқј л•Ң) */}
                    {sectionType === 'custom' && (
                      <Input label="кө¬л¶„мһҗ" value={customDelimiter} onChange={e => setCustomDelimiter(e.target.value)} placeholder="мҳҲ: --- лҳҗлҠ” ## л“ұ" />
                    )}

                    {/* CSV/XLSX: м—ҙ м„ нғқ */}
                    {currentConfig.hasColumnSelect && previewInfo?.columns?.length > 0 && (
                      <div className="space-y-2">
                        <Select
                          label={`ліёл¬ё м—ҙ м„ нғқ (${previewInfo.rowCount || '?'}н–ү)`}
                          value={contentColumn}
                          onChange={e => setContentColumn(e.target.value)}
                          options={[
                            { value: '', label: 'м „мІҙ м—ҙ н•©м№ҳкё°' },
                            ...previewInfo.columns.map(c => ({ value: c, label: c })),
                          ]}
                        />
                        <p className="text-xs text-text-secondary">
                          ліёл¬ёмңјлЎң мӮ¬мҡ©н•  м—ҙмқ„ м„ нғқн•ҳм„ёмҡ”. м„ нғқн•ҳм§Җ м•Ҡмңјл©ҙ лӘЁл“  м—ҙмқ„ н•©м№©лӢҲлӢӨ.
                        </p>
                      </div>
                    )}

                    {/* JSON: н•„л“ң м„ нғқ */}
                    {currentConfig.hasFieldSelect && previewInfo?.fields?.length > 0 && (
                      <div className="space-y-2">
                        <Select
                          label={`ліёл¬ё н•„л“ң м„ нғқ (${previewInfo.itemCount || '?'}к°ң н•ӯлӘ©)`}
                          value={contentField}
                          onChange={e => setContentField(e.target.value)}
                          options={[
                            { value: '', label: 'м „мІҙ лҚ°мқҙн„°' },
                            ...previewInfo.fields.map(f => ({ value: f, label: f })),
                          ]}
                        />
                        <p className="text-xs text-text-secondary">
