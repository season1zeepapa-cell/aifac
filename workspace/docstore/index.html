                        {deleting === doc.id ? (
                          <div className="w-4 h-4 border-2 border-red-400 border-t-transparent rounded-full animate-spin" />
                        ) : (
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        )}
                      </button>
                    )}
                  </div>
                </Card>
              ))}
            </div>
          )}

          {/* 문서 상세 모달 */}
          <DocumentDetailModal
            isOpen={selectedDocId !== null}
            onClose={() => setSelectedDocId(null)}
            documentId={selectedDocId}
          />

          {/* 맨 위로 스크롤 버튼 */}
          {showScrollTop && (
            <button
              className="scroll-top-btn"
              onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
              aria-label="맨 위로"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7" /></svg>
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // 검색 탭 (텍스트 / 벡터 / AI 질의 + 필터)
    // ========================================
    function SearchTab() {
      const [searchQuery, setSearchQuery] = useState('');
      const [searchType, setSearchType] = useState('text');
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [ragResult, setRagResult] = useState(null);
      // 필터
      const [filterDocId, setFilterDocId] = useState('');
      const [filterChapter, setFilterChapter] = useState('');
      const [docList, setDocList] = useState([]); // 문서 목록 (필터용)
      const [showFilters, setShowFilters] = useState(false);
      // 검색 결과에서 문서 상세 이동
      const [selectedDocId, setSelectedDocId] = useState(null);

      // 문서 목록 불러오기 (필터 드롭다운용)
      useEffect(() => {
        authFetch(`${API_BASE_URL}/documents`)
          .then(r => r.json())
          .then(data => setDocList(Array.isArray(data) ? data : data.documents || []))
          .catch(() => {});
      }, []);

      // 검색 실행
      const handleSearch = useCallback(async () => {
        if (!searchQuery.trim()) return;
        setLoading(true);
        setError(null);
        setResults(null);
        setRagResult(null);

        try {
          if (searchType === 'rag') {
            const body = { question: searchQuery.trim(), topK: 5 };
            if (filterDocId) body.docId = filterDocId;
            const res = await authFetch(`${API_BASE_URL}/rag`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.error || `질의 실패 (${res.status})`);
            }
            setRagResult(await res.json());
          } else {
            const params = new URLSearchParams({
              q: searchQuery.trim(),
              type: searchType,
              limit: '20',
            });
            if (filterDocId) params.set('docId', filterDocId);
            if (filterChapter) params.set('chapter', filterChapter);
            const res = await authFetch(`${API_BASE_URL}/search?${params}`);
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.error || `검색 실패 (${res.status})`);
            }
            setResults(await res.json());
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [searchQuery, searchType, filterDocId, filterChapter]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter') handleSearch();
      }, [handleSearch]);

      // 검색어 하이라이트
      const highlightText = useCallback((text, query) => {
        if (!query || !text) return text;
        const maxLen = 300;
        const lowerText = text.toLowerCase();
        const lowerQuery = query.toLowerCase();
        const idx = lowerText.indexOf(lowerQuery);
        let excerpt = text;
        if (text.length > maxLen) {
          if (idx >= 0) {
            const start = Math.max(0, idx - 80);
            const end = Math.min(text.length, idx + query.length + 220);
            excerpt = (start > 0 ? '...' : '') + text.slice(start, end) + (end < text.length ? '...' : '');
          } else {
            excerpt = text.slice(0, maxLen) + '...';
          }
        }
        if (idx < 0) return excerpt;
        const parts = excerpt.split(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'));
        return parts.map((part, i) =>
          part.toLowerCase() === lowerQuery
            ? React.createElement('mark', { key: i, className: 'bg-primary/30 text-primary px-0.5 rounded' }, part)
            : part
        );
      }, []);

      // 검색 결과 카드 (클릭 시 문서 상세 이동)
      const ResultCard = ({ r, children }) => (
        <Card hoverable onClick={() => r.documentId && setSelectedDocId(r.documentId)}>
          {children}
        </Card>
      );

      return (
        <div className="space-y-4 fade-in">
          {/* 검색 입력 */}
          <Card>
            <div className="space-y-3">
              <div className="flex gap-2">
                <input
                  type="text"
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="검색어를 입력하세요..."
                  className="flex-1 px-3 py-2 bg-bg border border-border rounded-lg text-text placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                />
                <Button onClick={handleSearch} disabled={loading || !searchQuery.trim()}>
                  {loading ? '검색 중...' : '검색'}
                </Button>
              </div>
              {/* 검색 타입 선택 */}
              <div className="flex gap-2 flex-wrap">
                {[
                  { key: 'text', label: '텍스트 검색' },
                  { key: 'vector', label: '의미 검색' },
                  { key: 'rag', label: 'AI 질의' },
                ].map(t => (
                  <button key={t.key}
                    onClick={() => setSearchType(t.key)}
                    className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                      searchType === t.key ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{t.label}</button>
                ))}
                {/* 필터 토글 */}
                <button
                  onClick={() => setShowFilters(!showFilters)}
                  className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                    showFilters || filterDocId || filterChapter
                      ? 'bg-yellow-500/20 text-yellow-400'
                      : 'bg-border text-text-secondary hover:text-text'
                  }`}
                >
                  필터 {(filterDocId || filterChapter) ? '(활성)' : ''}
                </button>
              </div>

              {/* 필터 패널 */}
              {showFilters && (
                <div className="space-y-2 p-3 bg-bg rounded-lg border border-border">
                  <Select
                    label="문서 범위"
                    value={filterDocId}
                    onChange={e => setFilterDocId(e.target.value)}
                    options={[
                      { value: '', label: '전체 문서' },
                      ...docList.map(d => ({ value: String(d.id), label: d.title })),
                    ]}
                  />
                  <Input
                    label="장/절 필터"
                    value={filterChapter}
                    onChange={e => setFilterChapter(e.target.value)}
                    placeholder="예: 제1장, 총칙"
                  />
                  {(filterDocId || filterChapter) && (
                    <button
                      onClick={() => { setFilterDocId(''); setFilterChapter(''); }}
                      className="text-xs text-red-500 hover:text-red-300"
                    >필터 초기화</button>
                  )}
                </div>
              )}

              <p className="text-xs text-text-secondary">
                {searchType === 'text'
                  ? '입력한 단어가 포함된 문서를 검색합니다.'
                  : searchType === 'vector'
                  ? '입력한 내용과 의미가 유사한 문서를 검색합니다.'
                  : '질문을 입력하면 관련 법령/문서를 찾아 AI가 답변합니다.'}
              </p>
            </div>
          </Card>

          {/* 로딩 */}
          {loading && (
            <div className="flex items-center justify-center py-12">
              <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
            </div>
          )}

          {/* 에러 */}
          {error && (
            <Card className="border-red-200 bg-red-50">
              <p className="text-sm text-red-500">{error}</p>
            </Card>
          )}

          {/* 검색 결과 */}
          {results && !loading && (
            <div className="space-y-3">
              <p className="text-sm text-text-secondary">
                "{results.query}" 검색 결과: <span className="text-text font-medium">{results.count}건</span>
                <span className="text-xs ml-1">(클릭하면 문서 상세로 이동)</span>
              </p>

              {results.count === 0 ? (
                <EmptyState icon="🔍" title="검색 결과가 없습니다" description="다른 검색어로 시도해보세요." />
              ) : results.type === 'text' ? (
                results.results.map((r, idx) => (
                  <ResultCard key={idx} r={r}>
                    <div className="space-y-2">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-medium text-text text-sm">{r.documentTitle}</span>
                        <Badge color={r.category === '법령' ? 'primary' : r.category === '기출' ? 'green' : r.category === '규정' ? 'yellow' : 'gray'}>{r.category}</Badge>
                        {r.label ? <Badge color="gray">{r.label}</Badge> : <Badge color="gray">섹션 {r.sectionIndex + 1}</Badge>}
                      </div>
                      <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                        {highlightText(r.rawText, results.query)}
                      </p>
                    </div>
                  </ResultCard>
                ))
              ) : (
                results.results.map((r, idx) => (
                  <ResultCard key={idx} r={r}>
                    <div className="space-y-2">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-medium text-text text-sm">{r.documentTitle}</span>
                        <Badge color={r.category === '법령' ? 'primary' : r.category === '기출' ? 'green' : r.category === '규정' ? 'yellow' : 'gray'}>{r.category}</Badge>
                        <Badge color="green">유사도 {(r.similarity * 100).toFixed(1)}%</Badge>
                        {r.label && <Badge color="gray">{r.label}</Badge>}
                      </div>
                      <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                        {r.chunkText?.length > 300 ? r.chunkText.slice(0, 300) + '...' : r.chunkText}
                      </p>
                    </div>
                  </ResultCard>
                ))
              )}
            </div>
          )}

          {/* RAG 질의 결과 */}
          {ragResult && !loading && (
            <div className="space-y-4">
              <Card className="border-primary/30">
                <div className="space-y-3">
                  <div className="flex items-center gap-2">
                    <span className="text-primary font-bold text-sm">AI 답변</span>
                    <Badge color="primary">RAG</Badge>
                  </div>
                  <div
                    className="text-sm text-text leading-relaxed markdown-body"
                    dangerouslySetInnerHTML={{
                      __html: typeof marked !== 'undefined' ? marked.parse(ragResult.answer || '') : ragResult.answer
                    }}
                  />
                </div>
              </Card>
              {ragResult.sources && ragResult.sources.length > 0 && (
                <div className="space-y-2">
                  <p className="text-xs text-text-secondary font-medium">근거 자료 ({ragResult.sources.length}건)</p>
                  {ragResult.sources.map((src, idx) => (
                    <Card key={idx} className="bg-bg">
                      <div className="space-y-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <Badge color="yellow">근거 {idx + 1}</Badge>
                          <span className="text-xs text-text font-medium">{src.documentTitle}</span>
                          {src.label && <Badge color="gray">{src.label}</Badge>}
                          <Badge color="green">유사도 {(src.similarity * 100).toFixed(1)}%</Badge>
                        </div>
                        <p className="text-xs text-text-secondary leading-relaxed">{src.excerpt}</p>
                      </div>
                    </Card>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* 검색 결과에서 문서 상세 모달 */}
          <DocumentDetailModal
            isOpen={selectedDocId !== null}
            onClose={() => setSelectedDocId(null)}
            documentId={selectedDocId}
          />
        </div>
      );
    }

    // ========================================
    // API 관리 대시보드 탭
    // ========================================
    function ApiDashboardTab() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [range, setRange] = useState('today');
      const [subTab, setSubTab] = useState('dashboard');
      const [actionLoading, setActionLoading] = useState(null);
      // 인라인 결과 메시지 { id: string, success: bool, message: string }
      const [actionResult, setActionResult] = useState(null);
      // 한도 인라인 편집 { provider: string, value: string }
      const [editingLimit, setEditingLimit] = useState(null);
      // 에러 필터
      const [errorFilter, setErrorFilter] = useState('all');
      // OCR 상태
      const [engines, setEngines] = useState([]);
      const [ocrLoading, setOcrLoading] = useState(true);

      const fetchData = useCallback(async () => {
        setLoading(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?range=${range}`);
          if (!res.ok) throw new Error('데이터 로드 실패');
          setData(await res.json());
        } catch (err) {
          console.error(err);
        } finally {
          setLoading(false);
        }
      }, [range]);

      const fetchEngines = useCallback(async () => {
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?type=ocr`);
          if (res.ok) {
            const d = await res.json();
            setEngines(d.engines || []);
          }
        } catch (err) {
          console.error('[OCR]', err);
        } finally {
          setOcrLoading(false);
        }
      }, []);

      useEffect(() => { fetchData(); fetchEngines(); }, [fetchData, fetchEngines]);

      // ── API 키 액션 ──
      const handleTestKey = useCallback(async (provider) => {
        setActionLoading(`test-${provider}`);
        setActionResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'testKey', provider }),
          });
          const result = await res.json();
          setActionResult({ id: `key-${provider}`, success: result.success, message: result.message });
          fetchData();
          setTimeout(() => setActionResult(prev => prev?.id === `key-${provider}` ? null : prev), 5000);
        } finally { setActionLoading(null); }
      }, [fetchData]);

      const handleToggleKey = useCallback(async (provider, currentActive) => {
        setActionLoading(`toggle-${provider}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'toggleKey', provider, isActive: !currentActive }),
          });
          fetchData();
        } finally { setActionLoading(null); }
      }, [fetchData]);

      const handleUpdateLimit = useCallback(async (provider, value) => {
        setActionLoading(`limit-${provider}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'updateLimit', provider, dailyLimit: parseInt(value) || 0 }),
          });
          setEditingLimit(null);
          fetchData();
        } finally { setActionLoading(null); }
      }, [fetchData]);

      // ── OCR 액션 ──
      const handleOcrMove = useCallback(async (index, direction) => {
        const ne = [...engines];
        const si = index + direction;
        if (si < 0 || si >= ne.length) return;
        [ne[index], ne[si]] = [ne[si], ne[index]];
        setEngines(ne);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrUpdatePriority', order: ne.map(e => e.engine_id) }),
          });
        } catch { fetchEngines(); }
      }, [engines, fetchEngines]);

      const handleOcrToggle = useCallback(async (engineId, currentEnabled) => {
        setActionLoading(`ocr-toggle-${engineId}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrToggleEngine', engineId, enabled: !currentEnabled }),
          });
          fetchEngines();
        } finally { setActionLoading(null); }
      }, [fetchEngines]);

      const handleOcrTest = useCallback(async (engineId) => {
        setActionLoading(`ocr-test-${engineId}`);
        setActionResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrTestEngine', engineId }),
          });
          const result = await res.json();
          setActionResult({ id: `ocr-${engineId}`, success: result.success, message: result.message });
          setTimeout(() => setActionResult(prev => prev?.id === `ocr-${engineId}` ? null : prev), 5000);
        } finally { setActionLoading(null); }
      }, []);

      // 일괄 테스트 (API 키)
      const handleTestAllKeys = useCallback(async () => {
        const configured = data?.keys?.filter(k => k.configured) || [];
        if (configured.length === 0) return;
        setActionLoading('test-all');
        let ok = 0, fail = 0;
        for (const key of configured) {
          setActionResult({ id: 'test-all', success: true, message: `테스트 중... (${ok + fail + 1}/${configured.length}) ${key.provider}` });
          try {
            const res = await authFetch(`${API_BASE_URL}/api-usage`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'testKey', provider: key.provider }),
            });
            const r = await res.json();
            r.success ? ok++ : fail++;
          } catch { fail++; }
        }
        setActionResult({ id: 'test-all', success: fail === 0, message: `완료: 성공 ${ok}개, 실패 ${fail}개` });
        fetchData();
        setTimeout(() => setActionResult(prev => prev?.id === 'test-all' ? null : prev), 5000);
        setActionLoading(null);
      }, [data, fetchData]);

      // 일괄 테스트 (OCR)
      const handleTestAllOcr = useCallback(async () => {
        const available = engines.filter(e => e.is_available && e.is_enabled);
        if (available.length === 0) return;
        setActionLoading('ocr-test-all');
        let ok = 0, fail = 0;
        for (const engine of available) {
          setActionResult({ id: 'ocr-test-all', success: true, message: `테스트 중... (${ok + fail + 1}/${available.length}) ${engine.name}` });
          try {
            const res = await authFetch(`${API_BASE_URL}/api-usage`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'ocrTestEngine', engineId: engine.engine_id }),
            });
            const r = await res.json();
            r.success ? ok++ : fail++;
          } catch { fail++; }
        }
        setActionResult({ id: 'ocr-test-all', success: fail === 0, message: `완료: 성공 ${ok}개, 실패 ${fail}개` });
        setTimeout(() => setActionResult(prev => prev?.id === 'ocr-test-all' ? null : prev), 5000);
        setActionLoading(null);
      }, [engines]);

      const providerLabels = { openai: 'OpenAI', anthropic: 'Anthropic', gemini: 'Google Gemini', upstage: 'Upstage' };
      const providerColors = { openai: 'green', anthropic: 'yellow', gemini: 'primary', upstage: 'blue' };

      if (loading && !data) {
        return (
          <div className="flex items-center justify-center py-16">
            <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
          </div>
        );
      }

      if (!data) {
        return <EmptyState icon="&#9888;" title="데이터 로드 실패" description="API 사용량 테이블이 생성되지 않았을 수 있습니다." />;
      }

      const totalCost = data.usageByProvider?.reduce((sum, p) => sum + parseFloat(p.total_cost || 0), 0) || 0;
      const totalCalls = data.usageByProvider?.reduce((sum, p) => sum + parseInt(p.call_count || 0), 0) || 0;
      const totalErrors = data.usageByProvider?.reduce((sum, p) => sum + parseInt(p.error_count || 0), 0) || 0;

      const SUB_TABS = [
        { id: 'dashboard', label: '대시보드' },
        { id: 'keys', label: 'API 키' },
        { id: 'usage', label: '사용량' },
        { id: 'ocr', label: 'OCR 설정' },
      ];

      const ocrStatusBadge = (engine) => {
        if (!engine.is_available) return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-400">미설정</span>;
        if (!engine.is_enabled) return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">비활성</span>;
        return <span className="text-xs px-1.5 py-0.5 rounded bg-green-50 text-green-600">활성</span>;
      };

      return (
        <div className="space-y-4 fade-in">
          {/* 서브 탭 네비게이션 */}
          <div className="flex gap-1 bg-card-bg rounded-lg p-1 border border-border">
            {SUB_TABS.map(tab => (
              <button key={tab.id} onClick={() => setSubTab(tab.id)}
                className={`flex-1 px-2 py-2 rounded-md text-xs font-medium transition-all ${
                  subTab === tab.id
                    ? 'bg-primary text-white shadow-sm'
                    : 'text-text-secondary hover:text-text hover:bg-border/50'
                }`}
              >{tab.label}{tab.id === 'ocr' && engines.filter(e => e.is_available && e.is_enabled).length > 0 ? ` (${engines.filter(e => e.is_available && e.is_enabled).length})` : ''}</button>
            ))}
          </div>

          {/* ════════ 대시보드 탭 ════════ */}
          {subTab === 'dashboard' && (
            <div className="space-y-4">
              {/* 기간 선택 + 새로고침 */}
              <div className="flex gap-2">
                {[{ v: 'today', l: '오늘' }, { v: 'week', l: '7일' }, { v: 'month', l: '30일' }].map(r => (
                  <button key={r.v} onClick={() => setRange(r.v)}
                    className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${
                      range === r.v ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{r.l}</button>
                ))}
                <button onClick={fetchData}
                  className="ml-auto px-3 py-1.5 rounded-full text-xs bg-border text-text-secondary hover:text-text"
                >&#x21BB; 새로고침</button>
              </div>

              {/* 요약 카드 + 전일 비교 */}
              {(() => {
                const today = data.prevComparison?.find(r => r.period === 'today');
                const yesterday = data.prevComparison?.find(r => r.period === 'yesterday');
                const diffBadge = (todayVal, yesterdayVal) => {
                  if (!yesterday || parseInt(yesterdayVal) === 0) return null;
                  const pct = Math.round(((todayVal - yesterdayVal) / yesterdayVal) * 100);
                  if (pct === 0) return null;
                  return <span className={`text-[10px] font-medium ${pct > 0 ? 'text-red-400' : 'text-green-500'}`}>{pct > 0 ? '\u2191' : '\u2193'}{Math.abs(pct)}%</span>;
                };
                return (
                  <div className="grid grid-cols-3 gap-3">
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">총 호출</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className="text-2xl font-bold text-text">{totalCalls.toLocaleString()}</p>
                        {today && yesterday && diffBadge(parseInt(today.call_count), parseInt(yesterday.call_count))}
                      </div>
                    </Card>
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">예상 비용</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className="text-2xl font-bold text-primary">${totalCost.toFixed(4)}</p>
                        {today && yesterday && diffBadge(parseFloat(today.total_cost), parseFloat(yesterday.total_cost))}
                      </div>
                    </Card>
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">에러</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className={`text-2xl font-bold ${totalErrors > 0 ? 'text-red-500' : 'text-green-500'}`}>{totalErrors}</p>
                        {today && yesterday && diffBadge(parseInt(today.error_count), parseInt(yesterday.error_count))}
                      </div>
                    </Card>
                  </div>
                );
              })()}

              {/* 프로바이더별 요약 */}
              <Card>
                <h4 className="text-xs font-bold text-text mb-3">프로바이더별 현황</h4>
                <div className="space-y-3">
                  {data.usageByProvider?.map(p => {
                    const cost = parseFloat(p.total_cost || 0);
                    const calls = parseInt(p.call_count || 0);
                    const errors = parseInt(p.error_count || 0);
                    const maxCalls = Math.max(...(data.usageByProvider?.map(x => parseInt(x.call_count || 0)) || [1]));
                    return (
                      <div key={p.provider}>
                        <div className="flex items-center justify-between mb-1">
                          <div className="flex items-center gap-2">
                            <Badge color={providerColors[p.provider] || 'gray'}>{providerLabels[p.provider] || p.provider}</Badge>
                            <span className="text-xs text-text">{calls}회</span>
                            {errors > 0 && <span className="text-xs text-red-500">({errors} 에러)</span>}
                          </div>
                          <span className="text-xs text-primary font-medium">${cost.toFixed(4)}</span>
                        </div>
                        <div className="w-full bg-border rounded-full h-1.5">
                          <div className="h-1.5 rounded-full bg-primary/70 transition-all" style={{ width: `${maxCalls > 0 ? (calls / maxCalls) * 100 : 0}%` }} />
                        </div>
                      </div>
                    );
                  })}
                  {(!data.usageByProvider || data.usageByProvider.length === 0) && (
                    <p className="text-xs text-text-secondary text-center py-4">선택한 기간에 사용 기록이 없습니다.</p>
                  )}
                </div>
              </Card>

              {/* 일별 추이 (최근 7일) */}
              {data.dailyTrend?.length > 0 && (() => {
                // 날짜별로 그룹핑
                const byDate = {};
                data.dailyTrend.forEach(d => {
                  const date = d.date?.slice(0, 10) || d.date;
                  if (!byDate[date]) byDate[date] = { calls: 0, cost: 0, providers: {} };
                  byDate[date].calls += parseInt(d.call_count);
                  byDate[date].cost += parseFloat(d.total_cost || 0);
                  byDate[date].providers[d.provider] = (byDate[date].providers[d.provider] || 0) + parseInt(d.call_count);
                });
                const dates = Object.keys(byDate).sort();
                const maxCalls = Math.max(...dates.map(d => byDate[d].calls), 1);
                const pColors = { openai: '#22c55e', anthropic: '#eab308', gemini: '#3b82f6', upstage: '#60a5fa' };
                return (
                  <Card>
                    <h4 className="text-xs font-bold text-text mb-3">일별 추이 (최근 7일)</h4>
                    <div className="space-y-2">
                      {dates.map(date => {
                        const d = byDate[date];
                        const pct = (d.calls / maxCalls) * 100;
                        const pList = Object.entries(d.providers);
                        return (
                          <div key={date} className="flex items-center gap-2 text-xs">
                            <span className="w-10 text-text-secondary text-[10px] shrink-0">{date.slice(5)}</span>
                            <div className="flex-1 h-4 bg-border/50 rounded overflow-hidden flex">
                              {pList.map(([prov, cnt]) => (
                                <div key={prov} style={{ width: `${(cnt / maxCalls) * 100}%`, backgroundColor: pColors[prov] || '#9ca3af' }}
                                  className="h-full transition-all" title={`${providerLabels[prov] || prov}: ${cnt}회`} />
                              ))}
                            </div>
                            <span className="w-8 text-right text-text shrink-0">{d.calls}</span>
                            <span className="w-14 text-right text-primary text-[10px] shrink-0">${d.cost.toFixed(3)}</span>
                          </div>
                        );
                      })}
                    </div>
                    <div className="flex gap-3 mt-2 pt-2 border-t border-border/50">
                      {Object.entries(pColors).filter(([p]) => data.dailyTrend.some(d => d.provider === p)).map(([p, c]) => (
                        <div key={p} className="flex items-center gap-1 text-[10px] text-text-secondary">
                          <span className="w-2.5 h-2.5 rounded-sm inline-block" style={{ backgroundColor: c }} />
                          {providerLabels[p] || p}
                        </div>
                      ))}
                    </div>
                  </Card>
                );
              })()}

              {/* 최근 에러 (있을 때만) */}
              {data.recentErrors?.length > 0 && (
                <div>
                  <h4 className="text-xs font-bold text-text mb-2">최근 에러 ({data.recentErrors.length}건)</h4>
                  <div className="space-y-1.5">
                    {data.recentErrors.slice(0, 5).map((e, i) => (
                      <Card key={i} className="border-red-200">
                        <div className="flex items-center gap-2 text-xs">
                          <Badge color={e.status === 'credit_exhausted' ? 'red' : 'yellow'}>{e.status}</Badge>
                          <span className="text-text-secondary">{e.provider}</span>
                          <span className="text-text-secondary ml-auto text-[10px]">{formatDate(e.created_at)}</span>
                        </div>
                        <p className="text-[11px] text-red-500 mt-1 line-clamp-1">{e.error_message}</p>
                      </Card>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ════════ API 키 관리 탭 ════════ */}
          {subTab === 'keys' && (
            <div className="space-y-3">
              <div className="flex items-center justify-between">
                <p className="text-xs text-text-secondary">각 프로바이더의 API 키 상태를 확인하고, 테스트/한도를 관리합니다.</p>
                <button onClick={handleTestAllKeys}
                  disabled={!!actionLoading || !data?.keys?.some(k => k.configured)}
                  className="px-3 py-1.5 text-xs bg-primary text-white rounded-lg hover:bg-primary/90 disabled:opacity-40 transition-colors shrink-0"
                >{actionLoading === 'test-all' ? '테스트 중...' : '전체 테스트'}</button>
              </div>
              {actionResult?.id === 'test-all' && (
                <div className={`text-xs px-3 py-2 rounded-lg fade-in ${actionResult.success ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>
                  {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                </div>
              )}
              {data.keys?.map(key => {
                const usage = data.usageByProvider?.find(u => u.provider === key.provider);
                const callCount = parseInt(usage?.call_count || 0);
                const creditErrors = parseInt(usage?.credit_error_count || 0);

                return (
                  <Card key={key.provider}>
                    <div className="space-y-3">
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <span className="font-bold text-sm text-text">{providerLabels[key.provider] || key.provider}</span>
                          {key.configured ? (
                            <Badge color={key.is_active ? 'green' : 'red'}>{key.is_active ? '활성' : '비활성'}</Badge>
                          ) : (
                            <Badge color="gray">미설정</Badge>
                          )}
                          {creditErrors > 0 && <Badge color="red">크레딧 소진</Badge>}
                        </div>
                        <div className="flex gap-1">
                          <button onClick={() => handleTestKey(key.provider)}
                            disabled={!key.configured || actionLoading === `test-${key.provider}`}
                            className="px-2.5 py-1 text-xs bg-primary/10 border border-primary/30 rounded-md hover:bg-primary/20 text-primary disabled:opacity-30 transition-colors"
                          >{actionLoading === `test-${key.provider}` ? '...' : '테스트'}</button>
                          <button onClick={() => handleToggleKey(key.provider, key.is_active)}
                            disabled={!key.configured}
                            className="px-2.5 py-1 text-xs bg-border rounded-md hover:bg-card-bg-hover text-text-secondary disabled:opacity-30 transition-colors"
                          >{key.is_active ? '비활성화' : '활성화'}</button>
                        </div>
                      </div>

                      <div className="flex items-center justify-between text-xs text-text-secondary">
                        <div className="flex gap-4">
                          <span>호출: <span className="text-text font-medium">{callCount}</span></span>
                          <span>비용: <span className="text-primary font-medium">${parseFloat(usage?.total_cost || 0).toFixed(4)}</span></span>
                        </div>
                        {editingLimit?.provider === key.provider ? (
                          <form className="flex items-center gap-1" onSubmit={(e) => { e.preventDefault(); handleUpdateLimit(key.provider, editingLimit.value); }}>
                            <input type="number" min="0" value={editingLimit.value}
                              onChange={e => setEditingLimit({ ...editingLimit, value: e.target.value })}
                              className="w-16 px-1.5 py-0.5 text-xs border border-primary rounded text-text text-center bg-white"
                              autoFocus onBlur={() => setTimeout(() => setEditingLimit(null), 200)} />
                            <button type="submit" className="text-[10px] px-1.5 py-0.5 bg-primary text-white rounded hover:bg-primary/90">저장</button>
                            <span className="text-[10px] text-text-secondary">(0=무제한)</span>
                          </form>
                        ) : (
                          <button onClick={() => setEditingLimit({ provider: key.provider, value: String(key.daily_limit || 0) })}
                            className="hover:text-primary transition-colors"
                          >한도: {key.daily_limit ? `${callCount}/${key.daily_limit}` : '무제한'}</button>
                        )}
                      </div>
                      {key.last_checked && (
                        <p className="text-[10px] text-text-secondary">마지막 확인: {new Date(key.last_checked).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                      )}

                      {key.daily_limit > 0 && (
                        <div className="w-full bg-border rounded-full h-2">
                          <div className={`h-2 rounded-full transition-all ${
                            callCount / key.daily_limit > 0.9 ? 'bg-red-500' :
                            callCount / key.daily_limit > 0.7 ? 'bg-yellow-500' : 'bg-green-500'
                          }`} style={{ width: `${Math.min(100, (callCount / key.daily_limit) * 100)}%` }} />
                        </div>
                      )}

                      {!key.configured && (() => {
                        const envGuide = {
                          openai: { env: 'OPENAI_API_KEY', desc: '임베딩 + GPT-4o 퀴즈 파싱' },
                          anthropic: { env: 'ANTHROPIC_API_KEY', desc: 'Claude OCR (폴백)' },
                          gemini: { env: 'GEMINI_API_KEY', desc: 'RAG 질의응답 + AI 요약 + OCR' },
                          upstage: { env: 'UPSTAGE_API_KEY', desc: 'Upstage OCR (무료)' },
                        };
                        const g = envGuide[key.provider];
                        return g ? (
                          <div className="text-[11px] bg-blue-50 text-blue-700 px-2.5 py-2 rounded-md">
                            <p className="font-medium mb-0.5">환경변수 설정 필요</p>
                            <p>Vercel 대시보드 또는 <code className="bg-blue-100 px-1 rounded">.env</code>에 <code className="bg-blue-100 px-1 rounded">{g.env}</code> 추가</p>
                            <p className="text-blue-500 mt-0.5">용도: {g.desc}</p>
                          </div>
                        ) : null;
                      })()}
                      {key.last_error && (
                        <p className="text-xs text-red-500 bg-red-50 px-2.5 py-1.5 rounded-md">{key.last_error.length > 120 ? key.last_error.slice(0, 120) + '...' : key.last_error}</p>
                      )}
                      {actionResult?.id === `key-${key.provider}` && (
                        <p className={`text-xs px-2.5 py-1.5 rounded-md fade-in ${
                          actionResult.success ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50'
                        }`}>
                          {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                        </p>
                      )}
                    </div>
                  </Card>
                );
              })}
            </div>
          )}

          {/* ════════ 사용량 상세 탭 ════════ */}
          {subTab === 'usage' && (
            <div className="space-y-4">
              {/* 기간 선택 + CSV 내보내기 */}
              <div className="flex gap-2 items-center">
                {[{ v: 'today', l: '오늘' }, { v: 'week', l: '7일' }, { v: 'month', l: '30일' }].map(r => (
                  <button key={r.v} onClick={() => setRange(r.v)}
                    className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${
                      range === r.v ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{r.l}</button>
                ))}
                {data.usageByModel?.length > 0 && (
                  <button onClick={() => {
                    const rows = [['프로바이더','모델','엔드포인트','호출수','토큰(입력)','토큰(출력)','비용($)']];
                    data.usageByModel.forEach(m => rows.push([m.provider, m.model, m.endpoint, m.call_count, m.total_tokens_in, m.total_tokens_out, parseFloat(m.total_cost).toFixed(4)]));
                    const totals = data.usageByModel.reduce((a, m) => ({ calls: a.calls + parseInt(m.call_count), tIn: a.tIn + parseInt(m.total_tokens_in || 0), tOut: a.tOut + parseInt(m.total_tokens_out || 0), cost: a.cost + parseFloat(m.total_cost) }), { calls: 0, tIn: 0, tOut: 0, cost: 0 });
                    rows.push(['합계', '', '', totals.calls, totals.tIn, totals.tOut, totals.cost.toFixed(4)]);
                    const csv = rows.map(r => r.join(',')).join('\n');
                    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = `docstore-usage-${range}-${new Date().toISOString().slice(0,10)}.csv`; a.click();
                  }} className="ml-auto px-2.5 py-1.5 rounded-full text-xs bg-border text-text-secondary hover:text-text transition-colors">
                    CSV 내보내기
                  </button>
                )}
              </div>

              {/* 모델별 사용량 + 합계 */}
              {data.usageByModel?.length > 0 ? (
                <Card>
                  <h4 className="text-xs font-bold text-text mb-3">모델별 사용량</h4>
                  <div className="space-y-1">
                    {data.usageByModel.map((m, i) => (
                      <div key={i} className="flex items-center justify-between text-xs py-2 border-b border-border/50">
                        <div className="flex items-center gap-2 min-w-0">
                          <Badge color={providerColors[m.provider] || 'gray'}>{m.provider}</Badge>
                          <span className="text-text truncate">{m.model}</span>
                          <span className="text-text-secondary text-[10px] hidden sm:inline">({m.endpoint})</span>
                        </div>
                        <div className="flex gap-3 text-text-secondary shrink-0">
                          <span>{m.call_count}회</span>
                          <span className="text-primary font-medium">${parseFloat(m.total_cost).toFixed(4)}</span>
                        </div>
                      </div>
                    ))}
                    {/* 합계 행 */}
                    {(() => {
                      const t = data.usageByModel.reduce((a, m) => ({
                        calls: a.calls + parseInt(m.call_count),
                        tIn: a.tIn + parseInt(m.total_tokens_in || 0),
                        tOut: a.tOut + parseInt(m.total_tokens_out || 0),
                        cost: a.cost + parseFloat(m.total_cost)
                      }), { calls: 0, tIn: 0, tOut: 0, cost: 0 });
                      return (
                        <div className="flex items-center justify-between text-xs py-2.5 mt-1 border-t-2 border-border">
                          <div className="flex items-center gap-2">
                            <span className="font-bold text-text">합계</span>
                            <span className="text-text-secondary text-[10px]">토큰: 입력 {t.tIn.toLocaleString()} / 출력 {t.tOut.toLocaleString()}</span>
                          </div>
                          <div className="flex gap-3 shrink-0">
                            <span className="font-bold text-text">{t.calls}회</span>
                            <span className="text-primary font-bold">${t.cost.toFixed(4)}</span>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                </Card>
              ) : (
                <Card><p className="text-xs text-text-secondary text-center py-6">선택한 기간에 사용 기록이 없습니다.</p></Card>
              )}

              {/* 에러 로그 + 필터 */}
              {data.recentErrors?.length > 0 && (
                <div>
                  <div className="flex items-center justify-between mb-2">
                    <h4 className="text-xs font-bold text-text">에러 로그 ({data.recentErrors.length}건)</h4>
                    <div className="flex gap-1">
                      {['all', ...new Set(data.recentErrors.map(e => e.provider))].map(f => (
                        <button key={f} onClick={() => setErrorFilter(f)}
                          className={`px-2 py-0.5 rounded-full text-[10px] transition-colors ${
                            errorFilter === f ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                          }`}
                        >{f === 'all' ? '전체' : f}</button>
                      ))}
                    </div>
                  </div>
                  <div className="space-y-1.5">
                    {data.recentErrors
                      .filter(e => errorFilter === 'all' || e.provider === errorFilter)
                      .map((e, i) => (
                      <Card key={i} className="border-red-200">
                        <div className="space-y-1">
                          <div className="flex items-center gap-2 text-xs">
                            <Badge color={e.status === 'credit_exhausted' ? 'red' : 'yellow'}>{e.status}</Badge>
                            <span className="text-text-secondary">{e.provider} / {e.model}</span>
                            <span className="text-text-secondary ml-auto text-[10px]">{formatDate(e.created_at)}</span>
                          </div>
                          <p className="text-[11px] text-red-500">{e.error_message?.length > 200 ? e.error_message.slice(0, 200) + '...' : e.error_message}</p>
                        </div>
                      </Card>
                    ))}
                    {data.recentErrors.filter(e => errorFilter === 'all' || e.provider === errorFilter).length === 0 && (
                      <p className="text-xs text-text-secondary text-center py-3">필터 조건에 맞는 에러가 없습니다.</p>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ════════ OCR 설정 탭 ════════ */}
          {subTab === 'ocr' && (
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <p className="text-xs text-text-secondary">이미지 업로드 시 위에서 아래 순서로 OCR 엔진을 시도합니다.</p>
                <button onClick={handleTestAllOcr}
                  disabled={!!actionLoading || !engines.some(e => e.is_available && e.is_enabled)}
                  className="px-3 py-1.5 text-xs bg-primary text-white rounded-lg hover:bg-primary/90 disabled:opacity-40 transition-colors shrink-0"
                >{actionLoading === 'ocr-test-all' ? '테스트 중...' : '전체 테스트'}</button>
              </div>
              {actionResult?.id === 'ocr-test-all' && (
                <div className={`text-xs px-3 py-2 rounded-lg fade-in ${actionResult.success ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>
                  {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                </div>
              )}
              {(() => {
                const active = engines.filter(e => e.is_available && e.is_enabled);
                return active.length > 0 ? (
                  <Card className="border-green-200 bg-green-50/50">
                    <p className="text-xs text-green-700 font-medium">
                      현재 사용 중: {active.map((e, i) => <span key={e.engine_id}>{i > 0 && ' → '}<span className="font-bold">{e.name}</span>{e.free && ' (무료)'}</span>)}
                    </p>
                  </Card>
                ) : (
                  <Card className="border-amber-200 bg-amber-50/50">
                    <p className="text-xs text-amber-700 font-medium">활성화된 OCR 엔진이 없습니다. 이미지 업로드 시 텍스트 추출이 불가합니다.</p>
                  </Card>
                );
              })()}

              {/* OCR 사용 통계 (최근 7일) */}
              {data?.ocrStats?.length > 0 && (
                <Card>
                  <h4 className="text-xs font-bold text-text mb-2">최근 7일 OCR 사용 현황</h4>
                  <div className="space-y-1.5">
                    {data.ocrStats.map(s => {
                      const total = parseInt(s.call_count);
                      const success = parseInt(s.success_count);
                      const rate = total > 0 ? Math.round((success / total) * 100) : 0;
                      return (
                        <div key={s.engine} className="flex items-center justify-between text-xs">
                          <span className="text-text">{s.engine}</span>
                          <div className="flex items-center gap-3">
                            <span className="text-text-secondary">{total}회</span>
                            <span className={`font-medium ${rate >= 90 ? 'text-green-600' : rate >= 70 ? 'text-yellow-600' : 'text-red-500'}`}>성공률 {rate}%</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </Card>
              )}

              {ocrLoading ? (
                <div className="text-center py-8 text-text-secondary text-sm">로딩...</div>
              ) : (
                <>
                  <div className="space-y-2">
                    {engines.map((engine, index) => (
                      <div key={engine.engine_id}
                        className={`flex items-center gap-2 p-3 rounded-lg border transition-colors ${
                          engine.is_enabled && engine.is_available
                            ? 'bg-white border-border shadow-sm'
                            : !engine.is_available
                              ? 'bg-gray-50 border-dashed border-gray-300'
                              : 'bg-gray-50 border-border/50 opacity-70'
                        }`}
                      >
                        <span className={`text-sm font-bold w-6 text-center ${engine.is_available ? 'text-primary' : 'text-gray-300'}`}>{index + 1}</span>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className={`text-sm font-medium truncate ${engine.is_available ? 'text-text' : 'text-text-secondary'}`}>{engine.name}</span>
                            {engine.free && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-green-50 text-green-600 font-medium">무료</span>}
                            {ocrStatusBadge(engine)}
                          </div>
                          <p className="text-[11px] text-text-secondary truncate">{engine.description}</p>
                          {!engine.is_available && (
                            <p className="text-[10px] text-amber-600 mt-0.5">
                              <code className="bg-amber-50 px-1 py-0.5 rounded">{engine.envKey}</code> 환경변수 설정이 필요합니다
                            </p>
                          )}
                          {actionResult?.id === `ocr-${engine.engine_id}` && (
                            <p className={`text-[10px] mt-0.5 fade-in ${actionResult.success ? 'text-green-600' : 'text-red-500'}`}>
                              {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                            </p>
                          )}
                        </div>
                        <div className="flex items-center gap-1 shrink-0">
                          <button onClick={() => handleOcrMove(index, -1)} disabled={index === 0}
                            className="w-7 h-7 flex items-center justify-center rounded-md text-text-secondary hover:text-primary hover:bg-gray-100 disabled:opacity-30 text-xs">&#9650;</button>
                          <button onClick={() => handleOcrMove(index, 1)} disabled={index === engines.length - 1}
                            className="w-7 h-7 flex items-center justify-center rounded-md text-text-secondary hover:text-primary hover:bg-gray-100 disabled:opacity-30 text-xs">&#9660;</button>
                          <button onClick={() => handleOcrToggle(engine.engine_id, engine.is_enabled)}
                            disabled={actionLoading === `ocr-toggle-${engine.engine_id}`}
                            className={`w-9 h-5 rounded-full transition-colors relative ${engine.is_enabled ? 'bg-green-500' : 'bg-gray-300'}`}
                          ><span className={`absolute w-3.5 h-3.5 rounded-full bg-white top-[3px] transition-transform ${engine.is_enabled ? 'right-[3px]' : 'left-[3px]'}`} /></button>
                          {engine.is_available && (
                            <button onClick={() => handleOcrTest(engine.engine_id)} disabled={!!actionLoading}
                              className="text-[10px] px-2 py-1 rounded-md border border-primary/30 text-primary hover:bg-blue-50 transition-colors disabled:opacity-30"
                            >{actionLoading === `ocr-test-${engine.engine_id}` ? '...' : '테스트'}</button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // App 컴포넌트
    // ========================================
    // ========================================
    // 로그인 화면
    // ========================================
    function LoginScreen({ onLogin }) {
      const [id, setId] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!id || !password) { setError('아이디와 비밀번호를 입력해주세요.'); return; }
        setLoading(true);
        setError('');
        try {
          const res = await fetch(`${API_BASE_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, password }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error || '로그인에 실패했습니다.'); return; }
          setAuthToken(data.token);
          setAuthUser({ name: data.name, admin: data.admin });
          onLogin();
        } catch (err) {
          setError('서버 연결에 실패했습니다.');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center px-4">
          <div className="w-full max-w-sm">
            {/* 로고 영역 */}
            <div className="text-center mb-8">
              <div className="text-4xl mb-2">&#128218;</div>
              <h1 className="text-2xl font-bold text-text">DocStore</h1>
              <p className="text-text-secondary text-sm mt-1">지식 관리 시스템 (관리자 전용)</p>
            </div>

            {/* 로그인 폼 */}
            <form onSubmit={handleSubmit} className="bg-white rounded-xl p-6 border border-border shadow-lg">
              {error && (
                <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm">
                  {error}
                </div>
              )}

              <div className="mb-4">
                <label className="block text-sm text-text-secondary mb-1">아이디</label>
                <input
                  type="text"
                  value={id}
                  onChange={e => setId(e.target.value)}
                  className="w-full px-3 py-2.5 bg-white border border-border rounded-lg text-text text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                  placeholder="아이디를 입력하세요"
                  autoFocus
                  autoComplete="username"
                />
              </div>

              <div className="mb-6">
                <label className="block text-sm text-text-secondary mb-1">비밀번호</label>
                <input
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  className="w-full px-3 py-2.5 bg-white border border-border rounded-lg text-text text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                  placeholder="비밀번호를 입력하세요"
                  autoComplete="current-password"
                />
              </div>

              <button
                type="submit"
                disabled={loading}
                className="w-full py-2.5 bg-primary hover:bg-primary-hover text-white rounded-lg text-sm font-medium transition-colors disabled:opacity-50"
              >
                {loading ? '로그인 중...' : '로그인'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(!!getAuthToken());
      const [activeTab, setActiveTab] = useState('upload');
      const [refreshKey, setRefreshKey] = useState(0);

      // 업로드 완료 시 문서 목록 새로고침 트리거
      const handleUploadComplete = useCallback(() => {
        setRefreshKey(k => k + 1);
      }, []);

      const handleLogout = useCallback(() => {
        clearAuthToken();
        setIsLoggedIn(false);
      }, []);

      // 홈 버튼: 문서 목록 탭으로 이동 + 새로고침
      const handleHomeClick = useCallback(() => {
        setActiveTab('upload');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, []);

      // 로그인 전이면 로그인 화면 표시
      if (!isLoggedIn) {
        return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;
      }

      return (
        <div className="min-h-screen pb-16">
          <Header onLogout={handleLogout} onHomeClick={handleHomeClick} />
          <main className="max-w-3xl mx-auto px-4 py-5">
            {activeTab === 'upload' && (
              <UploadTab onUploadComplete={handleUploadComplete} />
            )}
            {activeTab === 'documents' && (
              <DocumentsTab key={refreshKey} />
            )}
            {activeTab === 'search' && (
              <SearchTab />
            )}
            {activeTab === 'api' && (
              <ApiDashboardTab />
            )}
          </main>
          <BottomNav activeTab={activeTab} onTabChange={setActiveTab} />
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
