                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                          </svg>
                        </button>
                        {/* 장 내 섹션 (펼침 시에만 표시) */}
                        {isExpanded && (
                          <div className="p-3 space-y-2 bg-bg/50">
                            {group.sections.map((s, si) => renderSection(s, `${gi}-${si}`))}
                          </div>
                        )}
                      </div>
                    );
                  })
                ) : (
                  // 그룹핑 없이 모두 표시
                  sections.map((section, idx) => renderSection(section, idx))
                )}
              </div>
            </div>
          ) : null}
        </Modal>
      );
    }

    // ========================================
    // 문서 목록 탭
    // ========================================
    function DocumentsTab() {
      const [documents, setDocuments] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [categoryFilter, setCategoryFilter] = useState('');
      const [selectedDocId, setSelectedDocId] = useState(null);
      const [deleting, setDeleting] = useState(null);
      // 휴지통 모드 토글
      const [showTrash, setShowTrash] = useState(false);
      const [trashCount, setTrashCount] = useState(0);
      // 페이징: 처음 5개만 보여주고 '더보기'로 추가 로드
      const [visibleCount, setVisibleCount] = useState(5);

      // 문서 목록 불러오기
      const fetchDocuments = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          let query = showTrash
            ? '?trash=true'
            : categoryFilter ? `?category=${encodeURIComponent(categoryFilter)}` : '';
          const res = await authFetch(`${API_BASE_URL}/documents${query}`);
          if (!res.ok) throw new Error('문서 목록을 불러올 수 없습니다.');
          const data = await res.json();
          setDocuments(Array.isArray(data) ? data : data.documents || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [categoryFilter, showTrash]);

      // 휴지통 개수 조회
      const fetchTrashCount = useCallback(async () => {
        try {
          const res = await authFetch(`${API_BASE_URL}/documents?trash=true`);
          if (res.ok) {
            const data = await res.json();
            const docs = Array.isArray(data) ? data : data.documents || [];
            setTrashCount(docs.length);
          }
        } catch {}
      }, []);

      useEffect(() => {
        setVisibleCount(5); // 필터/모드 변경 시 페이징 초기화
        fetchDocuments();
      }, [fetchDocuments]);

      useEffect(() => {
        if (!showTrash) fetchTrashCount();
      }, [showTrash, fetchTrashCount, documents]);

      // 소프트 삭제 (휴지통으로 이동)
      const handleDelete = useCallback(async (id, e) => {
        e.stopPropagation();
        if (!confirm('이 문서를 휴지통으로 이동하시겠습니까?')) return;
        setDeleting(id);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'delete', id }),
          });
          if (!res.ok) throw new Error('삭제에 실패했습니다.');
          setDocuments(prev => prev.filter(d => d.id !== id));
        } catch (err) {
          alert(err.message);
        } finally {
          setDeleting(null);
        }
      }, []);

      // 복구
      const handleRestore = useCallback(async (id, e) => {
        e.stopPropagation();
        setDeleting(id);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'restore', id }),
          });
          if (!res.ok) throw new Error('복구에 실패했습니다.');
          setDocuments(prev => prev.filter(d => d.id !== id));
        } catch (err) {
          alert(err.message);
        } finally {
          setDeleting(null);
        }
      }, []);

      // 영구 삭제
      const handlePermanentDelete = useCallback(async (id, e) => {
        e.stopPropagation();
        if (!confirm('이 문서를 영구 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
        setDeleting(id);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'permanentDelete', id }),
          });
          if (!res.ok) throw new Error('영구 삭제에 실패했습니다.');
          setDocuments(prev => prev.filter(d => d.id !== id));
        } catch (err) {
          alert(err.message);
        } finally {
          setDeleting(null);
        }
      }, []);

      // 휴지통 비우기
      const handleEmptyTrash = useCallback(async () => {
        if (!confirm(`휴지통의 모든 문서(${documents.length}개)를 영구 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
        setLoading(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'emptyTrash' }),
          });
          if (!res.ok) throw new Error('휴지통 비우기에 실패했습니다.');
          setDocuments([]);
        } catch (err) {
          alert(err.message);
        } finally {
          setLoading(false);
        }
      }, [documents.length]);

      // 경과 시간 표시 (삭제 후 며칠 경과)
      const getDeletedAgo = (deletedAt) => {
        const diff = Date.now() - new Date(deletedAt).getTime();
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        if (days === 0) return '오늘';
        if (days === 1) return '어제';
        return `${days}일 전`;
      };

      // 카테고리별 뱃지 색상
      const getCategoryColor = (cat) => {
        switch (cat) {
          case '법령': return 'primary';
          case '기출': return 'green';
          case '규정': return 'yellow';
          default: return 'gray';
        }
      };

      // 맨 위로 스크롤 버튼 표시 여부
      const [showScrollTop, setShowScrollTop] = useState(false);
      useEffect(() => {
        const onScroll = () => setShowScrollTop(window.scrollY > 300);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      return (
        <div className="space-y-4 fade-in">
          {/* 카테고리 필터 + 문서 개수 + 휴지통 */}
          <div className="flex items-center gap-2">
            {!showTrash && (
              <div className="flex gap-1.5 overflow-x-auto pb-1 flex-1">
                {CATEGORIES.map(cat => (
                  <button
                    key={cat.value}
                    onClick={() => setCategoryFilter(cat.value)}
                    className={`px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all ${
                      categoryFilter === cat.value
                        ? 'bg-primary text-white shadow-sm'
                        : 'bg-card-bg border border-border text-text-secondary hover:text-text hover:border-primary/30'
                    }`}
                  >
                    {cat.label}
                  </button>
                ))}
              </div>
            )}
            {showTrash && (
              <div className="flex-1">
                <span className="text-sm font-medium text-red-500">
                  휴지통 ({documents.length}개)
                </span>
              </div>
            )}
            {/* 휴지통 버튼 */}
            <button
              onClick={() => { setShowTrash(!showTrash); setCategoryFilter(''); }}
              className={`relative px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors shrink-0 ${
                showTrash
                  ? 'bg-red-50 text-red-500 border border-red-200'
                  : 'bg-card-bg border border-border text-text-secondary hover:text-text'
              }`}
            >
              <svg className="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              {showTrash ? '목록으로' : '휴지통'}
              {!showTrash && trashCount > 0 && (
                <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">
                  {trashCount}
                </span>
              )}
            </button>
            {/* 휴지통 비우기 */}
            {showTrash && documents.length > 0 && (
              <button
                onClick={handleEmptyTrash}
                className="px-3 py-1.5 rounded-full text-sm font-medium bg-red-50 text-red-500 border border-red-200 hover:bg-red-100 transition-colors shrink-0"
              >
                비우기
              </button>
            )}
          </div>

          {/* 문서 개수 표시 (로딩 완료 후) */}
          {!loading && !error && !showTrash && documents.length > 0 && (
            <div className="flex items-center justify-between">
              <span className="text-xs text-text-secondary">
                {categoryFilter ? `'${categoryFilter}' ` : '전체 '}{documents.length}개 문서
              </span>
              <button onClick={fetchDocuments} className="text-xs text-text-secondary hover:text-primary transition-colors">
                &#x21BB; 새로고침
              </button>
            </div>
          )}

          {/* 로딩 */}
          {loading ? (
            <div className="flex items-center justify-center py-16">
              <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
            </div>
          ) : error ? (
            <Card className="border-red-200 bg-red-50">
              <div className="flex items-center justify-between">
                <p className="text-sm text-red-500">{error}</p>
                <Button variant="ghost" size="sm" onClick={fetchDocuments}>재시도</Button>
              </div>
            </Card>
          ) : documents.length === 0 ? (
            <EmptyState
              icon={showTrash ? "🗑️" : "📄"}
              title={showTrash ? "휴지통이 비어 있습니다" : "문서가 없습니다"}
              description={showTrash
                ? '삭제된 문서가 없습니다.'
                : categoryFilter ? `'${categoryFilter}' 카테고리에 문서가 없습니다.` : '업로드 탭에서 PDF를 업로드하세요.'}
            />
          ) : (
            /* 문서 카드 목록 */
            <div className="space-y-3">
              {documents.slice(0, visibleCount).map(doc => (
                <Card key={doc.id} hoverable={!showTrash} onClick={() => !showTrash && setSelectedDocId(doc.id)}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <h3 className={`font-medium truncate ${showTrash ? 'text-text-secondary' : 'text-text'}`}>{doc.title}</h3>
                        <Badge color={getCategoryColor(doc.category)} className="shrink-0">{doc.category}</Badge>
                      </div>
                      {/* 메타 정보 */}
                      <div className="flex flex-wrap items-center gap-x-2 gap-y-1 mt-1.5 text-xs text-text-secondary">
                        {FILE_TYPE_CONFIG[doc.file_type] && (
                          <span>{FILE_TYPE_CONFIG[doc.file_type].icon} {FILE_TYPE_CONFIG[doc.file_type].label}</span>
                        )}
                        {doc.file_type === 'law' && <span>법령</span>}
                        {showTrash && doc.deleted_at ? (
                          <span className="text-red-500">{getDeletedAgo(doc.deleted_at)} 삭제</span>
                        ) : (
                          <React.Fragment>
                            <span className="flex items-center gap-1">
                              <span className={`w-1.5 h-1.5 rounded-full ${
                                doc.embedding_status === 'done' ? 'bg-green-400' : doc.embedding_status === 'failed' ? 'bg-red-400' : 'bg-yellow-400'
                              }`} />
                              {doc.embedding_status === 'done' ? '벡터화됨' : doc.embedding_status === 'failed' ? '벡터 실패' : '대기'}
                            </span>
                            <span>{formatDate(doc.created_at)}</span>
                          </React.Fragment>
                        )}
                        {doc.section_count != null && <span>{doc.section_count}개 섹션</span>}
                        {doc.file_size > 0 && <span>{formatFileSize(doc.file_size)}</span>}
                      </div>
                      {/* 태그 */}
                      {doc.tags && doc.tags.length > 0 && (
                        <div className="flex flex-wrap gap-1 mt-1.5">
                          {doc.tags.map(tag => (
                            <span key={tag.id} className="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-blue-50 text-blue-600 border border-blue-100">
                              #{tag.name}
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                    {/* 일반 모드: 삭제 버튼 / 휴지통 모드: 복구 + 영구삭제 */}
                    {showTrash ? (
                      <div className="flex gap-1 shrink-0">
                        <button
                          onClick={(e) => handleRestore(doc.id, e)}
                          disabled={deleting === doc.id}
                          className="p-2 text-text-secondary hover:text-green-600 transition-colors"
                          title="복구"
                        >
                          {deleting === doc.id ? (
                            <div className="w-4 h-4 border-2 border-green-400 border-t-transparent rounded-full animate-spin" />
                          ) : (
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" /></svg>
                          )}
                        </button>
                        <button
                          onClick={(e) => handlePermanentDelete(doc.id, e)}
                          disabled={deleting === doc.id}
                          className="p-2 text-text-secondary hover:text-red-500 transition-colors"
                          title="영구 삭제"
                        >
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                      </div>
                    ) : (
                      <button
                        onClick={(e) => handleDelete(doc.id, e)}
                        disabled={deleting === doc.id}
                        className="p-2 text-text-secondary hover:text-red-500 transition-colors shrink-0"
                        aria-label="삭제"
                      >
                        {deleting === doc.id ? (
                          <div className="w-4 h-4 border-2 border-red-400 border-t-transparent rounded-full animate-spin" />
                        ) : (
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        )}
                      </button>
                    )}
                  </div>
                </Card>
              ))}
              {/* 더보기 버튼 */}
              {documents.length > visibleCount && (
                <button
                  onClick={() => setVisibleCount(prev => prev + 5)}
                  className="w-full py-2.5 text-sm text-primary hover:text-primary-hover bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors"
                >
                  더보기 ({visibleCount}/{documents.length}건)
                </button>
              )}
            </div>
          )}

          {/* 문서 상세 모달 */}
          <DocumentDetailModal
            isOpen={selectedDocId !== null}
            onClose={() => setSelectedDocId(null)}
            documentId={selectedDocId}
          />

          {/* 맨 위로 스크롤 버튼 */}
          {showScrollTop && (
            <button
              className="scroll-top-btn"
              onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
              aria-label="맨 위로"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7" /></svg>
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // 검색 탭 (텍스트 / 벡터 / AI 질의 + 필터)
    // ========================================
    function SearchTab() {
      const [searchQuery, setSearchQuery] = useState('');
      const [searchType, setSearchType] = useState('text');
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      // 필터
      const [filterDocIds, setFilterDocIds] = useState([]);
      const [filterChapter, setFilterChapter] = useState('');
      const [docList, setDocList] = useState([]); // 문서 목록 (필터용)
      const [showFilters, setShowFilters] = useState(false);
      // 검색 결과에서 문서 상세 이동
      const [selectedDocId, setSelectedDocId] = useState(null);
      // 페이징: 화면에 표시할 결과 수
      const PAGE_SIZE = 5;
      const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);

      // 문서 목록 불러오기 (필터용)
      useEffect(() => {
        authFetch(`${API_BASE_URL}/documents`)
          .then(r => r.json())
          .then(data => setDocList(Array.isArray(data) ? data : data.documents || []))
          .catch(() => {});
      }, []);

      // 검색 실행
      const handleSearch = useCallback(async () => {
        if (!searchQuery.trim()) return;
        setLoading(true);
        setError(null);
        setResults(null);
        setVisibleCount(PAGE_SIZE);

        try {
          const params = new URLSearchParams({
            q: searchQuery.trim(),
            type: searchType,
            limit: '50',
          });
          if (filterDocIds.length > 0) params.set('docIds', filterDocIds.join(','));
          if (filterChapter) params.set('chapter', filterChapter);
          const res = await authFetch(`${API_BASE_URL}/search?${params}`);
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error || `검색 실패 (${res.status})`);
          }
          setResults(await res.json());
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [searchQuery, searchType, filterDocIds, filterChapter]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter') handleSearch();
      }, [handleSearch]);

      // 검색어 하이라이트
      const highlightText = useCallback((text, query) => {
        if (!query || !text) return text;
        const maxLen = 300;
        const lowerText = text.toLowerCase();
        const lowerQuery = query.toLowerCase();
        const idx = lowerText.indexOf(lowerQuery);
        let excerpt = text;
        if (text.length > maxLen) {
          if (idx >= 0) {
            const start = Math.max(0, idx - 80);
            const end = Math.min(text.length, idx + query.length + 220);
            excerpt = (start > 0 ? '...' : '') + text.slice(start, end) + (end < text.length ? '...' : '');
          } else {
            excerpt = text.slice(0, maxLen) + '...';
          }
        }
        if (idx < 0) return excerpt;
        const parts = excerpt.split(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'));
        return parts.map((part, i) =>
          part.toLowerCase() === lowerQuery
            ? React.createElement('mark', { key: i, className: 'bg-primary/30 text-primary px-0.5 rounded' }, part)
            : part
        );
      }, []);

      // 검색 결과 카드 (클릭 시 문서 상세 이동)
      const ResultCard = ({ r, children }) => (
        <Card hoverable onClick={() => r.documentId && setSelectedDocId(r.documentId)}>
          {children}
        </Card>
      );

      return (
        <div className="space-y-4 fade-in">
          {/* 검색 입력 */}
          <Card>
            <div className="space-y-3">
              <div className="flex gap-2">
                <input
                  type="text"
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="검색어를 입력하세요..."
                  className="flex-1 px-3 py-2 bg-bg border border-border rounded-lg text-text placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                />
                <Button onClick={handleSearch} disabled={loading || !searchQuery.trim()}>
                  {loading ? '검색 중...' : '검색'}
                </Button>
              </div>
              {/* 검색 타입 선택 */}
              <div className="flex gap-2 flex-wrap">
                {[
                  { key: 'text', label: '텍스트 검색' },
                  { key: 'vector', label: '의미 검색' },
                ].map(t => (
                  <button key={t.key}
                    onClick={() => setSearchType(t.key)}
                    className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                      searchType === t.key ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{t.label}</button>
                ))}
                {/* 필터 토글 */}
                <button
                  onClick={() => setShowFilters(!showFilters)}
                  className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                    showFilters || filterDocIds.length > 0 || filterChapter
                      ? 'bg-yellow-500/20 text-yellow-400'
                      : 'bg-border text-text-secondary hover:text-text'
                  }`}
                >
                  필터 {(filterDocIds.length > 0 || filterChapter) ? '(활성)' : ''}
                </button>
              </div>

              {/* 필터 패널 */}
              {showFilters && (
                <div className="space-y-2 p-3 bg-bg rounded-lg border border-border">
                  <MultiSelect
                    label="문서 범위 (복수 선택 가능)"
                    selectedIds={filterDocIds}
                    onChange={setFilterDocIds}
                    options={docList.map(d => ({ value: String(d.id), label: d.title }))}
                    placeholder="전체 문서"
                  />
                  <Input
                    label="장/절 필터"
                    value={filterChapter}
                    onChange={e => setFilterChapter(e.target.value)}
                    placeholder="예: 제1장, 총칙"
                  />
                  {(filterDocIds.length > 0 || filterChapter) && (
                    <button
                      onClick={() => { setFilterDocIds([]); setFilterChapter(''); }}
                      className="text-xs text-red-500 hover:text-red-300"
                    >필터 초기화</button>
                  )}
                </div>
              )}

              <p className="text-xs text-text-secondary">
                {searchType === 'text'
                  ? '입력한 단어가 포함된 문서를 검색합니다.'
                  : '입력한 내용과 의미가 유사한 문서를 검색합니다.'}
              </p>
            </div>
          </Card>

          {/* 로딩 */}
          {loading && (
            <div className="flex items-center justify-center py-12">
              <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
            </div>
          )}

          {/* 에러 */}
          {error && (
            <Card className="border-red-200 bg-red-50">
              <p className="text-sm text-red-500">{error}</p>
            </Card>
          )}

          {/* 검색 결과 */}
          {results && !loading && (
            <div className="space-y-3">
              <p className="text-sm text-text-secondary">
                "{results.query}" 검색 결과: <span className="text-text font-medium">{results.count}건</span>
                <span className="text-xs ml-1">(클릭하면 문서 상세로 이동)</span>
              </p>

              {results.count === 0 ? (
                <EmptyState icon="🔍" title="검색 결과가 없습니다" description="다른 검색어로 시도해보세요." />
              ) : results.type === 'text' ? (
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{r.documentTitle}</span>
                          <Badge color={r.category === '법령' ? 'primary' : r.category === '기출' ? 'green' : r.category === '규정' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          {r.label ? <Badge color="gray">{r.label}</Badge> : <Badge color="gray">섹션 {r.sectionIndex + 1}</Badge>}
                        </div>
                        <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                          {highlightText(r.rawText, results.query)}
                        </p>
                      </div>
                    </ResultCard>
                  ))}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      더보기 ({visibleCount}/{results.results.length}건)
                    </button>
                  )}
                </>
              ) : (
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{r.documentTitle}</span>
                          <Badge color={r.category === '법령' ? 'primary' : r.category === '기출' ? 'green' : r.category === '규정' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          <Badge color="green">유사도 {(r.similarity * 100).toFixed(1)}%</Badge>
                          {r.label && <Badge color="gray">{r.label}</Badge>}
                        </div>
                        <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                          {r.chunkText?.length > 300 ? r.chunkText.slice(0, 300) + '...' : r.chunkText}
                        </p>
                      </div>
                    </ResultCard>
                  ))}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      더보기 ({visibleCount}/{results.results.length}건)
                    </button>
                  )}
                </>
              )}
            </div>
          )}

          {/* 검색 결과에서 문서 상세 모달 */}
          <DocumentDetailModal
            isOpen={selectedDocId !== null}
            onClose={() => setSelectedDocId(null)}
            documentId={selectedDocId}
          />
        </div>
      );
    }

    // ========================================
    // LLM 설정 패널 컴포넌트 (관리 탭 내 서브탭)
    // ========================================
    function LlmSettingsPanel() {
      const [settings, setSettings] = useState(() => loadLlmSettings());
      const [saved, setSaved] = useState(false);

      // 프로바이더별 설정 업데이트 헬퍼
      const updateProvider = useCallback((provider, key, value) => {
        setSettings(prev => ({
          ...prev,
          [provider]: { ...prev[provider], [key]: value },
        }));
        setSaved(false);
      }, []);

      // 모델 변경 시 해당 모델의 기본값 적용
      const handleModelChange = useCallback((provider, modelId) => {
        const catalogs = { gemini: GEMINI_CATALOG, openai: OPENAI_CATALOG, claude: CLAUDE_CATALOG };
        const info = catalogs[provider]?.find(m => m.id === modelId);
        setSettings(prev => ({
          ...prev,
          [provider]: {
            ...prev[provider],
            model: modelId,
            temperature: 0.3,
            ...(provider === 'gemini' && info?.thinking ? { thinkingBudget: 4096 } : {}),
            ...(provider === 'gemini' && !info?.thinking ? { thinkingBudget: 0 } : {}),
          },
        }));
        setSaved(false);
      }, []);

      // 저장
      const handleSave = useCallback(() => {
        llmSettings = JSON.parse(JSON.stringify(settings));
        saveLlmSettings(settings);
        setSaved(true);
        setTimeout(() => setSaved(false), 3000);
      }, [settings]);

      // 초기화
      const handleReset = useCallback(() => {
        const defaults = JSON.parse(JSON.stringify(DEFAULT_LLM_SETTINGS));
        setSettings(defaults);
        llmSettings = defaults;
        saveLlmSettings(defaults);
        setSaved(true);
        setTimeout(() => setSaved(false), 3000);
      }, []);

      // 가격 뱃지
      const TierBadge = ({ tier }) => (
        React.createElement('span', {
          className: 'text-[10px] font-bold text-white px-1.5 py-0.5 rounded',
          style: { backgroundColor: TIER_COLORS[tier] || '#6b7280' }
        }, tier)
      );

      // 프로바이더 섹션 렌더러
      const ProviderSection = ({ provider, label, catalog, icon }) => {
        const s = settings[provider];
        const selectedModel = catalog.find(m => m.id === s.model);
        const isGemini = provider === 'gemini';
        const isOpenai = provider === 'openai';
        const showThinking = isGemini && selectedModel?.thinking;
        const showReasoning = isOpenai && selectedModel?.reasoning;

        return (
          <Card>
            <div className="space-y-4">
              {/* 헤더 */}
              <div className="flex items-center gap-2">
                <span className="text-base">{icon}</span>
                <h3 className="text-sm font-bold text-text">{label}</h3>
              </div>

              {/* 모델 선택 */}
              <div>
                <label className="block text-xs font-medium text-text-secondary mb-1.5">모델</label>
                <select
                  value={s.model}
                  onChange={e => handleModelChange(provider, e.target.value)}
                  className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-sm text-text focus:outline-none focus:border-primary transition-colors"
                >
                  {catalog.map(m => (
                    <option key={m.id} value={m.id}>
                      {m.id} — {m.tier} · 입력 {m.inputP} · 출력 {m.outputP}
                    </option>
                  ))}
                </select>
                {/* 선택된 모델 정보 */}
                {selectedModel && (
                  <div className="mt-2 p-2.5 bg-bg rounded-lg border-l-3 border-primary text-xs space-y-1" style={{ borderLeftWidth: '3px' }}>
                    <div className="flex items-center gap-2">
                      <TierBadge tier={selectedModel.tier} />
                      <span className="text-text-secondary">입력 <strong className="text-text">{selectedModel.inputP}</strong> · 출력 <strong className="text-text">{selectedModel.outputP}</strong> / 1M tokens</span>
                    </div>
                    <p className="text-text-secondary">{selectedModel.desc}</p>
                  </div>
                )}
              </div>

              {/* Temperature 슬라이더 */}
              {!showReasoning && (
                <div>
                  <div className="flex items-center justify-between mb-1.5">
                    <label className="text-xs font-medium text-text-secondary">Temperature</label>
                    <span className="text-xs font-bold text-primary bg-primary/10 px-2 py-0.5 rounded">
                      {(s.temperature ?? 0.3).toFixed(1)}
                    </span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] text-text-secondary">일관</span>
                    <input
                      type="range" min="0" max="2" step="0.1"
                      value={s.temperature ?? 0.3}
                      onChange={e => updateProvider(provider, 'temperature', parseFloat(e.target.value))}
                      className="flex-1 accent-primary h-1 cursor-pointer"
                      style={{ accentColor: 'var(--primary)' }}
                    />
                    <span className="text-[10px] text-text-secondary">창의</span>
                  </div>
                  <p className="text-[10px] text-text-secondary mt-1">0 = 항상 같은 답, 2 = 다양한 표현. RAG 권장값: 0.2~0.5</p>
                </div>
              )}

              {/* Max Tokens */}
              <div>
                <label className="block text-xs font-medium text-text-secondary mb-1.5">Max Tokens (최대 응답 길이)</label>
                <select
                  value={s.maxTokens || 2048}
                  onChange={e => updateProvider(provider, 'maxTokens', parseInt(e.target.value))}
                  className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-sm text-text focus:outline-none focus:border-primary transition-colors"
                >
                  <option value={512}>512 — 짧은 답변</option>
                  <option value={1024}>1,024 — 보통</option>
                  <option value={2048}>2,048 — 상세 (기본)</option>
                  <option value={4096}>4,096 — 매우 상세</option>
                  <option value={8192}>8,192 — 최대</option>
                </select>
              </div>

              {/* Gemini Thinking Budget */}
              {showThinking && (
                <div>
                  <label className="block text-xs font-medium text-text-secondary mb-1.5">Thinking Budget (사고 토큰)</label>
                  <select
                    value={s.thinkingBudget || 0}
                    onChange={e => updateProvider(provider, 'thinkingBudget', parseInt(e.target.value))}
                    className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-sm text-text focus:outline-none focus:border-primary transition-colors"
                  >
                    <option value={0}>OFF — 즉시 응답 (추론 없음)</option>
                    <option value={1024}>1,024 tokens — 가벼운 추론</option>
                    <option value={4096}>4,096 tokens — 일반 추론</option>
                    <option value={8192}>8,192 tokens — 심층 추론</option>
                    <option value={16384}>16,384 tokens — 최대 추론</option>
                  </select>
                  <p className="text-[10px] text-text-secondary mt-1">Gemini 2.5 전용. 사고 토큰 수만큼 비용이 추가됩니다</p>
                </div>
              )}

              {/* OpenAI Reasoning Effort */}
              {showReasoning && (
                <div>
                  <label className="block text-xs font-medium text-text-secondary mb-1.5">Reasoning Effort (추론 강도)</label>
                  <select
                    value={s.reasoningEffort || 'medium'}
                    onChange={e => updateProvider(provider, 'reasoningEffort', e.target.value)}
                    className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-sm text-text focus:outline-none focus:border-primary transition-colors"
                  >
                    <option value="low">low — 빠름 (저비용)</option>
                    <option value="medium">medium — 균형 (기본)</option>
                    <option value="high">high — 최고 정확 (고비용)</option>
                  </select>
                  <p className="text-[10px] text-text-secondary mt-1">o-시리즈 전용. 추론 강도가 높을수록 비용/시간 증가</p>
                </div>
              )}
            </div>
          </Card>
        );
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <p className="text-sm text-text-secondary">AI 채팅에서 사용할 모델과 파라미터를 설정합니다.</p>
            <div className="flex items-center gap-2">
              <button
                onClick={handleReset}
                className="text-xs text-text-secondary hover:text-red-500 border border-border rounded-lg px-2.5 py-1.5 transition-colors"
              >기본값</button>
              <button
                onClick={handleSave}
                className={`text-xs font-medium rounded-lg px-3 py-1.5 transition-colors ${
                  saved
                    ? 'bg-green-500 text-white'
                    : 'bg-primary text-white hover:bg-primary-hover'
                }`}
              >{saved ? '저장됨' : '저장'}</button>
            </div>
          </div>

          <ProviderSection provider="gemini" label="Gemini" catalog={GEMINI_CATALOG} icon="G" />
          <ProviderSection provider="openai" label="OpenAI" catalog={OPENAI_CATALOG} icon="O" />
          <ProviderSection provider="claude" label="Claude" catalog={CLAUDE_CATALOG} icon="C" />

          {/* 현재 설정 요약 */}
          <Card className="bg-bg">
            <div className="space-y-2">
              <p className="text-xs font-medium text-text-secondary">현재 적용 설정</p>
              {['gemini', 'openai', 'claude'].map(p => (
                <div key={p} className="flex items-center justify-between text-xs">
                  <span className="text-text font-medium capitalize">{p}</span>
                  <span className="text-text-secondary">
                    {settings[p].model} · temp {(settings[p].temperature ?? 0.3).toFixed(1)} · {settings[p].maxTokens || 2048} tokens
                    {p === 'gemini' && settings[p].thinkingBudget > 0 ? ` · think ${settings[p].thinkingBudget}` : ''}
                  </span>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // AI 채팅 탭 (멀티턴 RAG 대화)
    // ========================================
    function ChatTab() {
      const [chatMessages, setChatMessages] = useState([]);
      // 각 메시지: { role: 'user'|'assistant', content, sources?, provider? }
      const [inputText, setInputText] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      // LLM 프로바이더
      const [llmProvider, setLlmProvider] = useState('gemini');
      const [llmProviders, setLlmProviders] = useState([]);
      // 문서 범위 필터 (복수 선택)
      const [filterDocIds, setFilterDocIds] = useState([]);
      const [docList, setDocList] = useState([]);
      const [showSettings, setShowSettings] = useState(false);
      // 근거자료 접기/펼치기 (메시지 인덱스별)
      const [expandedSources, setExpandedSources] = useState({});

      const chatEndRef = useRef(null);
      const inputRef = useRef(null);

      // 초기 데이터 로드
      useEffect(() => {
        authFetch(`${API_BASE_URL}/documents`)
          .then(r => r.json())
          .then(data => setDocList(Array.isArray(data) ? data : data.documents || []))
          .catch(() => {});
        authFetch(`${API_BASE_URL}/api-usage?type=llm`)
          .then(r => r.json())
          .then(data => { if (data.providers) setLlmProviders(data.providers); })
          .catch(() => {});
      }, []);

      // 새 메시지 시 하단 자동 스크롤
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatMessages, loading]);

      // 메시지 전송
      const handleSend = useCallback(async () => {
        const text = inputText.trim();
        if (!text || loading) return;

        const userMsg = { role: 'user', content: text };
        setChatMessages(prev => [...prev, userMsg]);
        setInputText('');
        setLoading(true);
        setError(null);

        try {
          // history: 이전 메시지에서 content만 추출 (sources 제외)
          const history = chatMessages.map(m => ({ role: m.role, content: m.content }));
          // llmSettings에서 현재 프로바이더 설정을 가져와 전달
          const providerSettings = llmSettings[llmProvider] || {};
          const body = {
            question: text, topK: 5, provider: llmProvider, history,
            llmOptions: {
              model: providerSettings.model,
              temperature: providerSettings.temperature,
              maxTokens: providerSettings.maxTokens,
              ...(llmProvider === 'gemini' && providerSettings.thinkingBudget ? { thinkingBudget: providerSettings.thinkingBudget } : {}),
            },
          };
          if (filterDocIds.length > 0) body.docIds = filterDocIds.map(id => parseInt(id, 10));

          const res = await authFetch(`${API_BASE_URL}/rag`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error || `질의 실패 (${res.status})`);
          }
          const data = await res.json();
          const assistantMsg = {
            role: 'assistant',
            content: data.answer,
            sources: data.sources || [],
            provider: data.provider,
          };
          setChatMessages(prev => [...prev, assistantMsg]);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
          setTimeout(() => inputRef.current?.focus(), 100);
        }
      }, [inputText, loading, chatMessages, llmProvider, filterDocIds]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      }, [handleSend]);

      // 새 대화
      const handleNewChat = useCallback(() => {
        setChatMessages([]);
        setError(null);
        setExpandedSources({});
        inputRef.current?.focus();
      }, []);

      // 근거자료 토글
      const toggleSources = useCallback((idx) => {
        setExpandedSources(prev => ({ ...prev, [idx]: !prev[idx] }));
      }, []);

      // 프로바이더 색상
      const providerColor = (id) => id === 'gemini' ? 'blue' : id === 'openai' ? 'green' : 'orange';
      const providerName = (id) => id === 'gemini' ? 'Gemini' : id === 'openai' ? 'OpenAI' : 'Claude';

      return (
        <div className="flex flex-col fade-in" style={{ height: 'calc(100vh - 130px)' }}>
          {/* 상단 바: 새 대화 + 설정 */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <h2 className="text-base font-bold text-text">AI 채팅</h2>
              {chatMessages.length > 0 && (
                <span className="text-xs text-text-secondary">{Math.floor(chatMessages.length / 2)}회 대화</span>
              )}
            </div>
            <div className="flex items-center gap-2">
              <button
                onClick={() => setShowSettings(!showSettings)}
                className="text-xs text-text-secondary hover:text-text border border-border rounded-lg px-2.5 py-1.5 transition-colors"
              >
                설정
              </button>
              <button
                onClick={handleNewChat}
                className="text-xs text-primary hover:text-primary-hover border border-primary/30 rounded-lg px-2.5 py-1.5 transition-colors hover:bg-primary/5"
              >
                새 대화
              </button>
            </div>
          </div>

          {/* 설정 패널 (접기/펼치기) */}
          {showSettings && (
            <Card className="mb-3">
              <div className="space-y-3">
                {/* LLM 프로바이더 선택 */}
                <div>
                  <p className="text-xs text-text-secondary mb-2">AI 모델</p>
                  <div className="flex items-center gap-2 flex-wrap">
                    {llmProviders.map(p => {
                      const active = llmProvider === p.id;
                      const modelId = llmSettings[p.id]?.model || '';
                      const shortModel = modelId.replace(/^(gemini-|gpt-|claude-)/, '').replace(/-\d{8}$/, '');
                      return (
                        <button key={p.id}
                          onClick={() => setLlmProvider(p.id)}
                          className={`px-2.5 py-1 rounded-full text-xs font-medium transition-colors ${
                            active
                              ? `bg-${providerColor(p.id)}-500 text-white`
                              : 'bg-border text-text-secondary hover:text-text'
                          }`}
                          style={active ? {
                            backgroundColor: p.id === 'gemini' ? '#3b82f6' : p.id === 'openai' ? '#22c55e' : '#f97316'
                          } : {}}
                        >
                          {p.name}
                          {active && shortModel ? <span className="ml-1 opacity-80">({shortModel})</span>
                            : p.free && <span className="ml-1 opacity-70">(무료)</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
                {/* 문서 범위 필터 (복수 선택) */}
                <MultiSelect
                  label="문서 범위 (복수 선택 가능)"
                  selectedIds={filterDocIds}
                  onChange={setFilterDocIds}
                  options={docList.map(d => ({ value: String(d.id), label: d.title }))}
                  placeholder="전체 문서"
                />
              </div>
            </Card>
          )}

          {/* 채팅 영역 */}
          <div className="flex-1 overflow-y-auto space-y-4 pb-2 min-h-0">
            {/* 빈 상태 */}
            {chatMessages.length === 0 && !loading && (
              <div className="flex flex-col items-center justify-center h-full text-center px-4">
                <div className="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-4">
                  <svg className="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                  </svg>
                </div>
                <p className="text-text font-medium mb-1">문서 기반 AI 채팅</p>
                <p className="text-sm text-text-secondary max-w-xs">
                  등록된 문서를 기반으로 AI가 답변합니다. 후속 질문도 이전 대화 맥락을 이해합니다.
                </p>
                <div className="flex flex-wrap gap-2 mt-4 justify-center">
                  {['CCTV 설치 기준은?', '개인정보 보호 원칙은?', '영상정보 보관 기간은?'].map(q => (
                    <button key={q}
                      onClick={() => { setInputText(q); inputRef.current?.focus(); }}
                      className="text-xs px-3 py-1.5 rounded-full border border-border text-text-secondary hover:text-primary hover:border-primary/30 transition-colors"
                    >{q}</button>
                  ))}
                </div>
              </div>
            )}

            {/* 메시지 목록 */}
            {chatMessages.map((msg, idx) => (
              <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[85%] ${msg.role === 'user' ? 'order-last' : ''}`}>
                  {/* 말풍선 */}
                  <div className={`rounded-2xl px-4 py-3 ${
                    msg.role === 'user'
                      ? 'bg-primary text-white rounded-br-md'
                      : 'bg-card-bg border border-border rounded-bl-md shadow-sm'
                  }`}>
                    {msg.role === 'assistant' ? (
                      <div>
                        {/* 프로바이더 뱃지 */}
                        <div className="flex items-center gap-1.5 mb-2">
                          <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full text-white"
                            style={{ backgroundColor: msg.provider === 'gemini' ? '#3b82f6' : msg.provider === 'openai' ? '#22c55e' : '#f97316' }}
                          >{providerName(msg.provider)}</span>
                        </div>
                        <div
                          className="text-sm text-text leading-relaxed markdown-body"
                          dangerouslySetInnerHTML={{
                            __html: typeof marked !== 'undefined' ? marked.parse(msg.content || '') : msg.content
                          }}
                        />
                      </div>
                    ) : (
                      <p className="text-sm leading-relaxed">{msg.content}</p>
                    )}
                  </div>

                  {/* 근거자료 (AI 메시지만) */}
                  {msg.role === 'assistant' && msg.sources && msg.sources.length > 0 && (
                    <div className="mt-1.5 ml-1">
                      <button
                        onClick={() => toggleSources(idx)}
                        className="text-xs text-text-secondary hover:text-primary transition-colors flex items-center gap-1"
                      >
                        <svg className={`w-3 h-3 transition-transform ${expandedSources[idx] ? 'rotate-90' : ''}`}
                          fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                        </svg>
                        근거자료 {msg.sources.length}건
                      </button>
                      {expandedSources[idx] && (
                        <div className="mt-2 space-y-1.5">
                          {msg.sources.map((src, si) => (
                            <div key={si} className="text-xs bg-bg border border-border rounded-lg p-2.5">
                              <div className="flex items-center gap-1.5 flex-wrap mb-1">
                                <span className="font-medium text-primary">근거 {si + 1}</span>
                                <span className="text-text font-medium">{src.documentTitle}</span>
                                {src.label && <span className="text-text-secondary">({src.label})</span>}
                                <span className="text-green-600">{(src.similarity * 100).toFixed(1)}%</span>
                              </div>
                              <p className="text-text-secondary leading-relaxed">{src.excerpt}</p>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            ))}

            {/* 로딩 인디케이터 */}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-card-bg border border-border rounded-2xl rounded-bl-md px-4 py-3 shadow-sm">
                  <div className="flex items-center gap-2">
                    <div className="flex gap-1">
                      <div className="w-2 h-2 bg-primary/50 rounded-full animate-bounce" style={{ animationDelay: '0ms' }} />
                      <div className="w-2 h-2 bg-primary/50 rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                      <div className="w-2 h-2 bg-primary/50 rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                    </div>
                    <span className="text-xs text-text-secondary">답변 생성 중...</span>
                  </div>
                </div>
              </div>
            )}

            {/* 에러 */}
            {error && (
              <div className="flex justify-start">
                <div className="bg-red-50 border border-red-200 rounded-2xl rounded-bl-md px-4 py-3">
                  <p className="text-sm text-red-500">{error}</p>
                </div>
              </div>
            )}

            <div ref={chatEndRef} />
          </div>

          {/* 하단 입력 영역 */}
          <div className="border-t border-border pt-3 mt-2">
            <div className="flex gap-2 items-end">
              <div className="flex-1 relative">
                <textarea
                  ref={inputRef}
                  value={inputText}
                  onChange={e => setInputText(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="질문을 입력하세요..."
                  rows={1}
                  className="w-full px-4 py-2.5 bg-bg border border-border rounded-xl text-text text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none"
                  style={{ minHeight: '42px', maxHeight: '120px' }}
                  onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
                />
              </div>
              <button
                onClick={handleSend}
                disabled={loading || !inputText.trim()}
                className="flex-shrink-0 w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center hover:bg-primary-hover disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19V5m0 0l-7 7m7-7l7 7" />
                </svg>
              </button>
            </div>
            <div className="flex items-center justify-between mt-1.5">
              <span className="text-[10px] text-text-secondary">
                {providerName(llmProvider)} ({llmSettings[llmProvider]?.model || '기본'}) {filterDocIds.length > 0 ? `| ${filterDocIds.length}개 문서 선택` : '| 전체 문서'}
              </span>
              <span className="text-[10px] text-text-secondary">Shift+Enter로 줄바꿈</span>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // API 관리 대시보드 탭
    // ========================================
    function ApiDashboardTab() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [range, setRange] = useState('today');
      const [subTab, setSubTab] = useState('dashboard');
      const [actionLoading, setActionLoading] = useState(null);
      // 인라인 결과 메시지 { id: string, success: bool, message: string }
      const [actionResult, setActionResult] = useState(null);
      // 한도 인라인 편집 { provider: string, value: string }
      const [editingLimit, setEditingLimit] = useState(null);
      // 에러 필터
      const [errorFilter, setErrorFilter] = useState('all');
      // 드래그 앤 드롭
      const [dragIndex, setDragIndex] = useState(null);
      const [dragOverIndex, setDragOverIndex] = useState(null);
      // OCR 상태
      const [engines, setEngines] = useState([]);
      const [ocrLoading, setOcrLoading] = useState(true);

      const fetchData = useCallback(async () => {
        setLoading(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?range=${range}`);
          if (!res.ok) throw new Error('데이터 로드 실패');
          setData(await res.json());
        } catch (err) {
          console.error(err);
        } finally {
          setLoading(false);
        }
      }, [range]);

      const fetchEngines = useCallback(async () => {
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?type=ocr`);
          if (res.ok) {
            const d = await res.json();
            setEngines(d.engines || []);
          }
        } catch (err) {
          console.error('[OCR]', err);
        } finally {
          setOcrLoading(false);
        }
      }, []);

      useEffect(() => { fetchData(); fetchEngines(); }, [fetchData, fetchEngines]);

      // ── API 키 액션 ──
      const handleTestKey = useCallback(async (provider) => {
        setActionLoading(`test-${provider}`);
        setActionResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'testKey', provider }),
          });
          const result = await res.json();
          setActionResult({ id: `key-${provider}`, success: result.success, message: result.message });
          fetchData();
          setTimeout(() => setActionResult(prev => prev?.id === `key-${provider}` ? null : prev), 5000);
        } finally { setActionLoading(null); }
      }, [fetchData]);

      const handleToggleKey = useCallback(async (provider, currentActive) => {
        setActionLoading(`toggle-${provider}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'toggleKey', provider, isActive: !currentActive }),
          });
          fetchData();
        } finally { setActionLoading(null); }
      }, [fetchData]);

      const handleUpdateLimit = useCallback(async (provider, value) => {
        setActionLoading(`limit-${provider}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'updateLimit', provider, dailyLimit: parseInt(value) || 0 }),
          });
          setEditingLimit(null);
          fetchData();
        } finally { setActionLoading(null); }
      }, [fetchData]);

      // ── OCR 액션 ──
      const handleOcrMove = useCallback(async (index, direction) => {
        const ne = [...engines];
        const si = index + direction;
        if (si < 0 || si >= ne.length) return;
        [ne[index], ne[si]] = [ne[si], ne[index]];
        setEngines(ne);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrUpdatePriority', order: ne.map(e => e.engine_id) }),
          });
        } catch { fetchEngines(); }
      }, [engines, fetchEngines]);

      // 드래그 완료 시 순서 반영
      const handleDragEnd = useCallback(async () => {
        if (dragIndex === null || dragOverIndex === null || dragIndex === dragOverIndex) {
          setDragIndex(null);
          setDragOverIndex(null);
          return;
        }
        const ne = [...engines];
        const [moved] = ne.splice(dragIndex, 1);
        ne.splice(dragOverIndex, 0, moved);
        setEngines(ne);
        setDragIndex(null);
        setDragOverIndex(null);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrUpdatePriority', order: ne.map(e => e.engine_id) }),
          });
        } catch { fetchEngines(); }
      }, [dragIndex, dragOverIndex, engines, fetchEngines]);

      const handleOcrToggle = useCallback(async (engineId, currentEnabled) => {
        setActionLoading(`ocr-toggle-${engineId}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrToggleEngine', engineId, enabled: !currentEnabled }),
          });
          fetchEngines();
        } finally { setActionLoading(null); }
      }, [fetchEngines]);

      const handleOcrTest = useCallback(async (engineId) => {
        setActionLoading(`ocr-test-${engineId}`);
        setActionResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrTestEngine', engineId }),
          });
          const result = await res.json();
          setActionResult({ id: `ocr-${engineId}`, success: result.success, message: result.message });
          setTimeout(() => setActionResult(prev => prev?.id === `ocr-${engineId}` ? null : prev), 5000);
        } finally { setActionLoading(null); }
      }, []);

      // 일괄 테스트 (API 키)
      const handleTestAllKeys = useCallback(async () => {
        const configured = data?.keys?.filter(k => k.configured) || [];
        if (configured.length === 0) return;
        setActionLoading('test-all');
        let ok = 0, fail = 0;
        for (const key of configured) {
          setActionResult({ id: 'test-all', success: true, message: `테스트 중... (${ok + fail + 1}/${configured.length}) ${key.provider}` });
          try {
            const res = await authFetch(`${API_BASE_URL}/api-usage`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'testKey', provider: key.provider }),
            });
            const r = await res.json();
            r.success ? ok++ : fail++;
          } catch { fail++; }
        }
        setActionResult({ id: 'test-all', success: fail === 0, message: `완료: 성공 ${ok}개, 실패 ${fail}개` });
        fetchData();
        setTimeout(() => setActionResult(prev => prev?.id === 'test-all' ? null : prev), 5000);
        setActionLoading(null);
      }, [data, fetchData]);

      // 일괄 테스트 (OCR)
      const handleTestAllOcr = useCallback(async () => {
        const available = engines.filter(e => e.is_available && e.is_enabled);
        if (available.length === 0) return;
        setActionLoading('ocr-test-all');
        let ok = 0, fail = 0;
        for (const engine of available) {
          setActionResult({ id: 'ocr-test-all', success: true, message: `테스트 중... (${ok + fail + 1}/${available.length}) ${engine.name}` });
          try {
            const res = await authFetch(`${API_BASE_URL}/api-usage`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'ocrTestEngine', engineId: engine.engine_id }),
            });
            const r = await res.json();
            r.success ? ok++ : fail++;
          } catch { fail++; }
        }
        setActionResult({ id: 'ocr-test-all', success: fail === 0, message: `완료: 성공 ${ok}개, 실패 ${fail}개` });
        setTimeout(() => setActionResult(prev => prev?.id === 'ocr-test-all' ? null : prev), 5000);
        setActionLoading(null);
      }, [engines]);

      const providerLabels = { openai: 'OpenAI', anthropic: 'Anthropic', gemini: 'Google Gemini', upstage: 'Upstage' };
      const providerColors = { openai: 'green', anthropic: 'yellow', gemini: 'primary', upstage: 'blue' };

      if (loading && !data) {
        return (
          <div className="flex items-center justify-center py-16">
            <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
          </div>
        );
      }

      if (!data) {
        return <EmptyState icon="&#9888;" title="데이터 로드 실패" description="API 사용량 테이블이 생성되지 않았을 수 있습니다." />;
      }

      const totalCost = data.usageByProvider?.reduce((sum, p) => sum + parseFloat(p.total_cost || 0), 0) || 0;
      const totalCalls = data.usageByProvider?.reduce((sum, p) => sum + parseInt(p.call_count || 0), 0) || 0;
      const totalErrors = data.usageByProvider?.reduce((sum, p) => sum + parseInt(p.error_count || 0), 0) || 0;

      const SUB_TABS = [
        { id: 'dashboard', label: '대시보드' },
        { id: 'keys', label: 'API 키' },
        { id: 'usage', label: '사용량' },
        { id: 'llm', label: 'LLM 설정' },
        { id: 'ocr', label: 'OCR 설정' },
      ];

      const ocrStatusBadge = (engine) => {
        if (!engine.is_available) return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-400">미설정</span>;
        if (!engine.is_enabled) return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">비활성</span>;
        return <span className="text-xs px-1.5 py-0.5 rounded bg-green-50 text-green-600">활성</span>;
      };

      return (
        <div className="space-y-4 fade-in">
          {/* 서브 탭 네비게이션 */}
          <div className="flex gap-1 bg-card-bg rounded-lg p-1 border border-border">
            {SUB_TABS.map(tab => (
              <button key={tab.id} onClick={() => setSubTab(tab.id)}
                className={`flex-1 px-2 py-2 rounded-md text-xs font-medium transition-all ${
                  subTab === tab.id
                    ? 'bg-primary text-white shadow-sm'
                    : 'text-text-secondary hover:text-text hover:bg-border/50'
                }`}
              >{tab.label}{tab.id === 'ocr' && engines.filter(e => e.is_available && e.is_enabled).length > 0 ? ` (${engines.filter(e => e.is_available && e.is_enabled).length})` : ''}</button>
            ))}
          </div>

          {/* ════════ 대시보드 탭 ════════ */}
          {subTab === 'dashboard' && (
            <div className="space-y-4">
              {/* 기간 선택 + 새로고침 */}
              <div className="flex gap-2">
                {[{ v: 'today', l: '오늘' }, { v: 'week', l: '7일' }, { v: 'month', l: '30일' }].map(r => (
                  <button key={r.v} onClick={() => setRange(r.v)}
                    className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${
                      range === r.v ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{r.l}</button>
                ))}
                <button onClick={fetchData}
                  className="ml-auto px-3 py-1.5 rounded-full text-xs bg-border text-text-secondary hover:text-text"
                >&#x21BB; 새로고침</button>
              </div>

              {/* 요약 카드 + 전일 비교 */}
              {(() => {
                const today = data.prevComparison?.find(r => r.period === 'today');
                const yesterday = data.prevComparison?.find(r => r.period === 'yesterday');
                const diffBadge = (todayVal, yesterdayVal) => {
                  if (!yesterday || parseInt(yesterdayVal) === 0) return null;
                  const pct = Math.round(((todayVal - yesterdayVal) / yesterdayVal) * 100);
                  if (pct === 0) return null;
                  return <span className={`text-[10px] font-medium ${pct > 0 ? 'text-red-400' : 'text-green-500'}`}>{pct > 0 ? '\u2191' : '\u2193'}{Math.abs(pct)}%</span>;
                };
                return (
                  <div className="grid grid-cols-3 gap-3">
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">총 호출</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className="text-2xl font-bold text-text">{totalCalls.toLocaleString()}</p>
                        {today && yesterday && diffBadge(parseInt(today.call_count), parseInt(yesterday.call_count))}
                      </div>
                    </Card>
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">예상 비용</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className="text-2xl font-bold text-primary">${totalCost.toFixed(4)}</p>
                        {today && yesterday && diffBadge(parseFloat(today.total_cost), parseFloat(yesterday.total_cost))}
                      </div>
                    </Card>
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">에러</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className={`text-2xl font-bold ${totalErrors > 0 ? 'text-red-500' : 'text-green-500'}`}>{totalErrors}</p>
                        {today && yesterday && diffBadge(parseInt(today.error_count), parseInt(yesterday.error_count))}
                      </div>
                    </Card>
                  </div>
                );
              })()}

              {/* 프로바이더별 요약 */}
              <Card>
                <h4 className="text-xs font-bold text-text mb-3">프로바이더별 현황</h4>
                <div className="space-y-3">
                  {data.usageByProvider?.map(p => {
                    const cost = parseFloat(p.total_cost || 0);
                    const calls = parseInt(p.call_count || 0);
                    const errors = parseInt(p.error_count || 0);
                    const maxCalls = Math.max(...(data.usageByProvider?.map(x => parseInt(x.call_count || 0)) || [1]));
                    return (
                      <div key={p.provider}>
                        <div className="flex items-center justify-between mb-1">
                          <div className="flex items-center gap-2">
                            <Badge color={providerColors[p.provider] || 'gray'}>{providerLabels[p.provider] || p.provider}</Badge>
                            <span className="text-xs text-text">{calls}회</span>
                            {errors > 0 && <span className="text-xs text-red-500">({errors} 에러)</span>}
                          </div>
                          <span className="text-xs text-primary font-medium">${cost.toFixed(4)}</span>
                        </div>
                        <div className="w-full bg-border rounded-full h-1.5">
                          <div className="h-1.5 rounded-full bg-primary/70 transition-all" style={{ width: `${maxCalls > 0 ? (calls / maxCalls) * 100 : 0}%` }} />
                        </div>
                      </div>
                    );
                  })}
                  {(!data.usageByProvider || data.usageByProvider.length === 0) && (
                    <p className="text-xs text-text-secondary text-center py-4">선택한 기간에 사용 기록이 없습니다.</p>
                  )}
                </div>
              </Card>

              {/* 일별 추이 (최근 7일) */}
              {data.dailyTrend?.length > 0 && (() => {
                // 날짜별로 그룹핑
                const byDate = {};
                data.dailyTrend.forEach(d => {
                  const date = d.date?.slice(0, 10) || d.date;
                  if (!byDate[date]) byDate[date] = { calls: 0, cost: 0, providers: {} };
                  byDate[date].calls += parseInt(d.call_count);
                  byDate[date].cost += parseFloat(d.total_cost || 0);
                  byDate[date].providers[d.provider] = (byDate[date].providers[d.provider] || 0) + parseInt(d.call_count);
                });
                const dates = Object.keys(byDate).sort();
                const maxCalls = Math.max(...dates.map(d => byDate[d].calls), 1);
                const pColors = { openai: '#22c55e', anthropic: '#eab308', gemini: '#3b82f6', upstage: '#60a5fa' };
                return (
                  <Card>
                    <h4 className="text-xs font-bold text-text mb-3">일별 추이 (최근 7일)</h4>
                    <div className="space-y-2">
                      {dates.map(date => {
                        const d = byDate[date];
                        const pct = (d.calls / maxCalls) * 100;
                        const pList = Object.entries(d.providers);
                        return (
                          <div key={date} className="flex items-center gap-2 text-xs">
                            <span className="w-10 text-text-secondary text-[10px] shrink-0">{date.slice(5)}</span>
                            <div className="flex-1 h-4 bg-border/50 rounded overflow-hidden flex">
                              {pList.map(([prov, cnt]) => (
                                <div key={prov} style={{ width: `${(cnt / maxCalls) * 100}%`, backgroundColor: pColors[prov] || '#9ca3af' }}
                                  className="h-full transition-all" title={`${providerLabels[prov] || prov}: ${cnt}회`} />
                              ))}
                            </div>
                            <span className="w-8 text-right text-text shrink-0">{d.calls}</span>
                            <span className="w-14 text-right text-primary text-[10px] shrink-0">${d.cost.toFixed(3)}</span>
                          </div>
                        );
                      })}
                    </div>
                    <div className="flex gap-3 mt-2 pt-2 border-t border-border/50">
                      {Object.entries(pColors).filter(([p]) => data.dailyTrend.some(d => d.provider === p)).map(([p, c]) => (
                        <div key={p} className="flex items-center gap-1 text-[10px] text-text-secondary">
                          <span className="w-2.5 h-2.5 rounded-sm inline-block" style={{ backgroundColor: c }} />
                          {providerLabels[p] || p}
                        </div>
                      ))}
                    </div>
                  </Card>
                );
              })()}

              {/* 최근 에러 (있을 때만) */}
              {data.recentErrors?.length > 0 && (
                <div>
                  <h4 className="text-xs font-bold text-text mb-2">최근 에러 ({data.recentErrors.length}건)</h4>
