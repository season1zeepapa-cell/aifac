    // ========================================
    // AI 채팅 탭 (멀티턴 RAG 대화)
    // ========================================
    function ChatTab({ onNavigateToDoc }) {
      const [chatMessages, setChatMessages] = useState([]);
      // 각 메시지: { role: 'user'|'assistant', content, sources?, provider? }
      const [inputText, setInputText] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      // LLM 프로바이더
      const [llmProvider, setLlmProvider] = useState('gemini');
      const [llmProviders, setLlmProviders] = useState([]);
      // 문서 범위 필터 (복수 선택)
      const [filterDocIds, setFilterDocIds] = useState([]);
      const [docList, setDocList] = useState([]);
      const [showSettings, setShowSettings] = useState(false);
      // 쿼리 강화 옵션
      const [useQueryRewrite, setUseQueryRewrite] = useState(true);
      const [useHyDE, setUseHyDE] = useState(true);
      const [useMorpheme, setUseMorpheme] = useState(false);
      const [useToolRouter, setUseToolRouter] = useState(false); // Tool Use (에이전틱 RAG)
      const [useVerify, setUseVerify] = useState(false); // Corrective RAG (검증+재검색)
      const [enhancementInfo, setEnhancementInfo] = useState(null);
      // 답변 가이드: 주제, 관점, 답변형식
      const [chatGuide, setChatGuide] = useState({ topic: '', perspective: '', format: '' });
      const [showGuide, setShowGuide] = useState(false);
      // Few-shot: 유사 과거 Q&A 제안 + 선택
      const [fewShotSuggestions, setFewShotSuggestions] = useState([]);
      const [selectedFewShots, setSelectedFewShots] = useState([]); // 사용자가 선택한 few-shot ID
      const [showFewShot, setShowFewShot] = useState(false);
      const fewShotTimer = useRef(null);
      // 근거자료 접기/펼치기 (메시지 인덱스별)
      const [expandedSources, setExpandedSources] = useState({});
      // F17: 대화 히스토리
      const [sessionId, setSessionId] = useState(null);
      const [sessions, setSessions] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      const chatEndRef = useRef(null);
      const inputRef = useRef(null);

      // 초기 데이터 로드
      useEffect(() => {
        authFetch(`${API_BASE_URL}/documents`)
          .then(r => r.json())
          .then(data => setDocList(Array.isArray(data) ? data : data.documents || []))
          .catch(() => {});
        authFetch(`${API_BASE_URL}/api-usage?type=llm`)
          .then(r => r.json())
          .then(data => { if (data.providers) setLlmProviders(data.providers); })
          .catch(() => {});
        // 대화 히스토리 목록 로드
        authFetch(`${API_BASE_URL}/chat-sessions`)
          .then(r => r.json())
          .then(data => { if (data.sessions) setSessions(data.sessions); })
          .catch(() => {});
      }, []);

      // Few-shot: 입력 변경 시 유사 질문 검색 (debounce 800ms)
      useEffect(() => {
        if (fewShotTimer.current) clearTimeout(fewShotTimer.current);
        if (!inputText || inputText.trim().length < 4) {
          setFewShotSuggestions([]);
          return;
        }
        fewShotTimer.current = setTimeout(async () => {
          try {
            const res = await authFetch(`${API_BASE_URL}/few-shot?q=${encodeURIComponent(inputText.trim())}&max=3`);
            const data = await res.json();
            if (data.similar && data.similar.length > 0) {
              setFewShotSuggestions(data.similar);
              setShowFewShot(true); // 자동으로 펼치기
            } else {
              setFewShotSuggestions([]);
            }
          } catch { setFewShotSuggestions([]); }
        }, 800);
        return () => { if (fewShotTimer.current) clearTimeout(fewShotTimer.current); };
      }, [inputText]);

      // 새 메시지 시 하단 자동 스크롤
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatMessages, loading]);

      // SSE 스트리밍 파서: fetch 응답에서 SSE 이벤트를 추출
      const parseSSE = useCallback(async function* (response) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try { yield JSON.parse(line.slice(6)); } catch {}
          }
        }
      }, []);

      // 메시지 전송 (SSE 스트리밍)
      const handleSend = useCallback(async () => {
        const text = inputText.trim();
        if (!text || loading) return;

        const userMsg = { role: 'user', content: text };
        setChatMessages(prev => [...prev, userMsg]);
        setInputText('');
        setLoading(true);
        setError(null);
        // 전송 후 few-shot 제안 초기화
        setFewShotSuggestions([]);
        setSelectedFewShots([]);

        try {
          // history: 이전 메시지에서 content만 추출 (sources 제외)
          const history = chatMessages.map(m => ({ role: m.role, content: m.content }));
          // llmSettings에서 현재 프로바이더 설정을 가져와 전달
          const providerSettings = llmSettings[llmProvider] || {};
          setEnhancementInfo(null);
          // 답변 가이드가 설정되어 있으면 질문에 지시문 추가
          let questionWithGuide = text;
          const guideLines = [];
          if (chatGuide.topic) guideLines.push(`[주제] ${chatGuide.topic}`);
          if (chatGuide.perspective) guideLines.push(`[관점] ${chatGuide.perspective}`);
          if (chatGuide.format) guideLines.push(`[답변형식] ${chatGuide.format}`);
          if (guideLines.length > 0) {
            questionWithGuide = `${guideLines.join(' | ')}\n\n${text}`;
          }

          // 선택된 few-shot 예시 준비
          const activeFewShots = selectedFewShots.length > 0
            ? fewShotSuggestions.filter(s => selectedFewShots.includes(s.id))
            : null;

          const body = {
            question: questionWithGuide, topK: 5, provider: llmProvider, history,
            stream: true,
            useQueryRewrite, useHyDE, useMorpheme,
            useToolRouter, useVerify,
            llmOptions: {
              model: providerSettings.model,
              temperature: providerSettings.temperature,
              maxTokens: providerSettings.maxTokens,
              ...(llmProvider === 'gemini' && providerSettings.thinkingBudget ? { thinkingBudget: providerSettings.thinkingBudget } : {}),
              ...(llmProvider === 'gemini' && providerSettings.thinkingLevel ? { thinkingLevel: providerSettings.thinkingLevel } : {}),
              ...(llmProvider === 'openai' && providerSettings.reasoningEffort ? { reasoningEffort: providerSettings.reasoningEffort } : {}),
            },
            ...(activeFewShots ? { userFewShots: activeFewShots } : {}),
          };
          if (filterDocIds.length > 0) body.docIds = filterDocIds.map(id => parseInt(id, 10));

          const res = await authFetch(`${API_BASE_URL}/rag`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });

          if (!res.ok) {
            const errText = await res.text().catch(() => '');
            let errMsg = `질의 실패 (${res.status})`;
            try { errMsg = JSON.parse(errText).error || errMsg; } catch { errMsg = errText || errMsg; }
            throw new Error(errMsg);
          }
          // Content-Type 확인: SSE가 아닌 경우 (Vercel 에러 페이지 등)
          const contentType = res.headers.get('content-type') || '';
          if (!contentType.includes('text/event-stream')) {
            const body = await res.text().catch(() => '');
            throw new Error(`서버가 SSE가 아닌 응답을 반환했습니다 (${contentType}): ${body.substring(0, 200)}`);
          }

          // SSE 스트리밍 응답 처리
          let streamSources = [];
          let streamProvider = llmProvider;
          let streamHops = 1;
          let streamCrossRefs = [];
          let accumulated = '';
          const debugMessages = [];

          // 스트리밍 중인 assistant 메시지를 먼저 추가
          const placeholderMsg = {
            role: 'assistant', content: '', sources: [],
            provider: llmProvider, hops: 1, crossRefs: [],
          };
          setChatMessages(prev => [...prev, placeholderMsg]);

          for await (const event of parseSSE(res)) {
            if (event.type === 'tools') {
              // Tool Use: 선택된 도구 정보 수신
              setChatMessages(prev => {
                const updated = [...prev];
                const last = { ...updated[updated.length - 1] };
                last.selectedTools = event.selectedTools;
                updated[updated.length - 1] = last;
                return updated;
              });
            } else if (event.type === 'corrective') {
              // Corrective RAG: 재검색 알림
              setChatMessages(prev => {
                const updated = [...prev];
                const last = { ...updated[updated.length - 1] };
                last.corrective = event;
                if (event.action === 'retry') {
                  last.content += `\n\n> 답변 품질 부족 (${event.score}/10) — "${event.retryQuery}"로 재검색 중... (${event.attempt}/2)\n\n`;
                }
                updated[updated.length - 1] = last;
                return updated;
              });
            } else if (event.type === 'enhancement') {
              // 쿼리 강화 과정 실시간 수신
              setEnhancementInfo(prev => ({ ...prev, [event.data?.type || event.type]: event.data || event }));
            } else if (event.type === 'sources') {
              // 검색 결과 수신
              streamSources = event.sources || [];
              streamProvider = event.provider || llmProvider;
              streamHops = event.hops || 1;
              streamCrossRefs = event.crossRefs || [];
              const streamKnowledgeGraph = event.knowledgeGraph || null;
              const streamEnhancement = event.enhancement || {};
              if (event.enhancement) setEnhancementInfo(prev => ({ ...prev, ...event.enhancement }));
              // sources 정보 업데이트
              setChatMessages(prev => {
                const updated = [...prev];
                const last = { ...updated[updated.length - 1] };
                last.sources = streamSources;
                last.provider = streamProvider;
                last.hops = streamHops;
                last.crossRefs = streamCrossRefs;
                last.knowledgeGraph = streamKnowledgeGraph;
                last.enhancement = streamEnhancement;
                updated[updated.length - 1] = last;
                return updated;
              });
            } else if (event.type === 'token') {
              // 토큰 도착 → 마지막 assistant 메시지에 추가
              accumulated += event.token;
              const currentText = accumulated;
              setChatMessages(prev => {
                const updated = [...prev];
                const last = { ...updated[updated.length - 1] };
                last.content = currentText;
                updated[updated.length - 1] = last;
                return updated;
              });
            } else if (event.type === 'parsed') {
              // 스트리밍 완료 후 구조화 파싱 결과 수신
              setChatMessages(prev => {
                const updated = [...prev];
                const last = { ...updated[updated.length - 1] };
                last.parsed = event.parsed;
                updated[updated.length - 1] = last;
                return updated;
              });
            } else if (event.type === 'stage') {
              // 상태 그래프 노드 진행 이벤트
              const stageMsg = `[${event.node}] ${event.status}${event.error ? ': ' + event.error : ''}`;
              console.log('[RAG Graph]', stageMsg);
              debugMessages.push(stageMsg);
            } else if (event.type === 'debug') {
              // 서버 디버깅 메시지 → 콘솔에 표시
              console.log('[RAG Debug]', event.message);
              debugMessages.push(event.message);
            } else if (event.type === 'error') {
              throw new Error(event.error || '스트리밍 오류');
            }
            // type === 'done' → 루프 종료
          }
          // 스트림이 끝났는데 토큰이 하나도 없으면 에러 표시
          if (!accumulated) {
            const debugInfo = debugMessages.length > 0 ? '\n[디버그] ' + debugMessages.join(' → ') : '';
            setError('답변이 생성되지 않았습니다.' + debugInfo);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
          setTimeout(() => inputRef.current?.focus(), 100);
        }
      }, [inputText, loading, chatMessages, llmProvider, filterDocIds, parseSSE, chatGuide]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      }, [handleSend]);

      // 새 대화
      const handleNewChat = useCallback(() => {
        setChatMessages([]);
        setSessionId(null);
        setError(null);
        setExpandedSources({});
        inputRef.current?.focus();
      }, []);

      // F17: 대화 저장
      const handleSaveChat = useCallback(async () => {
        if (chatMessages.length === 0) return;
        try {
          const resp = await authFetch(`${API_BASE_URL}/chat-sessions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              id: sessionId, messages: chatMessages, provider: llmProvider,
              docIds: filterDocIds.map(id => parseInt(id, 10)),
            }),
          });
          const data = await resp.json();
          if (data.success) {
            setSessionId(data.id);
            // 세션 목록 갱신
            const listResp = await authFetch(`${API_BASE_URL}/chat-sessions`);
            const listData = await listResp.json();
            if (listData.sessions) setSessions(listData.sessions);
          }
        } catch (e) { console.warn('대화 저장 실패:', e.message); }
      }, [chatMessages, sessionId, llmProvider, filterDocIds]);

      // F17: 대화 불러오기
      const handleLoadChat = useCallback(async (sid) => {
        try {
          const resp = await authFetch(`${API_BASE_URL}/chat-sessions?id=${sid}`);
          const data = await resp.json();
          if (data.messages) {
            setChatMessages(data.messages);
            setSessionId(data.id);
            setLlmProvider(data.provider || 'gemini');
            if (data.doc_ids?.length > 0) setFilterDocIds(data.doc_ids.map(String));
            setShowHistory(false);
            setExpandedSources({});
          }
        } catch (e) { console.warn('대화 로드 실패:', e.message); }
      }, []);

      // F17: 대화 삭제
      const handleDeleteSession = useCallback(async (sid, e) => {
        e.stopPropagation();
        if (!confirm('이 대화를 삭제하시겠습니까?')) return;
        try {
          await authFetch(`${API_BASE_URL}/chat-sessions?id=${sid}`, { method: 'DELETE' });
          setSessions(prev => prev.filter(s => s.id !== sid));
          if (sessionId === sid) { setSessionId(null); setChatMessages([]); }
        } catch (e) { console.warn('대화 삭제 실패:', e.message); }
      }, [sessionId]);

      // 근거자료 토글
      const toggleSources = useCallback((idx) => {
        setExpandedSources(prev => ({ ...prev, [idx]: !prev[idx] }));
      }, []);

      // 프로바이더 색상
      const providerColor = (id) => id === 'gemini' ? 'blue' : id === 'openai' ? 'green' : 'orange';
      const providerName = (id) => id === 'gemini' ? 'Gemini' : id === 'openai' ? 'OpenAI' : 'Claude';

      const { isApiDisabled } = React.useContext(ApiKeyStatusContext);
      const chatLlmDisabled = isApiDisabled(llmProvider);
      const chatEmbedDisabled = isApiDisabled('openai');

      return (
        <div className="flex flex-col fade-in" style={{ height: 'calc(100vh - 130px)' }}>
          <DisabledApiBanner providers={[llmProvider, 'openai']} featureName="AI 채팅" />
          {/* 상단 바: 새 대화 + 설정 */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <h2 className="text-base font-bold text-text">AI 채팅</h2>
              {chatMessages.length > 0 && (
                <span className="text-xs text-text-secondary">{Math.floor(chatMessages.length / 2)}회 대화</span>
              )}
            </div>
            <div className="flex items-center gap-1.5">
              <button
                onClick={() => setShowHistory(!showHistory)}
                className={`text-xs border rounded-lg px-2.5 py-1.5 transition-colors ${
                  showHistory ? 'text-primary border-primary bg-primary/5' : 'text-text-secondary hover:text-text border-border'
                }`}
              >
                기록 {sessions.length > 0 ? `(${sessions.length})` : ''}
              </button>
              {chatMessages.length > 0 && (
                <button
                  onClick={handleSaveChat}
                  className="text-xs text-green-600 hover:text-green-700 border border-green-200 rounded-lg px-2.5 py-1.5 transition-colors hover:bg-green-50"
                >
                  {sessionId ? '저장' : '새로 저장'}
                </button>
              )}
              <button
                onClick={() => setShowSettings(!showSettings)}
                className="text-xs text-text-secondary hover:text-text border border-border rounded-lg px-2.5 py-1.5 transition-colors"
              >
                설정
              </button>
              <button
                onClick={handleNewChat}
                className="text-xs text-primary hover:text-primary-hover border border-primary/30 rounded-lg px-2.5 py-1.5 transition-colors hover:bg-primary/5"
              >
                새 대화
              </button>
            </div>
          </div>

          {/* 대화 히스토리 패널 */}
          {showHistory && (
            <Card className="mb-3">
              <div className="space-y-1 max-h-48 overflow-y-auto">
                {sessions.length === 0 ? (
                  <p className="text-xs text-text-secondary text-center py-3">저장된 대화가 없습니다.</p>
                ) : sessions.map(s => (
                  <div
                    key={s.id}
                    onClick={() => handleLoadChat(s.id)}
                    className={`flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors ${
                      sessionId === s.id ? 'bg-primary/10 border border-primary/30' : 'hover:bg-card-bg-hover'
                    }`}
                  >
                    <div className="flex-1 min-w-0">
                      <p className="text-sm text-text truncate">{s.title}</p>
                      <p className="text-[10px] text-text-secondary">{s.message_count}개 메시지 · {new Date(s.updated_at).toLocaleDateString('ko-KR')}</p>
                    </div>
                    <button

                    )}
                    <button onClick={() => { setFewShotSuggestions([]); setSelectedFewShots([]); }}
                      className="text-[10px] text-text-secondary hover:text-red-400 transition-colors">닫기</button>
                  </div>
                </div>

                {/* 접혀 있을 때: 선택된 항목만 뱃지로 표시 */}
                {!showFewShot && selectedFewShots.length > 0 && (
                  <div className="flex gap-1 flex-wrap">
                    {fewShotSuggestions.filter(s => selectedFewShots.includes(s.id)).map(s => (
                      <span key={s.id} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-amber-500/20 text-amber-300">
                        {s.question.length > 25 ? s.question.substring(0, 25) + '...' : s.question}
                        <button onClick={(e) => { e.stopPropagation(); setSelectedFewShots(prev => prev.filter(id => id !== s.id)); }}
                          className="hover:text-red-400 transition-colors ml-0.5">x</button>
                      </span>
                    ))}
                  </div>
                )}

                {/* 펼쳤을 때: 체크박스 리스트 */}
                {showFewShot && (
                  <div className="space-y-1.5 max-h-40 overflow-y-auto">
                    {fewShotSuggestions.map((s, i) => {
                      const isSelected = selectedFewShots.includes(s.id);
                      return (
                        <div key={s.id || i}
                          className={`flex items-start gap-2 p-2 rounded-lg cursor-pointer transition-colors ${
                            isSelected ? 'bg-amber-500/15 border border-amber-500/30' : 'bg-background/50 border border-transparent hover:bg-amber-500/5'
                          }`}
                          onClick={() => {
                            setSelectedFewShots(prev =>
                              isSelected ? prev.filter(id => id !== s.id) : [...prev, s.id]
                            );
                          }}>
                          {/* 체크박스 */}
                          <div className={`flex-shrink-0 w-4 h-4 mt-0.5 rounded border-2 flex items-center justify-center transition-colors ${
                            isSelected ? 'bg-amber-500 border-amber-500' : 'border-text-secondary/30'
                          }`}>
                            {isSelected && (
                              <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                              </svg>
                            )}
                          </div>
                          {/* 내용 */}
                          <div className="flex-1 min-w-0">
                            <div className="text-xs text-text">{s.question}</div>
                            {s.conclusion && (
                              <div className="text-[10px] text-text-secondary mt-0.5 line-clamp-2">{s.conclusion}</div>
                            )}
                            <div className="flex items-center gap-2 mt-0.5">
                              <span className="text-[9px] text-amber-500/70">유사도 {(s.score * 100).toFixed(0)}%</span>
                              {s.category && s.category !== 'default' && (
                                <span className="text-[9px] px-1 py-0.5 rounded bg-border/50 text-text-secondary">{s.category}</span>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                    <p className="text-[9px] text-text-secondary/50 text-center pt-1">
                      선택한 예시가 AI 답변의 참고자료로 포함됩니다
                    </p>
                  </div>
                )}
              </div>
            )}
            <div className="flex gap-2 items-end">
              <div className="flex-1 relative">
                <textarea
                  ref={inputRef}
                  value={inputText}
                  onChange={e => setInputText(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="질문을 입력하세요..."
                  rows={1}
                  className="w-full px-4 py-2.5 bg-bg border border-border rounded-xl text-text text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none"
                  style={{ minHeight: '42px', maxHeight: '120px' }}
                  onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
                />
              </div>
              {/* 가이드 토글 버튼 */}
              <button
                onClick={() => setShowGuide(v => !v)}
                className={`flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center transition-colors ${
                  showGuide || chatGuide.topic || chatGuide.perspective || chatGuide.format
                    ? 'bg-primary/20 text-primary border border-primary/30'
                    : 'bg-border/50 text-text-secondary hover:text-text border border-border'
                }`}
                title="답변 가이드 (주제/관점/형식)"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
              </button>
              <button
                onClick={handleSend}
                disabled={loading || !inputText.trim() || chatLlmDisabled || chatEmbedDisabled}
                title={chatLlmDisabled ? `${llmProvider} API 비활성` : chatEmbedDisabled ? 'OpenAI(임베딩) API 비활성' : ''}
                className="flex-shrink-0 w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center hover:bg-primary-hover disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19V5m0 0l-7 7m7-7l7 7" />
                </svg>
              </button>
            </div>
            <div className="flex items-center justify-between mt-1.5">
              <span className="text-[10px] text-text-secondary">
                {providerName(llmProvider)} ({llmSettings[llmProvider]?.model || '기본'}) {filterDocIds.length > 0 ? `| ${filterDocIds.length}개 문서 선택` : '| 전체 문서'}
              </span>
              <span className="text-[10px] text-text-secondary">Shift+Enter로 줄바꿈</span>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 카테고리 관리 패널
    // ========================================
    // ========================================
    // 카테고리별 분할 프리셋 관리 패널
    // ========================================
    function ChunkPresetPanel() {
      const { categories } = React.useContext(CategoriesContext);
      const [presets, setPresets] = useState({});
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [message, setMessage] = useState(null);

      const STRATEGY_OPTIONS = [
        { value: 'sentence', label: '문장 단위' },
        { value: 'recursive', label: '재귀적 분할' },
        { value: 'law-article', label: '법령 조문' },
        { value: 'markdown', label: 'Markdown 헤딩' },
        { value: 'semantic', label: '의미 분할 (임베딩)' },
        { value: 'semantic-llm', label: 'AI 의미 분할 (LLM)' },
      ];

      // 기본 프리셋
      const DEFAULT_PRESETS = {
        '법령':   { strategy: 'law-article', chunkSize: 800, overlap: 0 },
        '규정':   { strategy: 'law-article', chunkSize: 800, overlap: 0 },
        '기출':   { strategy: 'sentence',    chunkSize: 400, overlap: 50 },
        '크롤링': { strategy: 'recursive',   chunkSize: 600, overlap: 100 },
        '기타':   { strategy: 'recursive',   chunkSize: 500, overlap: 100 },
      };

      // 서버에서 저장된 프리셋 로드
      const fetchPresets = useCallback(async () => {
        try {
          const res = await authFetch(`${API_BASE_URL}/settings?key=chunk_presets`);
          const data = await res.json();
          const saved = data.value || {};
          // 각 카테고리별로 저장된 값 또는 기본값 사용
          const merged = {};
          for (const cat of categories) {
            merged[cat.value] = saved[cat.value] || DEFAULT_PRESETS[cat.value] || { strategy: 'recursive', chunkSize: 500, overlap: 100 };
          }
          setPresets(merged);
          // 전역 변수에도 저장 (UploadTab에서 참조)
          window.__chunkPresets = merged;
        } catch (err) {
          console.error('[분할 프리셋]', err);
        } finally {
          setLoading(false);
        }
      }, [categories]);

      useEffect(() => { fetchPresets(); }, [fetchPresets]);

      // 개별 카테고리 프리셋 변경
      const updatePreset = (catValue, field, value) => {
        setPresets(prev => ({
          ...prev,
          [catValue]: { ...prev[catValue], [field]: value },
        }));
      };

      // 전체 저장
      const handleSave = async () => {
        setSaving(true);
        setMessage(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/settings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: 'chunk_presets', value: presets }),
          });
          if (!res.ok) throw new Error('저장 실패');
          window.__chunkPresets = presets;
          setMessage({ type: 'success', text: '분할 설정이 저장되었습니다.' });
        } catch (err) {
          setMessage({ type: 'error', text: err.message });
        } finally {
          setSaving(false);
          setTimeout(() => setMessage(null), 3000);
        }
      };

      if (loading) return <div className="text-center py-8 text-text-secondary text-sm">로딩 중...</div>;

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <div>
              <h3 className="text-sm font-bold text-text">카테고리별 기본 분할 설정</h3>
              <p className="text-xs text-text-secondary mt-0.5">업로드 시 카테고리를 선택하면 이 설정이 자동 적용됩니다</p>
            </div>
            <button onClick={handleSave} disabled={saving}
              className="px-4 py-2 rounded-lg text-xs font-medium bg-primary text-white hover:bg-primary/90 disabled:opacity-50 transition-colors">
              {saving ? '저장 중...' : '전체 저장'}
            </button>
          </div>

          {message && (
            <div className={`text-xs px-3 py-2 rounded-lg ${message.type === 'success' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-500'}`}>
              {message.text}
            </div>
          )}

          <div className="space-y-3">
            {categories.map(cat => {
              const preset = presets[cat.value] || {};
              return (
                <Card key={cat.value} className="border-border">
                  <div className="space-y-2">
                    <div className="flex items-center justify-between">
                      <span className="text-sm font-medium text-text">{cat.label}</span>
                      <span className="text-[10px] text-text-secondary bg-border px-2 py-0.5 rounded-full">
                        {preset.strategy || 'recursive'} / {preset.chunkSize || 500}자 / 겹침 {preset.overlap ?? 100}자
                      </span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <div>
                        <label className="block text-[10px] text-text-secondary mb-0.5">전략</label>
                        <select value={preset.strategy || 'recursive'}
                          onChange={e => updatePreset(cat.value, 'strategy', e.target.value)}
                          className="w-full text-xs px-2 py-1.5 rounded-lg border border-border bg-bg text-text">
                          {STRATEGY_OPTIONS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] text-text-secondary mb-0.5">청크 크기</label>
                        <input type="number" min="200" max="2000" step="50"
                          value={preset.chunkSize || 500}
                          onChange={e => updatePreset(cat.value, 'chunkSize', parseInt(e.target.value) || 500)}
                          className="w-full text-xs px-2 py-1.5 rounded-lg border border-border bg-bg text-text" />
                      </div>
                      <div>
                        <label className="block text-[10px] text-text-secondary mb-0.5">겹침</label>
                        <input type="number" min="0" max="500" step="25"
                          value={preset.overlap ?? 100}
                          onChange={e => updatePreset(cat.value, 'overlap', parseInt(e.target.value) || 0)}
                          className="w-full text-xs px-2 py-1.5 rounded-lg border border-border bg-bg text-text" />
                      </div>
                    </div>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    function CategoryPanel() {
      const { categories, reload } = React.useContext(CategoriesContext);
      const [items, setItems] = useState([]);
      const [newValue, setNewValue] = useState('');
      const [newLabel, setNewLabel] = useState('');
      const [editIdx, setEditIdx] = useState(-1);
      const [editValue, setEditValue] = useState('');
      const [editLabel, setEditLabel] = useState('');
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState('');

      // 카테고리 로드 시 로컬 상태 동기화
      useEffect(() => { setItems(categories.map(c => ({ ...c }))); }, [categories]);

      // 서버에 저장
      const saveToServer = useCallback(async (newItems) => {
        setSaving(true);
        setMsg('');
        try {
          const res = await authFetch(`${API_BASE_URL}/settings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: 'categories', value: newItems }),
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || '저장 실패');
          }
          await reload();
          setMsg('저장 완료');
          setTimeout(() => setMsg(''), 2000);
        } catch (err) {
          setMsg(`오류: ${err.message}`);
        } finally {
          setSaving(false);
        }
      }, [reload]);

      // 추가
      const handleAdd = useCallback(() => {
        const v = newValue.trim();
        const l = newLabel.trim() || v;
        if (!v) return;
        if (items.some(c => c.value === v)) { setMsg('이미 존재하는 카테고리입니다.'); return; }
        const next = [...items, { value: v, label: l }];
        setItems(next);
        setNewValue('');
        setNewLabel('');
        saveToServer(next);
      }, [items, newValue, newLabel, saveToServer]);

      // 삭제
      const handleDelete = useCallback((idx) => {
        const next = items.filter((_, i) => i !== idx);
        setItems(next);
        saveToServer(next);
      }, [items, saveToServer]);

      // 수정 시작
      const startEdit = useCallback((idx) => {
        setEditIdx(idx);
        setEditValue(items[idx].value);
        setEditLabel(items[idx].label);
      }, [items]);

      // 수정 저장
      const handleEditSave = useCallback(() => {
        const v = editValue.trim();
        const l = editLabel.trim() || v;
        if (!v) return;
        const next = items.map((c, i) => i === editIdx ? { value: v, label: l } : c);
        setItems(next);
        setEditIdx(-1);
        saveToServer(next);
      }, [items, editIdx, editValue, editLabel, saveToServer]);

      // 순서 변경 (위/아래)
      const handleMove = useCallback((idx, dir) => {
        const next = [...items];
        const target = idx + dir;
        if (target < 0 || target >= next.length) return;
        [next[idx], next[target]] = [next[target], next[idx]];
        setItems(next);
        saveToServer(next);
      }, [items, saveToServer]);

      return (
        <div className="space-y-4">
          <Card>
            <h3 className="text-base font-bold text-text mb-3">카테고리 관리</h3>
            <p className="text-xs text-text-secondary mb-4">문서 업로드 및 필터에 사용되는 카테고리를 관리합니다.</p>

            {/* 카테고리 목록 */}
            <div className="space-y-2 mb-4">
              {items.map((cat, idx) => (
                <div key={idx} className="flex items-center gap-2 p-2 bg-bg rounded-lg border border-border">
                  {editIdx === idx ? (
                    <>
                      <input value={editValue} onChange={e => setEditValue(e.target.value)}
                        className="flex-1 px-2 py-1 text-sm bg-card-bg border border-primary rounded focus:outline-none text-text"
                        placeholder="값" />
                      <input value={editLabel} onChange={e => setEditLabel(e.target.value)}
                        className="flex-1 px-2 py-1 text-sm bg-card-bg border border-primary rounded focus:outline-none text-text"
                        placeholder="표시명" />
                      <button onClick={handleEditSave} className="px-2 py-1 text-xs bg-primary text-white rounded hover:opacity-80">저장</button>
                      <button onClick={() => setEditIdx(-1)} className="px-2 py-1 text-xs bg-gray-200 text-gray-600 rounded hover:opacity-80">취소</button>
                    </>
                  ) : (
                    <>
                      <span className="flex-1 text-sm font-medium text-text">{cat.label}</span>
                      <span className="text-xs text-text-secondary bg-card-bg px-1.5 py-0.5 rounded">{cat.value}</span>
                      <div className="flex gap-1">
                        <button onClick={() => handleMove(idx, -1)} disabled={idx === 0}
                          className="w-6 h-6 text-xs rounded hover:bg-border disabled:opacity-30"
                          title="위로">&#9650;</button>
                        <button onClick={() => handleMove(idx, 1)} disabled={idx === items.length - 1}
                          className="w-6 h-6 text-xs rounded hover:bg-border disabled:opacity-30"
                          title="아래로">&#9660;</button>
                        <button onClick={() => startEdit(idx)}
                          className="w-6 h-6 text-xs rounded hover:bg-blue-50 text-blue-500"
                          title="수정">&#9998;</button>
                        <button onClick={() => handleDelete(idx)}
                          className="w-6 h-6 text-xs rounded hover:bg-red-50 text-red-500"
                          title="삭제">&#10005;</button>
                      </div>
                    </>
                  )}
                </div>
              ))}
              {items.length === 0 && (
                <p className="text-sm text-text-secondary text-center py-4">등록된 카테고리가 없습니다.</p>
              )}
            </div>

            {/* 새 카테고리 추가 */}
            <div className="flex gap-2 items-end">
              <div className="flex-1">
                <label className="block text-xs text-text-secondary mb-1">카테고리명</label>
                <input value={newValue} onChange={e => { setNewValue(e.target.value); if (!newLabel) setNewLabel(''); }}
                  onKeyDown={e => e.key === 'Enter' && handleAdd()}
                  className="w-full px-3 py-2 text-sm bg-card-bg border border-border rounded-lg focus:outline-none focus:ring-1 focus:ring-primary text-text"
                  placeholder="예: 매뉴얼" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-text-secondary mb-1">표시명 (선택)</label>
                <input value={newLabel} onChange={e => setNewLabel(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleAdd()}
                  className="w-full px-3 py-2 text-sm bg-card-bg border border-border rounded-lg focus:outline-none focus:ring-1 focus:ring-primary text-text"
                  placeholder="비워두면 카테고리명과 동일" />
              </div>
              <button onClick={handleAdd} disabled={saving || !newValue.trim()}
                className="px-4 py-2 text-sm bg-primary text-white rounded-lg hover:opacity-90 disabled:opacity-50 whitespace-nowrap">
                추가
              </button>
            </div>

            {/* 상태 메시지 */}
            {msg && (
              <p className={`text-xs mt-2 ${msg.startsWith('오류') ? 'text-red-500' : 'text-green-600'}`}>{msg}</p>
            )}
          </Card>

          {/* 안내 */}
          <Card>
            <h4 className="text-sm font-bold text-text mb-2">안내</h4>
            <ul className="text-xs text-text-secondary space-y-1">
              <li>* 카테고리를 삭제해도 기존 문서의 카테고리 값은 유지됩니다.</li>
              <li>* 카테고리 값(value)을 수정하면 기존 문서에는 반영되지 않습니다.</li>
              <li>* 순서를 변경하면 업로드/필터 드롭다운에 반영됩니다.</li>
            </ul>
          </Card>
        </div>
      );
    }

    // ========================================
    // 설정 탭 (API 키, LLM, 임베딩, OCR, 카테고리, 비식별화)
    // ========================================
    function SettingsTab() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [subTab, setSubTab] = useState('keys');
      const [actionLoading, setActionLoading] = useState(null);
      const [actionResult, setActionResult] = useState(null);
      const [editingLimit, setEditingLimit] = useState(null);
      // 드래그 앤 드롭
      const [dragIndex, setDragIndex] = useState(null);
      const [dragOverIndex, setDragOverIndex] = useState(null);
      // OCR 상태
      const [engines, setEngines] = useState([]);
      const [ocrLoading, setOcrLoading] = useState(true);

      const fetchData = useCallback(async () => {
        setLoading(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?range=today`);
          if (!res.ok) throw new Error('데이터 로드 실패');
          setData(await res.json());
        } catch (err) {
          console.error(err);
        } finally {
          setLoading(false);
        }
      }, []);

      const fetchEngines = useCallback(async () => {
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?type=ocr`);
          if (res.ok) {
            const d = await res.json();
            setEngines(d.engines || []);
          }
        } catch (err) {
          console.error('[OCR]', err);
        } finally {
          setOcrLoading(false);
        }
      }, []);

      useEffect(() => { fetchData(); fetchEngines(); }, [fetchData, fetchEngines]);

      // ── API 키 액션 ──
      const handleTestKey = useCallback(async (provider) => {
        setActionLoading(`test-${provider}`);
        setActionResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'testKey', provider }),
          });
          const result = await res.json();
          setActionResult({ id: `key-${provider}`, success: result.success, message: result.message });
          fetchData();
          setTimeout(() => setActionResult(prev => prev?.id === `key-${provider}` ? null : prev), 5000);
        } finally { setActionLoading(null); }
      }, [fetchData]);

      const { reload: reloadApiKeyStatus } = React.useContext(ApiKeyStatusContext);
      const handleToggleKey = useCallback(async (provider, currentActive) => {
        setActionLoading(`toggle-${provider}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'toggleKey', provider, isActive: !currentActive }),
          });
          fetchData();
          reloadApiKeyStatus(); // 전역 API 키 상태 갱신
        } finally { setActionLoading(null); }
      }, [fetchData, reloadApiKeyStatus]);

      const handleUpdateLimit = useCallback(async (provider, value) => {
        setActionLoading(`limit-${provider}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'updateLimit', provider, dailyLimit: parseInt(value) || 0 }),
          });
          setEditingLimit(null);
          fetchData();
        } finally { setActionLoading(null); }
      }, [fetchData]);

      // ── OCR 액션 ──
      const handleOcrMove = useCallback(async (index, direction) => {
        const ne = [...engines];
        const si = index + direction;
        if (si < 0 || si >= ne.length) return;
        [ne[index], ne[si]] = [ne[si], ne[index]];
        setEngines(ne);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrUpdatePriority', order: ne.map(e => e.engine_id) }),
          });
        } catch { fetchEngines(); }
      }, [engines, fetchEngines]);

      const handleDragEnd = useCallback(async () => {
        if (dragIndex === null || dragOverIndex === null || dragIndex === dragOverIndex) {
          setDragIndex(null);
          setDragOverIndex(null);
          return;
        }
        const ne = [...engines];
        const [moved] = ne.splice(dragIndex, 1);
        ne.splice(dragOverIndex, 0, moved);
        setEngines(ne);
        setDragIndex(null);
        setDragOverIndex(null);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrUpdatePriority', order: ne.map(e => e.engine_id) }),
          });
        } catch { fetchEngines(); }
      }, [dragIndex, dragOverIndex, engines, fetchEngines]);

      const handleOcrToggle = useCallback(async (engineId, currentEnabled) => {
        setActionLoading(`ocr-toggle-${engineId}`);
        try {
          await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrToggleEngine', engineId, enabled: !currentEnabled }),
          });
          fetchEngines();
        } finally { setActionLoading(null); }
      }, [fetchEngines]);

      const handleOcrTest = useCallback(async (engineId) => {
        setActionLoading(`ocr-test-${engineId}`);
        setActionResult(null);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'ocrTestEngine', engineId }),
          });
          const result = await res.json();
          setActionResult({ id: `ocr-${engineId}`, success: result.success, message: result.message });
          setTimeout(() => setActionResult(prev => prev?.id === `ocr-${engineId}` ? null : prev), 5000);
        } finally { setActionLoading(null); }
      }, []);

      // 일괄 테스트 (API 키)
      const handleTestAllKeys = useCallback(async () => {
        const configured = data?.keys?.filter(k => k.configured) || [];
        if (configured.length === 0) return;
        setActionLoading('test-all');
        let ok = 0, fail = 0;
        for (const key of configured) {
          setActionResult({ id: 'test-all', success: true, message: `테스트 중... (${ok + fail + 1}/${configured.length}) ${key.provider}` });
          try {
            const res = await authFetch(`${API_BASE_URL}/api-usage`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'testKey', provider: key.provider }),
            });
            const r = await res.json();
            r.success ? ok++ : fail++;
          } catch { fail++; }
        }
        setActionResult({ id: 'test-all', success: fail === 0, message: `완료: 성공 ${ok}개, 실패 ${fail}개` });
        fetchData();
        setTimeout(() => setActionResult(prev => prev?.id === 'test-all' ? null : prev), 5000);
        setActionLoading(null);
      }, [data, fetchData]);

      // 일괄 테스트 (OCR)
      const handleTestAllOcr = useCallback(async () => {
        const available = engines.filter(e => e.is_available && e.is_enabled);
        if (available.length === 0) return;
        setActionLoading('ocr-test-all');
        let ok = 0, fail = 0;
        for (const engine of available) {
          setActionResult({ id: 'ocr-test-all', success: true, message: `테스트 중... (${ok + fail + 1}/${available.length}) ${engine.name}` });
          try {
            const res = await authFetch(`${API_BASE_URL}/api-usage`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'ocrTestEngine', engineId: engine.engine_id }),
            });
            const r = await res.json();
            r.success ? ok++ : fail++;
          } catch { fail++; }
        }
        setActionResult({ id: 'ocr-test-all', success: fail === 0, message: `완료: 성공 ${ok}개, 실패 ${fail}개` });
        setTimeout(() => setActionResult(prev => prev?.id === 'ocr-test-all' ? null : prev), 5000);
        setActionLoading(null);
      }, [engines]);

      const providerLabels = {
        openai: 'OpenAI', anthropic: 'Anthropic', gemini: 'Google Gemini',
        cohere: 'Cohere', upstage: 'Upstage',
        'law-api': '국가법령정보센터', 'ocr-space': 'OCR.space',
        'google-vision': 'Google Vision', 'aws-textract': 'AWS Textract', 'naver-clova': '네이버 CLOVA',
        'naver-search': '네이버 검색 API',
      };
      const providerColors = {
        openai: 'green', anthropic: 'yellow', gemini: 'primary',
        cohere: 'blue', upstage: 'blue',
        'law-api': 'gray', 'ocr-space': 'gray',
        'google-vision': 'primary', 'aws-textract': 'yellow', 'naver-clova': 'green',
        'naver-search': 'green',
      };

      if (loading && !data) {
        return (
          <div className="flex items-center justify-center py-16">
            <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
          </div>
        );
      }

      if (!data) {
        return <EmptyState icon="&#9888;" title="데이터 로드 실패" description="API 사용량 테이블이 생성되지 않았을 수 있습니다." />;
      }

      const SUB_TABS = [
        { id: 'keys', label: 'API 키' },
        { id: 'llm', label: 'LLM 설정' },
        { id: 'embedding', label: '임베딩' },
        { id: 'ocr', label: 'OCR 설정' },
        { id: 'categories', label: '카테고리' },
        { id: 'deidentify', label: '비식별화' },
      ];

      const ocrStatusBadge = (engine) => {
        if (!engine.is_available) return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-400">미설정</span>;
        if (!engine.is_enabled) return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">비활성</span>;
        return <span className="text-xs px-1.5 py-0.5 rounded bg-green-50 text-green-600">활성</span>;
      };

      return (
        <div className="space-y-4 fade-in">
          {/* 서브 탭 네비게이션 */}
          <div className="flex gap-1 bg-card-bg rounded-lg p-1 border border-border overflow-x-auto">
            {SUB_TABS.map(tab => (
              <button key={tab.id} onClick={() => setSubTab(tab.id)}
                className={`flex-1 px-2 py-2 rounded-md text-xs font-medium transition-all whitespace-nowrap ${
                  subTab === tab.id
                    ? 'bg-primary text-white shadow-sm'
                    : 'text-text-secondary hover:text-text hover:bg-border/50'
                }`}
              >{tab.label}{tab.id === 'ocr' && engines.filter(e => e.is_available && e.is_enabled).length > 0 ? ` (${engines.filter(e => e.is_available && e.is_enabled).length})` : ''}</button>
            ))}
          </div>

          {/* ════════ API 키 관리 탭 ════════ */}
          {subTab === 'keys' && (
            <div className="space-y-3">
              <div className="flex items-center justify-between">
                <p className="text-xs text-text-secondary">각 프로바이더의 API 키 상태를 확인하고, 테스트/한도를 관리합니다.</p>
                <button onClick={handleTestAllKeys}
                  disabled={!!actionLoading || !data?.keys?.some(k => k.configured)}
                  className="px-3 py-1.5 text-xs bg-primary text-white rounded-lg hover:bg-primary/90 disabled:opacity-40 transition-colors shrink-0"
                >{actionLoading === 'test-all' ? '테스트 중...' : '전체 테스트'}</button>
              </div>
              {actionResult?.id === 'test-all' && (
                <div className={`text-xs px-3 py-2 rounded-lg fade-in ${actionResult.success ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>
                  {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                </div>
              )}
              {data.keys?.map(key => {
                const usage = data.usageByProvider?.find(u => u.provider === key.provider);
                const callCount = parseInt(usage?.call_count || 0);
                const creditErrors = parseInt(usage?.credit_error_count || 0);

                return (
                  <Card key={key.provider}>
                    <div className="space-y-3">
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <span className="font-bold text-sm text-text">{providerLabels[key.provider] || key.provider}</span>
                          {key.configured ? (
                            <Badge color={key.is_active ? 'green' : 'red'}>{key.is_active ? '활성' : '비활성'}</Badge>
                          ) : (
                            <Badge color="gray">미설정</Badge>
                          )}
                          {creditErrors > 0 && <Badge color="red">크레딧 소진</Badge>}
                        </div>
                        <div className="flex gap-1">
                          <button onClick={() => handleTestKey(key.provider)}
                            disabled={!key.configured || actionLoading === `test-${key.provider}`}
                            className="px-2.5 py-1 text-xs bg-primary/10 border border-primary/30 rounded-md hover:bg-primary/20 text-primary disabled:opacity-30 transition-colors"
                          >{actionLoading === `test-${key.provider}` ? '...' : '테스트'}</button>
                          <button onClick={() => handleToggleKey(key.provider, key.is_active)}
                            disabled={!key.configured}
                            className="px-2.5 py-1 text-xs bg-border rounded-md hover:bg-card-bg-hover text-text-secondary disabled:opacity-30 transition-colors"
                          >{key.is_active ? '비활성화' : '활성화'}</button>
                        </div>
                      </div>

                      <div className="flex items-center justify-between text-xs text-text-secondary">
                        <div className="flex gap-4">
                          <span>호출: <span className="text-text font-medium">{callCount}</span></span>
                          <span>비용: <span className="text-primary font-medium">${parseFloat(usage?.total_cost || 0).toFixed(4)}</span></span>
                        </div>
                        {editingLimit?.provider === key.provider ? (
                          <form className="flex items-center gap-1" onSubmit={(e) => { e.preventDefault(); handleUpdateLimit(key.provider, editingLimit.value); }}>
                            <input type="number" min="0" value={editingLimit.value}
                              onChange={e => setEditingLimit({ ...editingLimit, value: e.target.value })}
                              className="w-16 px-1.5 py-0.5 text-xs border border-primary rounded text-text text-center bg-card-bg"
                              autoFocus onBlur={() => setTimeout(() => setEditingLimit(null), 200)} />
                            <button type="submit" className="text-[10px] px-1.5 py-0.5 bg-primary text-white rounded hover:bg-primary/90">저장</button>
                            <span className="text-[10px] text-text-secondary">(0=무제한)</span>
                          </form>
                        ) : (
                          <button onClick={() => setEditingLimit({ provider: key.provider, value: String(key.daily_limit || 0) })}
                            className="hover:text-primary transition-colors"
                          >한도: {key.daily_limit ? `${callCount}/${key.daily_limit}` : '무제한'}</button>
                        )}
                      </div>
                      {key.last_checked && (
                        <p className="text-[10px] text-text-secondary">마지막 확인: {new Date(key.last_checked).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                      )}

                      {key.daily_limit > 0 && (
                        <div className="w-full bg-border rounded-full h-2">
                          <div className={`h-2 rounded-full transition-all ${
                            callCount / key.daily_limit > 0.9 ? 'bg-red-500' :
                            callCount / key.daily_limit > 0.7 ? 'bg-yellow-500' : 'bg-green-500'
                          }`} style={{ width: `${Math.min(100, (callCount / key.daily_limit) * 100)}%` }} />
                        </div>
                      )}

                      {!key.configured && (() => {
                        const envGuide = {
                          openai: { env: 'OPENAI_API_KEY', desc: '임베딩 + GPT-4o 퀴즈 파싱' },
                          anthropic: { env: 'ANTHROPIC_API_KEY', desc: 'Claude OCR (폴백)' },
                          gemini: { env: 'GEMINI_API_KEY', desc: 'RAG 질의응답 + AI 요약 + OCR' },
                          cohere: { env: 'COHERE_API_KEY', desc: '검색 Rerank (선택, 무료 1000회/월)' },
                          upstage: { env: 'UPSTAGE_API_KEY', desc: 'Upstage OCR (무료)' },
                          'law-api': { env: 'LAW_API_OC', desc: '국가법령정보센터 법령 검색/임포트' },
                          'ocr-space': { env: 'OCR_SPACE_API_KEY', desc: 'OCR.space 텍스트 추출 (무료 500회/월)' },
                          'google-vision': { env: 'GOOGLE_VISION_API_KEY', desc: 'Google Cloud Vision OCR' },
                          'aws-textract': { env: 'AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY', desc: 'AWS Textract 문서 OCR' },
                          'naver-clova': { env: 'CLOVA_OCR_SECRET + CLOVA_OCR_URL', desc: '네이버 CLOVA OCR' },
                          'naver-search': { env: 'NAVER_CLIENT_ID + NAVER_CLIENT_SECRET', desc: '네이버 뉴스 검색 크롤링' },
                        };
                        const g = envGuide[key.provider];
                        return g ? (
                          <div className="text-[11px] bg-blue-50 text-blue-700 px-2.5 py-2 rounded-md">
                            <p className="font-medium mb-0.5">환경변수 설정 필요</p>
                            <p>Vercel 대시보드 또는 <code className="bg-blue-100 px-1 rounded">.env</code>에 <code className="bg-blue-100 px-1 rounded">{g.env}</code> 추가</p>
                            <p className="text-blue-500 mt-0.5">용도: {g.desc}</p>
                          </div>
                        ) : null;
                      })()}
                      {key.last_error && (
                        <p className="text-xs text-red-500 bg-red-50 px-2.5 py-1.5 rounded-md">{key.last_error.length > 120 ? key.last_error.slice(0, 120) + '...' : key.last_error}</p>
                      )}
                      {actionResult?.id === `key-${key.provider}` && (
                        <p className={`text-xs px-2.5 py-1.5 rounded-md fade-in ${
                          actionResult.success ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50'
                        }`}>
                          {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                        </p>
                      )}
                    </div>
                  </Card>
                );
              })}
            </div>
          )}

          {/* ════════ LLM 설정 탭 ════════ */}
          {subTab === 'llm' && (
            <LlmSettingsPanel />
          )}

          {/* ════════ 임베딩 모델 설정 탭 ════════ */}
          {subTab === 'embedding' && (
            <EmbeddingModelPanel />
          )}

          {/* ════════ OCR 설정 탭 ════════ */}
          {subTab === 'ocr' && (
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <p className="text-xs text-text-secondary">이미지 업로드 시 위에서 아래 순서로 OCR 엔진을 시도합니다.</p>
                <button onClick={handleTestAllOcr}
                  disabled={!!actionLoading || !engines.some(e => e.is_available && e.is_enabled)}
                  className="px-3 py-1.5 text-xs bg-primary text-white rounded-lg hover:bg-primary/90 disabled:opacity-40 transition-colors shrink-0"
                >{actionLoading === 'ocr-test-all' ? '테스트 중...' : '전체 테스트'}</button>
              </div>
              {actionResult?.id === 'ocr-test-all' && (
                <div className={`text-xs px-3 py-2 rounded-lg fade-in ${actionResult.success ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>
                  {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                </div>
              )}
              {(() => {
                const active = engines.filter(e => e.is_available && e.is_enabled);
                return active.length > 0 ? (
                  <Card className="border-green-200 bg-green-50/50">
                    <p className="text-xs text-green-700 font-medium">
                      현재 사용 중: {active.map((e, i) => <span key={e.engine_id}>{i > 0 && ' → '}<span className="font-bold">{e.name}</span>{e.free && ' (무료)'}</span>)}
                    </p>
                  </Card>
                ) : (
                  <Card className="border-amber-200 bg-amber-50/50">
                    <p className="text-xs text-amber-700 font-medium">활성화된 OCR 엔진이 없습니다. 이미지 업로드 시 텍스트 추출이 불가합니다.</p>
                  </Card>
                );
              })()}

              {/* OCR 사용 통계 (최근 7일) */}
              {data?.ocrStats?.length > 0 && (
                <Card>
                  <h4 className="text-xs font-bold text-text mb-2">최근 7일 OCR 사용 현황</h4>
                  <div className="space-y-1.5">
                    {data.ocrStats.map(s => {
                      const total = parseInt(s.call_count);
                      const success = parseInt(s.success_count);
                      const rate = total > 0 ? Math.round((success / total) * 100) : 0;
                      return (
                        <div key={s.engine} className="flex items-center justify-between text-xs">
                          <span className="text-text">{s.engine}</span>
                          <div className="flex items-center gap-3">
                            <span className="text-text-secondary">{total}회</span>
                            <span className={`font-medium ${rate >= 90 ? 'text-green-600' : rate >= 70 ? 'text-yellow-600' : 'text-red-500'}`}>성공률 {rate}%</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </Card>
              )}

              {ocrLoading ? (
                <div className="text-center py-8 text-text-secondary text-sm">로딩...</div>
              ) : (
                <>
                  <div className="space-y-2">
                    {engines.map((engine, index) => (
                      <div key={engine.engine_id}
                        draggable
                        onDragStart={() => setDragIndex(index)}
                        onDragOver={(e) => { e.preventDefault(); setDragOverIndex(index); }}
                        onDragEnd={handleDragEnd}
                        onTouchStart={(e) => { setDragIndex(index); }}
                        className={`flex items-center gap-2 p-3 rounded-lg border transition-all ${
                          dragOverIndex === index && dragIndex !== null && dragIndex !== index
                            ? 'border-primary border-2 bg-blue-50/50'
                            : engine.is_enabled && engine.is_available
                              ? 'bg-card-bg border-border shadow-sm'
                              : !engine.is_available
                                ? 'bg-gray-50 border-dashed border-gray-300'
                                : 'bg-gray-50 border-border/50 opacity-70'
                        } ${dragIndex === index ? 'opacity-40 scale-95' : ''} cursor-grab active:cursor-grabbing`}
                      >
                        <span className={`text-sm font-bold w-6 text-center ${engine.is_available ? 'text-primary' : 'text-gray-300'}`} title="드래그하여 순서 변경">{index + 1}</span>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className={`text-sm font-medium truncate ${engine.is_available ? 'text-text' : 'text-text-secondary'}`}>{engine.name}</span>
                            {engine.free && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-green-50 text-green-600 font-medium">무료</span>}
                            {ocrStatusBadge(engine)}
                          </div>
                          <p className="text-[11px] text-text-secondary truncate">{engine.description}</p>
                          {!engine.is_available && (
                            <p className="text-[10px] text-amber-600 mt-0.5">
                              <code className="bg-amber-50 px-1 py-0.5 rounded">{engine.envKey}</code> 환경변수 설정이 필요합니다
                            </p>
                          )}
                          {actionResult?.id === `ocr-${engine.engine_id}` && (
                            <p className={`text-[10px] mt-0.5 fade-in ${actionResult.success ? 'text-green-600' : 'text-red-500'}`}>
                              {actionResult.success ? '\u2713' : '\u2717'} {actionResult.message}
                            </p>
                          )}
                        </div>
                        <div className="flex items-center gap-1 shrink-0">
                          <button onClick={() => handleOcrMove(index, -1)} disabled={index === 0}
                            className="w-7 h-7 flex items-center justify-center rounded-md text-text-secondary hover:text-primary hover:bg-gray-100 disabled:opacity-30 text-xs">&#9650;</button>
                          <button onClick={() => handleOcrMove(index, 1)} disabled={index === engines.length - 1}
                            className="w-7 h-7 flex items-center justify-center rounded-md text-text-secondary hover:text-primary hover:bg-gray-100 disabled:opacity-30 text-xs">&#9660;</button>
                          <button onClick={() => handleOcrToggle(engine.engine_id, engine.is_enabled)}
                            disabled={actionLoading === `ocr-toggle-${engine.engine_id}`}
                            className={`w-9 h-5 rounded-full transition-colors relative ${engine.is_enabled ? 'bg-green-500' : 'bg-gray-300'}`}
                          ><span className={`absolute w-3.5 h-3.5 rounded-full bg-white top-[3px] transition-transform ${engine.is_enabled ? 'right-[3px]' : 'left-[3px]'}`} /></button>
                          {engine.is_available && (
                            <button onClick={() => handleOcrTest(engine.engine_id)} disabled={!!actionLoading}
                              className="text-[10px] px-2 py-1 rounded-md border border-primary/30 text-primary hover:bg-blue-50 transition-colors disabled:opacity-30"
                            >{actionLoading === `ocr-test-${engine.engine_id}` ? '...' : '테스트'}</button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}

          {/* ════════ 카테고리 관리 탭 ════════ */}
          {subTab === 'categories' && (
            <CategoryPanel />
          )}

          {/* ════════ 비식별화 설정 탭 ════════ */}
          {subTab === 'deidentify' && (
            <DeidentifyPanel />
          )}
        </div>
      );
    }

    // ========================================
    // 튜닝 탭 (대시보드, 사용량, 프롬프트, 분할 설정, RAG 트레이싱, 관측성)
    // ========================================
    function TuningTab() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [range, setRange] = useState('today');
      const [subTab, setSubTab] = useState('dashboard');
      const [errorFilter, setErrorFilter] = useState('all');

      const fetchData = useCallback(async () => {
        setLoading(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/api-usage?range=${range}`);
          if (!res.ok) throw new Error('데이터 로드 실패');
          setData(await res.json());
        } catch (err) {
          console.error(err);
        } finally {
          setLoading(false);
        }
      }, [range]);

      useEffect(() => { fetchData(); }, [fetchData]);

      const providerLabels = {
        openai: 'OpenAI', anthropic: 'Anthropic', gemini: 'Google Gemini',
        cohere: 'Cohere', upstage: 'Upstage',
        'law-api': '국가법령정보센터', 'ocr-space': 'OCR.space',
        'google-vision': 'Google Vision', 'aws-textract': 'AWS Textract', 'naver-clova': '네이버 CLOVA',
        'naver-search': '네이버 검색 API',
      };
      const providerColors = {
        openai: 'green', anthropic: 'yellow', gemini: 'primary',
        cohere: 'blue', upstage: 'blue',
        'law-api': 'gray', 'ocr-space': 'gray',
        'google-vision': 'primary', 'aws-textract': 'yellow', 'naver-clova': 'green',
        'naver-search': 'green',
      };

      if (loading && !data) {
        return (
          <div className="flex items-center justify-center py-16">
            <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
          </div>
        );
      }

      if (!data) {
        return <EmptyState icon="&#9888;" title="데이터 로드 실패" description="API 사용량 테이블이 생성되지 않았을 수 있습니다." />;
      }

      const totalCost = data.usageByProvider?.reduce((sum, p) => sum + parseFloat(p.total_cost || 0), 0) || 0;
      const totalCalls = data.usageByProvider?.reduce((sum, p) => sum + parseInt(p.call_count || 0), 0) || 0;
      const totalErrors = data.usageByProvider?.reduce((sum, p) => sum + parseInt(p.error_count || 0), 0) || 0;

      const SUB_TABS = [
        { id: 'dashboard', label: '대시보드' },
        { id: 'usage', label: '사용량' },
        { id: 'prompts', label: '프롬프트' },
        { id: 'chunk-presets', label: '분할 설정' },
        { id: 'communities', label: '커뮤니티' },
        { id: 'rag-traces', label: 'RAG 트레이싱' },
        { id: 'observability', label: '관측성' },
      ];

      return (
        <div className="space-y-4 fade-in">
          {/* 서브 탭 네비게이션 */}
          <div className="flex gap-1 bg-card-bg rounded-lg p-1 border border-border overflow-x-auto">
            {SUB_TABS.map(tab => (
              <button key={tab.id} onClick={() => setSubTab(tab.id)}
                className={`flex-1 px-2 py-2 rounded-md text-xs font-medium transition-all whitespace-nowrap ${
                  subTab === tab.id
                    ? 'bg-primary text-white shadow-sm'
                    : 'text-text-secondary hover:text-text hover:bg-border/50'
                }`}
              >{tab.label}</button>
            ))}
          </div>

          {/* ════════ 대시보드 탭 ════════ */}
          {subTab === 'dashboard' && (
            <div className="space-y-4">
              {/* 기간 선택 + 새로고침 */}
              <div className="flex gap-2">
                {[{ v: 'today', l: '오늘' }, { v: 'week', l: '7일' }, { v: 'month', l: '30일' }].map(r => (
                  <button key={r.v} onClick={() => setRange(r.v)}
                    className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${
                      range === r.v ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{r.l}</button>
                ))}
                <button onClick={fetchData}
                  className="ml-auto px-3 py-1.5 rounded-full text-xs bg-border text-text-secondary hover:text-text"
                >&#x21BB; 새로고침</button>
              </div>

              {/* 요약 카드 + 전일 비교 */}
              {(() => {
                const today = data.prevComparison?.find(r => r.period === 'today');
                const yesterday = data.prevComparison?.find(r => r.period === 'yesterday');
                const diffBadge = (todayVal, yesterdayVal) => {
                  if (!yesterday || parseInt(yesterdayVal) === 0) return null;
                  const pct = Math.round(((todayVal - yesterdayVal) / yesterdayVal) * 100);
                  if (pct === 0) return null;
                  return <span className={`text-[10px] font-medium ${pct > 0 ? 'text-red-400' : 'text-green-500'}`}>{pct > 0 ? '\u2191' : '\u2193'}{Math.abs(pct)}%</span>;
                };
                return (
                  <div className="grid grid-cols-3 gap-3">
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">총 호출</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className="text-2xl font-bold text-text">{totalCalls.toLocaleString()}</p>
                        {today && yesterday && diffBadge(parseInt(today.call_count), parseInt(yesterday.call_count))}
                      </div>
                    </Card>
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">예상 비용</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className="text-2xl font-bold text-primary">${totalCost.toFixed(4)}</p>
                        {today && yesterday && diffBadge(parseFloat(today.total_cost), parseFloat(yesterday.total_cost))}
                      </div>
                    </Card>
                    <Card>
                      <p className="text-[10px] text-text-secondary uppercase tracking-wider">에러</p>
                      <div className="flex items-end gap-1.5 mt-1">
                        <p className={`text-2xl font-bold ${totalErrors > 0 ? 'text-red-500' : 'text-green-500'}`}>{totalErrors}</p>
                        {today && yesterday && diffBadge(parseInt(today.error_count), parseInt(yesterday.error_count))}
                      </div>
                    </Card>
                  </div>
                );
              })()}

              {/* 프로바이더별 요약 */}
              <Card>
                <h4 className="text-xs font-bold text-text mb-3">프로바이더별 현황</h4>
                <div className="space-y-3">
                  {data.usageByProvider?.map(p => {
                    const cost = parseFloat(p.total_cost || 0);
                    const calls = parseInt(p.call_count || 0);
                    const errors = parseInt(p.error_count || 0);
                    const maxCalls = Math.max(...(data.usageByProvider?.map(x => parseInt(x.call_count || 0)) || [1]));
                    return (
                      <div key={p.provider}>
                        <div className="flex items-center justify-between mb-1">
                          <div className="flex items-center gap-2">
                            <Badge color={providerColors[p.provider] || 'gray'}>{providerLabels[p.provider] || p.provider}</Badge>
                            <span className="text-xs text-text">{calls}회</span>
                            {errors > 0 && <span className="text-xs text-red-500">({errors} 에러)</span>}
                          </div>
                          <span className="text-xs text-primary font-medium">${cost.toFixed(4)}</span>
                        </div>
                        <div className="w-full bg-border rounded-full h-1.5">
                          <div className="h-1.5 rounded-full bg-primary/70 transition-all" style={{ width: `${maxCalls > 0 ? (calls / maxCalls) * 100 : 0}%` }} />
                        </div>
                      </div>
                    );
                  })}
                  {(!data.usageByProvider || data.usageByProvider.length === 0) && (
                    <p className="text-xs text-text-secondary text-center py-4">선택한 기간에 사용 기록이 없습니다.</p>
                  )}
                </div>
              </Card>

              {/* 일별 추이 (최근 7일) */}
              {data.dailyTrend?.length > 0 && (() => {
                const byDate = {};
                data.dailyTrend.forEach(d => {
                  const date = d.date?.slice(0, 10) || d.date;
                  if (!byDate[date]) byDate[date] = { calls: 0, cost: 0, providers: {} };
                  byDate[date].calls += parseInt(d.call_count);
                  byDate[date].cost += parseFloat(d.total_cost || 0);
                  byDate[date].providers[d.provider] = (byDate[date].providers[d.provider] || 0) + parseInt(d.call_count);
                });
                const dates = Object.keys(byDate).sort();
                const maxCalls = Math.max(...dates.map(d => byDate[d].calls), 1);
                const pColors = { openai: '#22c55e', anthropic: '#eab308', gemini: '#3b82f6', upstage: '#60a5fa' };
                return (
                  <Card>
                    <h4 className="text-xs font-bold text-text mb-3">일별 추이 (최근 7일)</h4>
                    <div className="space-y-2">
                      {dates.map(date => {
                        const d = byDate[date];
                        const pct = (d.calls / maxCalls) * 100;
                        const pList = Object.entries(d.providers);
                        return (
                          <div key={date} className="flex items-center gap-2 text-xs">
                            <span className="w-10 text-text-secondary text-[10px] shrink-0">{date.slice(5)}</span>
                            <div className="flex-1 h-4 bg-border/50 rounded overflow-hidden flex">
                              {pList.map(([prov, cnt]) => (
                                <div key={prov} style={{ width: `${(cnt / maxCalls) * 100}%`, backgroundColor: pColors[prov] || '#9ca3af' }}
                                  className="h-full transition-all" title={`${providerLabels[prov] || prov}: ${cnt}회`} />
                              ))}
                            </div>
                            <span className="w-8 text-right text-text shrink-0">{d.calls}</span>
                            <span className="w-14 text-right text-primary text-[10px] shrink-0">${d.cost.toFixed(3)}</span>
                          </div>
                        );
                      })}
                    </div>
                    <div className="flex gap-3 mt-2 pt-2 border-t border-border/50">
                      {Object.entries(pColors).filter(([p]) => data.dailyTrend.some(d => d.provider === p)).map(([p, c]) => (
                        <div key={p} className="flex items-center gap-1 text-[10px] text-text-secondary">
                          <span className="w-2.5 h-2.5 rounded-sm inline-block" style={{ backgroundColor: c }} />
                          {providerLabels[p] || p}
                        </div>
                      ))}
                    </div>
                  </Card>
                );
              })()}

              {/* 최근 에러 (있을 때만) */}
              {data.recentErrors?.length > 0 && (
                <div>
                  <h4 className="text-xs font-bold text-text mb-2">최근 에러 ({data.recentErrors.length}건)</h4>
                  <div className="space-y-1.5">
                    {data.recentErrors.slice(0, 5).map((e, i) => (
                      <Card key={i} className="border-red-200">
                        <div className="flex items-center gap-2 text-xs">
                          <Badge color={e.status === 'credit_exhausted' ? 'red' : 'yellow'}>{e.status}</Badge>
                          <span className="text-text-secondary">{e.provider}</span>
                          <span className="text-text-secondary ml-auto text-[10px]">{formatDate(e.created_at)}</span>
