          React.createElement('div', { className: 'p-2 bg-card-bg border border-border rounded-lg' },
            React.createElement('p', { className: 'font-semibold text-text mb-1' }, '관계 유형'),
            ...Object.entries(stats.byPredicate || {}).map(([pred, count]) =>
              React.createElement('div', { key: pred, className: 'flex justify-between text-text-secondary' },
                React.createElement('span', null, pred),
                React.createElement('span', { className: 'font-medium' }, count),
              )
            ),
          ),
        ),
      );
    }

    // ========================================
    // 문서 목록 탭
    // ========================================
    function DocumentsTab({ initialDocInfo, onInitialDocConsumed }) {
      const { categories: catList } = React.useContext(CategoriesContext);
      const CATEGORIES = getCategoriesWithAll(catList);
      const [documents, setDocuments] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [categoryFilter, setCategoryFilter] = useState('');
      const [selectedDocId, setSelectedDocId] = useState(initialDocInfo?.docId || null);
      // 검색 결과에서 전달받은 섹션 정보 (해당 조문으로 스크롤용)
      const [initialSectionInfo, setInitialSectionInfo] = useState(
        initialDocInfo ? { sectionIndex: initialDocInfo.sectionIndex, label: initialDocInfo.label } : null
      );

      // 검색 탭에서 전달받은 initialDocInfo 처리
      useEffect(() => {
        if (initialDocInfo?.docId) {
          setSelectedDocId(initialDocInfo.docId);
          setInitialSectionInfo({ sectionIndex: initialDocInfo.sectionIndex, label: initialDocInfo.label });
          if (onInitialDocConsumed) onInitialDocConsumed();
        }
      }, [initialDocInfo]);
      const [deleting, setDeleting] = useState(null);
      // 휴지통 모드 토글
      const [showTrash, setShowTrash] = useState(false);
      const [trashCount, setTrashCount] = useState(0);
      // 페이징: 처음 5개만 보여주고 '더보기'로 추가 로드
      const [visibleCount, setVisibleCount] = useState(5);
      // 태그 필터
      const [allTags, setAllTags] = useState([]);
      const [tagFilter, setTagFilter] = useState('');
      const [showTagFilter, setShowTagFilter] = useState(false);

      // F18: 즐겨찾기 토글
      const handleToggleFavorite = useCallback(async (docId) => {
        try {
          const resp = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'toggleFavorite', id: docId }),
          });
          const data = await resp.json();
          if (data.success) {
            setDocuments(prev => prev.map(d =>
              d.id === docId ? { ...d, is_favorited: data.is_favorited } : d
            ));
          }
        } catch (e) { console.warn('즐겨찾기 실패:', e.message); }
      }, []);

      // UX2: 임베딩 재생성 (목록에서 바로 실행)
      const [rebuildingEmbId, setRebuildingEmbId] = useState(null);
      const handleRebuildEmb = useCallback(async (docId, e) => {
        e.stopPropagation();
        setRebuildingEmbId(docId);
        try {
          const resp = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'rebuildEmbeddings', id: docId }),
          });
          if (!resp.ok) { const d = await resp.json().catch(() => ({})); throw new Error(d.error || '실패'); }
          setDocuments(prev => prev.map(d =>
            d.id === docId ? { ...d, embedding_status: 'done' } : d
          ));
        } catch (err) {
          alert(`임베딩 재생성 실패: ${err.message}`);
        } finally {
          setRebuildingEmbId(null);
        }
      }, []);

      // 태그 목록 불러오기 (필터용)
      useEffect(() => {
        authFetch(`${API_BASE_URL}/documents?tags=all`)
          .then(r => r.json())
          .then(data => setAllTags(data.tags || []))
          .catch(() => {});
      }, []);

      // 문서 목록 불러오기
      const fetchDocuments = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const params = new URLSearchParams();
          if (showTrash) {
            params.set('trash', 'true');
          } else {
            if (categoryFilter) params.set('category', categoryFilter);
            if (tagFilter) params.set('tag', tagFilter);
          }
          const qs = params.toString() ? `?${params}` : '';
          const res = await authFetch(`${API_BASE_URL}/documents${qs}`);
          if (!res.ok) throw new Error('문서 목록을 불러올 수 없습니다.');
          const data = await res.json();
          setDocuments(Array.isArray(data) ? data : data.documents || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [categoryFilter, tagFilter, showTrash]);

      // 휴지통 개수 조회
      const fetchTrashCount = useCallback(async () => {
        try {
          const res = await authFetch(`${API_BASE_URL}/documents?trash=true`);
          if (res.ok) {
            const data = await res.json();
            const docs = Array.isArray(data) ? data : data.documents || [];
            setTrashCount(docs.length);
          }
        } catch {}
      }, []);

      useEffect(() => {
        setVisibleCount(5); // 필터/모드 변경 시 페이징 초기화
        fetchDocuments();
      }, [fetchDocuments]);

      useEffect(() => {
        if (!showTrash) fetchTrashCount();
      }, [showTrash, fetchTrashCount, documents]);

      // 소프트 삭제 (휴지통으로 이동)
      const handleDelete = useCallback(async (id, e) => {
        e.stopPropagation();
        if (!confirm('이 문서를 휴지통으로 이동하시겠습니까?')) return;
        setDeleting(id);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'delete', id }),
          });
          if (!res.ok) throw new Error('삭제에 실패했습니다.');
          setDocuments(prev => prev.filter(d => d.id !== id));
        } catch (err) {
          alert(err.message);
        } finally {
          setDeleting(null);
        }
      }, []);

      // 복구
      const handleRestore = useCallback(async (id, e) => {
        e.stopPropagation();
        setDeleting(id);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'restore', id }),
          });
          if (!res.ok) throw new Error('복구에 실패했습니다.');
          setDocuments(prev => prev.filter(d => d.id !== id));
        } catch (err) {
          alert(err.message);
        } finally {
          setDeleting(null);
        }
      }, []);

      // 영구 삭제
      const handlePermanentDelete = useCallback(async (id, e) => {
        e.stopPropagation();
        if (!confirm('이 문서를 영구 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
        setDeleting(id);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'permanentDelete', id }),
          });
          if (!res.ok) throw new Error('영구 삭제에 실패했습니다.');
          setDocuments(prev => prev.filter(d => d.id !== id));
        } catch (err) {
          alert(err.message);
        } finally {
          setDeleting(null);
        }
      }, []);

      // 휴지통 비우기
      const handleEmptyTrash = useCallback(async () => {
        if (!confirm(`휴지통의 모든 문서(${documents.length}개)를 영구 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
        setLoading(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'emptyTrash' }),
          });
          if (!res.ok) throw new Error('휴지통 비우기에 실패했습니다.');
          setDocuments([]);
        } catch (err) {
          alert(err.message);
        } finally {
          setLoading(false);
        }
      }, [documents.length]);

      // 경과 시간 표시 (삭제 후 며칠 경과)
      const getDeletedAgo = (deletedAt) => {
        const diff = Date.now() - new Date(deletedAt).getTime();
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        if (days === 0) return '오늘';
        if (days === 1) return '어제';
        return `${days}일 전`;
      };

      // 카테고리별 뱃지 색상
      const getCategoryColor = (cat) => {
        switch (cat) {
          case '법령': return 'primary';
          case '기출': return 'green';
          case '규정': return 'yellow';
          default: return 'gray';
        }
      };

      // 맨 위로 스크롤 버튼 표시 여부
      const [showScrollTop, setShowScrollTop] = useState(false);
      useEffect(() => {
        const onScroll = () => setShowScrollTop(window.scrollY > 300);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      return (
        <div className="space-y-4 fade-in">
          {/* 카테고리 필터 + 태그 필터 + 휴지통 */}
          <div className="flex items-center gap-2">
            {!showTrash && (
              <div className="flex gap-1.5 overflow-x-auto pb-1 flex-1">
                {CATEGORIES.map(cat => (
                  <button
                    key={cat.value}
                    onClick={() => setCategoryFilter(cat.value)}
                    className={`px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all ${
                      categoryFilter === cat.value
                        ? 'bg-primary text-white shadow-sm'
                        : 'bg-card-bg border border-border text-text-secondary hover:text-text hover:border-primary/30'
                    }`}
                  >
                    {cat.label}
                  </button>
                ))}
                {/* 태그 필터 토글 버튼 */}
                {allTags.length > 0 && (
                  <button
                    onClick={() => setShowTagFilter(!showTagFilter)}
                    className={`px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all ${
                      tagFilter
                        ? 'bg-blue-500 text-white shadow-sm'
                        : showTagFilter
                          ? 'bg-blue-100 text-blue-600 border border-blue-200'
                          : 'bg-card-bg border border-border text-text-secondary hover:text-text hover:border-blue-300'
                    }`}
                  >
                    <svg className="w-3.5 h-3.5 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z" /></svg>
                    {tagFilter ? `#${tagFilter}` : '태그'}
                  </button>
                )}
              </div>
            )}
            {showTrash && (
              <div className="flex-1">
                <span className="text-sm font-medium text-red-500">
                  휴지통 ({documents.length}개)
                </span>
              </div>
            )}
            {/* 휴지통 버튼 */}
            <button
              onClick={() => { setShowTrash(!showTrash); setCategoryFilter(''); setTagFilter(''); setShowTagFilter(false); }}
              className={`relative px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors shrink-0 ${
                showTrash
                  ? 'bg-red-50 text-red-500 border border-red-200'
                  : 'bg-card-bg border border-border text-text-secondary hover:text-text'
              }`}
            >
              <svg className="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              {showTrash ? '목록으로' : '휴지통'}
              {!showTrash && trashCount > 0 && (
                <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">
                  {trashCount}
                </span>
              )}
            </button>
            {/* 휴지통 비우기 */}
            {showTrash && documents.length > 0 && (
              <button
                onClick={handleEmptyTrash}
                className="px-3 py-1.5 rounded-full text-sm font-medium bg-red-50 text-red-500 border border-red-200 hover:bg-red-100 transition-colors shrink-0"
              >
                비우기
              </button>
            )}
          </div>

          {/* 태그 필터 패널 (펼침) */}
          {showTagFilter && !showTrash && allTags.length > 0 && (
            <div className="flex flex-wrap gap-1.5 p-3 bg-card-bg border border-border rounded-lg">
              <button
                onClick={() => setTagFilter('')}
                className={`px-2.5 py-1 rounded-full text-xs font-medium transition-colors ${
                  !tagFilter ? 'bg-blue-500 text-white' : 'bg-bg border border-border text-text-secondary hover:text-text'
                }`}
              >전체</button>
              {allTags.map(t => (
                <button
                  key={t.id}
                  onClick={() => setTagFilter(tagFilter === t.name ? '' : t.name)}
                  className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium transition-colors ${
                    tagFilter === t.name
                      ? 'bg-blue-500 text-white shadow-sm'
                      : 'bg-bg border border-border text-text-secondary hover:text-text hover:border-blue-300'
                  }`}
                >
                  #{t.name}
                  {t.usage_count > 0 && (
                    <span className={`text-[10px] ${tagFilter === t.name ? 'text-blue-200' : 'text-text-secondary/60'}`}>
                      {t.usage_count}
                    </span>
                  )}
                </button>
              ))}
            </div>
          )}

          {/* 문서 개수 표시 (로딩 완료 후) */}
          {!loading && !error && !showTrash && documents.length > 0 && (
            <div className="flex items-center justify-between">
              <span className="text-xs text-text-secondary">
                {categoryFilter ? `'${categoryFilter}' ` : '전체 '}{tagFilter ? `#${tagFilter} ` : ''}{documents.length}개 문서
              </span>
              <button onClick={fetchDocuments} className="text-xs text-text-secondary hover:text-primary transition-colors">
                &#x21BB; 새로고침
              </button>
            </div>
          )}

          {/* 로딩 */}
          {loading ? (
            <div className="flex items-center justify-center py-16">
              <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
            </div>
          ) : error ? (
            <Card className="border-red-200 bg-red-50">
              <div className="flex items-center justify-between">
                <p className="text-sm text-red-500">{error}</p>
                <Button variant="ghost" size="sm" onClick={fetchDocuments}>재시도</Button>
              </div>
            </Card>
          ) : documents.length === 0 ? (
            <EmptyState
              icon={showTrash ? "🗑️" : "📄"}
              title={showTrash ? "휴지통이 비어 있습니다" : "문서가 없습니다"}
              description={showTrash
                ? '삭제된 문서가 없습니다.'
                : tagFilter ? `#${tagFilter} 태그가 붙은 문서가 없습니다.`
                : categoryFilter ? `'${categoryFilter}' 카테고리에 문서가 없습니다.` : '업로드 탭에서 PDF를 업로드하세요.'}
            />
          ) : (
            /* 문서 카드 목록 */
            <div className="space-y-3">
              {documents.slice(0, visibleCount).map(doc => (
                <Card key={doc.id} hoverable={!showTrash} onClick={() => !showTrash && setSelectedDocId(doc.id)}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <h3 className={`font-medium truncate ${showTrash ? 'text-text-secondary' : 'text-text'}`}>{doc.title}</h3>
                        <Badge color={getCategoryColor(doc.category)} className="shrink-0">{doc.category}</Badge>
                      </div>
                      {/* 메타 정보 */}
                      <div className="flex flex-wrap items-center gap-x-2 gap-y-1 mt-1.5 text-xs text-text-secondary">
                        {FILE_TYPE_CONFIG[doc.file_type] && (
                          <span>{FILE_TYPE_CONFIG[doc.file_type].icon} {FILE_TYPE_CONFIG[doc.file_type].label}</span>
                        )}
                        {doc.file_type === 'law' && <span>법령</span>}
                        {showTrash && doc.deleted_at ? (
                          <span className="text-red-500">{getDeletedAgo(doc.deleted_at)} 삭제</span>
                        ) : (
                          <React.Fragment>
                            <span className="flex items-center gap-1">
                              <span className={`w-1.5 h-1.5 rounded-full ${
                                doc.embedding_status === 'done' ? 'bg-green-400' : doc.embedding_status === 'failed' ? 'bg-red-400' : 'bg-yellow-400'
                              }`} />
                              {doc.embedding_status === 'done' ? '벡터화됨' : doc.embedding_status === 'failed' ? '벡터 실패' : '대기'}
                              {doc.embedding_status === 'failed' && (
                                <button
                                  onClick={(e) => handleRebuildEmb(doc.id, e)}
                                  disabled={rebuildingEmbId === doc.id}
                                  className="text-red-500 hover:text-red-600 underline text-[10px] ml-0.5"
                                >
                                  {rebuildingEmbId === doc.id ? '재생성중...' : '재시도'}
                                </button>
                              )}
                            </span>
                            <span>{formatDate(doc.created_at)}</span>
                          </React.Fragment>
                        )}
                        {doc.section_count != null && <span>{doc.section_count}개 섹션</span>}
                        {doc.file_size > 0 && <span>{formatFileSize(doc.file_size)}</span>}
                      </div>
                      {/* 태그 (클릭 시 태그 필터 적용) */}
                      {doc.tags && doc.tags.length > 0 && (
                        <div className="flex flex-wrap gap-1 mt-1.5">
                          {doc.tags.map(tag => (
                            <button
                              key={tag.id}
                              onClick={(e) => { e.stopPropagation(); setTagFilter(tag.name); setShowTagFilter(true); }}
                              className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium transition-colors ${
                                tagFilter === tag.name
                                  ? 'bg-blue-500 text-white'
                                  : 'bg-blue-50 text-blue-600 border border-blue-100 hover:bg-blue-100'
                              }`}
                            >
                              #{tag.name}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                    {/* 즐겨찾기 + 삭제 버튼 / 휴지통: 복구 + 영구삭제 */}
                    {showTrash ? (
                      <div className="flex gap-1 shrink-0">
                        <button
                          onClick={(e) => handleRestore(doc.id, e)}
                          disabled={deleting === doc.id}
                          className="p-2 text-text-secondary hover:text-green-600 transition-colors"
                          title="복구"
                        >
                          {deleting === doc.id ? (
                            <div className="w-4 h-4 border-2 border-green-400 border-t-transparent rounded-full animate-spin" />
                          ) : (
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" /></svg>
                          )}
                        </button>
                        <button
                          onClick={(e) => handlePermanentDelete(doc.id, e)}
                          disabled={deleting === doc.id}
                          className="p-2 text-text-secondary hover:text-red-500 transition-colors"
                          title="영구 삭제"
                        >
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                      </div>
                    ) : (
                      <div className="flex items-center gap-0.5 shrink-0">
                      <button
                        onClick={(e) => { e.stopPropagation(); handleToggleFavorite(doc.id); }}
                        className={`p-2 transition-colors ${doc.is_favorited ? 'text-yellow-500' : 'text-text-secondary hover:text-yellow-500'}`}
                        aria-label="즐겨찾기"
                      >
                        <svg className="w-4 h-4" fill={doc.is_favorited ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                      </button>
                      <button
                        onClick={(e) => handleDelete(doc.id, e)}
                        disabled={deleting === doc.id}
                        className="p-2 text-text-secondary hover:text-red-500 transition-colors"
                        aria-label="삭제"
                      >
                        {deleting === doc.id ? (
                          <div className="w-4 h-4 border-2 border-red-400 border-t-transparent rounded-full animate-spin" />
                        ) : (
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        )}
                      </button>
                      </div>
                    )}
                  </div>
                </Card>
              ))}
              {/* 더보기 버튼 */}
              {documents.length > visibleCount && (
                <button
                  onClick={() => setVisibleCount(prev => prev + 5)}
                  className="w-full py-2.5 text-sm text-primary hover:text-primary-hover bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors"
                >
                  더보기 ({visibleCount}/{documents.length}건)
                </button>
              )}
            </div>
          )}

          {/* 문서 상세 모달 (닫을 때 태그/문서 목록 새로고침) */}
          <DocumentDetailModal
            isOpen={selectedDocId !== null}
            onClose={() => {
              setSelectedDocId(null);
              setInitialSectionInfo(null);
              fetchDocuments();
              authFetch(`${API_BASE_URL}/documents?tags=all`)
                .then(r => r.json()).then(d => setAllTags(d.tags || [])).catch(() => {});
            }}
            documentId={selectedDocId}
            initialSectionInfo={initialSectionInfo}
          />

          {/* 맨 위로 스크롤 버튼 */}
          {showScrollTop && (
            <button
              className="scroll-top-btn"
              onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
              aria-label="맨 위로"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7" /></svg>
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // 검색 탭 (텍스트 / 벡터 / AI 질의 + 필터)
    // ========================================
    function SearchTab({ onNavigateToDoc }) {
      const [searchQuery, setSearchQuery] = useState('');
      const [searchType, setSearchType] = useState('hybrid');
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [useParentRetriever, setUseParentRetriever] = useState(false);
      // 필터
      const [filterDocIds, setFilterDocIds] = useState([]);
      const [filterChapter, setFilterChapter] = useState('');
      const [docList, setDocList] = useState([]); // 문서 목록 (필터용)
      const [showFilters, setShowFilters] = useState(false);
      // 검색 결과에서 문서 상세 이동
      const [selectedDocId, setSelectedDocId] = useState(null);
      // 페이징: 화면에 표시할 결과 수
      const PAGE_SIZE = 5;
      const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);

      // Few-shot: 유사 과거 Q&A 제안 (검색 탭)
      const [searchFewShots, setSearchFewShots] = useState([]);
      const searchFewShotTimer = useRef(null);

      // F19: 자동완성
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [activeIdx, setActiveIdx] = useState(-1); // 키보드 내비게이션용 활성 인덱스
      const suggestTimerRef = useRef(null);
      const suggestRef = useRef(null); // 드롭다운 DOM 참조

      // 최근 검색어 (localStorage 기반, 최대 10개)
      const RECENT_KEY = 'docstore_recent_searches';
      const MAX_RECENT = 10;
      const [recentSearches, setRecentSearches] = useState(() => {
        try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; }
        catch { return []; }
      });
      const [showRecent, setShowRecent] = useState(false);

      // 최근 검색어 저장
      const saveRecentSearch = useCallback((query) => {
        const q = query.trim();
        if (!q) return;
        setRecentSearches(prev => {
          // 중복 제거 후 맨 앞에 추가
          const next = [q, ...prev.filter(r => r !== q)].slice(0, MAX_RECENT);
          localStorage.setItem(RECENT_KEY, JSON.stringify(next));
          return next;
        });
      }, []);

      // Few-shot: 검색어 변경 시 유사 과거 Q&A 검색 (debounce)
      useEffect(() => {
        if (searchFewShotTimer.current) clearTimeout(searchFewShotTimer.current);
        if (!searchQuery || searchQuery.trim().length < 4) {
          setSearchFewShots([]);
          return;
        }
        searchFewShotTimer.current = setTimeout(async () => {
          try {
            const res = await authFetch(`${API_BASE_URL}/few-shot?q=${encodeURIComponent(searchQuery.trim())}&max=3`);
            const data = await res.json();
            setSearchFewShots(data.similar && data.similar.length > 0 ? data.similar : []);
          } catch { setSearchFewShots([]); }
        }, 800);
        return () => { if (searchFewShotTimer.current) clearTimeout(searchFewShotTimer.current); };
      }, [searchQuery]);

      // 최근 검색어 개별 삭제
      const removeRecentSearch = useCallback((query) => {
        setRecentSearches(prev => {
          const next = prev.filter(r => r !== query);
          localStorage.setItem(RECENT_KEY, JSON.stringify(next));
          return next;
        });
      }, []);

      // 최근 검색어 전체 삭제
      const clearRecentSearches = useCallback(() => {
        setRecentSearches([]);
        localStorage.removeItem(RECENT_KEY);
      }, []);

      // 문서 목록 불러오기 (필터용)
      useEffect(() => {
        authFetch(`${API_BASE_URL}/documents`)
          .then(r => r.json())
          .then(data => setDocList(Array.isArray(data) ? data : data.documents || []))
          .catch(() => {});
      }, []);

      // F19: 검색어 변경 시 자동완성 서제스트
      const handleQueryChange = useCallback((val) => {
        setSearchQuery(val);
        setActiveIdx(-1);
        if (suggestTimerRef.current) clearTimeout(suggestTimerRef.current);
        // 입력이 비면 최근 검색어 표시, 입력 중이면 숨김
        if (!val.trim()) {
          setSuggestions([]); setShowSuggestions(false);
          if (recentSearches.length > 0) setShowRecent(true);
          return;
        }
        setShowRecent(false);
        if (val.trim().length < 2) { setSuggestions([]); setShowSuggestions(false); return; }
        suggestTimerRef.current = setTimeout(async () => {
          try {
            const resp = await authFetch(`${API_BASE_URL}/search?suggest=${encodeURIComponent(val.trim())}`);
            const data = await resp.json();
            if (data.suggestions?.length > 0) {
              setSuggestions(data.suggestions);
              setShowSuggestions(true);
            } else {
              setSuggestions([]);
              setShowSuggestions(false);
            }
          } catch { setShowSuggestions(false); }
        }, 250);
      }, []);

      // 제안 선택 시 검색어 세팅 + 즉시 검색 실행
      const handleSelectSuggestion = useCallback((text) => {
        setSearchQuery(text);
        setShowSuggestions(false);
        setActiveIdx(-1);
        // 다음 틱에서 검색 실행 (searchQuery가 업데이트된 후)
        setTimeout(() => {
          // handleSearch가 최신 searchQuery를 참조하도록 직접 fetch
          (async () => {
            setLoading(true); setError(null); setResults(null); setVisibleCount(PAGE_SIZE);
            try {
              const params = new URLSearchParams({ q: text.trim(), type: searchType, limit: '50' });
              if (filterDocIds.length > 0) params.set('docIds', filterDocIds.join(','));
              if (filterChapter) params.set('chapter', filterChapter);
              if (useParentRetriever) params.set('parentRetriever', 'true');
              const res = await authFetch(`${API_BASE_URL}/search?${params}`);
              if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `검색 실패`); }
              setResults(await res.json());
            } catch (err) { setError(err.message); }
            finally { setLoading(false); }
          })();
        }, 0);
      }, [searchType, filterDocIds, filterChapter, useParentRetriever]);

      // 자동완성 매칭 텍스트 하이라이트
      const highlightMatch = useCallback((text, query) => {
        if (!query || !text) return text;
        const idx = text.toLowerCase().indexOf(query.toLowerCase());
        if (idx < 0) return text;
        return React.createElement(React.Fragment, null,
          text.slice(0, idx),
          React.createElement('span', { className: 'text-primary font-semibold' }, text.slice(idx, idx + query.length)),
          text.slice(idx + query.length)
        );
      }, []);

      // 검색 실행
      const handleSearch = useCallback(async () => {
        setShowSuggestions(false);
        setShowRecent(false);
        if (!searchQuery.trim()) return;
        setLoading(true);
        setError(null);
        setResults(null);
        setVisibleCount(PAGE_SIZE);
        saveRecentSearch(searchQuery);

        try {
          const params = new URLSearchParams({
            q: searchQuery.trim(),
            type: searchType,
            limit: '50',
          });
          if (filterDocIds.length > 0) params.set('docIds', filterDocIds.join(','));
          if (filterChapter) params.set('chapter', filterChapter);
          if (useParentRetriever) params.set('parentRetriever', 'true');
          const res = await authFetch(`${API_BASE_URL}/search?${params}`);
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error || `검색 실패 (${res.status})`);
          }
          setResults(await res.json());
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [searchQuery, searchType, filterDocIds, filterChapter, useParentRetriever, saveRecentSearch]);

      const handleKeyDown = useCallback((e) => {
        // 자동완성 드롭다운이 열려 있으면 키보드 내비게이션 처리
        if (showSuggestions && suggestions.length > 0) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            setActiveIdx(prev => prev < suggestions.length - 1 ? prev + 1 : 0);
            return;
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            setActiveIdx(prev => prev > 0 ? prev - 1 : suggestions.length - 1);
            return;
          }
          if (e.key === 'Enter' && activeIdx >= 0) {
            e.preventDefault();
            const selected = suggestions[activeIdx];
            handleSelectSuggestion(selected.text);
            return;
          }
          if (e.key === 'Escape') {
            setShowSuggestions(false);
            setActiveIdx(-1);
            return;
          }
        }
        if (e.key === 'Enter') handleSearch();
      }, [handleSearch, showSuggestions, suggestions, activeIdx, handleSelectSuggestion]);

      // 검색어 하이라이트
      // 검색어 하이라이트 — 다중 단어 각각 매칭 + 첫 매칭 위치 중심 발췌
      const highlightText = useCallback((text, query) => {
        if (!query || !text) return text;
        const maxLen = 350;

        // 검색어를 공백 기준으로 분리하여 각 단어별 매칭 (2글자 이상만)
        const terms = query.trim().split(/\s+/).filter(t => t.length >= 1);
        if (terms.length === 0) return text.length > maxLen ? text.slice(0, maxLen) + '...' : text;

        // 정규식 구성: 모든 검색 단어를 OR로 묶어서 하나의 패턴으로 생성
        const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
        const pattern = new RegExp(`(${escaped.join('|')})`, 'gi');

        // 첫 번째 매칭 위치를 기준으로 발췌문 생성
        const firstMatch = text.search(pattern);
        let excerpt = text;
        if (text.length > maxLen) {
          if (firstMatch >= 0) {
            const start = Math.max(0, firstMatch - 60);
            const end = Math.min(text.length, start + maxLen);
            excerpt = (start > 0 ? '...' : '') + text.slice(start, end) + (end < text.length ? '...' : '');
          } else {
            excerpt = text.slice(0, maxLen) + '...';
          }
        }

        // 매칭 부분을 mark 엘리먼트로 변환
        const parts = excerpt.split(pattern);
        const lowerTerms = terms.map(t => t.toLowerCase());
        return parts.map((part, i) =>
          lowerTerms.includes(part.toLowerCase())
            ? React.createElement('mark', { key: i, className: 'search-mark' }, part)
            : part
        );
      }, []);

      // 검색 결과 카드 (클릭 시 문서 탭으로 이동하여 해당 섹션까지 스크롤)
      const ResultCard = ({ r, children }) => (
        <Card hoverable onClick={() => {
          const sectionInfo = { sectionIndex: r.sectionIndex, label: r.label };
          if (r.documentId && onNavigateToDoc) onNavigateToDoc(r.documentId, sectionInfo);
          else if (r.documentId) setSelectedDocId(r.documentId);
        }}>
          {children}
          {r.documentId && (
            <div className="flex justify-end mt-2 pt-2 border-t border-border/50">
              <span className="flex items-center gap-1 text-xs text-primary">
                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                </svg>
                클릭하면 문서 상세로 이동
              </span>
            </div>
          )}
        </Card>
      );

      const { isApiDisabled } = React.useContext(ApiKeyStatusContext);
      // vector 검색만 완전 차단, hybrid는 FTS fallback 가능하므로 허용
      const searchDisabled = searchType === 'vector' ? isApiDisabled('openai') : false;

      return (
        <div className="space-y-4 fade-in">
          <DisabledApiBanner providers={['openai', 'cohere']} featureName="검색" />
          {/* 검색 입력 */}
          <Card>
            <div className="space-y-3">
              <div className="flex gap-2">
                <div className="relative flex-1">
                  <input
                    type="text"
                    value={searchQuery}
                    onChange={e => handleQueryChange(e.target.value)}
                    onKeyDown={handleKeyDown}
                    onFocus={() => {
                      if (suggestions.length > 0) setShowSuggestions(true);
                      else if (!searchQuery.trim() && recentSearches.length > 0) setShowRecent(true);
                    }}
                    onBlur={() => setTimeout(() => { setShowSuggestions(false); setShowRecent(false); }, 200)}
                    placeholder="검색어를 입력하세요..."
                    className="w-full px-3 py-2 bg-bg border border-border rounded-lg text-text placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                    autoComplete="off"
                  />
                  {/* F19: 자동완성 드롭다운 (키보드 내비게이션 + 매칭 하이라이트) */}
                  {showSuggestions && suggestions.length > 0 && (
                    <div ref={suggestRef} className="absolute z-20 top-full left-0 right-0 mt-1 bg-card-bg border border-border rounded-lg shadow-lg overflow-hidden max-h-64 overflow-y-auto">
                      {suggestions.map((s, i) => (
                        <button
                          key={i}
                          onMouseDown={() => handleSelectSuggestion(s.text)}
                          onMouseEnter={() => setActiveIdx(i)}
                          className={`w-full text-left px-3 py-2.5 text-sm transition-colors flex items-start gap-2.5 border-b border-border/30 last:border-b-0 ${
                            i === activeIdx ? 'bg-primary/10 text-text' : 'text-text hover:bg-card-bg-hover'
                          }`}
                        >
                          {/* 타입별 아이콘: 문서=파일, 섹션=텍스트 */}
                          {s.type === 'section' ? (
                            <svg className="w-4 h-4 text-blue-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h7" /></svg>
                          ) : (
                            <svg className="w-4 h-4 text-emerald-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                          )}
                          <div className="min-w-0 flex-1">
                            <div className="truncate">{highlightMatch(s.text, searchQuery)}</div>
                            {/* 섹션인 경우 출처 문서명 표시 */}
                            {s.type === 'section' && s.doc_title && (
                              <div className="text-xs text-text-secondary mt-0.5 truncate">
                                {s.doc_title}{s.label ? ` > ${s.label}` : ''}
                              </div>
                            )}
                            {/* 문서인 경우 카테고리 표시 */}
                            {s.type === 'document' && s.category && (
                              <div className="text-xs text-text-secondary mt-0.5">{s.category}</div>
                            )}
                          </div>
                          {/* 타입 뱃지 */}
                          <span className={`shrink-0 text-xs px-1.5 py-0.5 rounded ${
                            s.type === 'section' ? 'bg-blue-500/15 text-blue-400' : 'bg-emerald-500/15 text-emerald-400'
                          }`}>{s.type === 'section' ? '본문' : '문서'}</span>
                        </button>
                      ))}
                      {/* 하단 안내 */}
                      <div className="px-3 py-1.5 text-xs text-text-secondary bg-bg/50 flex items-center gap-2">
                        <kbd className="px-1 py-0.5 bg-border rounded text-xs">↑↓</kbd> 이동
                        <kbd className="px-1 py-0.5 bg-border rounded text-xs">Enter</kbd> 선택
                        <kbd className="px-1 py-0.5 bg-border rounded text-xs">Esc</kbd> 닫기
                      </div>
                    </div>
                  )}
                  {/* 최근 검색어 드롭다운 (입력창이 비어있고 자동완성이 없을 때 표시) */}
                  {showRecent && !showSuggestions && recentSearches.length > 0 && (
                    <div className="absolute z-20 top-full left-0 right-0 mt-1 bg-card-bg border border-border rounded-lg shadow-lg overflow-hidden">
                      <div className="flex items-center justify-between px-3 py-2 border-b border-border/50">
                        <span className="text-xs font-medium text-text-secondary">최근 검색어</span>
                        <button
                          onMouseDown={(e) => { e.preventDefault(); clearRecentSearches(); setShowRecent(false); }}
                          className="text-xs text-red-400 hover:text-red-300 transition-colors"
                        >전체 삭제</button>
                      </div>
                      {recentSearches.map((q, i) => (
                        <div key={i} className="flex items-center gap-2 px-3 py-2 hover:bg-card-bg-hover transition-colors border-b border-border/20 last:border-b-0">
                          <svg className="w-3.5 h-3.5 text-text-secondary shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                          </svg>
                          <button
                            onMouseDown={() => { setSearchQuery(q); setShowRecent(false); setTimeout(() => handleSelectSuggestion(q), 0); }}
                            className="flex-1 text-left text-sm text-text truncate hover:text-primary transition-colors"
                          >{q}</button>
                          <button
                            onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); removeRecentSearch(q); }}
                            className="text-text-secondary hover:text-red-400 transition-colors shrink-0 p-0.5"
                            title="삭제"
                          >
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                            </svg>
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <Button onClick={handleSearch} disabled={loading || !searchQuery.trim() || searchDisabled}>
                  {searchDisabled ? 'API 비활성' : loading ? '검색 중...' : '검색'}
                </Button>
              </div>
              {/* 검색 타입 선택 */}
              <div className="flex gap-2 flex-wrap">
                {[
                  { key: 'hybrid', label: '통합 검색' },
                  { key: 'text', label: '텍스트 검색' },
                  { key: 'vector', label: '의미 검색' },
                ].map(t => (
                  <button key={t.key}
                    onClick={() => { setSearchType(t.key); setResults(null); }}
                    className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                      searchType === t.key ? 'bg-primary text-white' : 'bg-border text-text-secondary hover:text-text'
                    }`}
                  >{t.label}</button>
                ))}
                {/* Parent Retriever 토글 */}
                {searchType === 'hybrid' && (
                  <button
                    onClick={() => setUseParentRetriever(!useParentRetriever)}
                    className={`flex items-center gap-1 px-2.5 py-1.5 rounded-full text-sm font-medium transition-colors ${
                      useParentRetriever
                        ? 'bg-violet-500 text-white shadow-sm'
                        : 'bg-border text-text-secondary hover:bg-violet-50 hover:text-violet-600'
                    }`}
                    title="Parent Document Retriever: 작은 청크로 정밀 검색 후 부모 컨텍스트 반환"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    PD
                  </button>
                )}
                {/* 필터 토글 */}
                <button
                  onClick={() => setShowFilters(!showFilters)}
                  className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                    showFilters || filterDocIds.length > 0 || filterChapter
                      ? 'bg-yellow-500/20 text-yellow-400'
                      : 'bg-border text-text-secondary hover:text-text'
                  }`}
                >
                  필터 {(filterDocIds.length > 0 || filterChapter) ? '(활성)' : ''}
                </button>
              </div>

              {/* 필터 패널 */}
              {showFilters && (
                <div className="space-y-2 p-3 bg-bg rounded-lg border border-border">
                  <MultiSelect
                    label="문서 범위 (복수 선택 가능)"
                    selectedIds={filterDocIds}
                    onChange={setFilterDocIds}
                    options={docList.map(d => ({ value: String(d.id), label: d.title }))}
                    placeholder="전체 문서"
                  />
                  <Input
                    label="장/절 필터"
                    value={filterChapter}
                    onChange={e => setFilterChapter(e.target.value)}
                    placeholder="예: 제1장, 총칙"
                  />
                  {(filterDocIds.length > 0 || filterChapter) && (
                    <button
                      onClick={() => { setFilterDocIds([]); setFilterChapter(''); }}
                      className="text-xs text-red-500 hover:text-red-300"
                    >필터 초기화</button>
                  )}
                </div>
              )}

              <p className="text-xs text-text-secondary">
                {searchType === 'hybrid'
                  ? '키워드 + 의미 검색을 RRF 알고리즘으로 합산하고, Rerank로 정밀 재순위화합니다. 최고 품질의 검색 결과를 제공합니다.'
                  : searchType === 'text'
                  ? '입력한 단어가 포함된 문서를 검색합니다. (FTS 전문검색 우선, 1글자는 ILIKE 폴백)'
                  : '입력한 내용과 의미가 유사한 문서를 벡터 임베딩으로 검색합니다.'}
              </p>
            </div>
          </Card>

          {/* 로딩 */}
          {loading && (
            <div className="flex items-center justify-center py-12">
              <div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin" />
            </div>
          )}

          {/* 에러 */}
          {error && (
            <Card className="border-red-200 bg-red-50">
              <p className="text-sm text-red-500">{error}</p>
            </Card>
          )}

          {/* Few-shot: 유사 과거 질문 제안 (검색 탭) */}
          {searchFewShots.length > 0 && !loading && (
            <div className="mb-3 p-3 bg-amber-500/5 border border-amber-500/20 rounded-xl">
              <div className="flex items-center gap-1 mb-2">
                <svg className="w-3.5 h-3.5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                </svg>
                <span className="text-xs font-semibold text-amber-400">유사한 과거 질문</span>
                <button onClick={() => setSearchFewShots([])} className="ml-auto text-[10px] text-text-secondary hover:text-red-400">닫기</button>
              </div>
              <div className="space-y-1.5">
                {searchFewShots.map((s, i) => (
                  <button key={s.id || i}
                    onClick={() => { setSearchQuery(s.question); setSearchFewShots([]); }}
                    className="w-full text-left p-2 bg-background/50 rounded-lg hover:bg-amber-500/10 transition-colors">
                    <div className="text-xs text-text">{s.question}</div>
                    {s.conclusion && <div className="text-[10px] text-text-secondary mt-0.5 line-clamp-1">{s.conclusion}</div>}
                    <span className="text-[9px] text-amber-500/70">유사도 {(s.score * 100).toFixed(0)}%</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* 검색 결과 */}
          {results && !loading && (
            <div className="space-y-3">
              <p className="text-sm text-text-secondary">
                "{results.query}" 검색 결과: <span className="text-text font-medium">{results.count}건</span>
                <span className="text-xs ml-1">(클릭하면 문서 상세로 이동)</span>
              </p>

              {/* FN1: 확장 검색어 표시 — 동의어 사전으로 검색어가 확장된 경우 표시 */}
              {results.expandedTerms && results.expandedTerms.length > 0 && (
                <div className="flex items-start gap-2 px-3 py-2 bg-primary/10 border border-primary/20 rounded-lg">
                  <svg className="w-4 h-4 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
                  <p className="text-xs text-text-secondary leading-relaxed">
                    <span className="font-medium text-primary">확장 검색어: </span>
                    {results.expandedTerms.map((term, i) => (
                      React.createElement(React.Fragment, { key: i },
                        i > 0 && ', ',
                        React.createElement('span', { className: 'text-text font-medium' }, term)
                      )
                    ))}
                  </p>
                </div>
              )}

              {results.warning && (
                <div className="mb-3 p-3 bg-yellow-50 border border-yellow-200 rounded-lg text-xs text-yellow-800">
                  {results.warning}
                </div>
              )}
              {results.count === 0 ? (
                <EmptyState icon="🔍" title="검색 결과가 없습니다" description={results.warning || "다른 검색어로 시도해보세요."} />
              ) : results.type === 'hybrid' ? (
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => {
                    /* 최고 점수 대비 상대 품질 계산 (0~100%) */
                    const topScore = results.results[0]?.rrfScore || 1;
                    const quality = Math.min(100, Math.round((r.rrfScore / topScore) * 100));
                    return (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        {/* 상단: 제목 + 카테고리 + 매칭 방식 + 라벨 */}
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{highlightText(r.documentTitle, results.query)}</span>
                          <Badge color={r.category === '법령' ? 'primary' : r.category === '기출' ? 'green' : r.category === '규정' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          {r.vectorRank && r.ftsRank
                            ? <Badge color="green">양쪽 매칭</Badge>
                            : r.vectorRank
                            ? <Badge color="blue">의미 매칭</Badge>
                            : <Badge color="yellow">키워드 매칭</Badge>}
                          {r.label && <Badge color="gray">{r.label}</Badge>}
                        </div>
                        {/* 점수 바: RRF 품질 시각화 + 상세 점수 */}
                        <div className="flex items-center gap-2">
                          <div className="flex-1 h-1.5 bg-border rounded-full overflow-hidden">
                            <div className="h-full rounded-full transition-all"
                              style={{ width: `${quality}%`, background: quality >= 80 ? 'var(--primary)' : quality >= 50 ? '#f59e0b' : 'var(--text-secondary)' }} />
                          </div>
                          <div className="flex items-center gap-1.5 text-[10px] text-text-secondary shrink-0">
                            <span title="RRF 합산 점수">RRF {(r.rrfScore * 1000).toFixed(1)}</span>
                            {r.similarity && <span title="벡터 유사도">| 유사도 {(r.similarity * 100).toFixed(0)}%</span>}
                            {r.vectorRank && <span title="벡터 검색 순위">V{r.vectorRank}위</span>}
                            {r.ftsRank && <span title="키워드 검색 순위">K{r.ftsRank}위</span>}
                          </div>
                        </div>
                        {/* 본문 — headline(FTS 매칭)이 있으면 우선 표시 */}
                        {r.headline ? (
                          <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words fts-headline"
                            dangerouslySetInnerHTML={{ __html: r.headline }}
                          />
                        ) : (
                          <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                            {highlightText(r.chunkText, results.query)}
                          </p>
                        )}
                      </div>
                    </ResultCard>
                    );
                  })}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      더보기 ({visibleCount}/{results.results.length}건)
                    </button>
                  )}
                </>
              ) : results.type === 'fts' ? (
                /* FTS 전문 검색 결과 — ts_headline 하이라이팅 + FTS 점수 표시 */
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{highlightText(r.documentTitle, results.query)}</span>
                          <Badge color={r.category === '법령' ? 'primary' : r.category === '기출' ? 'green' : r.category === '규정' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          {r.label ? <Badge color="gray">{r.label}</Badge> : <Badge color="gray">섹션 {r.sectionIndex + 1}</Badge>}
                          <span className="text-xs text-text-secondary">FTS {(r.ftsScore * 1000).toFixed(1)}</span>
                        </div>
                        {/* ts_headline이 있으면 <mark> 태그가 포함된 하이라이팅 표시 */}
                        {r.headline ? (
                          <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words fts-headline"
                            dangerouslySetInnerHTML={{ __html: r.headline }}
                          />
                        ) : (
                          <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                            {highlightText(r.rawText, results.query)}
                          </p>
                        )}
                      </div>
                    </ResultCard>
                  ))}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      더보기 ({visibleCount}/{results.results.length}건)
                    </button>
                  )}
                </>
              ) : results.type === 'text' ? (
                /* ILIKE 폴백 (1글자 검색 등) */
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{highlightText(r.documentTitle, results.query)}</span>
                          <Badge color={r.category === '법령' ? 'primary' : r.category === '기출' ? 'green' : r.category === '규정' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          {r.label ? <Badge color="gray">{highlightText(r.label, results.query)}</Badge> : <Badge color="gray">섹션 {r.sectionIndex + 1}</Badge>}
                        </div>
                        <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                          {highlightText(r.rawText, results.query)}
                        </p>
                      </div>
                    </ResultCard>
                  ))}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      더보기 ({visibleCount}/{results.results.length}건)
                    </button>
                  )}
                </>
              ) : (
                <>
                  {results.results.slice(0, visibleCount).map((r, idx) => (
                    <ResultCard key={idx} r={r}>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-text text-sm">{highlightText(r.documentTitle, results.query)}</span>
                          <Badge color={r.category === '법령' ? 'primary' : r.category === '기출' ? 'green' : r.category === '규정' ? 'yellow' : 'gray'}>{r.category}</Badge>
                          <Badge color="green">유사도 {(r.similarity * 100).toFixed(1)}%</Badge>
                          {r.label && <Badge color="gray">{highlightText(r.label, results.query)}</Badge>}
                        </div>
                        <p className="text-sm text-text/80 leading-relaxed whitespace-pre-wrap break-words">
                          {highlightText(r.chunkText, results.query)}
                        </p>
                      </div>
                    </ResultCard>
                  ))}
                  {visibleCount < results.results.length && (
                    <button
                      onClick={() => setVisibleCount(prev => prev + PAGE_SIZE)}
                      className="w-full py-3 text-sm font-medium text-primary bg-card-bg border border-border rounded-xl hover:bg-card-bg-hover transition-colors"
                    >
                      더보기 ({visibleCount}/{results.results.length}건)
                    </button>
                  )}
                </>
              )}
            </div>
          )}

          {/* 검색 결과에서 문서 상세 모달 */}
          <DocumentDetailModal
            isOpen={selectedDocId !== null}
            onClose={() => setSelectedDocId(null)}
            documentId={selectedDocId}
          />
        </div>
      );
    }

    // ========================================
    // 임베딩 모델 설정 패널
    // ========================================
    function EmbeddingModelPanel() {
      const [currentModel, setCurrentModel] = useState('openai');
      const [availableModels, setAvailableModels] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);

      // 모델별 아이콘/색상
      const MODEL_STYLES = {
        openai: { color: '#10a37f', icon: 'O', label: 'OpenAI' },
        upstage: { color: '#ff6b35', icon: 'U', label: 'Upstage Solar' },
        cohere: { color: '#39594d', icon: 'C', label: 'Cohere' },
      };

      // 설정 로드
      useEffect(() => {
        (async () => {
          try {
            const res = await authFetch(`${API_BASE_URL}/settings?key=embeddingModel`);
            if (res.ok) {
              const data = await res.json();
              setCurrentModel(data.value || 'openai');
              setAvailableModels(data.availableModels || []);
            }
          } catch (err) {
            console.error('[임베딩 설정]', err);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      // 모델 변경 저장
      const handleSave = useCallback(async (modelId) => {
        // 차원이 다르면 경고
        const currentDim = availableModels.find(m => m.id === currentModel)?.dimensions;
        const newDim = availableModels.find(m => m.id === modelId)?.dimensions;
        if (currentDim && newDim && currentDim !== newDim) {
          const ok = confirm(
            `벡터 차원이 ${currentDim} → ${newDim}으로 변경됩니다.\n` +
            `기존 문서의 임베딩이 초기화되며, 모든 문서의 임베딩을 재생성해야 합니다.\n\n계속하시겠습니까?`
          );
          if (!ok) return;
        }

        setSaving(true);
        try {
          const res = await authFetch(`${API_BASE_URL}/settings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: 'embeddingModel', value: modelId }),
          });
          if (!res.ok) {
            const e = await res.json().catch(() => ({}));
            throw new Error(e.error || '저장 실패');
          }
          setCurrentModel(modelId);
          setSaved(true);
          setTimeout(() => setSaved(false), 5000);
        } catch (err) {
          alert(`임베딩 모델 변경 실패: ${err.message}`);
        } finally {
          setSaving(false);
        }
      }, [currentModel, availableModels]);

      if (loading) {
        return <div className="text-center py-8 text-sm text-text-secondary">로딩 중...</div>;
      }

      return (
        <div className="space-y-4">
          {/* 안내 */}
          <Card>
            <div className="space-y-2">
              <h3 className="text-sm font-bold text-text">임베딩 모델 선택</h3>
              <p className="text-xs text-text-secondary leading-relaxed">
                문서 인덱싱과 검색에 사용할 임베딩 모델을 선택합니다.
                모델 변경 후에는 기존 문서의 <strong>임베딩을 재생성</strong>해야 검색이 정상 동작합니다.
                (차원 수가 달라 기존 벡터와 호환되지 않습니다)
              </p>
            </div>
          </Card>

          {/* 모델 카드 */}
          {availableModels.map(m => {
            const style = MODEL_STYLES[m.id] || MODEL_STYLES.openai;
            const isSelected = currentModel === m.id;
            return (
              <Card key={m.id}>
                <div className={`relative ${isSelected ? 'ring-2 ring-primary rounded-lg -m-4 p-4' : ''}`}>
                  {/* 선택 표시 */}
                  {isSelected && (
                    <div className="absolute top-2 right-2 w-5 h-5 bg-primary rounded-full flex items-center justify-center">
                      <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                      </svg>
                    </div>
                  )}

                  <div className="flex items-start gap-3">
                    {/* 아이콘 */}
                    <div className="w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold text-sm shrink-0"
                      style={{ backgroundColor: style.color }}>
                      {style.icon}
                    </div>

                    <div className="flex-1 min-w-0">
                      {/* 이름 + 뱃지 */}
                      <div className="flex items-center gap-2 mb-1">
                        <h4 className="text-sm font-bold text-text">{style.label}</h4>
                        {m.id === 'upstage' && (
                          <span className="text-[10px] px-1.5 py-0.5 rounded bg-orange-100 text-orange-700 font-medium">한국어 1위</span>
                        )}
                        {m.id === 'cohere' && (
                          <span className="text-[10px] px-1.5 py-0.5 rounded bg-teal-100 text-teal-700 font-medium">검색 최적화</span>
                        )}
                        {!m.available && (
                          <span className="text-[10px] px-1.5 py-0.5 rounded bg-red-100 text-red-600 font-medium">API 키 없음</span>
                        )}
                      </div>

                      {/* 모델명 + 차원 */}
                      <p className="text-xs text-text-secondary mb-1">
                        <code className="bg-bg px-1 py-0.5 rounded text-[11px]">{m.model}</code>
                        <span className="mx-1.5">·</span>
                        <span>{m.dimensions.toLocaleString()}차원</span>
                      </p>

                      {/* 설명 */}
                      <p className="text-xs text-text-secondary">{m.description}</p>

                      {/* 선택 버튼 */}
                      {!isSelected && m.available && (
                        <button
                          onClick={() => handleSave(m.id)}
                          disabled={saving}
                          className="mt-2 px-3 py-1.5 text-xs bg-primary text-white rounded-lg hover:bg-primary/90 disabled:opacity-40 transition-colors"
                        >
                          {saving ? '변경 중...' : '이 모델 사용'}
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              </Card>
            );
          })}

          {/* 저장 완료 알림 */}
          {saved && (
            <div className="text-center text-xs text-green-600 bg-green-50 rounded-lg py-3 space-y-1">
              <p className="font-medium">임베딩 모델이 변경되었습니다.</p>
              <p>기존 문서는 문서 목록에서 "임베딩 재생성"을 실행해주세요.</p>
            </div>
          )}

          {/* 주의사항 */}
          <Card>
            <div className="space-y-2">
              <h4 className="text-xs font-bold text-amber-600">모델 변경 시 주의사항</h4>
              <ul className="text-xs text-text-secondary space-y-1 list-disc list-inside">
                <li>모델마다 벡터 차원이 다릅니다 (1024 / 1536 / 4096)</li>
                <li>모델 변경 후 기존 문서는 검색 정확도가 떨어질 수 있습니다</li>
                <li>문서 상세 페이지에서 "임베딩 재생성" 버튼으로 업데이트하세요</li>
                <li>Upstage Solar는 한국어 법률 문서에 가장 높은 정확도를 제공합니다</li>
              </ul>
            </div>
          </Card>
        </div>
      );
    }

    // LLM 설정 패널 컴포넌트 (관리 탭 내 서브탭)
    // ========================================
    function LlmSettingsPanel() {
      const [settings, setSettings] = useState(() => loadLlmSettings());
      const [saved, setSaved] = useState(false);

      // 프로바이더별 설정 업데이트 헬퍼
      const updateProvider = useCallback((provider, key, value) => {
        setSettings(prev => ({
          ...prev,
          [provider]: { ...prev[provider], [key]: value },
        }));
        setSaved(false);
      }, []);

      // 모델 변경 시 해당 모델의 기본값 적용
      const handleModelChange = useCallback((provider, modelId) => {
        const catalogs = { gemini: GEMINI_CATALOG, openai: OPENAI_CATALOG, claude: CLAUDE_CATALOG };
        const info = catalogs[provider]?.find(m => m.id === modelId);
        const isG3 = provider === 'gemini' && modelId.startsWith('gemini-3');
        setSettings(prev => ({
          ...prev,
          [provider]: {
            ...prev[provider],
            model: modelId,
            temperature: 0.3,
            // Gemini 3.x: thinkingLevel (budget 초기화), 2.5: thinkingBudget (level 초기화)
            ...(provider === 'gemini' && info?.thinking && isG3 ? { thinkingLevel: 'medium', thinkingBudget: 0 } : {}),
            ...(provider === 'gemini' && info?.thinking && !isG3 ? { thinkingBudget: 4096, thinkingLevel: '' } : {}),
            ...(provider === 'gemini' && !info?.thinking ? { thinkingBudget: 0, thinkingLevel: '' } : {}),
            // OpenAI o-시리즈: reasoningEffort 기본값
            ...(provider === 'openai' && info?.reasoning ? { reasoningEffort: 'medium' } : {}),
          },
        }));
        setSaved(false);
      }, []);

      // 저장
      const handleSave = useCallback(() => {
        llmSettings = JSON.parse(JSON.stringify(settings));
        saveLlmSettings(settings);
        setSaved(true);
        setTimeout(() => setSaved(false), 3000);
      }, [settings]);

      // 초기화
      const handleReset = useCallback(() => {

    // ========================================
    // 구조화 답변 렌더링 컴포넌트
    // ========================================
    // LLM 응답을 결론/근거 체인/교차 참조/주의사항 섹션으로 분리 표시
    function ParsedAnswer({ parsed, raw, sources, isStreaming }) {

        if (isStreaming && looksLikeJson) {
          return React.createElement('div', { className: 'text-sm text-text-secondary flex items-center gap-2' },
            React.createElement('div', { className: 'w-4 h-4 border-2 border-primary border-t-transparent rounded-full animate-spin' }),
            '답변 생성 중...'

        }
        // 스트리밍 완료 후 JSON이면 본문 텍스트를 추출해서 표시
        if (looksLikeJson) {
          try {
            // 코드 블록 제거 + 불완전 JSON 복구 시도
            let jsonStr = raw.replace(/^```(?:json)?\s*\n?|\n?\s*```$/g, '').trim();
            // 닫는 중괄호 누락 시 추가
            const opens = (jsonStr.match(/\{/g) || []).length;
            const closes = (jsonStr.match(/\}/g) || []).length;
            if (opens > closes) jsonStr += '}'.repeat(opens - closes);
            // 마지막에 쉼표가 있으면 제거
            jsonStr = jsonStr.replace(/,\s*\}/g, '}');

            const obj = JSON.parse(jsonStr);
            // 다양한 키명 지원: conclusion, 결론, answer, summary, response 등
            const text = obj.conclusion || obj['결론'] || obj.answer || obj.summary
              || obj.response || obj['답변'] || obj['요약']
              // 위 키가 모두 없으면 모든 문자열 값을 합침
              || Object.values(obj).filter(v => typeof v === 'string' && v.length > 20).join('\n\n');

            if (text) {
              return React.createElement('div', {
                className: 'text-sm text-text leading-relaxed markdown-body break-words',
                dangerouslySetInnerHTML: {
                  __html: typeof marked !== 'undefined' ? marked.parse(text) : text
                }
              });
            }
          } catch {
            // JSON 파싱 완전 실패 시 → JSON 속 텍스트 부분만 정규식으로 추출
            const textMatch = raw.match(/"(?:conclusion|결론|answer|summary|response|답변)"\s*:\s*"((?:[^"\\]|\\.)*)"/);
            if (textMatch) {
              const extracted = textMatch[1].replace(/\\n/g, '\n').replace(/\\"/g, '"');
              return React.createElement('div', {
                className: 'text-sm text-text leading-relaxed markdown-body break-words',
                dangerouslySetInnerHTML: {
                  __html: typeof marked !== 'undefined' ? marked.parse(extracted) : extracted

            }

        }
        // 일반 텍스트/마크다운 렌더링
        return React.createElement('div', {
          className: 'text-sm text-text leading-relaxed markdown-body break-words',
          dangerouslySetInnerHTML: {
            __html: typeof marked !== 'undefined' ? marked.parse(raw || '') : (raw || '')
          }
        });
      }

      const { conclusion, evidenceChain, crossReferences, caveats, warnings, format } = parsed;

      // 근거 검증 통계
      const verifiedCount = (evidenceChain || []).filter(s => s.verified !== false).length;
      const unverifiedCount = (evidenceChain || []).filter(s => s.verified === false).length;
      const totalSteps = (evidenceChain || []).length;
      const allVerified = totalSteps > 0 && unverifiedCount === 0;

      return React.createElement('div', { className: 'space-y-2' },
        // 환각 경고 배너 — 미검증 근거가 있을 때 눈에 띄게 표시

          className: 'flex items-start gap-2.5 p-3 bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800 rounded-lg'

            React.createElement('svg', {
              className: 'w-4 h-4 text-red-500', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'
            }, React.createElement('path', {
              strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2,
              d: 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z'
            }))

          React.createElement('div', { className: 'flex-1 min-w-0' },
            React.createElement('p', { className: 'text-xs font-bold text-red-700 dark:text-red-400' },
              `AI 답변 신뢰도 주의 — ${unverifiedCount}건의 미검증 근거 발견`
            ),
            React.createElement('p', { className: 'text-[11px] text-red-600/80 dark:text-red-400/70 mt-0.5 leading-relaxed' },
              'AI가 인용한 근거 번호가 실제 검색된 자료에 존재하지 않습니다. 해당 부분은 AI가 생성한 내용(환각)일 수 있으므로, 반드시 원문을 직접 확인해주세요.'

        warnings && warnings.length > 0 && React.createElement('div', {

        // 결론 섹션
        conclusion && React.createElement('div', {

        },
          React.createElement('div', { className: 'flex items-center gap-1.5 mb-1.5' },
            React.createElement('span', { className: 'text-blue-600 dark:text-blue-400 text-xs font-bold' }, '\u{1F4A1} 결론')

              React.createElement('span', { className: 'text-text-secondary font-normal' }, `(${totalSteps}단계)`),
              // 신뢰도 요약 배지
              allVerified
                ? React.createElement('span', {
                    className: 'px-1.5 py-0.5 rounded-full text-[10px] font-medium bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400',

                               matchedSource.similarity >= 0.6 ? 'text-yellow-600 dark:text-yellow-400' : 'text-text-secondary'
                  }, `· ${(matchedSource.similarity * 100).toFixed(1)}%`)

            className: 'w-full flex items-center justify-between px-3 py-2 bg-bg hover:bg-card-bg transition-colors text-left',
            onClick: () => setShowCrossRefs(v => !v)
          },
            React.createElement('span', { className: 'text-xs font-bold text-text flex items-center gap-1' },
              '\u{1F517} \uAD50\uCC28 \uCC38\uC870',
              React.createElement('span', { className: 'text-text-secondary font-normal' }, `(${crossReferences.length}\uAC74)`)
            ),
            React.createElement('svg', {
              className: `w-3.5 h-3.5 text-text-secondary transition-transform ${showCrossRefs ? 'rotate-180' : ''}`,
              fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'
            }, React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M19 9l-7 7-7-7' }))
          ),
          showCrossRefs && React.createElement('div', { className: 'px-3 pb-2 space-y-1 pt-1' },
            crossReferences.map((ref, i) => React.createElement('div', {

            },
              React.createElement('span', { className: 'text-text font-medium' }, ref.from),
              React.createElement('span', { className: 'text-purple-500 font-bold' }, `\u2192 (${ref.relation}) \u2192`),
              React.createElement('span', { className: 'text-text font-medium' }, ref.to)

          React.createElement('div', { className: 'flex items-center gap-1 mb-1' },
            React.createElement('span', { className: 'text-amber-600 dark:text-amber-400 text-xs font-bold' }, '\u26A0\uFE0F \uC8FC\uC758\uC0AC\uD56D')
          ),
          React.createElement('div', {

            onClick: () => setShowRaw(v => !v)
          }, showRaw ? '\u25B2 \uC6D0\uBCF8 \uC811\uAE30' : `\u25BC \uC6D0\uBCF8 \uBCF4\uAE30 (${format})`),
        ),
        showRaw && React.createElement('div', {
          className: 'text-xs text-text-secondary bg-bg rounded p-2 border border-border max-h-60 overflow-y-auto markdown-body',
