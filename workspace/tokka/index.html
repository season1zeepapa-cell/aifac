                    {emoji}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* 메시지 입력 */}
          <div className="bg-white border-t border-gray-100 px-3 py-2">
            <div className="flex items-end gap-2">
              {/* 이모지 버튼 */}
              <button
                onClick={() => setShowEmoji(prev => !prev)}
                className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 transition-all ${
                  showEmoji ? 'bg-pink-light text-pink-main' : 'text-gray-400 hover:text-gray-600'
                }`}
              >
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </button>
              <textarea
                ref={inputRef}
                value={inputText}
                onChange={e => setInputText(e.target.value)}
                onKeyDown={handleKeyDown}
                onFocus={() => setShowEmoji(false)}
                placeholder="메시지를 입력하세요"
                rows={1}
                className="flex-1 resize-none px-4 py-2.5 bg-gray-100 rounded-2xl text-sm border-none max-h-24 leading-snug"
                style={{ minHeight: '40px' }}
                onInput={e => {
                  e.target.style.height = 'auto';
                  e.target.style.height = Math.min(e.target.scrollHeight, 96) + 'px';
                }}
              />
              <button
                onClick={sendMessage}
                disabled={!inputText.trim() || sending}
                className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 transition-all ${
                  inputText.trim()
                    ? 'bg-pink-main text-white shadow-md shadow-pink-main/30'
                    : 'bg-gray-200 text-gray-400'
                }`}
              >
                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
              </button>
            </div>
          </div>

          {/* 멤버 초대 모달 */}
          <InviteModal
            isOpen={showInvite}
            onClose={() => setShowInvite(false)}
            roomId={roomId}
            currentMembers={room?.members || []}
          />
        </div>
      );
    }

    // 멤버 초대 모달
    function InviteModal({ isOpen, onClose, roomId, currentMembers }) {
      const { showToast } = useApp();
      const [friends, setFriends] = useState([]);
      const [selectedIds, setSelectedIds] = useState([]);
      const [loading, setLoading] = useState(false);
      const [inviting, setInviting] = useState(false);

      const currentMemberIds = useMemo(() => currentMembers.map(m => m.id), [currentMembers]);

      useEffect(() => {
        if (isOpen) {
          setLoading(true);
          apiFetch('/friends')
            .then(data => {
              const allFriends = data.friends || data || [];
              // 이미 방에 있는 사람 제외
              setFriends(allFriends.filter(f => !currentMemberIds.includes(f.id)));
            })
            .catch(err => showToast(err.message, 'error'))
            .finally(() => setLoading(false));
          setSelectedIds([]);
        }
      }, [isOpen, showToast, currentMemberIds]);

      const handleInvite = async () => {
        if (selectedIds.length === 0) return;
        setInviting(true);
        try {
          await apiFetch(`/rooms/${roomId}/invite`, {
            method: 'POST',
            body: JSON.stringify({ memberIds: selectedIds }),
          });
          showToast('멤버를 초대했습니다!', 'success');
          onClose();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setInviting(false);
        }
      };

      return (
        <FullModal isOpen={isOpen} onClose={onClose} title="멤버 초대"
          rightAction={
            <button
              onClick={handleInvite}
              disabled={inviting || selectedIds.length === 0}
              className="text-pink-main font-semibold text-sm disabled:opacity-40"
            >
              {inviting ? '...' : '초대'}
            </button>
          }
        >
          <div className="p-4">
            {loading ? (
              <Spinner className="py-8" />
            ) : friends.length === 0 ? (
              <EmptyState icon="👥" title="초대할 친구가 없습니다" />
            ) : (
              friends.map(friend => {
                const selected = selectedIds.includes(friend.id);
                return (
                  <div
                    key={friend.id}
                    className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors ${
                      selected ? 'bg-pink-light' : 'hover:bg-gray-50'
                    }`}
                    onClick={() => setSelectedIds(prev =>
                      prev.includes(friend.id) ? prev.filter(x => x !== friend.id) : [...prev, friend.id]
                    )}
                  >
                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${
                      selected ? 'border-pink-main bg-pink-main' : 'border-gray-300'
                    }`}>
                      {selected && (
                        <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                        </svg>
                      )}
                    </div>
                    <Avatar src={friend.profile_image} name={friend.nickname} size="sm" />
                    <p className="font-semibold text-sm">{friend.nickname}</p>
                  </div>
                );
              })
            )}
          </div>
        </FullModal>
      );
    }

    // ========================================
    // 페이지: 설정 / 프로필
    // ========================================
    function SettingsPage() {
      const { user, logout, updateUser, showToast } = useApp();
      const [editing, setEditing] = useState(false);
      const [nickname, setNickname] = useState(user?.nickname || '');
      const [statusMessage, setStatusMessage] = useState(user?.status_message || '');
      const [saving, setSaving] = useState(false);
      const [uploading, setUploading] = useState(false);
      const [showPhotoPreview, setShowPhotoPreview] = useState(false);
      const [currentTheme, setCurrentTheme] = useState(localStorage.getItem('tokka_theme') || 'pink');
      const [showThemePicker, setShowThemePicker] = useState(false);
      const [isDark, setIsDark] = useState(() => localStorage.getItem('tokka_dark') === '1');
      const fileInputRef = useRef(null);

      useEffect(() => {
        setIsDark(localStorage.getItem('tokka_dark') === '1');
      }, []);
      const [showBlocked, setShowBlocked] = useState(false);
      const [blockedUsers, setBlockedUsers] = useState([]);
      const [loadingBlocked, setLoadingBlocked] = useState(false);

      // 비밀번호 변경 상태
      const [showPasswordChange, setShowPasswordChange] = useState(false);
      const [currentPassword, setCurrentPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [showCurrentPw, setShowCurrentPw] = useState(false);
      const [showNewPw, setShowNewPw] = useState(false);
      const [showConfirmPw, setShowConfirmPw] = useState(false);
      const [changingPassword, setChangingPassword] = useState(false);

      // 비밀번호 변경 핸들러
      const handlePasswordChange = async () => {
        if (!currentPassword || !newPassword || !confirmPassword) {
          showToast('모든 항목을 입력해주세요.', 'error');
          return;
        }
        if (newPassword.length < 6) {
          showToast('새 비밀번호는 6자 이상이어야 합니다.', 'error');
          return;
        }
        if (newPassword !== confirmPassword) {
          showToast('새 비밀번호가 일치하지 않습니다.', 'error');
          return;
        }
        setChangingPassword(true);
        try {
          await apiFetch('/users/password', {
            method: 'PUT',
            body: JSON.stringify({ currentPassword, newPassword }),
          });
          showToast('비밀번호가 변경되었습니다.', 'success');
          setShowPasswordChange(false);
          setCurrentPassword('');
          setNewPassword('');
          setConfirmPassword('');
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setChangingPassword(false);
        }
      };

      // 회원 탈퇴 상태
      const [showWithdraw, setShowWithdraw] = useState(false);
      const [withdrawReasons, setWithdrawReasons] = useState([]);
      const [withdrawing, setWithdrawing] = useState(false);

      const WITHDRAW_REASONS = [
        { id: 'not_useful', label: '서비스가 유용하지 않아요' },
        { id: 'too_complex', label: '사용이 어려워요' },
        { id: 'privacy', label: '개인정보가 걱정돼요' },
        { id: 'other_service', label: '다른 서비스를 사용해요' },
        { id: 'temporary', label: '잠시 쉬고 싶어요' },
        { id: 'other', label: '기타' },
      ];

      const toggleWithdrawReason = (reasonId) => {
        setWithdrawReasons(prev => 
          prev.includes(reasonId) 
            ? prev.filter(r => r !== reasonId)
            : [...prev, reasonId]
        );
      };

      const handleWithdraw = async () => {
        setWithdrawing(true);
        try {
          await apiFetch('/users/account', {
            method: 'DELETE',
            body: JSON.stringify({ reasons: withdrawReasons }),
          });
          showToast('회원 탈퇴가 완료되었습니다. 이용해주셔서 감사합니다.', 'success');
          logout();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setWithdrawing(false);
        }
      };

      // 테마 변경
      const handleThemeChange = (themeId) => {
        applyTheme(themeId);
        setCurrentTheme(themeId);
        setShowThemePicker(false);
      };

      // 차단된 유저 목록 조회
      const fetchBlockedUsers = async () => {
        setLoadingBlocked(true);
        try {
          const data = await apiFetch('/friends/blocked');
          setBlockedUsers(data);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setLoadingBlocked(false);
        }
      };

      // 차단 해제
      const handleUnblock = async (userId) => {
        try {
          await apiFetch(`/friends/${userId}/unblock`, { method: 'POST' });
          setBlockedUsers(prev => prev.filter(u => u.id !== userId));
          showToast('차단이 해제되었습니다.', 'success');
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      useEffect(() => {
        if (user) {
          setNickname(user.nickname || '');
          setStatusMessage(user.status_message || '');
        }
      }, [user]);

      // 프로필 수정 저장
      const handleSave = async () => {
        setSaving(true);
        try {
          const data = await apiFetch('/users/profile', {
            method: 'PUT',
            body: JSON.stringify({ nickname, status_message: statusMessage }),
          });
          updateUser({ nickname, status_message: statusMessage });
          showToast('프로필이 수정되었습니다.', 'success');
          setEditing(false);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setSaving(false);
        }
      };

      // 프로필 이미지 업로드 (자동 압축)
      const handleImageUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        setUploading(true);
        try {
          // 이미지 압축 (800x800, JPEG 80%)
          const compressedBlob = await compressImage(file, 800, 800, 0.8);
          
          // 압축 후에도 4MB 초과 시 에러 (안전장치)
          if (compressedBlob.size > 4 * 1024 * 1024) {
            showToast('이미지가 너무 큽니다. 다른 이미지를 선택해주세요.', 'error');
            setUploading(false);
            return;
          }

          // Blob을 File 객체로 변환 (MIME 타입 명시)
          const compressedFile = new File([compressedBlob], 'profile.jpg', { type: 'image/jpeg' });
          
          const formData = new FormData();
          formData.append('image', compressedFile);

          const data = await apiFetch('/users/profile-image', {
            method: 'POST',
            body: formData,
          });
          updateUser({ profile_image: data.profile_image });
          showToast('프로필 사진이 변경되었습니다.', 'success');
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setUploading(false);
        }
      };

      return (
        <AppShell>
          <div className="flex flex-col h-full app-bg">
            {/* 그라데이션 헤더 + 프로필 통합 */}
            <div className="bg-gradient-to-br from-pink-main to-pink-dark px-4 pt-8 pb-6 text-white">
              <div className="flex items-center justify-between mb-5">
                <h1 className="text-2xl font-extrabold text-white">설정</h1>
                {!editing && (
                  <button
                    onClick={() => setEditing(true)}
                    className="text-sm text-white font-semibold bg-white/20 px-3 py-1.5 rounded-xl hover:bg-white/30"
                  >
                    편집
                  </button>
                )}
              </div>

              {/* 프로필 */}
              <div className="flex flex-col items-center">
                <div className="relative">
                  <div className="p-0.5 rounded-full bg-white/30">
                    <Avatar
                      src={user?.profile_image}
                      name={user?.nickname}
                      size="2xl"
                      className="border-4 border-white/20"
                      onClick={() => {
                        if (!editing && user?.profile_image) {
                          setShowPhotoPreview(true);
                        }
                      }}
                    />
                  </div>
                  {editing && (
                    <button
                      onClick={() => fileInputRef.current?.click()}
                      disabled={uploading}
                      className="absolute bottom-1 right-1 w-9 h-9 bg-white rounded-full flex items-center justify-center shadow-lg"
                    >
                      {uploading ? (
                        <div className="w-4 h-4 border-2 border-pink-main border-t-transparent rounded-full animate-spin" />
                      ) : (
                        <svg className="w-5 h-5 text-pink-main" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                      )}
                    </button>
                  )}
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={handleImageUpload}
                  />
                </div>

                {editing ? (
                  <div className="mt-4 w-full space-y-3">
                    <input
                      type="text"
                      value={nickname}
                      onChange={e => setNickname(e.target.value)}
                      placeholder="닉네임"
                      className="w-full px-4 py-2.5 bg-white/20 rounded-xl text-white placeholder-white/60 text-center font-bold border-none"
                      style={{ outline: 'none', boxShadow: 'none' }}
                    />
                    <input
                      type="text"
                      value={statusMessage}
                      onChange={e => setStatusMessage(e.target.value)}
                      placeholder="상태 메시지"
                      className="w-full px-4 py-2.5 bg-white/20 rounded-xl text-white placeholder-white/60 text-center text-sm border-none"
                      style={{ outline: 'none', boxShadow: 'none' }}
                    />
                    <div className="flex gap-2 pt-2">
                      <Button
                        variant="ghost"
                        size="sm"
                        className="flex-1 !text-white hover:!bg-white/10"
                        onClick={() => {
                          setEditing(false);
                          setNickname(user?.nickname || '');
                          setStatusMessage(user?.status_message || '');
                        }}
                      >
                        취소
                      </Button>
                      <button
                        onClick={handleSave}
                        disabled={saving}
                        className="flex-1 py-1.5 bg-white text-pink-main rounded-xl font-semibold text-sm hover:bg-white/90 disabled:opacity-50"
                      >
                        {saving ? '저장 중...' : '저장'}
                      </button>
                    </div>
                  </div>
                ) : (
                  <>
                    <h2 className="mt-4 text-xl font-bold">{user?.nickname}</h2>
                    <p className="text-white/70 text-sm mt-1">
                      {user?.status_message || '상태 메시지를 입력해주세요'}

                    <p className="text-white/50 text-xs mt-2">{user?.email}</p>

                )}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto">
              {/* 메뉴 항목들 */}
              <div className="mt-4 mx-4">
                <div className="bg-gray-50 dark:bg-gray-800/80 rounded-2xl overflow-hidden">
                  <button
                    onClick={() => setEditing(true)}
                    className="w-full flex items-center gap-3 px-4 py-3.5 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                  >
                    <div className="w-9 h-9 bg-blue-100 rounded-xl flex items-center justify-center">
                      <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                      </svg>
                    </div>
                    <span className="text-sm font-medium text-gray-700 dark:text-gray-200">프로필 수정</span>
                    <svg className="w-5 h-5 text-gray-300 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                    </svg>
                  </button>
                  <div className="h-px bg-gray-200 dark:bg-gray-600 mx-4" />
                  <button
                    onClick={() => { applyDarkMode(!isDark); setIsDark(!isDark); }}
                    className="w-full flex items-center gap-3 px-4 py-3.5 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                  >
                    <div className="w-9 h-9 bg-indigo-100 dark:bg-indigo-900/50 rounded-xl flex items-center justify-center text-lg">

                      <svg className="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />

                    <span className="text-sm font-medium text-gray-700 dark:text-gray-200">비밀번호 변경</span>
                    <svg className="w-5 h-5 text-gray-300 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                    </div>
                    <span className="text-sm font-medium text-gray-700">차단 관리</span>
                    <svg className="w-5 h-5 text-gray-300 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />

                    <svg className="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                  </div>
                  <span className="text-sm font-medium text-red-500">로그아웃</span>
                </button>
              </div>

              {/* 회원 탈퇴 */}
              <div className="mx-4 mb-8">
                <button

              <div className="text-center pb-8">
                <p className="text-xs text-gray-300">TOKKA v1.0.0</p>

            </div>

            {/* 차단 관리 모달 */}
            {showBlocked && (
              <div className="absolute inset-0 bg-black/40 z-50 flex items-end justify-center">
                <div className="bg-white w-full rounded-t-2xl max-h-[70%] flex flex-col animate-slide-up">

                    <button onClick={() => setShowBlocked(false)} className="text-gray-400 hover:text-gray-600">
                      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4">
                    {loadingBlocked ? (
                      <div className="flex justify-center py-8">

                      <div className="text-center py-8 text-gray-400 text-sm">

                      <div className="space-y-2">

                              <p className="font-semibold text-sm text-gray-900 truncate">{u.nickname}</p>
                              <p className="text-xs text-gray-400 truncate">{u.email}</p>
                            </div>
                            <button
                              onClick={() => handleUnblock(u.id)}
                              className="px-3 py-1.5 text-xs font-semibold text-pink-main bg-pink-50 rounded-lg hover:bg-pink-100 transition-colors"
                            >
                              해제
                            </button>
                          </div>

                    )}
                  </div>
                </div>
              </div>

            {/* 비밀번호 변경 모달 */}
            {showPasswordChange && (
              <div className="absolute inset-0 bg-black/40 z-50 flex items-end justify-center" onClick={() => setShowPasswordChange(false)}>
                <div className="bg-white dark:bg-gray-900 w-full rounded-t-2xl flex flex-col sheet-up" onClick={e => e.stopPropagation()}>
                  <div className="flex items-center justify-between px-4 py-3.5 border-b border-gray-100 dark:border-gray-700">
                    <h3 className="font-bold text-gray-900 dark:text-white text-base">비밀번호 변경</h3>
                    <button onClick={() => setShowPasswordChange(false)} className="text-gray-400 hover:text-gray-600 p-1">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />

                  </div>
                  <div className="p-5 pb-8 space-y-4">
                    {/* 현재 비밀번호 */}
                    <div className="relative">
                      <input
                        type={showCurrentPw ? 'text' : 'password'}

                        value={currentPassword}
                        onChange={e => setCurrentPassword(e.target.value)}
                        className="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl text-sm pr-12 border-none"
                        style={{ outline: 'none' }}
                      />
                      <button
                        type="button"
                        onClick={() => setShowCurrentPw(!showCurrentPw)}
                        className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 p-1"
                      >
                        {showCurrentPw ? (
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />

                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />

                    {/* 새 비밀번호 */}

                        type={showNewPw ? 'text' : 'password'}

                      <button
                        type="button"

                      >
                        {showNewPw ? (
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                          </svg>

                          </svg>

                      </button>
                    </div>
                    {/* 새 비밀번호 확인 */}
                    <div className="relative">
                      <input
                        type={showConfirmPw ? 'text' : 'password'}
                        placeholder="새 비밀번호 확인"

                      />
                      <button
                        type="button"
                        onClick={() => setShowConfirmPw(!showConfirmPw)}
                        className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 p-1"
                      >
                        {showConfirmPw ? (
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                          </svg>
                        ) : (
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />

                    </div>
                    {/* 변경 버튼 */}

                      onClick={handlePasswordChange}
                      disabled={changingPassword}
                      className="w-full py-3 bg-pink-main text-white rounded-xl font-semibold text-sm hover:bg-pink-dark disabled:opacity-50 transition-colors"
                    >
                      {changingPassword ? '변경 중...' : '비밀번호 변경'}

                  </div>
                </div>
              </div>
            )}

            {/* 회원 탈퇴 모달 */}
            {showWithdraw && (
              <div className="absolute inset-0 bg-black/40 z-50 flex items-end justify-center" onClick={() => setShowWithdraw(false)}>
                <div className="bg-white dark:bg-gray-900 w-full rounded-t-2xl flex flex-col sheet-up max-h-[85vh]" onClick={e => e.stopPropagation()}>
                  <div className="flex items-center justify-between px-4 py-3.5 border-b border-gray-100 dark:border-gray-700">
                    <h3 className="font-bold text-gray-900 dark:text-white text-base">회원 탈퇴</h3>
                    <button onClick={() => setShowWithdraw(false)} className="text-gray-400 hover:text-gray-600 p-1">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>
                  </div>
                  <div className="p-5 pb-8 space-y-5 overflow-y-auto">
                    {/* 경고 안내 */}
                    <div className="bg-red-50 dark:bg-red-900/30 rounded-xl p-4">
                      <div className="flex items-start gap-3">
                        <div className="w-10 h-10 bg-red-100 dark:bg-red-800 rounded-full flex items-center justify-center flex-shrink-0">
                          <svg className="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                          </svg>
                        </div>
                        <div>
                          <p className="font-semibold text-red-600 dark:text-red-400 text-sm">탈퇴 시 삭제되는 정보</p>
                          <ul className="mt-2 text-xs text-red-500 dark:text-red-300 space-y-1">
                            <li>• 모든 친구 등록 정보</li>
                            <li>• 모든 채팅방 및 대화 기록</li>
                            <li>• 프로필 정보 및 계정</li>
                          </ul>
                          <p className="mt-2 text-xs text-red-400">삭제된 데이터는 복구할 수 없습니다.</p>
                        </div>
                      </div>
                    </div>

                    {/* 탈퇴 사유 설문 */}
                    <div>
                      <p className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">탈퇴 사유를 알려주세요 (선택)</p>
                      <div className="space-y-2">
                        {WITHDRAW_REASONS.map(reason => (
                          <label
                            key={reason.id}
                            className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors ${
                              withdrawReasons.includes(reason.id)
                                ? 'bg-pink-50 dark:bg-pink-900/30 border-2 border-pink-main'
                                : 'bg-gray-50 dark:bg-gray-800 border-2 border-transparent'
                            }`}
                          >
                            <input
                              type="checkbox"
                              checked={withdrawReasons.includes(reason.id)}
                              onChange={() => toggleWithdrawReason(reason.id)}
                              className="w-4 h-4 rounded border-gray-300 text-pink-main focus:ring-pink-main"
                            />
                            <span className="text-sm text-gray-700 dark:text-gray-300">{reason.label}</span>
                          </label>
                        ))}
                      </div>
                    </div>

                    {/* 버튼 영역 */}
                    <div className="flex gap-3 pt-2">
                      <button
                        onClick={() => setShowWithdraw(false)}
                        className="flex-1 py-3 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-xl font-semibold text-sm hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"
                      >
                        취소
                      </button>
                      <button
                        onClick={handleWithdraw}
                        disabled={withdrawing}
                        className="flex-1 py-3 bg-red-500 text-white rounded-xl font-semibold text-sm hover:bg-red-600 disabled:opacity-50 transition-colors"
                      >
                        {withdrawing ? '처리 중...' : '탈퇴하기'}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {showThemePicker && (
              <div className="absolute inset-0 bg-black/40 z-50 flex items-end justify-center" onClick={() => setShowThemePicker(false)}>
                <div className="bg-white w-full rounded-t-2xl flex flex-col sheet-up" onClick={e => e.stopPropagation()}>
                  <div className="flex items-center justify-between px-4 py-3.5 border-b border-gray-100">
                    <h3 className="font-bold text-gray-900 text-base">테마 변경</h3>
                    <button onClick={() => setShowThemePicker(false)} className="text-gray-400 hover:text-gray-600 p-1">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>
                  </div>
                  <div className="p-5 pb-8">
                    <div className="grid grid-cols-3 gap-3">
                      {THEMES.map(theme => {
                        const isActive = currentTheme === theme.id;
                        return (
                          <button
                            key={theme.id}
                            onClick={() => handleThemeChange(theme.id)}
                            className={`flex flex-col items-center gap-2 p-3 rounded-2xl border-2 transition-all ${
                              isActive ? 'border-gray-900 bg-gray-50' : 'border-transparent hover:bg-gray-50'
                            }`}
                          >
                            <div
                              className="w-12 h-12 rounded-full shadow-md flex items-center justify-center text-xl"
                              style={{
                                background: `linear-gradient(135deg, ${theme.main}, ${theme.dark})`
                              }}
                            >
                              {theme.emoji}
                            </div>
                            <span className="text-xs font-medium text-gray-700">{theme.label}</span>
                            {isActive && (
                              <div className="w-5 h-5 rounded-full flex items-center justify-center" style={{ background: theme.main }}>
                                <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                                </svg>
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </div>
                    <p className="text-center text-xs text-gray-400 mt-4">채팅 말풍선과 UI 색상이 변경됩니다</p>
                  </div>
                </div>
              </div>
            )}

            {showPhotoPreview && user?.profile_image && (
              <div
                className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center"
                onClick={() => setShowPhotoPreview(false)}
              >
                <button
                  onClick={() => setShowPhotoPreview(false)}
                  className="absolute top-4 right-4 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white"
                >
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
                <img
                  src={user.profile_image}
                  alt={user.nickname}
                  className="max-w-[90vw] max-h-[80vh] rounded-2xl object-contain shadow-2xl"
                  onClick={(e) => e.stopPropagation()}
                />
              </div>
            )}
          </div>
        </AppShell>
      );
    }

    // ========================================
    // 앱 컴포넌트
    // ========================================
    function AppContent() {
      const { user, loading } = useApp();
      const { path, navigate } = useRouter();

      // 현재 탭 인덱스 (스와이프 네비게이션용)
      const currentPath = path === '' ? 'friends' : path;
      const currentTabIndex = TAB_ORDER.indexOf(currentPath);
      const isMainTab = currentTabIndex !== -1;

      // 스와이프로 다음/이전 탭 이동
      const goNextTab = useCallback(() => {
        if (currentTabIndex >= 0 && currentTabIndex < TAB_ORDER.length - 1) {
          navigate(TAB_ORDER[currentTabIndex + 1]);
        }
      }, [currentTabIndex, navigate]);

      const goPrevTab = useCallback(() => {
        if (currentTabIndex > 0) {
          navigate(TAB_ORDER[currentTabIndex - 1]);
        }
      }, [currentTabIndex, navigate]);

      const { handleTouchStart, handleTouchMove, handleTouchEnd } = useSwipe(goNextTab, goPrevTab);

      // 인증 리다이렉트
      useEffect(() => {
        if (!loading && !user) {
          if (path !== 'login' && path !== 'register') {
            navigate('login');
          }
        }
      }, [loading, user, path, navigate]);

      // 로그인 후 기본 페이지
      useEffect(() => {
        if (!loading && user) {
          if (path === 'login' || path === 'register' || path === '') {
            navigate('friends');
          }
        }
      }, [loading, user, path, navigate]);

      if (loading) {
        return (
          <div className="flex items-center justify-center h-screen bg-white">
            <div className="text-center">
              <div className="w-16 h-16 bg-pink-main rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-pink-main/30">
                <svg className="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                </svg>
              </div>
              <Spinner className="mb-3" />
              <p className="text-gray-400 text-sm">로딩 중...</p>
            </div>
          </div>
        );
      }

      // 라우팅
      // 채팅방은 chat/:roomId 패턴
      const chatMatch = matchRoute('chat/:roomId', path);

      if (path === 'login') return <LoginPage />;
      if (path === 'register') return <RegisterPage />;

      // 로그인 필요한 페이지
      if (!user) return null;

      // 채팅방은 스와이프 미적용
      if (chatMatch) return <ChatRoomPage roomId={chatMatch.roomId} />;

      // 메인 탭 페이지들 (스와이프 적용)
      let page;
      if (path === 'friends' || path === '') page = <FriendsPage />;
      else if (path === 'chats') page = <ChatsPage />;
      else if (path === 'settings') page = <SettingsPage />;
      else page = <FriendsPage />;

      return (
        <div
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
          className="h-full"
        >
          {page}
        </div>
      );
    }

    function App() {
      return (
        <div className="max-w-[420px] mx-auto h-screen bg-white shadow-2xl shadow-gray-300/50 relative overflow-hidden">
          <AppProvider>
            <Router>
              <AppContent />
              <ToastContainer />
            </Router>
          </AppProvider>
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
